<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart - Jewellery Store</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f9f9f9;
  }

  header {
    background: #111;
    color: gold;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .container {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
  }

  .cart-items {
    flex: 2;
    min-width: 300px;
  }

  .summary {
    flex: 1;
    min-width: 250px;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    height: fit-content;
  }

  .item {
    display: flex;
    gap: 10px;
    background: #fff;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
    align-items: center;
  }

  .item img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
  }

  .details {
    flex: 1;
  }

  .price {
    color: green;
    font-weight: bold;
  }

  button {
    padding: 5px 10px;
    border: none;
    background: gold;
    cursor: pointer;
    border-radius: 5px;
  }

  .remove {
    background: red;
    color: #fff;
  }

  .summary h3 {
    margin-top: 0;
  }

  .line {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
  }

  .checkout {
    width: 100%;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
  }

</style>
</head>

<body>

<header>
  <div>Jewellery Store</div>
  <div>Cart</div>
</header>

<div class="container">

  <!-- CART ITEMS -->
  <div class="cart-items" id="cartItems"></div>

  <!-- SUMMARY -->
  <div class="summary">
    <h3>Order Summary</h3>

    <div class="line">
      <span>Subtotal</span>
      <span id="subtotal">₹0</span>
    </div>

    <div class="line">
      <span>Shipping</span>
      <span>₹50</span>
    </div>

    <div class="line">
      <b>Total</b>
      <b id="total">₹0</b>
    </div>

    <button class="checkout">Proceed to Checkout</button>
  </div>

</div>

<script>

let cart = [
  {name:"Gold Necklace", price:1200, qty:1, image:"https://via.placeholder.com/100"},
  {name:"Diamond Ring", price:800, qty:2, image:"https://via.placeholder.com/100"}
];

function renderCart() {
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  let subtotal = 0;

  cart.forEach((item, index) => {
    subtotal += item.price * item.qty;

    container.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <div class="details">
          <h4>${item.name}</h4>
          <div class="price">₹${item.price}</div>

          <div>
            Qty:
            <button onclick="decrease(${index})">-</button>
            ${item.qty}
            <button onclick="increase(${index})">+</button>
          </div>

          <button class="remove" onclick="removeItem(${index})">Remove</button>
        </div>
      </div>
    `;
  });

  document.getElementById("subtotal").innerText = "₹" + subtotal;
  document.getElementById("total").innerText = "₹" + (subtotal + 50);
}

function increase(i) {
  cart[i].qty++;
  renderCart();
}

function decrease(i) {
  if(cart[i].qty > 1) {
    cart[i].qty--;
  }
  renderCart();
}

function removeItem(i) {
  cart.splice(i, 1);
  renderCart();
}

renderCart();

</script>

</body>
</html>
