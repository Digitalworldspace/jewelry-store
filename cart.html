<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Cart | Shopping Bag</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            padding-bottom: 70px;
        }
        .cart-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        h2 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .cart-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .cart-item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
        }
        .cart-item-details { flex: 1; }
        .cart-item-name { font-weight: 600; margin-bottom: 4px; }
        .cart-item-price { color: var(--gold); font-weight: 600; margin: 8px 0; }
        .cart-item-total { font-weight: bold; margin-top: 8px; }
        .remove-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 18px;
        }
        .cart-summary {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .summary-row.total {
            border-bottom: none;
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            padding-top: 15px;
        }
        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        .clear-cart-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #dc3545;
            color: #dc3545;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
        .empty-cart {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 16px;
        }
        .empty-cart i { font-size: 60px; color: #ccc; margin-bottom: 15px; }
        .continue-shop {
            display: inline-block;
            margin-top: 15px;
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid #e9ecef;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="cart-container">
        <h2><i class="fas fa-shopping-bag"></i> Shopping Cart</h2>
        <div id="cartItems"></div>
        <div id="cartSummary"></div>
    </div>
    
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop"><i class="fas fa-search"></i><span>Shop</span></a>
        <a data-page="cart" class="active"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="account"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // URL Masking Navigation
        function navigateTo(page) {
            if (window.parent !== window) {
                window.parent.postMessage({ page: page }, '*');
            } else {
                window.location.href = page + '.html';
            }
        }
        
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.style.background = '#dc3545';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadCart() {
            try {
                const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (error) throw error;
                const cart = data?.items || [];
                
                if (!cart.length) {
                    document.getElementById('cartItems').innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <h3>Your cart is empty</h3>
                            <a class="continue-shop" data-page="shop">Continue Shopping →</a>
                        </div>
                    `;
                    document.getElementById('cartSummary').innerHTML = '';
                    document.querySelectorAll('.continue-shop').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.preventDefault();
                            navigateTo('shop');
                        });
                    });
                    return;
                }
                
                let itemsHtml = '';
                let subtotal = 0;
                for (const item of cart) {
                    const itemTotal = item.price * item.quantity;
                    subtotal += itemTotal;
                    itemsHtml += `
                        <div class="cart-item">
                            <img class="cart-item-image" src="${item.image}" onerror="this.src='https://via.placeholder.com/70x70'">
                            <div class="cart-item-details">
                                <div class="cart-item-name">${escapeHtml(item.name)}</div>
                                <div class="cart-item-sku">SKU: ${item.sku}</div>
                                <div class="cart-item-price">₹${item.price.toLocaleString()} × ${item.quantity}</div>
                                <div class="cart-item-total">Total: ₹${itemTotal.toLocaleString()}</div>
                            </div>
                            <button class="remove-btn" onclick="removeItem(${item.id})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                }
                
                const tax = Math.round(subtotal * 0.18);
                const shipping = subtotal >= 3000 ? 0 : 100;
                const total = subtotal + tax + shipping;
                
                document.getElementById('cartItems').innerHTML = itemsHtml;
                document.getElementById('cartSummary').innerHTML = `
                    <div class="cart-summary">
                        <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                        <div class="summary-row"><span>Shipping</span><span>₹${shipping}</span></div>
                        <div class="summary-row"><span>GST (18%)</span><span>₹${tax.toLocaleString()}</span></div>
                        <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
                        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
                        <button class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }
        
        window.removeItem = async function(id) {
            try {
                const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (error) throw error;
                let items = data?.items || [];
                items = items.filter(i => i.id !== id);
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                await supabase.from('carts').upsert({ session_id: sessionId, items: items, total: total, updated_at: new Date().toISOString() }, { onConflict: 'session_id' });
                showToast('Item removed');
                loadCart();
            } catch (error) {
                showToast('Failed to remove', true);
            }
        };
        
        window.clearCart = async function() {
            if (!confirm('Clear all items from cart?')) return;
            try {
                await supabase.from('carts').upsert({ session_id: sessionId, items: [], total: 0, updated_at: new Date().toISOString() }, { onConflict: 'session_id' });
                showToast('Cart cleared');
                loadCart();
            } catch (error) {
                showToast('Failed to clear', true);
            }
        };
        
        window.checkout = function() {
            navigateTo('checkout');
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        loadCart();
    </script>
</body>
</html>
