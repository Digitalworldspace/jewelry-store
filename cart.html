<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shopping Cart - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --dark: #1a1a1a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --danger: #dc3545;
            --success: #28a745;
        }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; padding-bottom: 70px; }
        
        header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--gray-200);
        }
        .logo { font-size: 20px; font-weight: 600; color: var(--primary); font-family: 'Playfair Display', serif; text-decoration: none; }
        .back-btn { font-size: 20px; color: var(--gray-600); text-decoration: none; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        
        .cart-item {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            position: relative;
            border: 1px solid var(--gray-200);
        }
        .cart-item-image { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
        .cart-item-details { flex: 1; }
        .cart-item-details h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .cart-item-sku { font-size: 10px; color: var(--gray-600); }
        .cart-item-price { font-weight: 600; color: var(--primary); margin: 8px 0; }
        
        .quantity-control { display: flex; align-items: center; gap: 8px; }
        .quantity-btn {
            width: 32px; height: 32px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .quantity-btn:hover { background: var(--primary); color: white; }
        .quantity-input { width: 50px; height: 32px; text-align: center; border: 1px solid var(--gray-200); border-radius: 8px; }
        .cart-item-total { font-weight: 700; margin-top: 8px; }
        .remove-item {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--danger);
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
        }
        .remove-item:hover { background: var(--danger); color: white; border-radius: 50%; }
        
        .empty-cart { text-align: center; padding: 60px 20px; background: white; border-radius: 16px; }
        .empty-cart i { font-size: 60px; color: var(--gray-200); margin-bottom: 15px; }
        .continue-shopping {
            display: inline-block;
            background: var(--primary);
            color: var(--dark);
            padding: 10px 25px;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 15px;
        }
        
        .cart-summary {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--gray-200);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-200);
        }
        .summary-row.total {
            border-bottom: none;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            padding-top: 15px;
        }
        .shipping-info {
            background: var(--gray-100);
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-size: 12px;
        }
        .shipping-progress {
            margin-top: 8px;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }
        .shipping-progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s;
        }
        .checkout-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--dark);
            text-align: center;
            border-radius: 40px;
            font-weight: 600;
            margin: 15px 0 10px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .clear-cart-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 40px;
            cursor: pointer;
        }
        .clear-cart-btn:hover { background: var(--danger); color: white; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
        }
        .toast-error { background: #dc3545; }
        .toast-success { background: #28a745; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
        
        @media (min-width: 768px) {
            .container { max-width: 1000px; }
            .cart-item-image { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <a href="index.html" class="logo">STYLE·OF·LIFE</a>
        <div style="width: 28px;"></div>
    </header>

    <div class="container">
        <h1>Shopping Cart</h1>
        <div id="cartItems"></div>
        <div id="cartSummary"></div>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Shop</span></a>
        <a href="cart.html" class="active"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Account</span></a>
    </div>

    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let cart = [];
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        const FREE_SHIPPING = 3000;
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            else toast.classList.add('toast-success');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadCart() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                cart = data?.items || [];
                renderCart();
                updateSummary();
                updateCartCount();
            } catch (error) {
                cart = [];
                renderCart();
            }
        }
        
        async function saveCart() {
            try {
                const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: cart,
                        total: total,
                        updated_at: new Date().toISOString()
                    });
                renderCart();
                updateSummary();
                updateCartCount();
                return true;
            } catch (error) {
                showToast('Failed to save', true);
                return false;
            }
        }
        
        function updateCartCount() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const badges = document.querySelectorAll('.cart-count');
            badges.forEach(b => { if (b) b.textContent = total; });
        }
        
        function updateSummary() {
            const div = document.getElementById('cartSummary');
            if (!cart.length) { div.innerHTML = ''; return; }
            
            let subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const tax = Math.round(subtotal * 0.18);
            let shipping = subtotal >= FREE_SHIPPING ? 0 : 100;
            const total = subtotal + tax + shipping;
            const remaining = FREE_SHIPPING - subtotal;
            const progress = Math.min(100, (subtotal / FREE_SHIPPING) * 100);
            
            div.innerHTML = `
                <div class="cart-summary">
                    <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                    <div class="shipping-info">
                        <i class="fas fa-truck"></i> 
                        ${subtotal >= FREE_SHIPPING ? '🎉 FREE Shipping!' : `Add ₹${remaining} more for FREE shipping`}
                        <div class="shipping-progress"><div class="shipping-progress-fill" style="width: ${progress}%"></div></div>
                    </div>
                    <div class="summary-row"><span>Shipping</span><span>₹${shipping}</span></div>
                    <div class="summary-row"><span>GST (18%)</span><span>₹${tax.toLocaleString()}</span></div>
                    <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
                    <button class="checkout-btn" onclick="goToCheckout()">Checkout →</button>
                    <button class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
                </div>
            `;
        }
        
        window.updateQty = async (id, qty) => {
            qty = parseInt(qty);
            if (qty < 1) qty = 1;
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity = qty;
                await saveCart();
                showToast('Quantity updated');
            }
        };
        
        window.incQty = async (id, cur) => { await updateQty(id, cur + 1); };
        window.decQty = async (id, cur) => { if (cur > 1) await updateQty(id, cur - 1); else await removeItem(id); };
        
        window.removeItem = async (id) => {
            cart = cart.filter(i => i.id !== id);
            await saveCart();
            showToast('Item removed');
        };
        
        window.clearCart = async () => {
            if (!cart.length) { showToast('Cart empty', true); return; }
            if (confirm('Remove all items?')) {
                cart = [];
                await saveCart();
                showToast('Cart cleared');
            }
        };
        
        window.goToCheckout = () => {
            if (!cart.length) { showToast('Cart empty!', true); return; }
            window.location.href = 'checkout.html';
        };
        
        function renderCart() {
            const container = document.getElementById('cartItems');
            if (!cart.length) {
                container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h3>Cart empty</h3><a href="shop.html" class="continue-shopping">Shop Now →</a></div>`;
                return;
            }
            
            let html = '';
            cart.forEach(item => {
                html += `
                    <div class="cart-item">
                        <img class="cart-item-image" src="${item.image || 'https://via.placeholder.com/80x80'}" onerror="this.src='https://via.placeholder.com/80x80'">
                        <div class="cart-item-details">
                            <h4>${escapeHtml(item.name)}</h4>
                            <div class="cart-item-sku">${item.sku}</div>
                            <div class="cart-item-price">₹${item.price.toLocaleString()}</div>
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="decQty(${item.id}, ${item.quantity})">−</button>
                                <input type="number" class="quantity-input" value="${item.quantity}" onchange="updateQty(${item.id}, this.value)">
                                <button class="quantity-btn" onclick="incQty(${item.id}, ${item.quantity})">+</button>
                            </div>
                            <div class="cart-item-total">Total: ₹${(item.price * item.quantity).toLocaleString()}</div>
                        </div>
                        <button class="remove-item" onclick="removeItem(${item.id})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m))); }
        
        loadCart();
    </script>
</body>
</html>
