<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Style OF Life</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff;
    color:#111;
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

.hero{
    text-align:center;
    padding:40px;
}

.btn{
    background:#fff;
    border:2px solid #111;
    padding:10px 20px;
    cursor:pointer;
    font-weight:bold;
}

.btn:hover{
    background:#111;
    color:#fff;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:220px;
    border:1px solid #eee;
    padding:15px;
    text-align:center;
}
</style>
</head>

<body>

<header>Style OF Life</header>

<div class="hero">
    <h1>Luxury Imitation Jewelry</h1>
    <p>Minimal • Elegant • White Theme</p>
    <button class="btn" onclick="loadProducts()">View Collection</button>
</div>

<div class="container" id="products"></div>

<div id="cart"></div>

<script src="app.js"></script>

</body>
</html>
