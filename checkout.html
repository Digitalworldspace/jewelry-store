<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Checkout | Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            padding-bottom: 70px;
        }
        .checkout-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        h2 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .form-box, .summary-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--gray);
            font-size: 13px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .summary-row.total {
            border-bottom: none;
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            padding-top: 15px;
        }
        .place-order-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid #e9ecef;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h2><i class="fas fa-lock"></i> Secure Checkout</h2>
        <div id="checkoutContent">
            <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop"><i class="fas fa-search"></i><span>Shop</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="account"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // URL Masking Navigation
        function navigateTo(page) {
            if (window.parent !== window) {
                window.parent.postMessage({ page: page }, '*');
            } else {
                window.location.href = page + '.html';
            }
        }
        
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.style.background = '#dc3545';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadCheckout() {
            try {
                const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (error) throw error;
                const cart = data?.items || [];
                
                if (!cart.length) {
                    document.getElementById('checkoutContent').innerHTML = `
                        <div class="form-box" style="text-align:center;">
                            <i class="fas fa-shopping-cart" style="font-size: 60px; color: #ccc;"></i>
                            <h3 style="margin: 15px 0;">Your cart is empty</h3>
                            <a data-page="shop" style="color: var(--gold); cursor: pointer;">Continue Shopping →</a>
                        </div>
                    `;
                    return;
                }
                
                let subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                let tax = Math.round(subtotal * 0.18);
                let shipping = subtotal >= 3000 ? 0 : 100;
                let total = subtotal + tax + shipping;
                
                document.getElementById('checkoutContent').innerHTML = `
                    <div class="form-box">
                        <h3 style="margin-bottom: 15px;">Shipping Information</h3>
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="fullName" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" maxlength="10" placeholder="10-digit mobile number">
                        </div>
                        <div class="form-group">
                            <label>Email Address *</label>
                            <input type="email" id="email" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Full Address *</label>
                            <textarea id="address" rows="3" placeholder="House number, street, city, pincode"></textarea>
                        </div>
                    </div>
                    <div class="summary-box">
                        <h3 style="margin-bottom: 15px;">Order Summary</h3>
                        <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                        <div class="summary-row"><span>Shipping</span><span>₹${shipping}</span></div>
                        <div class="summary-row"><span>GST (18%)</span><span>₹${tax.toLocaleString()}</span></div>
                        <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
                        <button class="place-order-btn" onclick="placeOrder()">Place Order (COD) →</button>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading checkout:', error);
            }
        }
        
        window.placeOrder = async function() {
            const name = document.getElementById('fullName')?.value.trim();
            const phone = document.getElementById('phone')?.value.trim();
            const email = document.getElementById('email')?.value.trim();
            const address = document.getElementById('address')?.value.trim();
            
            if (!name || !phone || !email || !address) {
                showToast('Please fill all fields', true);
                return;
            }
            
            if (phone.length !== 10 || !/^\d+$/.test(phone)) {
                showToast('Enter valid 10-digit phone number', true);
                return;
            }
            
            try {
                const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (error) throw error;
                const cart = data?.items || [];
                
                if (!cart.length) {
                    showToast('Cart is empty', true);
                    return;
                }
                
                const orderId = 'ORD' + Date.now();
                const subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                const tax = Math.round(subtotal * 0.18);
                const shipping = subtotal >= 3000 ? 0 : 100;
                const total = subtotal + tax + shipping;
                
                const order = {
                    order_id: orderId,
                    customer_name: name,
                    phone: phone,
                    email: email,
                    address: address,
                    items: cart,
                    subtotal: subtotal,
                    tax: tax,
                    shipping: shipping,
                    total: total,
                    status: 'Pending',
                    payment_status: 'cod',
                    created_at: new Date().toISOString()
                };
                
                await supabase.from('orders').insert([order]);
                await supabase.from('carts').upsert({ session_id: sessionId, items: [], total: 0, updated_at: new Date().toISOString() }, { onConflict: 'session_id' });
                
                showToast(`✅ Order placed! ID: ${orderId}`);
                setTimeout(() => navigateTo('track'), 2000);
            } catch (error) {
                console.error('Error placing order:', error);
                showToast('Failed to place order', true);
            }
        };
        
        loadCheckout();
    </script>
</body>
</html>
