<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- ========== META PIXEL CODE - Facebook Ads Tracking ========== -->

    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=991714683377528&ev=PageView&noscript=1"

    <title>Checkout - Style Of Life | Secure Payment</title>
    <meta name="description" content="Secure checkout at Style Of Life. Pay via Razorpay - Cards, UPI, NetBanking. Free shipping on orders above ₹3000.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://styleoflife987-hub.github.io/jewelry-store/checkout.html">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
        }
        body { font-family: 'Inter', sans-serif; background: var(--white-light); padding-bottom: 70px; }
        
        .checkout-container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .checkout-box { background: white; border-radius: 24px; padding: 25px; border: 1px solid rgba(0,0,0,0.05); }
        h2 { color: var(--gold); margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: var(--gray); font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
        
        .order-summary { background: var(--white-light); border-radius: 16px; padding: 15px; margin: 20px 0; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .summary-row.total { border-bottom: none; font-size: 18px; font-weight: bold; color: var(--gold); padding-top: 12px; border-top: 2px solid var(--gold); }
        
        .place-order-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .place-order-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); text-decoration: none; font-size: 10px; cursor: pointer; }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        .toast-error { background: #dc3545; color: white; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .empty-cart { text-align: center; padding: 60px; }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-box">
            <h2><i class="fas fa-lock"></i> Secure Checkout</h2>
            <div id="checkoutContent"><div class="loading"><div class="spinner"></div><p>Loading checkout...</p></div></div>
        </div>
    </div>
    
    <div id="paymentLoading" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Processing your payment...</div>
    </div>
    
    <div class="bottom-nav">
        <a href="home.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Discover</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Bag</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabaseUrl = "https://kkvgdagjboxhtuyqlomq.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrdmdkYWdqYm94aHR1eXFsb21xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzgyMTksImV4cCI6MjA5MDA1NDIxOX0.5A4UUcvwAi5UM8K81mmrN3lOTmzUYq70qRouaVqpwDA";
        
        const supabase = createClient(supabaseUrl, supabaseAnonKey);
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) { sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('sessionId', sessionId); }
        
        const RAZORPAY_KEY_ID = "rzp_live_Sa1tFsYEgmLi8S";
        let productsCache = {};
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function navigateTo(page) { window.location.href = page + '.html'; }
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function calculateGST(price, gstPercent) {
            const gstAmount = (price * gstPercent) / 100;
            return { gstAmount, total: price + gstAmount };
        }
        
        async function fetchProductGST(productId) {
            if (productsCache[productId]) return productsCache[productId];
            try {
                const { data, error } = await supabase.from('products').select('gst, price').eq('id', productId).single();
                if (error) throw error;
                productsCache[productId] = data;
                return data;
            } catch { return { gst: 18, price: 0 }; }
        }
        
        async function loadCheckout() {
            const container = document.getElementById('checkoutContent');
            try {
                const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (error) throw error;
                const cart = data?.items || [];
                
                if (!cart.length) {
                    container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h3>Your cart is empty</h3><a href="shop.html" style="color: var(--gold); cursor: pointer;">Continue Shopping →</a></div>`;
                    return;
                }
                
                let subtotal = 0, totalGST = 0, itemsHtml = '', gstBreakdown = {};
                for (const item of cart) {
                    const productInfo = await fetchProductGST(item.id);
                    const gstPercent = productInfo?.gst || 18;
                    const { gstAmount, total } = calculateGST(item.price, gstPercent);
                    subtotal += item.price * item.quantity;
                    totalGST += gstAmount * item.quantity;
                    gstBreakdown[gstPercent] = (gstBreakdown[gstPercent] || 0) + (gstAmount * item.quantity);
                    itemsHtml += `<div class="checkout-item"><div>${escapeHtml(item.name)} × ${item.quantity}<div style="font-size:10px;">GST ${gstPercent}%: ₹${(gstAmount * item.quantity).toFixed(2)}</div></div><div>₹${(total * item.quantity).toFixed(2)}</div></div>`;
                }
                
                let gstBreakdownHtml = '';
                for (const [percent, amount] of Object.entries(gstBreakdown)) {
                    gstBreakdownHtml += `<div><span>GST ${percent}%</span><span>₹${amount.toFixed(2)}</span></div>`;
                }
                
                const shipping = subtotal >= 3000 ? 0 : 100;
                const total = subtotal + totalGST + shipping;
                
                container.innerHTML = `
                    <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" placeholder="Enter your full name"></div>
                    <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" maxlength="10" placeholder="10-digit mobile number"></div>
                    <div class="form-group"><label>Email Address *</label><input type="email" id="email" placeholder="your@email.com"></div>
                    <div class="form-group"><label>Delivery Address *</label><textarea id="address" rows="3" placeholder="House number, street, city, pincode"></textarea></div>
                    <div class="order-summary">
                        <div>${itemsHtml}</div>
                        <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                        <div class="gst-breakdown">${gstBreakdownHtml}<div style="border-top:1px solid #ddd; margin-top:5px; padding-top:5px;"><span><strong>Total GST</strong></span><span><strong>₹${totalGST.toFixed(2)}</strong></span></div></div>
                        <div class="summary-row"><span>Shipping</span><span>₹${shipping}</span></div>
                        <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
                    </div>
                    <button class="place-order-btn" id="placeOrderBtn">Pay ₹${total.toLocaleString()} via Razorpay</button>
                `;
                
                document.getElementById('placeOrderBtn').addEventListener('click', () => initiatePayment());
            } catch (error) {
                console.error('Error loading checkout:', error);
                container.innerHTML = '<div class="empty-cart">Error loading checkout. Please try again.</div>';
            }
        }
        
        async function initiatePayment() {
            const name = document.getElementById('fullName')?.value.trim();
            const phone = document.getElementById('phone')?.value.trim();
            const email = document.getElementById('email')?.value.trim();
            const address = document.getElementById('address')?.value.trim();
            
            if (!name || !phone || !email || !address) { showToast('Please fill all shipping details', true); return; }
            if (phone.length !== 10 || !/^\d+$/.test(phone)) { showToast('Enter valid 10-digit phone number', true); return; }
            if (!email.includes('@') || !email.includes('.')) { showToast('Enter valid email address', true); return; }
            
            const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            if (error || !data?.items?.length) { showToast('Your cart is empty', true); return; }
            
            const cart = data.items;
            let subtotal = 0, totalGST = 0, itemsWithGST = [];
            for (const item of cart) {
                const productInfo = await fetchProductGST(item.id);
                const gstPercent = productInfo?.gst || 18;
                const { gstAmount, total } = calculateGST(item.price, gstPercent);
                subtotal += item.price * item.quantity;
                totalGST += gstAmount * item.quantity;
                itemsWithGST.push({ ...item, gst: gstPercent, gstAmount, totalWithGST: total });
            }
            
            const shipping = subtotal >= 3000 ? 0 : 100;
            const total = subtotal + totalGST + shipping;
            const orderId = 'ORD' + Date.now();
            const loadingOverlay = document.getElementById('paymentLoading');
            loadingOverlay.classList.add('active');
            
            try {
                const order = {
                    order_id: orderId, customer_name: name, phone: phone, email: email, address: address,
                    items: itemsWithGST.map(i => ({ id: i.id, sku: i.sku, name: i.name, price: i.price, quantity: i.quantity, gst: i.gst, gstAmount: i.gstAmount })),
                    subtotal: subtotal, total_gst: totalGST, shipping: shipping, total: total,
                    status: 'Pending', payment_status: 'pending', payment_method: 'razorpay', created_at: new Date().toISOString()
                };
                await supabase.from('orders').insert([order]);
                
                const options = {
                    key: RAZORPAY_KEY_ID, amount: Math.round(total * 100), currency: "INR",
                    name: "Style Of Life", description: `Order #${orderId}`,
                    prefill: { name: name, email: email, contact: phone },
                    theme: { color: "#D4AF37" },
                    handler: async function(response) {
                        await supabase.from('orders').update({ payment_status: 'success', payment_id: response.razorpay_payment_id, status: 'Processing' }).eq('order_id', orderId);
                        await supabase.from('carts').upsert({ session_id: sessionId, items: [], total: 0, updated_at: new Date().toISOString() }, { onConflict: 'session_id' });
                        
                        // ========== FACEBOOK PURCHASE EVENT ==========
                        if (typeof fbq !== 'undefined') {
                            fbq('track', 'Purchase', {
                                value: total,
                                currency: 'INR',
                                order_id: orderId
                            });
                            console.log('✅ Facebook Purchase Event Tracked:', { value: total, currency: 'INR', order_id: orderId });
                        }
                        
                        loadingOverlay.classList.remove('active');
                        showToast(`✅ Payment successful! Order ID: ${orderId}`);
                        setTimeout(() => navigateTo('track'), 2000);
                    },
                    modal: { ondismiss: function() { loadingOverlay.classList.remove('active'); showToast('Payment cancelled', true); supabase.from('orders').delete().eq('order_id', orderId); } }
                };
                
                const razorpay = new Razorpay(options);
                razorpay.open();
            } catch (error) {
                console.error('Payment error:', error);
                loadingOverlay.classList.remove('active');
                showToast('Payment failed. Please try again.', true);
                await supabase.from('orders').delete().eq('order_id', orderId);
            }
        }
        
        document.getElementById('phone')?.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10); });
        
        // Facebook InitiateCheckout Event
        if (typeof fbq !== 'undefined') {
            fbq('track', 'InitiateCheckout');
            console.log('✅ Facebook InitiateCheckout Event Tracked');
        }
        
        loadCheckout();
    </script>
</body>
</html>
