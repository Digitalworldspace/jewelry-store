<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Style Of Life</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --dark: #1a1a1a; --gray-200: #e9ecef; }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; }
        header { background: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 600; color: var(--primary); }
        nav a { color: #6c757d; text-decoration: none; margin-left: 30px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .form-box, .summary-box { background: white; padding: 30px; border-radius: 16px; border: 1px solid var(--gray-200); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--primary); margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 8px; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-200); }
        .summary-row.total { border-bottom: none; font-size: 20px; font-weight: bold; color: var(--primary); }
        .place-order-btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 40px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .loading-content { background: white; padding: 30px; border-radius: 24px; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1a1a1a; color: var(--primary); padding: 12px 24px; border-radius: 50px; z-index: 10000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        footer { background: #0a0a0a; color: white; text-align: center; padding: 40px; margin-top: 60px; }
        @media (max-width: 768px) { header { flex-direction: column; } .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE</div>
        <nav><a href="index.html">Home</a><a href="cart.html">Cart</a></nav>
    </header>

    <div class="container">
        <h1>Secure Checkout</h1>
        <div class="checkout-grid">
            <div class="form-box">
                <h3 style="margin-bottom: 20px;">Shipping Information</h3>
                <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Enter your full name" required></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" maxlength="10" placeholder="10-digit mobile number" required></div>
                <div class="form-group"><label>Email Address *</label><input type="email" id="email" placeholder="your@email.com" required></div>
                <div class="form-group"><label>Street Address *</label><input type="text" id="address" placeholder="House number, street" required></div>
                <div class="form-group"><label>City *</label><input type="text" id="city" placeholder="City" required></div>
                <div class="form-group"><label>Pincode *</label><input type="text" id="pincode" maxlength="6" placeholder="6-digit pincode" required></div>
            </div>
            <div class="summary-box">
                <h3 style="margin-bottom: 20px;">Order Summary</h3>
                <div id="orderItems"></div>
                <div id="orderTotals"></div>
                <button class="place-order-btn" onclick="initiatePayment()">Proceed to Pay →</button>
                <p style="font-size: 11px; text-align: center; margin-top: 12px;">🔒 Secure payment by Razorpay</p>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content"><div class="spinner"></div><h3>Processing your order...</h3><p>Please don't close this window</p></div>
    </div>

    <footer><p>© 2026 STYLE OF LIFE. All rights reserved.</p></footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let cart = [];
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = isError ? `❌ ${message}` : `✅ ${message}`;
            toast.style.background = isError ? '#dc3545' : '#1a1a1a';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        async function loadCart() {
            const { data } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            cart = data?.items || [];
            updateOrderSummary();
        }
        
        function updateOrderSummary() {
            if (cart.length === 0) {
                document.getElementById('orderItems').innerHTML = '<div style="text-align:center; padding:40px;">Your cart is empty</div>';
                return;
            }
            let subtotal = 0, itemsHtml = '';
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                itemsHtml += `<div class="summary-row"><span>${item.name} x ${item.quantity}</span><span>₹${itemTotal.toLocaleString()}</span></div>`;
            });
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax + 100;
            document.getElementById('orderItems').innerHTML = itemsHtml;
            document.getElementById('orderTotals').innerHTML = `
                <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                <div class="summary-row"><span>Shipping</span><span>₹100</span></div>
                <div class="summary-row"><span>GST (18%)</span><span>₹${tax.toLocaleString()}</span></div>
                <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
            `;
            window.orderTotal = total;
        }
        
        function getShippingDetails() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            if (!name || !phone || !email || !address || !city || !pincode) {
                showToast('Please fill all required fields', true);
                return null;
            }
            if (phone.length !== 10) { showToast('Enter valid 10-digit phone', true); return null; }
            return { name, phone, email, address: `${address}, ${city} - ${pincode}` };
        }
        
        async function createPendingOrder(orderData) {
            const orderId = 'ORD' + Date.now();
            const order = {
                order_id: orderId,
                customer_name: orderData.name,
                phone: orderData.phone,
                email: orderData.email,
                address: orderData.address,
                items: cart.map(i => ({ id: i.id, sku: i.sku, name: i.name, price: i.price, quantity: i.quantity })),
                subtotal: cart.reduce((s, i) => s + (i.price * i.quantity), 0),
                tax: Math.round(cart.reduce((s, i) => s + (i.price * i.quantity), 0) * 0.18),
                shipping: 100,
                total: window.orderTotal,
                status: 'Payment Pending',
                payment_status: 'pending',
                created_at: new Date().toISOString()
            };
            const { error } = await supabase.from('orders').insert([order]);
            if (error) throw error;
            return orderId;
        }
        
        window.initiatePayment = async function() {
            const shipping = getShippingDetails();
            if (!shipping) return;
            if (cart.length === 0) { showToast('Cart is empty', true); return; }
            
            showLoading(true);
            try {
                const orderId = await createPendingOrder(shipping);
                
                const options = {
                    key: "rzp_test_YourTestKeyHere", // REPLACE WITH YOUR RAZORPAY TEST KEY
                    amount: window.orderTotal * 100,
                    currency: "INR",
                    name: "Style Of Life",
                    description: `Order #${orderId}`,
                    prefill: { name: shipping.name, email: shipping.email, contact: shipping.phone },
                    notes: { order_id: orderId },
                    theme: { color: "#d4af37" },
                    handler: function(response) {
                        showToast(`Payment initiated! Order ID: ${orderId}`);
                        showLoading(false);
                        setTimeout(() => window.location.href = `track.html?order=${orderId}`, 3000);
                    },
                    modal: { ondismiss: function() { 
                        supabase.from('orders').delete().eq('order_id', orderId);
                        showLoading(false);
                        showToast('Payment cancelled', true);
                    }}
                };
                const rzp = new Razorpay(options);
                rzp.open();
            } catch(e) { showLoading(false); showToast('Error: ' + e.message, true); }
        };
        
        loadCart();
        document.getElementById('phone').addEventListener('input', e => e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,10));
        document.getElementById('pincode').addEventListener('input', e => e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,6));
    </script>
</body>
</html>
