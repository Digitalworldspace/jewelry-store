<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Jewellery Store</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f7f7f7;
  }

  header {
    background: #111;
    color: gold;
    padding: 15px;
    display: flex;
    justify-content: space-between;
  }

  .container {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
  }

  .box {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
    min-width: 300px;
  }

  input, textarea, select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
  }

  .summary {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
  }

  .line {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
  }

</style>
</head>

<body>

<header>
  <div>Jewellery Store</div>
  <div>Checkout</div>
</header>

<div class="container">

  <!-- ADDRESS -->
  <div class="box">
    <h3>Delivery Address</h3>

    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Mobile Number">
    <textarea placeholder="Full Address"></textarea>
    <input type="text" placeholder="City">
    <input type="text" placeholder="Pincode">
  </div>

  <!-- PAYMENT -->
  <div class="box">
    <h3>Payment Method</h3>

    <select>
      <option>Cash on Delivery</option>
      <option>UPI</option>
      <option>Card Payment</option>
    </select>

    <div class="summary">
      <h3>Order Summary</h3>

      <div class="line">
        <span>Subtotal</span>
        <span id="subtotal">₹2000</span>
      </div>

      <div class="line">
        <span>Shipping</span>
        <span>₹50</span>
      </div>

      <div class="line">
        <b>Total</b>
        <b id="total">₹2050</b>
      </div>

      <button onclick="placeOrder()">Place Order</button>
    </div>
  </div>

</div>

<script>

function placeOrder() {
  alert("Order Placed Successfully 🎉");

</script>

</body>
</html>
