<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Dashboard - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --primary-light: #f5e6c6;
            --dark: #1a1a1a;
            --dark-card: #141414;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-600: #6c757d;
            --gray-800: #343a40;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
        }
        
        /* Header */
        .admin-header {
            background: var(--dark);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i { font-size: 28px; background: none; color: var(--primary); }
        
        .admin-nav {
            display: flex;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 50px;
        }
        
        .admin-nav a {
            color: var(--gray-600);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 40px;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .admin-nav a:hover, .admin-nav a.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--dark);
        }
        
        .logout-btn {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 25px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--gray-200);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            width: 55px;
            height: 55px;
            background: rgba(212,175,55,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--primary);
        }
        
        .stat-info h3 {
            font-size: 12px;
            color: var(--gray-600);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-800);
        }
        
        .stat-trend {
            font-size: 11px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        
        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--gray-200);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .chart-header h3 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        canvas { max-height: 280px; width: 100%; }
        
        /* SEO Checker */
        .seo-checker {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--gray-200);
        }
        
        .seo-checker h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .url-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 14px;
        }
        
        .check-btn {
            padding: 12px 24px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .seo-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .seo-metric {
            background: var(--gray-100);
            border-radius: 12px;
            padding: 15px;
        }
        
        .seo-metric h4 {
            font-size: 13px;
            color: var(--gray-600);
            margin-bottom: 8px;
        }
        
        .seo-score {
            font-size: 24px;
            font-weight: 700;
        }
        
        .score-good { color: var(--success); }
        .score-average { color: var(--warning); }
        .score-poor { color: var(--danger); }
        
        .progress-bar {
            height: 6px;
            background: var(--gray-200);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .fill-good { background: var(--success); }
        .fill-average { background: var(--warning); }
        .fill-poor { background: var(--danger); }
        
        /* Keywords Table */
        .keywords-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--gray-200);
            margin-bottom: 30px;
        }
        
        .keywords-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .keywords-table th, .keywords-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .keywords-table th {
            color: var(--gray-600);
            font-weight: 600;
            font-size: 12px;
        }
        
        .rank-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .rank-top { background: #d1fae5; color: #065f46; }
        .rank-middle { background: #fef3c7; color: #92400e; }
        .rank-bottom { background: #fee2e2; color: #991b1b; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark);
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; padding: 15px; }
            .admin-nav { flex-wrap: wrap; justify-content: center; }
            .charts-row { grid-template-columns: 1fr; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            STYLE OF LIFE <span>SEO DASHBOARD</span>
        </div>
        <div class="admin-nav">
            <a href="admin.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="admin-products.html"><i class="fas fa-box"></i> Products</a>
            <a href="admin-orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="seo-dashboard.html" class="active"><i class="fas fa-search"></i> SEO</a>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="container">
        <!-- SEO Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-eye"></i></div>
                <div class="stat-info">
                    <h3>Total Impressions</h3>
                    <div class="stat-number" id="totalImpressions">--</div>
                    <div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i> <span class="trend-up">+23%</span></div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-mouse-pointer"></i></div>
                <div class="stat-info">
                    <h3>Total Clicks</h3>
                    <div class="stat-number" id="totalClicks">--</div>
                    <div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i> <span class="trend-up">+15%</span></div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-info">
                    <h3>CTR</h3>
                    <div class="stat-number" id="ctr">--</div>
                    <div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i> <span class="trend-up">+5.2%</span></div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-bar"></i></div>
                <div class="stat-info">
                    <h3>Avg. Position</h3>
                    <div class="stat-number" id="avgPosition">--</div>
                    <div class="stat-trend"><i class="fas fa-arrow-down trend-down"></i> <span class="trend-down">-2.1</span></div>
                </div>
            </div>
        </div>
        
        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-line"></i> Traffic Overview</h3>
                    <select id="periodSelect" onchange="updateCharts()">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                    </select>
                </div>
                <canvas id="trafficChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-pie"></i> Traffic Source</h3>
                </div>
                <canvas id="sourceChart"></canvas>
            </div>
        </div>
        
        <!-- SEO Checker Tool -->
        <div class="seo-checker">
            <h3><i class="fas fa-search"></i> SEO Page Analyzer</h3>
            <div class="url-input-group">
                <input type="text" id="seoUrl" class="url-input" placeholder="Enter page URL to analyze (e.g., https://styleoflife987-hub.github.io/jewelry-store/shop.html)">
                <button class="check-btn" onclick="analyzePageSEO()"><i class="fas fa-chart-simple"></i> Analyze SEO</button>
            </div>
            <div id="seoResults" class="seo-results"></div>
        </div>
        
        <!-- Top Keywords -->
        <div class="keywords-card">
            <h3><i class="fas fa-key"></i> Top Performing Keywords</h3>
            <div style="overflow-x: auto;">
                <table class="keywords-table">
                    <thead>
                        <tr><th>Keyword</th><th>Position</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>Trend</th></tr>
                    </thead>
                    <tbody id="keywordsTable">
                        <tr><td colspan="6" class="loading"><div class="spinner"></div>Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- SEO Recommendations -->
        <div class="keywords-card">
            <h3><i class="fas fa-lightbulb"></i> SEO Recommendations</h3>
            <div id="recommendations"></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let trafficChart, sourceChart;
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateCharts() {
            loadTrafficData();
        }
        
        async function loadTrafficData() {
            const period = document.getElementById('periodSelect').value;
            
            // Simulated data (in production, fetch from Google Search Console API)
            const days = parseInt(period);
            const labels = [];
            const impressions = [];
            const clicks = [];
            
            for (let i = days - 1; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }));
                
                // Simulated data
                const baseImpressions = 500 + Math.random() * 300;
                const baseClicks = 50 + Math.random() * 40;
                impressions.push(Math.round(baseImpressions));
                clicks.push(Math.round(baseClicks));
            }
            
            // Update stats
            const totalImpressions = impressions.reduce((a, b) => a + b, 0);
            const totalClicks = clicks.reduce((a, b) => a + b, 0);
            const ctr = ((totalClicks / totalImpressions) * 100).toFixed(1);
            const avgPosition = (8 + Math.random() * 4).toFixed(1);
            
            document.getElementById('totalImpressions').textContent = totalImpressions.toLocaleString();
            document.getElementById('totalClicks').textContent = totalClicks.toLocaleString();
            document.getElementById('ctr').textContent = `${ctr}%`;
            document.getElementById('avgPosition').textContent = avgPosition;
            
            // Traffic Chart
            const trafficCtx = document.getElementById('trafficChart').getContext('2d');
            if (trafficChart) trafficChart.destroy();
            trafficChart = new Chart(trafficCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Impressions',
                            data: impressions,
                            borderColor: '#d4af37',
                            backgroundColor: 'rgba(212,175,55,0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Clicks',
                            data: clicks,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            yAxisID: 'y'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#e9ecef' } },
                        x: { grid: { display: false } }
                    }
                }
            });
            
            // Source Chart
            const sourceCtx = document.getElementById('sourceChart').getContext('2d');
            if (sourceChart) sourceChart.destroy();
            sourceChart = new Chart(sourceCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Organic Search', 'Direct', 'Social Media', 'Referral', 'Email'],
                    datasets: [{
                        data: [45, 25, 15, 10, 5],
                        backgroundColor: ['#d4af37', '#3b82f6', '#10b981', '#8b5cf6', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }
        
        async function loadKeywords() {
            const keywords = [
                { keyword: "luxury jewelry india", position: 4, impressions: 12500, clicks: 780, ctr: 6.24, trend: "up" },
                { keyword: "diamond rings online", position: 7, impressions: 8900, clicks: 445, ctr: 5.00, trend: "up" },
                { keyword: "gold necklaces", position: 3, impressions: 15200, clicks: 1250, ctr: 8.22, trend: "up" },
                { keyword: "style of life jewelry", position: 1, impressions: 8500, clicks: 2100, ctr: 24.71, trend: "up" },
                { keyword: "engagement rings", position: 12, impressions: 6700, clicks: 268, ctr: 4.00, trend: "down" },
                { keyword: "handcrafted jewelry", position: 8, impressions: 5400, clicks: 324, ctr: 6.00, trend: "up" },
                { keyword: "bridal jewelry set", position: 15, impressions: 4300, clicks: 172, ctr: 4.00, trend: "down" },
                { keyword: "24k gold jewelry", position: 9, impressions: 6100, clicks: 366, ctr: 6.00, trend: "up" }
            ];
            
            let html = '';
            for (const k of keywords) {
                const rankClass = k.position <= 5 ? 'rank-top' : (k.position <= 15 ? 'rank-middle' : 'rank-bottom');
                html += `
                    <tr>
                        <td><strong>${k.keyword}</strong></td>
                        <td><span class="rank-badge ${rankClass}">#${k.position}</span></td>
                        <td>${k.impressions.toLocaleString()}</td>
                        <td>${k.clicks.toLocaleString()}</td>
                        <td>${k.ctr}%</td>
                        <td><i class="fas fa-arrow-${k.trend === 'up' ? 'up trend-up' : 'down trend-down'}"></i></td>
                    </tr>
                `;
            }
            document.getElementById('keywordsTable').innerHTML = html;
        }
        
        window.analyzePageSEO = async function() {
            const url = document.getElementById('seoUrl').value.trim();
            if (!url) {
                showToast('Please enter a URL');
                return;
            }
            
            const resultsDiv = document.getElementById('seoResults');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing...</div>';
            
            // Simulate SEO analysis
            setTimeout(() => {
                const scores = {
                    title: { score: 85, status: 'good', message: 'Title length is optimal (45-60 chars)' },
                    description: { score: 70, status: 'average', message: 'Meta description could be longer (150-160 chars recommended)' },
                    headings: { score: 90, status: 'good', message: 'Proper heading structure detected' },
                    images: { score: 65, status: 'average', message: 'Some images missing alt text' },
                    keywords: { score: 80, status: 'good', message: 'Keywords well distributed' },
                    mobile: { score: 95, status: 'good', message: 'Mobile responsive design' },
                    speed: { score: 72, status: 'average', message: 'Page speed could be improved' },
                    links: { score: 78, status: 'average', message: 'Internal linking structure good' }
                };
                
                const overallScore = Object.values(scores).reduce((sum, s) => sum + s.score, 0) / Object.keys(scores).length;
                const overallClass = overallScore >= 80 ? 'score-good' : (overallScore >= 60 ? 'score-average' : 'score-poor');
                
                let html = `
                    <div class="seo-metric">
                        <h4>Overall SEO Score</h4>
                        <div class="seo-score ${overallClass}">${Math.round(overallScore)}/100</div>
                        <div class="progress-bar">
                            <div class="progress-fill ${overallClass === 'score-good' ? 'fill-good' : (overallClass === 'score-average' ? 'fill-average' : 'fill-poor')}" style="width: ${overallScore}%"></div>
                        </div>
                    </div>
                `;
                
                for (const [key, value] of Object.entries(scores)) {
                    const statusClass = value.status === 'good' ? 'score-good' : 'score-average';
                    html += `
                        <div class="seo-metric">
                            <h4>${key.charAt(0).toUpperCase() + key.slice(1)}</h4>
                            <div class="seo-score ${statusClass}">${value.score}/100</div>
                            <div class="progress-bar">
                                <div class="progress-fill ${value.status === 'good' ? 'fill-good' : 'fill-average'}" style="width: ${value.score}%"></div>
                            </div>
                            <p style="font-size: 11px; margin-top: 8px; color: var(--gray-600);">${value.message}</p>
                        </div>
                    `;
                }
                
                resultsDiv.innerHTML = html;
                showToast('SEO analysis completed');
            }, 1500);
        };
        
        function loadRecommendations() {
            const recommendations = [
                { priority: "High", title: "Add alt text to all product images", description: "52 images are missing alt text. This affects accessibility and SEO." },
                { priority: "Medium", title: "Improve page load speed", description: "Current load time is 3.2s. Aim for under 2s." },
                { priority: "High", title: "Update meta descriptions", description: "5 pages have missing or duplicate meta descriptions." },
                { priority: "Low", title: "Add structured data", description: "Product schema is missing for 12 products." },
                { priority: "Medium", title: "Fix broken links", description: "3 broken internal links detected." },
                { priority: "High", title: "Mobile optimization", description: "Some pages have touch elements too close together." }
            ];
            
            let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
            for (const rec of recommendations) {
                const priorityColor = rec.priority === 'High' ? '#ef4444' : (rec.priority === 'Medium' ? '#f59e0b' : '#10b981');
                html += `
                    <div style="padding: 12px; background: var(--gray-100); border-radius: 12px; border-left: 4px solid ${priorityColor};">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong>${rec.title}</strong>
                            <span style="font-size: 10px; color: ${priorityColor};">${rec.priority} Priority</span>
                        </div>
                        <p style="font-size: 12px; color: var(--gray-600);">${rec.description}</p>
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('recommendations').innerHTML = html;
        }
        
        window.logout = function() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        };
        
        // Initialize
        loadTrafficData();
        loadKeywords();
        loadRecommendations();
        
        // Auto-refresh every 5 minutes
        setInterval(loadTrafficData, 300000);
    </script>
</body>
</html>
