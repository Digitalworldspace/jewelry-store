<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#d4af37">
    <title>My Account - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --dark: #1a1a1a;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
        }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; padding-bottom: 70px; }
        
        header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 600; color: var(--primary); font-family: 'Playfair Display', serif; text-decoration: none; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            background: white;
            padding: 5px;
            border-radius: 50px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--primary);
            color: var(--dark);
        }
        
        /* Content */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--gray-200);
        }
        
        .order-item {
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 0;
        }
        .order-item:last-child { border-bottom: none; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d4edda; color: #155724; }
        
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .wishlist-item {
            background: var(--gray-100);
            border-radius: 12px;
            overflow: hidden;
        }
        .wishlist-item img { width: 100%; height: 120px; object-fit: cover; }
        .wishlist-info { padding: 8px; }
        .wishlist-name { font-size: 12px; font-weight: 600; }
        .wishlist-price { font-size: 12px; color: var(--primary); }
        
        .profile-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--gray-200);
            border-radius: 40px;
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .empty { text-align: center; padding: 40px; color: var(--gray-600); }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
        
        @media (min-width: 768px) {
            .wishlist-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">STYLE·OF·LIFE</a>
        <a href="cart.html"><i class="fas fa-shopping-bag" style="font-size: 20px; color: var(--gray-600);"></i></a>
    </header>
    
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('orders')">Orders</div>
            <div class="tab" onclick="showTab('wishlist')">Wishlist</div>
            <div class="tab" onclick="showTab('profile')">Profile</div>
        </div>
        
        <div id="orders" class="tab-content active">
            <div id="ordersList"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
        </div>
        <div id="wishlist" class="tab-content">
            <div id="wishlistList"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
        </div>
        <div id="profile" class="tab-content">
            <div id="profileContent"></div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Shop</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html" class="active"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        async function getCurrentUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                currentUser = { ...user, profile };
            }
            return currentUser;
        }
        
        async function loadOrders() {
            if (!currentUser) { document.getElementById('ordersList').innerHTML = '<div class="empty">Login to view orders</div>'; return; }
            const { data } = await supabase.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            if (!data?.length) { document.getElementById('ordersList').innerHTML = '<div class="empty">No orders yet</div>'; return; }
            
            let html = '';
            data.forEach(o => {
                html += `
                    <div class="card order-item">
                        <div><strong>${o.order_id}</strong> - ${new Date(o.created_at).toLocaleDateString()}</div>
                        <div>₹${(o.total || 0).toLocaleString()} - <span class="status-badge status-${o.status?.toLowerCase()}">${o.status || 'Pending'}</span></div>
                        <div style="font-size:12px; margin-top:5px;">${o.items?.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
                        <a href="track.html?order=${o.order_id}" style="color: var(--primary); font-size:12px; margin-top:8px; display:inline-block;">Track →</a>
                    </div>
                `;
            });
            document.getElementById('ordersList').innerHTML = html;
        }
        
        async function loadWishlist() {
            if (!currentUser) { document.getElementById('wishlistList').innerHTML = '<div class="empty">Login to view wishlist</div>'; return; }
            const { data } = await supabase.from('wishlist').select('*, products(*)').eq('user_id', currentUser.id);
            if (!data?.length) { document.getElementById('wishlistList').innerHTML = '<div class="empty">Wishlist empty</div>'; return; }
            
            let html = '<div class="wishlist-grid">';
            data.forEach(w => {
                const p = w.products;
                html += `
                    <div class="wishlist-item">
                        <img src="${p?.images?.[0] || 'https://via.placeholder.com/200x120'}" onerror="this.src='https://via.placeholder.com/200x120'">
                        <div class="wishlist-info">
                            <div class="wishlist-name">${p?.name}</div>
                            <div class="wishlist-price">₹${(p?.price || 0).toLocaleString()}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('wishlistList').innerHTML = html;
        }
        
        async function loadProfile() {
            if (!currentUser) { document.getElementById('profileContent').innerHTML = '<div class="card">Please login</div>'; return; }
            document.getElementById('profileContent').innerHTML = `
                <div class="card">
                    <form id="profileForm">
                        <input type="text" name="full_name" value="${currentUser.profile?.full_name || ''}" placeholder="Full Name">
                        <input type="tel" name="phone" value="${currentUser.profile?.phone || ''}" placeholder="Phone">
                        <input type="email" value="${currentUser.email}" disabled placeholder="Email">
                        <button type="submit" class="save-btn">Save Changes</button>
                    </form>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            `;
            document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await supabase.from('profiles').update({ full_name: formData.get('full_name'), phone: formData.get('phone') }).eq('id', currentUser.id);
                alert('Profile updated!');
                location.reload();
            });
        }
        
        window.logout = async function() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        };
        
        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            if (tab === 'orders') loadOrders();
            if (tab === 'wishlist') loadWishlist();
            if (tab === 'profile') loadProfile();
        };
        
        await getCurrentUser();
        loadOrders();
    </script>
</body>
</html>
