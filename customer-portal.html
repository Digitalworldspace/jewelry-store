<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#d4af37">
    <title>My Account - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --dark: #1a1a1a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
        }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; padding-bottom: 70px; }
        
        header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo { font-size: 20px; font-weight: 600; color: var(--primary); font-family: 'Playfair Display', serif; text-decoration: none; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Login Section */
        .login-section {
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }
        .login-section h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .login-section p {
            color: var(--gray-600);
            font-size: 13px;
            margin-bottom: 25px;
        }
        .login-form .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .login-form label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 13px;
            color: var(--gray-600);
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 14px;
        }
        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .register-link {
            margin-top: 20px;
            font-size: 13px;
        }
        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-label {
            font-size: 11px;
            color: var(--gray-600);
            margin-top: 5px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            background: white;
            padding: 5px;
            border-radius: 50px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--primary);
            color: var(--dark);
        }
        
        /* Content */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--gray-200);
        }
        
        .order-item {
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 0;
        }
        .order-item:last-child { border-bottom: none; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #c3e6cb; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        /* Price Breakdown */
        .price-breakdown {
            background: var(--gray-100);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            font-size: 12px;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }
        .price-row.total {
            border-top: 1px solid var(--gray-200);
            margin-top: 5px;
            padding-top: 8px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .wishlist-item {
            background: var(--gray-100);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .wishlist-item img { width: 100%; height: 120px; object-fit: cover; }
        .wishlist-info { padding: 8px; }
        .wishlist-name { font-size: 12px; font-weight: 600; }
        .wishlist-price { font-size: 12px; color: var(--primary); font-weight: 600; }
        .remove-wishlist {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.5);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        
        .profile-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--gray-200);
            border-radius: 40px;
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .empty { text-align: center; padding: 40px; color: var(--gray-600); }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 12px;
            animation: slideUp 0.3s ease;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
        
        @media (min-width: 768px) {
            .wishlist-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">STYLE·OF·LIFE</a>
        <a href="cart.html"><i class="fas fa-shopping-bag" style="font-size: 20px; color: var(--gray-600);"></i></a>
    </header>
    
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <h2><i class="fas fa-user-circle"></i> Welcome Back!</h2>
            <p>Login to view your orders, wishlist and manage your account</p>
            <form id="loginForm" class="login-form" onsubmit="handleCustomerLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Login →</button>
            </form>
            <div class="register-link">
                <p>New customer? <a href="register.html">Create an account</a></p>
            </div>
        </div>
        
        <!-- Dashboard Content (Hidden until login) -->
        <div id="dashboardContent" style="display: none;">
            <!-- Stats Cards -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-number" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSpent">₹0</div>
                    <div class="stat-label">Total Spent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingOrders">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="showTab('orders')">Orders</div>
                <div class="tab" onclick="showTab('wishlist')">Wishlist</div>
                <div class="tab" onclick="showTab('profile')">Profile</div>
            </div>
            
            <div id="orders" class="tab-content active">
                <div id="ordersList"><div class="loading"><div class="spinner"></div><p>Loading orders...</p></div></div>
            </div>
            <div id="wishlist" class="tab-content">
                <div id="wishlistList"><div class="loading"><div class="spinner"></div><p>Loading wishlist...</p></div></div>
            </div>
            <div id="profile" class="tab-content">
                <div id="profileContent"></div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Shop</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html" class="active"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        const TAX_RATE = 0.18;
        const SHIPPING = 100;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'toast-error' : 'toast-success'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Handle Customer Login
        window.handleCustomerLogin = async function(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            
            const loginBtn = event.target.querySelector('.login-btn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Get user profile
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', data.user.id)
                        .single();
                    
                    currentUser = { ...data.user, profile: profile || {} };
                    
                    // Store user in localStorage
                    localStorage.setItem('customerLoggedIn', 'true');
                    localStorage.setItem('customerUser', JSON.stringify(currentUser));
                    
                    showToast('Login successful! Welcome back!');
                    
                    // Hide login, show dashboard
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardContent').style.display = 'block';
                    
                    // Load user data
                    await loadOrders();
                    await loadWishlist();
                    await loadProfile();
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showToast(error.message || 'Login failed. Please check your credentials.', true);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login →';
            }
        };
        
        // Handle Customer Logout
        window.handleCustomerLogout = async function() {
            try {
                await supabase.auth.signOut();
                localStorage.removeItem('customerLoggedIn');
                localStorage.removeItem('customerUser');
                currentUser = null;
                
                showToast('Logged out successfully');
                
                // Show login, hide dashboard
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardContent').style.display = 'none';
                
                // Clear form
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                
            } catch (error) {
                console.error('Logout error:', error);
                showToast('Error logging out', true);
            }
        };
        
        // Check if user is already logged in
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                
                currentUser = { ...user, profile: profile || {} };
                localStorage.setItem('customerLoggedIn', 'true');
                localStorage.setItem('customerUser', JSON.stringify(currentUser));
                
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
                
                await loadOrders();
                await loadWishlist();
                await loadProfile();
            } else {
                // Check localStorage for session
                const storedUser = localStorage.getItem('customerUser');
                if (storedUser) {
                    try {
                        const parsedUser = JSON.parse(storedUser);
                        // Try to refresh session
                        const { data } = await supabase.auth.getSession();
                        if (!data.session) {
                            localStorage.removeItem('customerLoggedIn');
                            localStorage.removeItem('customerUser');
                        }
                    } catch (e) {
                        localStorage.removeItem('customerLoggedIn');
                        localStorage.removeItem('customerUser');
                    }
                }
            }
        }
        
        async function updateStats(orders) {
            const totalOrders = orders.length;
            const totalSpent = orders.reduce((sum, o) => sum + (o.total || 0), 0);
            const pendingOrders = orders.filter(o => o.status === 'Pending' || o.status === 'pending').length;
            
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalSpent').textContent = `₹${totalSpent.toLocaleString()}`;
            document.getElementById('pendingOrders').textContent = pendingOrders;
        }
        
        function calculateOrderBreakdown(subtotal) {
            const tax = Math.round(subtotal * TAX_RATE);
            const shipping = subtotal >= 3000 ? 0 : SHIPPING;
            const total = subtotal + tax + shipping;
            return { tax, shipping, total };
        }
        
        async function loadOrders() {
            if (!currentUser) { 
                document.getElementById('ordersList').innerHTML = '<div class="empty">Please login to view orders</div>'; 
                return; 
            }
            
            document.getElementById('ordersList').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>';
            
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            if (error) {
                document.getElementById('ordersList').innerHTML = '<div class="empty">Error loading orders</div>';
                return;
            }
            
            await updateStats(data || []);
            
            if (!data?.length) { 
                document.getElementById('ordersList').innerHTML = '<div class="empty">✨ No orders yet. Start shopping!</div>'; 
                return; 
            }
            
            let html = '';
            for (const o of data) {
                const subtotal = o.subtotal || o.items?.reduce((s, i) => s + (i.price * i.quantity), 0) || 0;
                const { tax, shipping, total } = calculateOrderBreakdown(subtotal);
                
                html += `
                    <div class="card order-item">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div><strong>${o.order_id}</strong></div>
                            <div class="status-badge status-${o.status?.toLowerCase() || 'pending'}">${o.status || 'Pending'}</div>
                        </div>
                        <div style="font-size: 12px; color: var(--gray-600); margin: 5px 0;">
                            ${new Date(o.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}
                        </div>
                        <div style="font-size: 12px; margin-top: 8px;">
                            ${o.items?.slice(0, 2).map(i => `${i.name} x${i.quantity}`).join(', ')}${o.items?.length > 2 ? ` +${o.items.length - 2} more` : ''}
                        </div>
                        <div class="price-breakdown">
                            <div class="price-row">
                                <span>Subtotal</span>
                                <span>₹${subtotal.toLocaleString()}</span>
                            </div>
                            <div class="price-row">
                                <span>GST (18%)</span>
                                <span>₹${tax.toLocaleString()}</span>
                            </div>
                            <div class="price-row">
                                <span>Shipping</span>
                                <span>${shipping === 0 ? 'Free' : '₹' + shipping.toLocaleString()}</span>
                            </div>
                            <div class="price-row total">
                                <span>Total</span>
                                <span>₹${total.toLocaleString()}</span>
                            </div>
                        </div>
                        <a href="track.html?order=${o.order_id}" style="color: var(--primary); font-size: 12px; margin-top: 10px; display: inline-block;">
                            Track Order <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                `;
            }
            document.getElementById('ordersList').innerHTML = html;
        }
        
        async function loadWishlist() {
            if (!currentUser) { 
                document.getElementById('wishlistList').innerHTML = '<div class="empty">Please login to view wishlist</div>'; 
                return; 
            }
            
            document.getElementById('wishlistList').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading wishlist...</p></div>';
            
            const { data, error } = await supabase
                .from('wishlist')
                .select('*, products(*)')
                .eq('user_id', currentUser.id);
            
            if (error) {
                document.getElementById('wishlistList').innerHTML = '<div class="empty">Error loading wishlist</div>';
                return;
            }
            
            if (!data?.length) { 
                document.getElementById('wishlistList').innerHTML = '<div class="empty">❤️ Your wishlist is empty. Add items you love!</div>'; 
                return; 
            }
            
            let html = '<div class="wishlist-grid">';
            for (const w of data) {
                const p = w.products;
                const img = p?.images?.[0] || 'https://via.placeholder.com/200x120?text=Style+Of+Life';
                html += `
                    <div class="wishlist-item">
                        <img src="${img}" onerror="this.src='https://via.placeholder.com/200x120?text=Style+Of+Life'">
                        <div class="remove-wishlist" onclick="removeFromWishlist(${w.product_id})">
                            <i class="fas fa-times"></i>
                        </div>
                        <div class="wishlist-info">
                            <div class="wishlist-name">${escapeHtml(p?.name || 'Product')}</div>
                            <div class="wishlist-price">₹${(p?.price || 0).toLocaleString()}</div>
                            <button onclick="addToCartFromWishlist(${p?.id}, '${escapeHtml(p?.name).replace(/'/g, "\\'")}', ${p?.price}, '${p?.sku}', '${img}')" 
                                    style="width:100%; margin-top:8px; padding:5px; background: var(--primary); border:none; border-radius:20px; font-size:10px; font-weight:600; cursor:pointer;">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('wishlistList').innerHTML = html;
        }
        
        window.removeFromWishlist = async function(productId) {
            if (!currentUser) return;
            const { error } = await supabase
                .from('wishlist')
                .delete()
                .eq('user_id', currentUser.id)
                .eq('product_id', productId);
            
            if (error) {
                showToast('Error removing item', true);
            } else {
                showToast('Removed from wishlist');
                loadWishlist();
            }
        };
        
        window.addToCartFromWishlist = async function(id, name, price, sku, img) {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await removeFromWishlist(id);
                loadWishlist();
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        async function loadProfile() {
            if (!currentUser) { 
                document.getElementById('profileContent').innerHTML = '<div class="card">Please login to view profile</div>'; 
                return; 
            }
            
            document.getElementById('profileContent').innerHTML = `
                <div class="card">
                    <form id="profileForm">
                        <input type="text" name="full_name" value="${currentUser.profile?.full_name || ''}" placeholder="Full Name">
                        <input type="tel" name="phone" value="${currentUser.profile?.phone || ''}" placeholder="Phone Number">
                        <input type="email" value="${currentUser.email}" disabled placeholder="Email Address">
                        <button type="submit" class="save-btn">Save Changes</button>
                    </form>
                    <button class="logout-btn" onclick="handleCustomerLogout()">Logout</button>
                </div>
            `;
            
            document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const updates = {
                    full_name: formData.get('full_name'),
                    phone: formData.get('phone')
                };
                
                const { error } = await supabase
                    .from('profiles')
                    .update(updates)
                    .eq('id', currentUser.id);
                
                if (error) {
                    showToast('Error updating profile', true);
                } else {
                    showToast('Profile updated successfully!');
                    currentUser.profile = { ...currentUser.profile, ...updates };
                    localStorage.setItem('customerUser', JSON.stringify(currentUser));
                }
            });
        }
        
        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            if (tab === 'orders') loadOrders();
            if (tab === 'wishlist') loadWishlist();
            if (tab === 'profile') loadProfile();
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        // Initialize
        await checkAuth();
    </script>
</body>
</html>
