<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Account - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
            --gray-light: #999999;
            --success: #28a745;
            --danger: #dc3545;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            padding-bottom: 70px;
        }
        
        .account-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
        }
        
        .account-box {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        
        h2 {
            color: var(--gold);
            margin-bottom: 25px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray);
            font-size: 13px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .switch-link {
            margin-top: 25px;
            font-size: 14px;
        }
        
        .switch-link a {
            color: var(--gold);
            cursor: pointer;
            text-decoration: none;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .welcome-badge {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(212,175,55,0.02));
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--gray);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: var(--danger);
            color: white;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @media (max-width: 768px) {
            .account-box { padding: 25px; }
            .stats-grid { gap: 10px; }
            .stat-number { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="account-container">
        <div id="accountContent"></div>
    </div>
    
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop"><i class="fas fa-search"></i><span>Shop</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="customer-portal" class="active"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentUser = null;
        
        function navigateTo(page) {
            if (window.parent !== window) {
                window.parent.postMessage({ page: page }, '*');
            } else {
                window.location.href = page + '.html';
            }
        }
        
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function getProfile(userId) {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .maybeSingle();
                
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Get profile error:', error);
                return null;
            }
        }
        
        async function handleLogin(email, password) {
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return false;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.user) {
                    const profile = await getProfile(data.user.id);
                    currentUser = { 
                        ...data.user, 
                        profile: profile || { full_name: email.split('@')[0], phone: '' }
                    };
                    localStorage.setItem('customerUser', JSON.stringify(currentUser));
                    showToast('Login successful!');
                    return true;
                }
                return false;
            } catch (error) {
                showToast(error.message || 'Login failed', true);
                return false;
            }
        }
        
        async function handleLogout() {
            await supabase.auth.signOut();
            localStorage.removeItem('customerUser');
            currentUser = null;
            showToast('Logged out successfully');
            renderLoginRegister();
        }
        
        async function loadUserOrders() {
            if (!currentUser) return [];
            try {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('email', currentUser.email)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                return data || [];
            } catch (error) {
                return [];
            }
        }
        
        async function renderDashboard() {
            const container = document.getElementById('accountContent');
            const orders = await loadUserOrders();
            const totalOrders = orders.length;
            const totalSpent = orders.reduce((sum, o) => sum + (o.total || 0), 0);
            const pendingOrders = orders.filter(o => o.status === 'pending' || o.status === 'Pending').length;
            
            container.innerHTML = `
                <div class="account-box">
                    <div class="dashboard-header">
                        <div class="welcome-badge"><i class="fas fa-crown"></i> Welcome, ${currentUser?.profile?.full_name || currentUser?.email?.split('@')[0]}!</div>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-number">${totalOrders}</div><div class="stat-label">Total Orders</div></div>
                        <div class="stat-card"><div class="stat-number">₹${totalSpent.toLocaleString()}</div><div class="stat-label">Total Spent</div></div>
                        <div class="stat-card"><div class="stat-number">${pendingOrders}</div><div class="stat-label">Pending Orders</div></div>
                    </div>
                    <div style="margin-top: 20px;">
                        <a data-page="shop" style="background: var(--gold); color: var(--black); padding: 12px 30px; border-radius: 40px; text-decoration: none; display: inline-block; font-weight: 600;">Continue Shopping →</a>
                    </div>
                </div>
            `;
            
            document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
        }
        
        function renderLoginRegister() {
            const container = document.getElementById('accountContent');
            container.innerHTML = `
                <div class="account-box">
                    <div id="loginForm">
                        <h2><i class="fas fa-user-circle"></i> My Account</h2>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="loginEmail" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter password">
                        </div>
                        <button class="login-btn" id="loginBtn">Login →</button>
                        <div class="switch-link">
                            <p>New customer? <a id="showRegisterBtn">Create an account</a></p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('loginBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.textContent = 'Logging in...';
                const success = await handleLogin(email, password);
                if (success) await renderDashboard();
                btn.disabled = false;
                btn.textContent = 'Login →';
            });
            
            document.getElementById('showRegisterBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = 'register.html';
            });
            
            document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn')?.click();
            });
        }
        
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            const profile = await getProfile(user.id);
            currentUser = { ...user, profile: profile || { full_name: user.email?.split('@')[0], phone: '' } };
            await renderDashboard();
        } else {
            renderLoginRegister();
        }
    </script>
</body>
</html>
