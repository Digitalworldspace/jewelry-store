<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - My Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            padding-bottom: 70px;
        }
        .account-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .account-box {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }
        h2 {
            color: var(--gold);
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--gray);
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .login-btn, .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .switch-link {
            margin-top: 20px;
            font-size: 13px;
        }
        .switch-link a {
            color: var(--gold);
            cursor: pointer;
            text-decoration: none;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="account-container">
        <div id="accountContent">
            <div class="account-box">
                <h2><i class="fas fa-user-circle"></i> My Account</h2>
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                    </div>
                    <button class="login-btn" onclick="handleLogin()">Login →</button>
                    <div class="switch-link">
                        <p>New customer? <a onclick="showRegister()">Create an account</a></p>
                    </div>
                </div>
                <div id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="regEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="regPhone" maxlength="10" placeholder="10-digit mobile number">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="Create password (min 6 characters)">
                    </div>
                    <button class="register-btn" onclick="handleRegister()">Create Account →</button>
                    <div class="switch-link">
                        <p>Already have account? <a onclick="showLogin()">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop"><i class="fas fa-search"></i><span>Shop</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="account" class="active"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentUser = null;
        
        function navigateTo(page) {
            if (window.parent !== window) {
                window.parent.postMessage({ page: page }, '*');
            } else {
                window.location.href = page + '.html';
            }
        }
        
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.style.background = '#dc3545';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        window.showLogin = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        };
        
        window.showRegister = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };
        
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                showToast('Login successful!');
                setTimeout(() => navigateTo('account'), 1000);
            } catch (error) {
                showToast(error.message || 'Login failed', true);
            }
        };
        
        window.handleRegister = async function() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!name || !email || !password) {
                showToast('Please fill all required fields', true);
                return;
            }
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', true);
                return;
            }
            
            if (phone && (phone.length !== 10 || !/^\d+$/.test(phone))) {
                showToast('Enter valid 10-digit phone number', true);
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: name, phone: phone } }
                });
                if (error) throw error;
                
                showToast('Registration successful! Please check your email to verify.');
                setTimeout(() => showLogin(), 2000);
            } catch (error) {
                showToast(error.message || 'Registration failed', true);
            }
        };
        
        // Check if already logged in
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('accountContent').innerHTML = `
                <div class="account-box">
                    <h2><i class="fas fa-user-circle"></i> Welcome ${user.email?.split('@')[0]}!</h2>
                    <p style="margin: 15px 0;">You are logged in to your account.</p>
                    <button class="login-btn" onclick="handleLogout()" style="background: #dc3545;">Logout</button>
                </div>
            `;
        }
        
        window.handleLogout = async function() {
            await supabase.auth.signOut();
            showToast('Logged out successfully');
            setTimeout(() => navigateTo('account'), 500);
        };
    </script>
</body>
</html>
