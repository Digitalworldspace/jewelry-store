<script type="module">
    import { createClient } from '@supabase/supabase-js';
    
    if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
    
    const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    let allProducts = [];
    let currentImages = { add: {}, edit: {} };
    
    async function loadProducts() {
        const { data, error } = await supabase.from('products').select('*').order('id');
        if (error) {
            console.error('Error loading products:', error);
            document.getElementById('productsGrid').innerHTML = '<div class="empty-state"><p>Error loading products</p></div>';
            return;
        }
        allProducts = data || [];
        displayProducts(allProducts);
    }
    
    async function saveProduct() {
        const sku = document.getElementById('sku').value.trim();
        const name = document.getElementById('name').value.trim();
        const category = document.getElementById('category').value;
        const price = parseFloat(document.getElementById('price').value);
        const stock = parseInt(document.getElementById('stock').value);
        const description = document.getElementById('description').value.trim();
        
        if (!sku || !name || !price || !stock) {
            alert('Please fill all required fields');
            return;
        }
        
        // Collect uploaded images
        const images = [];
        for (let i = 0; i < 5; i++) {
            if (currentImages.add[i]) {
                images.push(currentImages.add[i]);
            }
        }
        
        const { data, error } = await supabase.from('products').insert([{
            sku, name, category, price, stock, description,
            images: images
        }]).select();
        
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        
        alert('✅ Product added successfully!');
        hideAddForm();
        await loadProducts();
    }
    
    async function updateProduct() {
        const id = parseInt(document.getElementById('editId').value);
        const sku = document.getElementById('editSku').value.trim();
        const name = document.getElementById('editName').value.trim();
        const category = document.getElementById('editCategory').value;
        const price = parseFloat(document.getElementById('editPrice').value);
        const stock = parseInt(document.getElementById('editStock').value);
        const description = document.getElementById('editDescription').value.trim();
        
        if (!sku || !name || !price || !stock) {
            alert('Please fill all required fields');
            return;
        }
        
        // Collect images
        let images = [];
        for (let i = 0; i < 5; i++) {
            if (currentImages.edit[i]) {
                images.push(currentImages.edit[i]);
            } else if (allProducts.find(p => p.id === id)?.images?.[i]) {
                images.push(allProducts.find(p => p.id === id).images[i]);
            }
        }
        
        const { error } = await supabase
            .from('products')
            .update({ sku, name, category, price, stock, description, images })
            .eq('id', id);
        
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        
        alert('✅ Product updated successfully!');
        closeEditModal();
        await loadProducts();
    }
    
    async function deleteProduct(id) {
        if (!confirm('⚠️ Delete this product permanently?')) return;
        
        const { error } = await supabase.from('products').delete().eq('id', id);
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        
        alert('✅ Product deleted');
        await loadProducts();
    }
    
    // ... rest of the functions (displayProducts, etc.)
    
    loadProducts();
</script>
