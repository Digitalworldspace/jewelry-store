<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --primary-dark: #b8962e; --dark: #1a1a1a; --darker: #0a0a0a; --light: #ffffff; --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-600: #6c757d; --danger: #dc3545; --success: #28a745; --info: #17a2b8; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        
        /* Header */
        header { background: var(--darker); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        nav a { color: #aaa; text-decoration: none; margin-left: 20px; padding: 8px 15px; border-radius: 6px; transition: all 0.3s; }
        nav a:hover, nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        
        /* Main Container */
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 30px; font-size: 28px; }
        
        /* Toolbar */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .btn { background: var(--primary); color: #1a1a1a; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 14px; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c82333; }
        .search-box input { padding: 10px 15px; border: 1px solid var(--gray-200); border-radius: 8px; width: 250px; font-size: 14px; }
        
        /* Form Card */
        .form-card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid var(--gray-200); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-card h2 { color: var(--primary); margin-bottom: 20px; font-size: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--gray-600); font-size: 13px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 14px; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        
        /* Image Grid */
        .image-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 20px 0; }
        .image-slot { background: var(--gray-100); border: 2px dashed var(--gray-200); border-radius: 12px; padding: 15px; text-align: center; transition: all 0.3s; }
        .image-slot:hover { border-color: var(--primary); background: white; }
        .image-slot label { display: block; font-size: 12px; color: var(--gray-600); margin-bottom: 8px; }
        .image-slot input { width: 100%; padding: 8px; font-size: 11px; background: white; border: 1px solid var(--gray-200); border-radius: 6px; }
        
        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--gray-200); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(212,175,55,0.15); border-color: var(--primary); }
        .product-image { width: 100%; height: 200px; object-fit: cover; background: var(--gray-100); }
        .product-info { padding: 20px; }
        .product-info h4 { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .product-sku { font-size: 12px; color: var(--gray-600); margin-bottom: 5px; }
        .product-category { color: var(--primary); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .product-price { font-size: 22px; font-weight: 700; color: var(--primary); margin: 10px 0; }
        .product-stock { font-size: 13px; margin-bottom: 15px; padding: 4px 12px; border-radius: 30px; display: inline-block; font-weight: 500; }
        .stock-high { background: #d4edda; color: #155724; }
        .stock-low { background: #fff3cd; color: #856404; }
        .stock-out { background: #f8d7da; color: #721c24; }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; }
        .edit-btn, .delete-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 13px; }
        .edit-btn { background: var(--info); color: white; }
        .edit-btn:hover { background: #138496; transform: translateY(-2px); }
        .delete-btn { background: var(--danger); color: white; }
        .delete-btn:hover { background: #c82333; transform: translateY(-2px); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; max-width: 700px; margin: 50px auto; padding: 30px; border-radius: 24px; animation: slideUp 0.3s ease; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--primary); }
        .modal-header h2 { color: var(--primary); font-size: 24px; }
        .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--gray-600); transition: all 0.3s; }
        .close-modal:hover { color: var(--danger); }
        .modal-actions { display: flex; gap: 15px; margin-top: 25px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 40px; font-weight: 600; }
        
        .empty-state { text-align: center; padding: 80px; background: white; border-radius: 20px; border: 1px solid var(--gray-200); }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: var(--primary); }
        .empty-state p { color: var(--gray-600); }
        
        footer { background: var(--darker); color: white; text-align: center; padding: 30px; margin-top: 60px; }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 15px 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .image-grid { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
            .modal-content { margin: 20px; padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>📦 Product Management</h1>
        
        <div class="toolbar">
            <button class="btn" id="showAddFormBtn" onclick="showAddForm()">➕ Add New Product</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name or SKU..." onkeyup="searchProducts()">
            </div>
        </div>
        
        <!-- Add Product Form -->
        <div id="addForm" class="form-card" style="display: none;">
            <h2>✨ Add New Product</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>SKU *</label>
                    <input type="text" id="sku" placeholder="e.g., GOLD001">
                </div>
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace">
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="category">
                        <option value="Necklaces">Necklaces</option>
                        <option value="Rings">Rings</option>
                        <option value="Earrings">Earrings</option>
                        <option value="Bracelets">Bracelets</option>
                        <option value="Bangles">Bangles</option>
                        <option value="Pendants">Pendants</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000">
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g., 10" value="10">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="2" placeholder="Product description..."></textarea>
            </div>
            
            <h3 style="margin: 20px 0 10px;">📸 Image URLs (5 images)</h3>
            <div class="image-grid">
                <div class="image-slot">
                    <label>Image 1 (Main)</label>
                    <input type="url" id="img1" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 2</label>
                    <input type="url" id="img2" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 3</label>
                    <input type="url" id="img3" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 4</label>
                    <input type="url" id="img4" placeholder="https://...">
                </div>
                <div class="image-slot">
                    <label>Image 5</label>
                    <input type="url" id="img5" placeholder="https://...">
                </div>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn" onclick="saveProduct()" style="flex: 1;">💾 Save Product</button>
                <button class="btn btn-danger" onclick="hideAddForm()" style="flex: 1;">Cancel</button>
            </div>
        </div>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="product-grid">
            <div class="empty-state"><div style="width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px;"></div><p>Loading products...</p></div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <!-- Edit Product Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Edit Product</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" id="editSku">
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="editName">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="editCategory">
                        <option value="Necklaces">Necklaces</option>
                        <option value="Rings">Rings</option>
                        <option value="Earrings">Earrings</option>
                        <option value="Bracelets">Bracelets</option>
                        <option value="Bangles">Bangles</option>
                        <option value="Pendants">Pendants</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="editPrice">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="editStock">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="editDescription" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="updateProduct()" style="background: var(--success);">💾 Save Changes</button>
                <button class="btn btn-danger" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Check admin authentication
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        let allProducts = [];
        
        // Load products from localStorage
        function loadProducts() {
            const stored = localStorage.getItem('products');
            if (stored) {
                try {
                    allProducts = JSON.parse(stored);
                    displayProducts(allProducts);
                } catch(e) {
                    allProducts = [];
                    displayProducts([]);
                }
            } else {
                // Initialize with sample products if empty
                const sampleProducts = [
                    {
                        id: 1,
                        sku: "GOLD001",
                        name: "Gold Necklace",
                        category: "Necklaces",
                        price: 25000,
                        stock: 10,
                        description: "22k Gold Necklace with traditional design",
                        images: ["https://images.unsplash.com/photo-1515562141207-7a88fb7ce338"]
                    },
                    {
                        id: 2,
                        sku: "DIA001",
                        name: "Diamond Ring",
                        category: "Rings",
                        price: 45000,
                        stock: 5,
                        description: "Solitaire Diamond Ring in 18k Gold",
                        images: ["https://images.unsplash.com/photo-1605100804763-247f67b3557e"]
                    },
                    {
                        id: 3,
                        sku: "PEARL001",
                        name: "Pearl Earrings",
                        category: "Earrings",
                        price: 15000,
                        stock: 8,
                        description: "Freshwater Pearl Earrings with Gold",
                        images: ["https://images.unsplash.com/photo-1535632066927-ab7c9ab60908"]
                    }
                ];
                localStorage.setItem('products', JSON.stringify(sampleProducts));
                allProducts = sampleProducts;
                displayProducts(allProducts);
            }
        }
        
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (!products || products.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No Products Found</h3>
                        <p>Click "Add New Product" to get started.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (let p of products) {
                const mainImage = (p.images && p.images[0]) || 'https://via.placeholder.com/300x200?text=No+Image';
                let stockClass = 'stock-high';
                let stockText = `In Stock (${p.stock})`;
                if (p.stock <= 0) { stockClass = 'stock-out'; stockText = 'Out of Stock'; }
                else if (p.stock < 10) { stockClass = 'stock-low'; stockText = `Low Stock (${p.stock})`; }
                
                html += `
                    <div class="product-card" data-id="${p.id}">
                        <img src="${mainImage}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                        <div class="product-info">
                            <h4>${escapeHtml(p.name)}</h4>
                            <div class="product-sku">SKU: ${p.sku}</div>
                            <div class="product-category">${p.category || 'Uncategorized'}</div>
                            <div class="product-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
                            <div class="product-stock ${stockClass}">${stockText}</div>
                            <div class="product-actions">
                                <button class="edit-btn" onclick="openEditModal(${p.id})">✏️ Edit</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Search products
        window.searchProducts = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.sku.toLowerCase().includes(term)
            );
            displayProducts(filtered);
        };
        
        // Show add form
        window.showAddForm = function() {
            document.getElementById('addForm').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        // Hide add form
        window.hideAddForm = function() {
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('stock').value = '10';
            document.getElementById('description').value = '';
            document.getElementById('category').value = 'Necklaces';
            for (let i = 1; i <= 5; i++) {
                document.getElementById('img' + i).value = '';
            }
        };
        
        // Save new product
        window.saveProduct = function() {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value.trim();
            const stock = document.getElementById('stock').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!sku || !name || !price || !stock) {
                alert('Please fill all required fields (SKU, Name, Price, Stock)');
                return;
            }
            
            const images = [];
            for (let i = 1; i <= 5; i++) {
                const img = document.getElementById('img' + i).value.trim();
                if (img) images.push(img);
            }
            
            const newProduct = {
                id: Date.now(),
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: description,
                images: images
            };
            
            allProducts.push(newProduct);
            localStorage.setItem('products', JSON.stringify(allProducts));
            
            alert('✅ Product added successfully!');
            hideAddForm();
            displayProducts(allProducts);
        };
        
        // Open edit modal
        window.openEditModal = function(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            
            document.getElementById('editId').value = product.id;
            document.getElementById('editSku').value = product.sku || '';
            document.getElementById('editName').value = product.name || '';
            document.getElementById('editCategory').value = product.category || 'Necklaces';
            document.getElementById('editPrice').value = product.price || '';
            document.getElementById('editStock').value = product.stock || '';
            document.getElementById('editDescription').value = product.description || '';
            
            document.getElementById('editModal').style.display = 'block';
        };
        
        // Update product
        window.updateProduct = function() {
            const id = Number(document.getElementById('editId').value);
            const sku = document.getElementById('editSku').value.trim();
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value;
            const price = document.getElementById('editPrice').value.trim();
            const stock = document.getElementById('editStock').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            
            if (!sku || !name || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }
            
            const index = allProducts.findIndex(p => p.id === id);
            if (index === -1) return;
            
            allProducts[index] = {
                ...allProducts[index],
                sku: sku,
                name: name,
                category: category,
                price: Number(price),
                stock: Number(stock),
                description: description
            };
            
            localStorage.setItem('products', JSON.stringify(allProducts));
            
            alert('✅ Product updated successfully!');
            closeEditModal();
            displayProducts(allProducts);
        };
        
        // Delete product
        window.deleteProduct = function(id) {
            if (!confirm('⚠️ Delete this product permanently? This cannot be undone.')) return;
            
            const filtered = allProducts.filter(p => p.id !== id);
            allProducts = filtered;
            localStorage.setItem('products', JSON.stringify(allProducts));
            
            alert('✅ Product deleted successfully!');
            displayProducts(allProducts);
            
            // Clear search if needed
            document.getElementById('searchInput').value = '';
        };
        
        // Close edit modal
        window.closeEditModal = function() {
            document.getElementById('editModal').style.display = 'none';
        };
        
        // Logout
        window.logout = function() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        };
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        };
        
        // Initialize
        loadProducts();
        
        // Add styles for spinner animation
        const style = document.createElement('style');
        style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
