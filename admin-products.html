<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Style Of Life</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --dark: #1a1a1a;
            --darker: #0a0a0a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --danger: #dc3545;
            --success: #28a745;
            --info: #17a2b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
        }

        header {
            background: var(--darker);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            background: var(--primary);
            color: var(--darker);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        nav a:hover,
        nav a.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            background: var(--primary);
            color: #1a1a1a;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .search-box input {
            padding: 12px 18px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            width: 280px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--gray-200);
            display: none;
        }

        .form-card h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray-600);
            font-size: 13px;
            text-transform: uppercase;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--gray-200);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15);
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: var(--gray-100);
        }

        .product-info {
            padding: 20px;
        }

        .product-info h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-sku {
            font-size: 11px;
            color: var(--gray-600);
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin: 10px 0;
        }

        .product-stock {
            font-size: 12px;
            margin-bottom: 15px;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 500;
        }

        .stock-high {
            background: #d4edda;
            color: #155724;
        }

        .stock-low {
            background: #fff3cd;
            color: #856404;
        }

        .stock-out {
            background: #f8d7da;
            color: #721c24;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .edit-btn,
        .delete-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 13px;
        }

        .edit-btn {
            background: var(--info);
            color: white;
        }

        .edit-btn:hover {
            background: #138496;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 28px;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary);
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 24px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray-600);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .empty-state {
            text-align: center;
            padding: 80px;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--gray-200);
        }

        footer {
            background: var(--darker);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }

        .status-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .status-message.success {
            background: var(--success);
        }

        .status-message.error {
            background: var(--danger);
        }

        .status-message.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e9ecef;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input {
                width: 100%;
            }
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="statusMessage" class="status-message"></div>

    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>📦 Product Management</h1>

        <div class="toolbar">
            <button class="btn" onclick="showAddForm()">➕ Add New Product</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by name or SKU..." onkeyup="searchProducts()">
            </div>
        </div>

        <div id="addForm" class="form-card">
            <h2>✨ Add New Product</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>SKU *</label>
                    <input type="text" id="sku" placeholder="e.g., GOLD001">
                </div>
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="name" placeholder="e.g., Gold Necklace">
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="category">
                        <option value="Necklaces">Necklaces</option>
                        <option value="Rings">Rings</option>
                        <option value="Earrings">Earrings</option>
                        <option value="Bracelets">Bracelets</option>
                        <option value="Bangles">Bangles</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g., 25000" step="0.01">
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g., 10" value="10" min="0">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3" placeholder="Product description..."></textarea>
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
            </div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn" onclick="saveProduct()" id="saveProductBtn" style="flex: 1;">💾 Save Product</button>
                <button class="btn btn-danger" onclick="hideAddForm()" style="flex: 1;">Cancel</button>
            </div>
        </div>

        <div id="productsGrid" class="product-grid">
            <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Edit Product</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div>
                    <label>SKU</label>
                    <input type="text" id="editSku">
                </div>
                <div>
                    <label>Product Name</label>
                    <input type="text" id="editName">
                </div>
                <div>
                    <label>Category</label>
                    <select id="editCategory">
                        <option value="Necklaces">Necklaces</option>
                        <option value="Rings">Rings</option>
                        <option value="Earrings">Earrings</option>
                        <option value="Bracelets">Bracelets</option>
                        <option value="Bangles">Bangles</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div>
                    <label>Price (₹)</label>
                    <input type="number" id="editPrice" step="0.01">
                </div>
                <div>
                    <label>Stock</label>
                    <input type="number" id="editStock" min="0">
                </div>
            </div>
            <div>
                <label>Description</label>
                <textarea id="editDescription" rows="3"></textarea>
            </div>
            <div>
                <label>Image URL</label>
                <input type="text" id="editImageUrl">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="updateProduct()" id="updateProductBtn" style="flex: 1; background: var(--success);">💾 Save Changes</button>
                <button class="btn btn-danger" onclick="closeEditModal()" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tbopyyocuvlsjvtdogcp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRib3B5eW9jdXZsc2p2dGRvZ2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzYxNzcsImV4cCI6MjA4OTYxMjE3N30.TfEtU1NBHCGnZqZzm4LuI1iw22lSPav0OrUskhDw5wc";

        // Check admin login
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        let allProducts = [];

        function showMessage(message, type = 'success') {
            const msgDiv = document.getElementById('statusMessage');
            msgDiv.className = `status-message ${type} show`;
            msgDiv.textContent = message;
            setTimeout(() => {
                msgDiv.classList.remove('show');
            }, 3000);
        }

        async function fetchWithRetry(url, options, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    
                    const response = await fetch(url, {
                        ...options,
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    return await response.json();
                } catch (error) {
                    console.log(`Attempt ${i + 1} failed:`, error.message);
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            try {
                const products = await fetchWithRetry(`${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                allProducts = products || [];
                displayProducts(allProducts);
                showMessage(`Loaded ${allProducts.length} products`, 'success');
                
            } catch (error) {
                console.error('Error loading products:', error);
                grid.innerHTML = `<div class="empty-state"><p>❌ Error loading products: ${error.message}</p><button class="btn" onclick="loadProducts()" style="margin-top:15px;">Retry</button></div>`;
                showMessage('Error loading products', 'error');
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>📭 No Products Found</h3><p>Click "Add New Product" to get started.</p></div>';
                return;
            }
            
            let html = '';
            for (let p of products) {
                const mainImage = p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/300x200?text=No+Image';
                
                let stockClass = p.stock > 20 ? 'stock-high' : (p.stock > 0 ? 'stock-low' : 'stock-out');
                let stockText = p.stock > 0 ? `In Stock (${p.stock})` : 'Out of Stock';
                if (p.stock > 0 && p.stock < 10) stockText = `⚠️ Low Stock (${p.stock})`;
                
                html += `
                    <div class="product-card">
                        <img src="${mainImage}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                        <div class="product-info">
                            <h4>${escapeHtml(p.name)}</h4>
                            <div class="product-sku">SKU: ${p.sku}</div>
                            <div class="product-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
                            <div class="product-stock ${stockClass}">${stockText}</div>
                            <div class="product-actions">
                                <button class="edit-btn" onclick="openEditModal(${p.id})">✏️ Edit</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.sku.toLowerCase().includes(term)
            );
            displayProducts(filtered);
        }

        function showAddForm() {
            document.getElementById('addForm').style.display = 'block';
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('stock').value = '10';
            document.getElementById('description').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('category').value = 'Necklaces';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideAddForm() {
            document.getElementById('addForm').style.display = 'none';
        }

        async function saveProduct() {
            const sku = document.getElementById('sku').value.trim().toUpperCase();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value;
            const price = parseFloat(document.getElementById('price').value);
            const stock = parseInt(document.getElementById('stock').value);
            const description = document.getElementById('description').value.trim();
            const imageUrl = document.getElementById('imageUrl').value.trim();
            
            if (!sku || !name || isNaN(price) || isNaN(stock)) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            const images = imageUrl ? [imageUrl] : [];
            
            const saveBtn = document.getElementById('saveProductBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '⏳ Saving...';
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/products`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sku, name, category, price, stock, description, images
                    })
                });
                
                showMessage(`✅ Product "${name}" added successfully!`, 'success');
                hideAddForm();
                await loadProducts();
                
            } catch (error) {
                console.error('Save error:', error);
                showMessage('Error: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 Save Product';
            }
        }

        async function deleteProduct(id) {
            const product = allProducts.find(p => p.id === id);
            if (!confirm(`⚠️ Delete product "${product?.name}" permanently?`)) return;
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                showMessage(`✅ Product deleted successfully`, 'success');
                await loadProducts();
                document.getElementById('searchInput').value = '';
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function openEditModal(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            
            document.getElementById('editId').value = product.id;
            document.getElementById('editSku').value = product.sku || '';
            document.getElementById('editName').value = product.name || '';
            document.getElementById('editCategory').value = product.category || 'Necklaces';
            document.getElementById('editPrice').value = product.price || '';
            document.getElementById('editStock').value = product.stock || '';
            document.getElementById('editDescription').value = product.description || '';
            document.getElementById('editImageUrl').value = (product.images && product.images[0]) ? product.images[0] : '';
            
            document.getElementById('editModal').style.display = 'block';
        }

        async function updateProduct() {
            const id = parseInt(document.getElementById('editId').value);
            const sku = document.getElementById('editSku').value.trim().toUpperCase();
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value;
            const price = parseFloat(document.getElementById('editPrice').value);
            const stock = parseInt(document.getElementById('editStock').value);
            const description = document.getElementById('editDescription').value.trim();
            const imageUrl = document.getElementById('editImageUrl').value.trim();
            
            if (!sku || !name || isNaN(price) || isNaN(stock)) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            const images = imageUrl ? [imageUrl] : [];
            
            const updateBtn = document.getElementById('updateProductBtn');
            updateBtn.disabled = true;
            updateBtn.textContent = '⏳ Updating...';
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ sku, name, category, price, stock, description, images })
                });
                
                showMessage(`✅ Product "${name}" updated successfully!`, 'success');
                closeEditModal();
                await loadProducts();
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                updateBtn.disabled = false;
                updateBtn.textContent = '💾 Save Changes';
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m];
            });
        }

        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) closeEditModal();
        };

        // Initialize
        loadProducts();
    </script>
</body>
</html>
