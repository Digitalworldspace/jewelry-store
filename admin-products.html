<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Management - Style Of Life</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --dark: #1a1a1a;
            --darker: #0a0a0a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
        }

        header {
            background: var(--darker);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            background: var(--primary);
            color: var(--darker);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 1.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            background: rgba(212,175,55,0.1);
            color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2rem;
            font-size: 1.75rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn {
            background: var(--primary);
            color: var(--dark);
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .search-box input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            width: 280px;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--gray-200);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--gray-600);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .product-info {
            padding: 1rem;
        }

        .product-info h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .product-sku {
            font-size: 0.7rem;
            color: var(--gray-600);
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .edit-btn, .delete-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .edit-btn {
            background: var(--info);
            color: white;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            border-radius: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        footer {
            background: var(--darker);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html" class="active">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>Product Management</h1>
        
        <div class="toolbar">
            <button class="btn" onclick="showAddForm()">+ Add New Product</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name or SKU..." onkeyup="searchProducts()">
            </div>
        </div>
        
        <div id="addForm" class="form-card" style="display: none;">
            <h3 style="margin-bottom: 1rem;">Add New Product</h3>
            <div class="form-grid">
                <div class="form-group"><label>SKU *</label><input type="text" id="sku" placeholder="e.g., GOLD001"></div>
                <div class="form-group"><label>Product Name *</label><input type="text" id="name" placeholder="e.g., Gold Necklace"></div>
                <div class="form-group"><label>Category</label><input type="text" id="category" placeholder="Necklaces/Rings/Earrings"></div>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>Price (₹) *</label><input type="number" id="price" step="0.01"></div>
                <div class="form-group"><label>Stock *</label><input type="number" id="stock" min="0"></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="imageUrl" placeholder="https://..."></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="description" rows="3"></textarea></div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn" onclick="saveProduct()">Save Product</button>
                <button class="btn btn-danger" onclick="hideAddForm()">Cancel</button>
            </div>
        </div>
        
        <div class="product-grid" id="productsGrid"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Product</h3>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group"><label>SKU</label><input type="text" id="editSku"></div>
                <div class="form-group"><label>Product Name</label><input type="text" id="editName"></div>
                <div class="form-group"><label>Category</label><input type="text" id="editCategory"></div>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>Price (₹)</label><input type="number" id="editPrice" step="0.01"></div>
                <div class="form-group"><label>Stock</label><input type="number" id="editStock" min="0"></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="editImageUrl"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3"></textarea></div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn" onclick="updateProduct()">Save Changes</button>
                <button class="btn btn-danger" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://tbopyyocuvlsjvtdogcp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRib3B5eW9jdXZsc2p2dGRvZ2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzYxNzcsImV4cCI6MjA4OTYxMjE3N30.TfEtU1NBHCGnZqZzm4LuI1iw22lSPav0OrUskhDw5wc";
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        let allProducts = [];
        
        async function loadProducts() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                allProducts = await response.json();
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }
        
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:3rem;">No products found</div>';
                return;
            }
            
            let html = '';
            for (const p of products) {
                const imageUrl = p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/300x220?text=No+Image';
                html += `
                    <div class="product-card">
                        <img src="${imageUrl}" class="product-image" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
                        <div class="product-info">
                            <h4>${escapeHtml(p.name)}</h4>
                            <div class="product-sku">SKU: ${p.sku}</div>
                            <div class="product-price">₹${(p.price || 0).toLocaleString()}</div>
                            <div>Stock: ${p.stock}</div>
                            <div class="product-actions">
                                <button class="edit-btn" onclick="openEditModal(${p.id})">Edit</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }
        
        window.searchProducts = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.sku.toLowerCase().includes(term)
            );
            displayProducts(filtered);
        };
        
        window.showAddForm = function() {
            document.getElementById('addForm').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        window.hideAddForm = function() {
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('sku').value = '';
            document.getElementById('name').value = '';
            document.getElementById('category').value = '';
            document.getElementById('price').value = '';
            document.getElementById('stock').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('description').value = '';
        };
        
        window.saveProduct = async function() {
            const sku = document.getElementById('sku').value.trim().toUpperCase();
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value.trim();
            const price = parseFloat(document.getElementById('price').value);
            const stock = parseInt(document.getElementById('stock').value);
            const imageUrl = document.getElementById('imageUrl').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!sku || !name || isNaN(price) || isNaN(stock)) {
                alert('Please fill all required fields');
                return;
            }
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sku, name, category, price, stock, description,
                        images: imageUrl ? [imageUrl] : []
                    })
                });
                
                if (response.ok) {
                    alert('Product added successfully');
                    hideAddForm();
                    loadProducts();
                } else {
                    alert('Error adding product');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error adding product');
            }
        };
        
        window.openEditModal = async function(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            
            document.getElementById('editId').value = product.id;
            document.getElementById('editSku').value = product.sku || '';
            document.getElementById('editName').value = product.name || '';
            document.getElementById('editCategory').value = product.category || '';
            document.getElementById('editPrice').value = product.price || '';
            document.getElementById('editStock').value = product.stock || '';
            document.getElementById('editImageUrl').value = (product.images && product.images[0]) || '';
            document.getElementById('editDescription').value = product.description || '';
            
            document.getElementById('editModal').style.display = 'block';
        };
        
        window.updateProduct = async function() {
            const id = parseInt(document.getElementById('editId').value);
            const sku = document.getElementById('editSku').value.trim().toUpperCase();
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value.trim();
            const price = parseFloat(document.getElementById('editPrice').value);
            const stock = parseInt(document.getElementById('editStock').value);
            const imageUrl = document.getElementById('editImageUrl').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            
            if (!sku || !name || isNaN(price) || isNaN(stock)) {
                alert('Please fill all required fields');
                return;
            }
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sku, name, category, price, stock, description,
                        images: imageUrl ? [imageUrl] : []
                    })
                });
                
                if (response.ok) {
                    alert('Product updated successfully');
                    closeEditModal();
                    loadProducts();
                } else {
                    alert('Error updating product');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating product');
            }
        };
        
        window.deleteProduct = async function(id) {
            if (!confirm('Delete this product permanently?')) return;
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (response.ok) {
                    alert('Product deleted successfully');
                    loadProducts();
                } else {
                    alert('Error deleting product');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting product');
            }
        };
        
        window.closeEditModal = function() {
            document.getElementById('editModal').style.display = 'none';
        };
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        loadProducts();
    </script>
</body>
</html>
