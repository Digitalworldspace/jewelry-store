<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff;
      color: #111;
    }

    header {
      background: #111;
      color: gold;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .images {
      flex: 1;
      min-width: 300px;
    }

    .images img {
      width: 100%;
      border-radius: 10px;
    }

    .details {
      flex: 1;
      min-width: 300px;
    }

    .price {
      font-size: 22px;
      color: green;
      font-weight: bold;
    }

    .old {
      text-decoration: line-through;
      color: #999;
      margin-left: 10px;
    }

    button {
      padding: 10px 15px;
      background: gold;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    .box {
      border: 1px solid #eee;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #fff;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <div>Jewellery Store</div>
  <div>Cart</div>
</header>

<div class="container">

  <!-- Product Images -->
  <div class="images">
    <img id="mainImg" src="https://via.placeholder.com/500" />
  </div>

  <!-- Product Details -->
  <div class="details">
    <h2 id="title">Loading Product...</h2>

    <div>
      <span class="price" id="price">₹0</span>
      <span class="old" id="oldPrice">₹0</span>
    </div>

    <p id="desc">Product description will load from backend...</p>

    <button>Add to Cart</button>
    <button>Buy Now</button>

    <div class="box">
      <b>SKU:</b> <span id="sku">---</span><br>
      <b>Category:</b> Jewellery
    </div>

    <div class="box">
      <b>Delivery:</b> 3-5 Days<br>
      <b>Return:</b> 7 Days Easy Return
    </div>
  </div>

</div>

<footer>
  © 2026 Jewellery Store
</footer>

<script>
const API_URL = "https://your-backend.com/api/product/1";

async function loadProduct() {

  // Dummy backend response (replace with API)
  const data = {
    name: "Bridal Gold Necklace Set",
    price: 1499,
    oldPrice: 2499,
    image: "https://via.placeholder.com/500",
    description: "Premium imitation bridal jewellery with high-quality finish.",
    sku: "BRD-001"
  };

  document.getElementById("title").innerText = data.name;
  document.getElementById("price").innerText = "₹" + data.price;
  document.getElementById("oldPrice").innerText = "₹" + data.oldPrice;
  document.getElementById("mainImg").src = data.image;
  document.getElementById("desc").innerText = data.description;
  document.getElementById("sku").innerText = data.sku;
}

loadProduct();
</script>

</body>
</html>
