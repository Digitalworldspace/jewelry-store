<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --black: #1A1A1A;
            --gray: #666666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .register-left {
            flex: 1;
            background: linear-gradient(135deg, var(--black), #2c2c2c);
            padding: 50px;
            color: white;
        }
        .register-left h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 20px; }
        .register-left h1 span { color: var(--gold); }
        .register-left p { color: #aaa; line-height: 1.6; margin-bottom: 30px; }
        .benefits { list-style: none; }
        .benefits li { margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .benefits i { color: var(--gold); }
        .register-right { flex: 1; padding: 50px; }
        .register-right h2 { font-size: 28px; margin-bottom: 30px; color: var(--black); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--gray); font-size: 13px; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: var(--gold); }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-link { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .login-link a { color: var(--gold); text-decoration: none; font-weight: 600; cursor: pointer; }
        .terms { font-size: 12px; color: var(--gray); text-align: center; margin-top: 15px; }
        @media (max-width: 768px) {
            .register-container { flex-direction: column; }
            .register-left { padding: 30px; text-align: center; }
            .benefits { text-align: left; }
            .register-right { padding: 30px; }
        }
