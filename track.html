<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#d4af37">
    <title>Track Order - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --dark: #1a1a1a;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
        }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; padding-bottom: 70px; }
        
        header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 600; color: var(--primary); font-family: 'Playfair Display', serif; text-decoration: none; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .track-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }
        h1 { font-size: 24px; margin-bottom: 15px; color: var(--primary); }
        
        .track-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .track-input {
            padding: 14px;
            border: 1px solid var(--gray-200);
            border-radius: 40px;
            font-size: 14px;
        }
        .track-btn {
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .order-details {
            margin-top: 20px;
            text-align: left;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #c3e6cb; color: #155724; }
        
        .info-row { padding: 8px 0; border-bottom: 1px solid var(--gray-200); }
        .error { text-align: center; padding: 30px; color: #dc3545; }
        
        .loading { text-align: center; padding: 30px; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">STYLE·OF·LIFE</a>
        <div></div>
    </header>
    
    <div class="container">
        <div class="track-box">
            <h1>🔍 Track Order</h1>
            <p>Enter your Order ID</p>
            <div class="track-form">
                <input type="text" id="orderId" class="track-input" placeholder="e.g., ORD1739876543210">
                <button class="track-btn" onclick="trackOrder()">Track →</button>
            </div>
            <div id="result"></div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Shop</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html" class="active"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        window.trackOrder = async function() {
            const orderId = document.getElementById('orderId').value.trim();
            if (!orderId) { alert('Enter Order ID'); return; }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
            
            const { data, error } = await supabase.from('orders').select('*').eq('order_id', orderId);
            if (error || !data?.length) {
                resultDiv.innerHTML = '<div class="error">❌ Order not found</div>';
                return;
            }
            
            const o = data[0];
            resultDiv.innerHTML = `
                <div class="order-details">
                    <div class="info-row"><strong>Order ID:</strong> ${o.order_id}</div>
                    <div class="info-row"><strong>Date:</strong> ${new Date(o.created_at).toLocaleDateString()}</div>
                    <div class="info-row"><strong>Customer:</strong> ${escapeHtml(o.customer_name)}</div>
                    <div class="info-row"><strong>Phone:</strong> ${o.phone || o.customer_phone}</div>
                    <div class="info-row"><strong>Address:</strong> ${escapeHtml(o.address)}</div>
                    <div class="info-row"><strong>Status:</strong> <span class="status-badge status-${o.status?.toLowerCase()}">${o.status || 'Pending'}</span></div>
                    <div class="info-row"><strong>Total:</strong> ₹${(o.total || 0).toLocaleString()}</div>
                    <div class="info-row"><strong>Items:</strong> ${o.items?.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
                </div>
            `;
        };
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m))); }
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('order')) {
            document.getElementById('orderId').value = urlParams.get('order');
            trackOrder();
        }
    </script>
</body>
</html>
