<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --white-dark: #F0F0F0;
            --black: #1A1A1A;
            --black-light: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--black);
            overflow-x: hidden;
        }
        
        /* Light Background */
        .light-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%);
        }
        
        /* Floating Particles */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--gold), transparent);
            border-radius: 50%;
            opacity: 0.15;
            animation: floatParticle 15s infinite;
        }
        
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.05; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.2; }
        }
        
        /* Stories Section */
        .stories-section {
            padding: 15px 0;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .story-item:hover {
            transform: scale(0.95);
        }
        
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px;
            margin-bottom: 6px;
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--white);
        }
        
        .story-name {
            font-size: 11px;
            color: var(--gray);
            font-weight: 500;
        }
        
        /* Header with Black & Gold Logo */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .animated-logo {
            position: relative;
            cursor: pointer;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--black);
        }
        
        .logo-gold {
            color: var(--gold);
            font-weight: 900;
            margin: 0 2px;
        }
        
        .logo-sub {
            font-size: 8px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: -2px;
            opacity: 0.8;
        }
        
        .logo-diamond {
            position: absolute;
            top: -12px;
            right: -20px;
            font-size: 14px;
            color: var(--gold);
            animation: diamondSpin 3s linear infinite;
        }
        
        @keyframes diamondSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--black);
            font-size: 22px;
            text-decoration: none;
            position: relative;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        /* Story Modal */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        .story-modal.active {
            display: flex;
        }
        
        .story-modal-content {
            max-width: 90%;
            width: 400px;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        
        .story-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .story-modal-header h3 {
            font-size: 18px;
            color: var(--black);
        }
        
        .close-story {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }
        
        .story-modal-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .story-modal-info {
            padding: 20px;
        }
        
        .story-product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--black);
        }
        
        .story-product-sku {
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 10px;
        }
        
        .story-product-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            margin: 15px 0;
        }
        
        .story-product-description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .story-buttons {
            display: flex;
            gap: 12px;
        }
        
        .story-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .story-cart-btn {
            flex: 1;
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Post Card */
        .post-card {
            margin-bottom: 20px;
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
        }
        
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .post-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            padding: 2px;
        }
        
        .post-user-info h4 {
            font-size: 14px;
            font-weight: 600;
        }
        
        .post-user-info p {
            font-size: 10px;
            color: var(--gray);
        }
        
        .post-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .post-actions {
            padding: 12px 15px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white-light);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(212,175,55,0.15);
        }
        
        .action-btn i {
            font-size: 18px;
            color: var(--gold);
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
        }
        
        .action-btn:hover {
            background: rgba(212,175,55,0.1);
            transform: translateY(-2px);
        }
        
        .post-caption {
            padding: 0 15px 12px;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .post-caption span {
            font-weight: 600;
            color: var(--gold-dark);
        }
        
        .hashtag {
            color: var(--gold);
            cursor: pointer;
        }
        
        .post-time {
            padding: 0 15px 15px;
            font-size: 10px;
            color: var(--gray);
        }
        
        /* Product Tag */
        .post-product-tag {
            background: var(--white-light);
            margin: 10px 15px;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .tag-product-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .tag-product-image {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .tag-product-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .tag-product-price {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
        }
        
        .product-buttons {
            display: flex;
            gap: 12px;
        }
        
        .buy-now-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .add-to-cart-icon {
            background: var(--white);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-to-cart-icon:hover {
            background: var(--gold);
            color: var(--white);
        }
        
        /* Grid Section */
        .grid-section {
            padding: 20px 15px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .section-title a {
            color: var(--gold);
            font-size: 12px;
            text-decoration: none;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        
        .grid-product {
            aspect-ratio: 1 / 1;
            object-fit: cover;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .grid-product:hover {
            transform: scale(1.02);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: #f44336;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--white-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <!-- Light Background -->
    <div class="light-bg"></div>
    <div class="floating-particles" id="particles"></div>
    
    <!-- Stories Section -->
    <div class="stories-section">
        <div class="stories-container" id="storiesContainer">
            <!-- Stories will be loaded here -->
        </div>
    </div>
    
    <!-- Header with Black & Gold Logo -->
    <div class="instagram-header">
        <div class="animated-logo">
            <div class="logo-container">
                <div class="logo-main">STYLE<span class="logo-gold">OF</span>LIFE</div>
                <div class="logo-sub">LUXURY JEWELRY</div>
            </div>
            <i class="fas fa-gem logo-diamond"></i>
        </div>
        <div class="header-icons">
            <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- Story Modal -->
    <div id="storyModal" class="story-modal">
        <div class="story-modal-content">
            <div class="story-modal-header">
                <h3>Product Details</h3>
                <button class="close-story" onclick="closeStoryModal()">&times;</button>
            </div>
            <img id="storyModalImage" class="story-modal-image" src="" alt="">
            <div class="story-modal-info">
                <div class="story-product-name" id="storyProductName"></div>
                <div class="story-product-sku" id="storyProductSku"></div>
                <div class="story-product-price" id="storyProductPrice"></div>
                <div class="story-product-description" id="storyProductDesc"></div>
                <div class="story-buttons">
                    <button class="story-buy-btn" id="storyBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                    <button class="story-cart-btn" id="storyCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Feed Posts -->
    <div id="feedContainer"></div>
    
    <!-- Grid Section -->
    <div class="grid-section">
        <div class="section-title">
            <h3>Shop Our Collection</h3>
            <a href="shop.html">View All →</a>
        </div>
        <div class="product-grid" id="productGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        let currentStoryProduct = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
                
                const cartIcon = document.querySelector('.header-icons a:first-child i');
                if (cartIcon) {
                    cartIcon.classList.add('cart-animation');
                    setTimeout(() => cartIcon.classList.remove('cart-animation'), 500);
                }
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        window.openStoryModal = (product) => {
            currentStoryProduct = product;
            document.getElementById('storyModalImage').src = product.image;
            document.getElementById('storyProductName').textContent = product.name;
            document.getElementById('storyProductSku').textContent = `SKU: ${product.sku}`;
            document.getElementById('storyProductPrice').textContent = `₹${product.price.toLocaleString()}`;
            document.getElementById('storyProductDesc').textContent = product.description || 'Exquisite handcrafted jewelry piece. Made with premium quality materials and finest craftsmanship.';
            
            const buyBtn = document.getElementById('storyBuyBtn');
            const cartBtn = document.getElementById('storyCartBtn');
            
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, product.image);
            cartBtn.onclick = () => addToCart(product.id, product.name, product.price, product.sku, product.image);
            
            document.getElementById('storyModal').classList.add('active');
        };
        
        window.closeStoryModal = () => {
            document.getElementById('storyModal').classList.remove('active');
        };
        
        async function loadStories() {
            const container = document.getElementById('storiesContainer');
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('id')
                .limit(8);
            
            if (error || !products?.length) return;
            
            const storyCategories = [
                { name: '✨ New', filter: 'new' },
                { name: '💍 Rings', filter: 'rings' },
                { name: '📿 Necklaces', filter: 'necklaces' },
                { name: '👑 Earrings', filter: 'earrings' },
                { name: '💫 Bracelets', filter: 'bracelets' },
                { name: '💎 Pendants', filter: 'pendants' },
                { name: '⭐ Best Sellers', filter: 'bestsellers' },
                { name: '🔥 Sale', filter: 'sale' }
            ];
            
            let html = '';
            for (let i = 0; i < storyCategories.length && i < products.length; i++) {
                const product = products[i];
                const img = product.images?.[0] || 'https://via.placeholder.com/70x70';
                html += `
                    <div class="story-item" onclick="openStoryModal({
                        id: ${product.id},
                        name: '${escapeHtml(product.name)}',
                        sku: '${product.sku}',
                        price: ${product.price},
                        image: '${img}',
                        description: '${escapeHtml(product.description || 'Exquisite handcrafted jewelry piece.')}'
                    })">
                        <div class="story-ring">
                            <img class="story-image" src="${img}" alt="${storyCategories[i].name}">
                        </div>
                        <div class="story-name">${storyCategories[i].name}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        async function loadFeed() {
            const container = document.getElementById('feedContainer');
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('id')
                .limit(5);
            
            if (error || !products?.length) {
                container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading feed...</p></div>';
                return;
            }
            
            const feedPosts = [
                {
                    id: 1,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: products[0]?.images?.[0] || 'https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop',
                    product: products[0],
                    caption: 'Elevate your elegance with our stunning diamond necklace. ✨ Handcrafted with love and precision.',
                    time: '2 hours ago',
                    hashtags: '#LuxuryJewelry #StyleOfLife #DiamondNecklace'
                },
                {
                    id: 2,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: products[1]?.images?.[0] || 'https://images.pexels.com/photos/1191665/pexels-photo-1191665.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop',
                    product: products[1] || products[0],
                    caption: 'The perfect ring for your special moment. 💍 Our solitaire diamond ring is a timeless classic.',
                    time: '5 hours ago',
                    hashtags: '#DiamondRing #Proposal #EngagementRing'
                },
                {
                    id: 3,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: products[2]?.images?.[0] || 'https://images.pexels.com/photos/1455286/pexels-photo-1455286.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop',
                    product: products[2] || products[0],
                    caption: 'Pearls never go out of style. 🌟 Our pearl drop earrings add the perfect touch of elegance.',
                    time: '1 day ago',
                    hashtags: '#PearlJewelry #Elegance #StyleOfLife'
                }
            ];
            
            let html = '';
            for (const post of feedPosts) {
                const img = post.product?.images?.[0] || 'https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop';
                
                html += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-user">
                                <img class="post-avatar" src="${post.avatar}" alt="">
                                <div class="post-user-info">
                                    <h4>${post.name} <i class="fas fa-check-circle" style="color: var(--gold); font-size: 12px;"></i></h4>
                                    <p>${post.user}</p>
                                </div>
                            </div>
                            <div class="post-menu"><i class="fas fa-ellipsis-h"></i></div>
                        </div>
                        <img class="post-image" src="${img}" alt="">
                        <div class="post-actions">
                            <div class="action-btn" onclick="openStoryModal({
                                id: ${post.product?.id || 1},
                                name: '${escapeHtml(post.product?.name || 'Jewelry')}',
                                sku: '${post.product?.sku || 'LUX-001'}',
                                price: ${post.product?.price || 0},
                                image: '${img}',
                                description: '${escapeHtml(post.product?.description || 'Exquisite handcrafted jewelry piece.')}'
                            })">
                                <i class="fas fa-info-circle"></i>
                                <span>View Details</span>
                            </div>
                        </div>
                        <div class="post-caption">
                            <span>${post.user}</span> ${post.caption}<br>
                            <span class="hashtag">${post.hashtags}</span>
                        </div>
                        <div class="post-product-tag">
                            <div class="tag-product-info">
                                <img class="tag-product-image" src="${img}" alt="">
                                <div>
                                    <div class="tag-product-name">${post.product?.name || 'Luxury Jewelry'}</div>
                                    <div class="tag-product-price">₹${(post.product?.price || 0).toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="product-buttons">
                                <button class="buy-now-btn" onclick="buyNow(${post.product?.id || 1}, '${escapeHtml(post.product?.name || 'Jewelry')}', ${post.product?.price || 0}, '${post.product?.sku || 'LUX-001'}', '${img}')">
                                    <i class="fas fa-bolt"></i> Buy Now
                                </button>
                                <div class="add-to-cart-icon" onclick="addToCart(${post.product?.id || 1}, '${escapeHtml(post.product?.name || 'Jewelry')}', ${post.product?.price || 0}, '${post.product?.sku || 'LUX-001'}', '${img}')">
                                    <i class="fas fa-shopping-cart"></i>
                                </div>
                            </div>
                        </div>
                        <div class="post-time">${post.time}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        async function loadProductGrid() {
            const container = document.getElementById('productGrid');
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id')
                    .limit(6);
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="loading"><p>Coming soon...</p></div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/200x200?text=Style+Of+Life';
                    html += `
                        <img class="grid-product" src="${img}" alt="${p.name}" onclick="openStoryModal({
                            id: ${p.id},
                            name: '${escapeHtml(p.name)}',
                            sku: '${p.sku}',
                            price: ${p.price},
                            image: '${img}',
                            description: '${escapeHtml(p.description || 'Exquisite handcrafted jewelry piece.')}'
                        })">
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="loading"><p>Error loading</p></div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        // Close modal on outside click
        document.getElementById('storyModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeStoryModal();
            }
        });
        
        await updateCartCount();
        await loadStories();
        await loadFeed();
        await loadProductGrid();
    </script>
</body>
</html>
