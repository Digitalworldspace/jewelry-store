<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --black: #000000;
            --black-light: #1A1A1A;
            --black-dark: #0A0A0A;
            --white: #FFFFFF;
            --gray: #2A2A2A;
            --gray-light: #3A3A3A;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow-x: hidden;
        }
        
        /* Instagram Stories Section */
        .stories-section {
            padding: 15px 0;
            background: var(--black);
            border-bottom: 1px solid rgba(212,175,55,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 70px;
            cursor: pointer;
        }
        
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px;
            margin-bottom: 8px;
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--black);
        }
        
        .story-name {
            font-size: 11px;
            color: var(--gray-light);
        }
        
        /* Header - Instagram Style */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--black);
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        
        .logo-small {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--gold);
            font-size: 22px;
            text-decoration: none;
            position: relative;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--black);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        /* Instagram Post Card */
        .post-card {
            margin-bottom: 20px;
            background: var(--black-light);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
        }
        
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            padding: 2px;
        }
        
        .post-user-info h4 {
            font-size: 13px;
            font-weight: 600;
        }
        
        .post-user-info p {
            font-size: 10px;
            color: var(--gray-light);
        }
        
        .post-menu {
            color: var(--gray-light);
            font-size: 18px;
        }
        
        .post-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .post-actions {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
        }
        
        .action-icons {
            display: flex;
            gap: 20px;
        }
        
        .action-icons i {
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-icons i:hover {
            color: var(--gold);
            transform: scale(1.1);
        }
        
        .liked {
            color: #ff3040;
        }
        
        .post-likes {
            padding: 0 15px 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .post-caption {
            padding: 0 15px 12px;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .post-caption span {
            font-weight: 600;
            margin-right: 5px;
        }
        
        .post-time {
            padding: 0 15px 15px;
            font-size: 10px;
            color: var(--gray-light);
        }
        
        .post-product-tag {
            background: rgba(212,175,55,0.1);
            margin: 10px 15px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .tag-product-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .tag-product-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .tag-product-name {
            font-size: 13px;
            font-weight: 600;
        }
        
        .tag-product-price {
            font-size: 12px;
            color: var(--gold);
        }
        
        .shop-now-btn {
            background: var(--gold);
            color: var(--black);
            padding: 6px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Grid Posts Section */
        .grid-section {
            padding: 20px 15px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .section-title a {
            color: var(--gold);
            font-size: 12px;
            text-decoration: none;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        
        .grid-product {
            aspect-ratio: 1 / 1;
            object-fit: cover;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .grid-product:hover {
            transform: scale(1.02);
        }
        
        /* Bottom Navigation - Instagram Style */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(212,175,55,0.2);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray-light);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--black);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 600;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: #f44336;
            color: white;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Add to Cart Animation */
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <!-- Instagram Stories -->
    <div class="stories-section">
        <div class="stories-container">
            <div class="story-item">
                <div class="story-ring"><img class="story-image" src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=70&h=70&fit=crop" alt=""></div>
                <div class="story-name">New Arrivals</div>
            </div>
            <div class="story-item">
                <div class="story-ring"><img class="story-image" src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=70&h=70&fit=crop" alt=""></div>
                <div class="story-name">Rings</div>
            </div>
            <div class="story-item">
                <div class="story-ring"><img class="story-image" src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=70&h=70&fit=crop" alt=""></div>
                <div class="story-name">Necklaces</div>
            </div>
            <div class="story-item">
                <div class="story-ring"><img class="story-image" src="https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=70&h=70&fit=crop" alt=""></div>
                <div class="story-name">Bracelets</div>
            </div>
            <div class="story-item">
                <div class="story-ring"><img class="story-image" src="https://images.unsplash.com/photo-1589674781759-21f0bb668a1d?w=70&h=70&fit=crop" alt=""></div>
                <div class="story-name">Pendants</div>
            </div>
            <div class="story-item">
                <div class="story-ring"><img class="story-image" src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=70&h=70&fit=crop" alt=""></div>
                <div class="story-name">Earrings</div>
            </div>
        </div>
    </div>
    
    <!-- Instagram Header -->
    <div class="instagram-header">
        <i class="fas fa-camera" style="color: var(--gold); font-size: 24px;"></i>
        <div class="logo-small">STYLE OF LIFE</div>
        <div class="header-icons">
            <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- Feed Posts -->
    <div id="feedContainer"></div>
    
    <!-- Product Grid Section -->
    <div class="grid-section">
        <div class="section-title">
            <h3>Shop Our Collection</h3>
            <a href="shop.html">View All →</a>
        </div>
        <div class="product-grid" id="productGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        let likedPosts = JSON.parse(localStorage.getItem('likedPosts') || '{}');
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart!`);
                await updateCartCount();
                
                const cartIcon = document.querySelector('.header-icons a:first-child i');
                if (cartIcon) {
                    cartIcon.classList.add('cart-animation');
                    setTimeout(() => cartIcon.classList.remove('cart-animation'), 500);
                }
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.likePost = function(postId) {
            const heartIcon = document.getElementById(`heart-${postId}`);
            const likesCount = document.getElementById(`likes-${postId}`);
            
            if (likedPosts[postId]) {
                likedPosts[postId] = false;
                heartIcon.classList.remove('liked');
                let currentLikes = parseInt(likesCount.textContent);
                likesCount.textContent = currentLikes - 1;
            } else {
                likedPosts[postId] = true;
                heartIcon.classList.add('liked');
                let currentLikes = parseInt(likesCount.textContent);
                likesCount.textContent = currentLikes + 1;
            }
            
            localStorage.setItem('likedPosts', JSON.stringify(likedPosts));
        };
        
        async function loadFeed() {
            const container = document.getElementById('feedContainer');
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('id')
                .limit(5);
            
            if (error || !products?.length) {
                container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading feed...</p></div>';
                return;
            }
            
            const feedPosts = [
                {
                    id: 1,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=40&h=40&fit=crop',
                    product: products[0],
                    caption: 'Elevate your elegance with our stunning diamond necklace. ✨ Handcrafted with love and precision. #LuxuryJewelry #StyleOfLife',
                    time: '2 hours ago',
                    likes: 1247
                },
                {
                    id: 2,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=40&h=40&fit=crop',
                    product: products[1] || products[0],
                    caption: 'The perfect ring for your special moment. 💍 Our solitaire diamond ring is a timeless classic. #DiamondRing #Proposal',
                    time: '5 hours ago',
                    likes: 892
                },
                {
                    id: 3,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=40&h=40&fit=crop',
                    product: products[2] || products[0],
                    caption: 'Pearls never go out of style. 🌟 Our pearl drop earrings add the perfect touch of elegance to any outfit. #PearlJewelry #Elegance',
                    time: '1 day ago',
                    likes: 2103
                }
            ];
            
            let html = '';
            for (const post of feedPosts) {
                const img = post.product?.images?.[0] || 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=400&h=400&fit=crop';
                const isLiked = likedPosts[post.id] || false;
                
                html += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-user">
                                <img class="post-avatar" src="${post.avatar}" alt="">
                                <div class="post-user-info">
                                    <h4>${post.name}</h4>
                                    <p>${post.user}</p>
                                </div>
                            </div>
                            <div class="post-menu"><i class="fas fa-ellipsis-h"></i></div>
                        </div>
                        <img class="post-image" src="${img}" alt="">
                        <div class="post-actions">
                            <div class="action-icons">
                                <i class="fas fa-heart ${isLiked ? 'liked' : ''}" id="heart-${post.id}" onclick="likePost(${post.id})"></i>
                                <i class="far fa-comment"></i>
                                <i class="far fa-paper-plane"></i>
                            </div>
                            <div class="action-icons">
                                <i class="far fa-bookmark"></i>
                            </div>
                        </div>
                        <div class="post-likes">
                            <span id="likes-${post.id}">${post.likes}</span> likes
                        </div>
                        <div class="post-caption">
                            <span>${post.user}</span> ${post.caption}
                        </div>
                        <div class="post-product-tag">
                            <div class="tag-product-info">
                                <img class="tag-product-image" src="${img}" alt="">
                                <div>
                                    <div class="tag-product-name">${post.product?.name || 'Luxury Jewelry'}</div>
                                    <div class="tag-product-price">₹${(post.product?.price || 0).toLocaleString()}</div>
                                </div>
                            </div>
                            <button class="shop-now-btn" onclick="addToCart(${post.product?.id || 1}, '${escapeHtml(post.product?.name || 'Jewelry')}', ${post.product?.price || 0}, '${post.product?.sku || 'LUX-001'}', '${img}')">Shop Now</button>
                        </div>
                        <div class="post-time">${post.time}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        async function loadProductGrid() {
            const container = document.getElementById('productGrid');
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id')
                    .limit(6);
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="loading"><p>Coming soon...</p></div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/200x200?text=Style+Of+Life';
                    html += `
                        <img class="grid-product" src="${img}" alt="${p.name}" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="loading"><p>Error loading</p></div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        await updateCartCount();
        await loadFeed();
        await loadProductGrid();
    </script>
</body>
</html>
