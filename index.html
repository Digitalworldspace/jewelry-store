<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --white-dark: #F0F0F0;
            --black: #1A1A1A;
            --black-light: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--black);
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        
        /* Light Background */
        .light-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%);
        }
        
        /* Stories Section - No Category Names Below */
        .stories-section {
            padding: 15px 0;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .story-item:active {
            transform: scale(0.95);
        }
        
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px;
            margin-bottom: 0;
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--white);
        }
        
        /* Header */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .animated-logo {
            position: relative;
            cursor: pointer;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--black);
        }
        
        .logo-gold {
            color: var(--gold);
            font-weight: 900;
            margin: 0 2px;
        }
        
        .logo-sub {
            font-size: 8px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: -2px;
            opacity: 0.8;
        }
        
        .logo-diamond {
            position: absolute;
            top: -12px;
            right: -20px;
            font-size: 14px;
            color: var(--gold);
            animation: diamondSpin 3s linear infinite;
        }
        
        @keyframes diamondSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--black);
            font-size: 22px;
            text-decoration: none;
            position: relative;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        /* Featured Section - Only Image, Name, Price with Buy Now & Cart */
        .featured-section {
            padding: 20px 15px;
            background: linear-gradient(135deg, rgba(212,175,55,0.05), rgba(212,175,55,0.02));
            margin-bottom: 20px;
        }
        
        .featured-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--gold-dark);
        }
        
        .random-products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .random-product-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .random-product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        .random-product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .random-product-info {
            padding: 12px;
        }
        
        .random-product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .random-product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .random-buttons {
            display: flex;
            gap: 8px;
        }
        
        .random-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 8px;
            border: none;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .random-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        /* Product Grid with Scrollable Images */
        .products-section {
            padding: 20px 15px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
            position: relative;
        }
        
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .product-item {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .product-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        /* Image Gallery - Scrollable */
        .product-gallery {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            display: flex;
            scrollbar-width: thin;
        }
        
        .product-gallery::-webkit-scrollbar {
            height: 4px;
        }
        
        .product-gallery::-webkit-scrollbar-track {
            background: var(--white-dark);
            border-radius: 10px;
        }
        
        .product-gallery::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        .gallery-image {
            min-width: 100%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
        }
        
        .gallery-dots {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
            z-index: 5;
        }
        
        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.2s;
        }
        
        .gallery-dot.active {
            width: 20px;
            border-radius: 3px;
            background: var(--gold);
        }
        
        .product-item-info {
            padding: 15px;
        }
        
        .product-item-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .product-item-sku {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }
        
        .product-item-desc {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-item-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }
        
        .product-item-buttons {
            display: flex;
            gap: 12px;
        }
        
        .product-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .product-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-cart-btn:hover {
            background: var(--gold);
            color: var(--white);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: #f44336;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--white-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        @media (min-width: 768px) {
            .random-products {
                grid-template-columns: repeat(4, 1fr);
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="light-bg"></div>
    
    <!-- Stories Section - No Category Names -->
    <div class="stories-section">
        <div class="stories-container" id="storiesContainer">
            <!-- Stories will be loaded here -->
        </div>
    </div>
    
    <!-- Header -->
    <div class="instagram-header">
        <div class="animated-logo">
            <div class="logo-container">
                <div class="logo-main">STYLE<span class="logo-gold">OF</span>LIFE</div>
                <div class="logo-sub">LUXURY JEWELRY</div>
            </div>
            <i class="fas fa-gem logo-diamond"></i>
        </div>
        <div class="header-icons">
            <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- Random Products Section - Only Image, Name, Price with Buy Now & Cart -->
    <div class="featured-section">
        <div class="featured-title">✨ You May Also Like</div>
        <div class="random-products" id="randomProducts">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Products Section with Scrollable Images -->
    <div class="products-section">
        <div class="section-title">
            <h3>All Products</h3>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        // Initialize gallery with scroll and dots
        function initGallery(galleryId, images, dotContainerId) {
            const gallery = document.getElementById(galleryId);
            const dotContainer = document.getElementById(dotContainerId);
            
            if (!gallery || !dotContainer) return;
            
            // Clear existing content
            gallery.innerHTML = '';
            dotContainer.innerHTML = '';
            
            // Add images
            images.forEach((img, index) => {
                const imgElement = document.createElement('img');
                imgElement.src = img;
                imgElement.className = 'gallery-image';
                imgElement.alt = 'Product image';
                imgElement.onerror = () => { imgElement.src = 'https://via.placeholder.com/400x400?text=Image+Not+Available'; };
                gallery.appendChild(imgElement);
                
                // Add dot
                const dot = document.createElement('div');
                dot.className = 'gallery-dot';
                if (index === 0) dot.classList.add('active');
                dot.addEventListener('click', () => {
                    gallery.scrollTo({ left: gallery.clientWidth * index, behavior: 'smooth' });
                });
                dotContainer.appendChild(dot);
            });
            
            // Update active dot on scroll
            gallery.addEventListener('scroll', () => {
                const scrollPosition = gallery.scrollLeft;
                const itemWidth = gallery.clientWidth;
                const activeIndex = Math.round(scrollPosition / itemWidth);
                const dots = dotContainer.querySelectorAll('.gallery-dot');
                dots.forEach((dot, idx) => {
                    if (idx === activeIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            });
        }
        
        // Load Stories - No Category Names
        async function loadStories() {
            const container = document.getElementById('storiesContainer');
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('id')
                .limit(6);
            
            const storyIcons = ['✨', '💍', '📿', '👑', '💫', '💎'];
            const storyColors = ['#D4AF37', '#E8C47E', '#F5E6B3', '#E8C47E', '#D4AF37', '#B8962E'];
            
            let html = '';
            for (let i = 0; i < 6; i++) {
                const product = products && products[i] ? products[i] : null;
                const storyImage = product?.images?.[0] || `https://via.placeholder.com/70x70?text=${storyIcons[i]}`;
                
                html += `
                    <div class="story-item">
                        <div class="story-ring">
                            <img class="story-image" src="${storyImage}" alt="Story">
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // Load random products for featured section
        async function loadRandomProducts() {
            const container = document.getElementById('randomProducts');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ Coming soon</div>';
                    return;
                }
                
                // Shuffle and get 4 random products
                const shuffled = [...products];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const randomProducts = shuffled.slice(0, 4);
                
                let html = '';
                for (const p of randomProducts) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/300x150?text=Style+Of+Life';
                    
                    html += `
                        <div class="random-product-card">
                            <img class="random-product-image" src="${img}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/300x150?text=Style+Of+Life'">
                            <div class="random-product-info">
                                <div class="random-product-name">${escapeHtml(p.name)}</div>
                                <div class="random-product-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="random-buttons">
                                    <button class="random-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-bolt"></i> Buy
                                    </button>
                                    <button class="random-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-cart-plus"></i> Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading random products:', error);
                container.innerHTML = '<div class="empty-state">Unable to load recommendations</div>';
            }
        }
        
        // Load products with scrollable images
        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ No products found</div>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const desc = p.description || 'Exquisite handcrafted jewelry piece made with premium quality materials and finest craftsmanship. Perfect for special occasions.';
                    
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    html += `
                        <div class="product-item">
                            <div class="product-gallery" id="${galleryId}"></div>
                            <div class="gallery-dots" id="${dotId}"></div>
                            <div class="product-item-info">
                                <div class="product-item-name">${escapeHtml(p.name)}</div>
                                <div class="product-item-sku">SKU: ${p.sku} | ${p.category || 'Jewelry'}</div>
                                <div class="product-item-desc">${escapeHtml(desc.substring(0, 120))}${desc.length > 120 ? '...' : ''}</div>
                                <div class="product-item-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="product-item-buttons">
                                    <button class="product-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')">
                                        <i class="fas fa-bolt"></i> Buy Now
                                    </button>
                                    <button class="product-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')">
                                        <i class="fas fa-shopping-cart"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                // Initialize galleries after adding to DOM
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    setTimeout(() => {
                        initGallery(galleryId, displayImages, dotId);
                    }, 50);
                }
                
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        // Initialize
        loadStories();
        await updateCartCount();
        await loadRandomProducts();
        await loadProducts();
    </script>
</body>
</html>
