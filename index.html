<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --white-dark: #F0F0F0;
            --black: #1A1A1A;
            --black-light: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--black);
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        
        /* Light Background */
        .light-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%);
        }
        
        /* Stories Section - Category Toggle */
        .stories-section {
            padding: 15px 0;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 70px;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.6;
        }
        
        .story-item.active {
            opacity: 1;
        }
        
        .story-item.active .story-ring {
            box-shadow: 0 0 0 2px var(--gold);
            transform: scale(1.05);
        }
        
        .story-item:hover {
            transform: translateY(-3px);
        }
        
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px;
            margin-bottom: 6px;
            transition: all 0.3s;
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            background: var(--white);
        }
        
        .story-name {
            font-size: 11px;
            color: var(--gray);
            font-weight: 500;
        }
        
        /* Header */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .animated-logo {
            position: relative;
            cursor: pointer;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--black);
        }
        
        .logo-gold {
            color: var(--gold);
            font-weight: 900;
            margin: 0 2px;
        }
        
        .logo-sub {
            font-size: 8px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: -2px;
            opacity: 0.8;
        }
        
        .logo-diamond {
            position: absolute;
            top: -12px;
            right: -20px;
            font-size: 14px;
            color: var(--gold);
            animation: diamondSpin 3s linear infinite;
        }
        
        @keyframes diamondSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--black);
            font-size: 22px;
            text-decoration: none;
            position: relative;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        /* Story Modal - Product Details Popup */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        .story-modal.active {
            display: flex;
        }
        
        .story-modal-content {
            max-width: 90%;
            width: 380px;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .story-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .story-modal-header h3 {
            font-size: 18px;
            color: var(--black);
        }
        
        .close-story {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }
        
        .story-modal-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            object-position: center;
        }
        
        .story-modal-info {
            padding: 20px;
        }
        
        .story-product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--black);
        }
        
        .story-product-sku {
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 10px;
        }
        
        .story-product-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            margin: 15px 0;
        }
        
        .story-product-description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .story-buttons {
            display: flex;
            gap: 12px;
        }
        
        .story-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .story-buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
        }
        
        .story-cart-btn {
            flex: 1;
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .story-cart-btn:hover {
            background: var(--gold);
            color: var(--white);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Scrollable Product Dashboard */
        .product-dashboard {
            padding: 20px 15px;
            background: var(--white);
            margin: 15px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .dashboard-header h3 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .dashboard-header span {
            font-size: 12px;
            color: var(--gold);
            background: rgba(212,175,55,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        /* Horizontal Scrollable Products */
        .scrollable-products {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 10px 5px 20px;
            scrollbar-width: thin;
        }
        
        .scrollable-products::-webkit-scrollbar {
            height: 4px;
        }
        
        .scrollable-products::-webkit-scrollbar-track {
            background: var(--white-dark);
            border-radius: 10px;
        }
        
        .scrollable-products::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        .scroll-product-card {
            min-width: 160px;
            width: 160px;
            background: var(--white-light);
            border-radius: 16px;
            overflow: hidden;
            scroll-snap-align: start;
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }
        
        .scroll-product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: var(--gold);
        }
        
        .scroll-product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            object-position: center;
        }
        
        .scroll-product-info {
            padding: 12px;
        }
        
        .scroll-product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .scroll-product-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .scroll-product-buttons {
            display: flex;
            gap: 6px;
        }
        
        .scroll-buy-btn {
            flex: 1;
            background: var(--gold);
            color: var(--white);
            padding: 6px;
            border: none;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .scroll-cart-btn {
            background: var(--white);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* Products Grid with Description */
        .products-section {
            padding: 20px 15px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
            position: relative;
        }
        
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }
        
        .current-category {
            font-size: 12px;
            color: var(--gold);
            background: rgba(212,175,55,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .product-item {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .product-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        .product-item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            object-position: center;
            background: var(--white-light);
        }
        
        .product-item-info {
            padding: 15px;
        }
        
        .product-item-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .product-item-sku {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }
        
        .product-item-desc {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-item-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }
        
        .product-item-buttons {
            display: flex;
            gap: 12px;
        }
        
        .product-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .product-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-cart-btn:hover {
            background: var(--gold);
            color: var(--white);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: #f44336;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--white-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .scroll-product-card {
                min-width: 180px;
                width: 180px;
            }
            .scroll-product-image {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="light-bg"></div>
    
    <!-- Stories Section - Category Toggle -->
    <div class="stories-section">
        <div class="stories-container" id="storiesContainer">
            <!-- Categories will be loaded here -->
        </div>
    </div>
    
    <!-- Header -->
    <div class="instagram-header">
        <div class="animated-logo">
            <div class="logo-container">
                <div class="logo-main">STYLE<span class="logo-gold">OF</span>LIFE</div>
                <div class="logo-sub">LUXURY JEWELRY</div>
            </div>
            <i class="fas fa-gem logo-diamond"></i>
        </div>
        <div class="header-icons">
            <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- Story Modal - Product Details Popup -->
    <div id="storyModal" class="story-modal">
        <div class="story-modal-content">
            <div class="story-modal-header">
                <h3>✨ Product Details</h3>
                <button class="close-story" onclick="closeStoryModal()">&times;</button>
            </div>
            <img id="storyModalImage" class="story-modal-image" src="" alt="">
            <div class="story-modal-info">
                <div class="story-product-name" id="storyProductName"></div>
                <div class="story-product-sku" id="storyProductSku"></div>
                <div class="story-product-price" id="storyProductPrice"></div>
                <div class="story-product-description" id="storyProductDesc"></div>
                <div class="story-buttons">
                    <button class="story-buy-btn" id="storyBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                    <button class="story-cart-btn" id="storyCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scrollable Product Dashboard -->
    <div class="product-dashboard">
        <div class="dashboard-header">
            <h3>✨ Scroll to Explore</h3>
            <span>Swipe →</span>
        </div>
        <div class="scrollable-products" id="scrollableProducts">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Products Section with Description -->
    <div class="products-section">
        <div class="section-title">
            <h3 id="categoryTitle">All Products</h3>
            <span class="current-category" id="currentCategory">All</span>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        let allProducts = [];
        let currentCategory = 'all';
        let currentStoryProduct = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // Category mapping with beautiful images
        const categories = [
            { id: 'all', name: '✨ All', icon: 'fa-gem', filter: null, color: '#D4AF37' },
            { id: 'rings', name: '💍 Rings', icon: 'fa-ring', filter: 'Rings', color: '#E8C47E' },
            { id: 'necklaces', name: '📿 Necklaces', icon: 'fa-link', filter: 'Necklaces', color: '#F5E6B3' },
            { id: 'earrings', name: '👑 Earrings', icon: 'fa-ear-deaf', filter: 'Earrings', color: '#E8C47E' },
            { id: 'bracelets', name: '💫 Bracelets', icon: 'fa-hand-peace', filter: 'Bracelets', color: '#D4AF37' },
            { id: 'pendants', name: '💎 Pendants', icon: 'fa-gem', filter: 'Pendants', color: '#B8962E' }
        ];
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
                
                const cartIcon = document.querySelector('.header-icons a:first-child i');
                if (cartIcon) {
                    cartIcon.classList.add('cart-animation');
                    setTimeout(() => cartIcon.classList.remove('cart-animation'), 500);
                }
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        // Open story modal with product details
        window.openStoryModal = (product) => {
            currentStoryProduct = product;
            document.getElementById('storyModalImage').src = product.image;
            document.getElementById('storyProductName').textContent = product.name;
            document.getElementById('storyProductSku').textContent = `SKU: ${product.sku}`;
            document.getElementById('storyProductPrice').textContent = `₹${product.price.toLocaleString()}`;
            document.getElementById('storyProductDesc').textContent = product.description || 'Exquisite handcrafted jewelry piece made with premium quality materials and finest craftsmanship. Perfect for special occasions.';
            
            const buyBtn = document.getElementById('storyBuyBtn');
            const cartBtn = document.getElementById('storyCartBtn');
            
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, product.image);
            cartBtn.onclick = () => addToCart(product.id, product.name, product.price, product.sku, product.image);
            
            document.getElementById('storyModal').classList.add('active');
        };
        
        window.closeStoryModal = () => {
            document.getElementById('storyModal').classList.remove('active');
        };
        
        // Load Categories/Stories
        function loadStories() {
            const container = document.getElementById('storiesContainer');
            let html = '';
            for (const cat of categories) {
                html += `
                    <div class="story-item ${cat.id === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat.id}')">
                        <div class="story-ring">
                            <div class="story-image" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, ${cat.color}, var(--white));">
                                <i class="fas ${cat.icon}" style="font-size: 28px; color: var(--gold);"></i>
                            </div>
                        </div>
                        <div class="story-name">${cat.name}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // Filter by category
        window.filterByCategory = async (categoryId) => {
            currentCategory = categoryId;
            
            // Update active state on stories
            document.querySelectorAll('.story-item').forEach((item, index) => {
                if (index === categories.findIndex(c => c.id === categoryId)) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Update UI
            const category = categories.find(c => c.id === categoryId);
            document.getElementById('categoryTitle').textContent = category?.name || 'Products';
            document.getElementById('currentCategory').textContent = category?.name || 'All';
            
            // Load products for selected category
            await loadProductsByCategory(categoryId);
        };
        
        // Load products by category
        async function loadProductsByCategory(categoryId) {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            try {
                let query = supabase.from('products').select('*');
                
                if (categoryId !== 'all') {
                    const category = categories.find(c => c.id === categoryId);
                    if (category && category.filter) {
                        query = query.ilike('category', `%${category.filter}%`);
                    }
                }
                
                const { data: products, error } = await query.order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ No products found in this category</div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/400x400?text=Style+Of+Life';
                    const desc = p.description || 'Exquisite handcrafted jewelry piece made with premium quality materials and finest craftsmanship. Perfect for special occasions.';
                    
                    html += `
                        <div class="product-item">
                            <img class="product-item-image" src="${img}" alt="${p.name}" onclick="openStoryModal({
                                id: ${p.id},
                                name: '${escapeHtml(p.name)}',
                                sku: '${p.sku}',
                                price: ${p.price},
                                image: '${img}',
                                description: '${escapeHtml(desc)}'
                            })" style="cursor: pointer;">
                            <div class="product-item-info">
                                <div class="product-item-name">${escapeHtml(p.name)}</div>
                                <div class="product-item-sku">SKU: ${p.sku} | ${p.category || 'Jewelry'}</div>
                                <div class="product-item-desc">${escapeHtml(desc.substring(0, 120))}${desc.length > 120 ? '...' : ''}</div>
                                <div class="product-item-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="product-item-buttons">
                                    <button class="product-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-bolt"></i> Buy Now
                                    </button>
                                    <button class="product-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-shopping-cart"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        // Load scrollable products dashboard
        async function loadScrollableProducts() {
            const container = document.getElementById('scrollableProducts');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ Products coming soon</div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/160x160?text=Style+Of+Life';
                    const desc = p.description || 'Exquisite handcrafted jewelry piece.';
                    
                    html += `
                        <div class="scroll-product-card" onclick="openStoryModal({
                            id: ${p.id},
                            name: '${escapeHtml(p.name)}',
                            sku: '${p.sku}',
                            price: ${p.price},
                            image: '${img}',
                            description: '${escapeHtml(desc)}'
                        })">
                            <img class="scroll-product-image" src="${img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/160x160?text=Style+Of+Life'">
                            <div class="scroll-product-info">
                                <div class="scroll-product-name">${escapeHtml(p.name)}</div>
                                <div class="scroll-product-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="scroll-product-buttons">
                                    <button class="scroll-buy-btn" onclick="event.stopPropagation(); buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">Buy</button>
                                    <button class="scroll-cart-btn" onclick="event.stopPropagation(); addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')"><i class="fas fa-shopping-cart"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading scrollable products:', error);
                container.innerHTML = '<div class="empty-state">Unable to load products</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        // Close modal on outside click
        document.getElementById('storyModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeStoryModal();
            }
        });
        
        // Initialize
        loadStories();
        await updateCartCount();
        await loadScrollableProducts();
        await loadProductsByCategory('all');
    </script>
</body>
</html>
