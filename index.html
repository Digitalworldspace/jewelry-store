<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Store</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #fff;
  }

  /* HEADER */
  header {
    background: #111;
    color: gold;
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    position: sticky;
    top: 0;
  }

  nav a {
    color: #fff;
    margin: 0 10px;
    text-decoration: none;
    font-size: 14px;
  }

  /* HERO */
  .hero {
    height: 60vh;
    background: linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
                url('https://via.placeholder.com/1200x600') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  /* SECTION */
  .section {
    padding: 20px;
  }

  .title {
    font-size: 20px;
    margin-bottom: 10px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
  }

  .card {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
  }

  .price {
    color: green;
    font-weight: bold;
  }

  button {
    background: gold;
    border: none;
    padding: 6px 10px;
    margin-top: 5px;
    cursor: pointer;
    border-radius: 5px;
  }

  footer {
    background: #111;
    color: #fff;
    text-align: center;
    padding: 20px;
    margin-top: 30px;
  }

  /* RESPONSIVE */
  @media(max-width:600px){
    .hero{
      font-size:20px;
      height:40vh;
    }
  }
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div><b>Jewellery Store</b></div>

  <nav>
    <a href="#">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  Premium Imitation Jewellery Collection
</div>

<!-- CATEGORIES -->
<div class="section">
  <div class="title">Categories</div>
  <div class="grid" id="categories"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
  <div class="title">Featured Products</div>
  <div class="grid" id="products"></div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Jewellery Store | All Rights Reserved
</footer>

<script>

const API_HOME = "https://your-backend.com/api/home";
const API_PRODUCTS = "https://your-backend.com/api/products";

/* LOAD CATEGORIES */
function loadCategories() {

  const data = [
    {name:"Necklace"},
    {name:"Earrings"},
    {name:"Rings"},
    {name:"Bangles"}
  ];

  const container = document.getElementById("categories");

  data.forEach(c => {
    container.innerHTML += `
      <div class="card">
        <h4>${c.name}</h4>
      </div>
    `;
  });
}

/* LOAD PRODUCTS */
function loadProducts() {

  const data = [
    {name:"Gold Necklace", price:1200, image:"https://via.placeholder.com/300"},
    {name:"Diamond Earrings", price:800, image:"https://via.placeholder.com/300"},
    {name:"Bridal Set", price:2000, image:"https://via.placeholder.com/300"},
    {name:"Gold Ring", price:600, image:"https://via.placeholder.com/300"}
  ];

  const container = document.getElementById("products");

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <div class="price">₹${p.price}</div>
        <button onclick="viewProduct()">View</button>
      </div>
    `;
  });
}

function viewProduct(){
  window.location.href = "product.html";
}

loadCategories();
loadProducts();

</script>

</body>
</html>
