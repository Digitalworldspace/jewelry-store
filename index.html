<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --white-dark: #F0F0F0;
            --black: #1A1A1A;
            --black-light: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--black);
            overflow-x: hidden;
        }
        
        /* Light Background */
        .light-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%);
        }
        
        /* Stories Section - Category Toggle */
        .stories-section {
            padding: 15px 0;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.7;
        }
        
        .story-item.active {
            opacity: 1;
        }
        
        .story-item.active .story-ring {
            box-shadow: 0 0 0 2px var(--gold);
        }
        
        .story-item:hover {
            transform: scale(0.95);
        }
        
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px;
            margin-bottom: 6px;
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--white);
        }
        
        .story-name {
            font-size: 11px;
            color: var(--gray);
            font-weight: 500;
        }
        
        /* Instagram Story Modal */
        .instagram-story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        
        .instagram-story-modal.active {
            display: flex;
        }
        
        .story-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 10;
        }
        
        .story-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .story-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
        }
        
        .story-user-info h4 {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        
        .story-user-info p {
            color: rgba(255,255,255,0.7);
            font-size: 10px;
        }
        
        .story-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .story-close:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .story-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        
        .story-content-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .story-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 4px;
            padding: 12px 15px;
            z-index: 10;
        }
        
        .story-progress-segment {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .story-progress-fill {
            height: 100%;
            width: 0%;
            background: white;
            transition: width 0.1s linear;
        }
        
        .story-product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 60px 20px 30px;
            color: white;
        }
        
        .story-product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .story-product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin: 10px 0;
        }
        
        .story-product-desc {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .story-buttons {
            display: flex;
            gap: 12px;
        }
        
        .story-buy {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .story-cart {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Header */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .animated-logo {
            position: relative;
            cursor: pointer;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--black);
        }
        
        .logo-gold {
            color: var(--gold);
            font-weight: 900;
            margin: 0 2px;
        }
        
        .logo-sub {
            font-size: 8px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: -2px;
            opacity: 0.8;
        }
        
        .logo-diamond {
            position: absolute;
            top: -12px;
            right: -20px;
            font-size: 14px;
            color: var(--gold);
            animation: diamondSpin 3s linear infinite;
        }
        
        @keyframes diamondSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--black);
            font-size: 22px;
            text-decoration: none;
            position: relative;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        /* Featured Section */
        .featured-section {
            padding: 20px 15px;
            background: linear-gradient(135deg, rgba(212,175,55,0.05), rgba(212,175,55,0.02));
            margin-bottom: 20px;
        }
        
        .featured-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--gold-dark);
        }
        
        .random-products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .random-product-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .random-product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        .random-product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .random-product-info {
            padding: 12px;
        }
        
        .random-product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .random-product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .random-product-desc {
            font-size: 11px;
            color: var(--gray);
            line-height: 1.4;
            margin-bottom: 10px;
        }
        
        .random-buttons {
            display: flex;
            gap: 8px;
        }
        
        .random-buy-btn {
            flex: 1;
            background: var(--gold);
            color: var(--white);
            padding: 6px;
            border: none;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .random-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Product Grid with Description */
        .products-section {
            padding: 20px 15px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
            position: relative;
        }
        
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }
        
        .current-category {
            font-size: 12px;
            color: var(--gold);
            background: rgba(212,175,55,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .product-item {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .product-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        .product-item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .product-item-info {
            padding: 15px;
        }
        
        .product-item-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .product-item-sku {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }
        
        .product-item-desc {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .product-item-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }
        
        .product-item-buttons {
            display: flex;
            gap: 12px;
        }
        
        .product-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .product-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-cart-btn:hover {
            background: var(--gold);
            color: var(--white);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: #f44336;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--white-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        @media (min-width: 768px) {
            .random-products {
                grid-template-columns: repeat(4, 1fr);
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="light-bg"></div>
    
    <!-- Stories Section - Category Toggle with Instagram Story Feature -->
    <div class="stories-section">
        <div class="stories-container" id="storiesContainer">
            <!-- Categories will be loaded here -->
        </div>
    </div>
    
    <!-- Instagram Story Modal -->
    <div id="instagramStoryModal" class="instagram-story-modal">
        <div class="story-header">
            <div class="story-user">
                <img id="storyUserAvatar" class="story-user-avatar" src="" alt="">
                <div class="story-user-info">
                    <h4 id="storyUserName">Style Of Life</h4>
                    <p id="storyUserTime">Just now</p>
                </div>
            </div>
            <button class="story-close" onclick="closeInstagramStory()">✕</button>
        </div>
        <div class="story-progress-bar" id="storyProgressBar"></div>
        <div class="story-content" id="storyContent" onclick="nextStory()">
            <img id="storyContentImage" class="story-content-image" src="" alt="">
        </div>
        <div class="story-product-info">
            <div class="story-product-name" id="storyProductName"></div>
            <div class="story-product-price" id="storyProductPrice"></div>
            <div class="story-product-desc" id="storyProductDesc"></div>
            <div class="story-buttons">
                <button class="story-buy" id="storyBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                <button class="story-cart" id="storyCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
            </div>
        </div>
    </div>
    
    <!-- Header -->
    <div class="instagram-header">
        <div class="animated-logo">
            <div class="logo-container">
                <div class="logo-main">STYLE<span class="logo-gold">OF</span>LIFE</div>
                <div class="logo-sub">LUXURY JEWELRY</div>
            </div>
            <i class="fas fa-gem logo-diamond"></i>
        </div>
        <div class="header-icons">
            <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- Random Products Section -->
    <div class="featured-section">
        <div class="featured-title">✨ You May Also Like</div>
        <div class="random-products" id="randomProducts">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Products Section with Description -->
    <div class="products-section">
        <div class="section-title">
            <h3 id="categoryTitle">All Products</h3>
            <span class="current-category" id="currentCategory">All</span>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        let allProducts = [];
        let currentCategory = 'all';
        let currentStoryProducts = [];
        let currentStoryIndex = 0;
        let storyTimer = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // Category mapping
        const categories = [
            { id: 'all', name: '✨ All', icon: 'fa-gem', filter: null },
            { id: 'rings', name: '💍 Rings', icon: 'fa-ring', filter: 'Rings' },
            { id: 'necklaces', name: '📿 Necklaces', icon: 'fa-link', filter: 'Necklaces' },
            { id: 'earrings', name: '👑 Earrings', icon: 'fa-ear-deaf', filter: 'Earrings' },
            { id: 'bracelets', name: '💫 Bracelets', icon: 'fa-hand-peace', filter: 'Bracelets' },
            { id: 'pendants', name: '💎 Pendants', icon: 'fa-gem', filter: 'Pendants' }
        ];
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        // Instagram Story Functions
        function showStoryAtIndex(index) {
            if (!currentStoryProducts[index]) return;
            
            const product = currentStoryProducts[index];
            document.getElementById('storyUserAvatar').src = product.image;
            document.getElementById('storyUserName').textContent = product.name;
            document.getElementById('storyUserTime').textContent = 'Just now';
            document.getElementById('storyContentImage').src = product.image;
            document.getElementById('storyProductName').textContent = product.name;
            document.getElementById('storyProductPrice').textContent = `₹${product.price.toLocaleString()}`;
            document.getElementById('storyProductDesc').textContent = product.description;
            
            const buyBtn = document.getElementById('storyBuyBtn');
            const cartBtn = document.getElementById('storyCartBtn');
            
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, product.image);
            cartBtn.onclick = () => addToCart(product.id, product.name, product.price, product.sku, product.image);
            
            updateProgressBars(index);
        }
        
        function updateProgressBars(currentIndex) {
            const container = document.getElementById('storyProgressBar');
            container.innerHTML = '';
            
            for (let i = 0; i < currentStoryProducts.length; i++) {
                const segment = document.createElement('div');
                segment.className = 'story-progress-segment';
                const fill = document.createElement('div');
                fill.className = 'story-progress-fill';
                if (i < currentIndex) {
                    fill.style.width = '100%';
                } else if (i === currentIndex) {
                    fill.style.width = '0%';
                    setTimeout(() => {
                        fill.style.transition = 'width 5s linear';
                        fill.style.width = '100%';
                    }, 10);
                }
                segment.appendChild(fill);
                container.appendChild(segment);
            }
        }
        
        function startStoryTimer() {
            if (storyTimer) clearInterval(storyTimer);
            storyTimer = setInterval(() => {
                if (currentStoryIndex < currentStoryProducts.length - 1) {
                    currentStoryIndex++;
                    showStoryAtIndex(currentStoryIndex);
                } else {
                    closeInstagramStory();
                }
            }, 5000);
        }
        
        function stopStoryTimer() {
            if (storyTimer) {
                clearInterval(storyTimer);
                storyTimer = null;
            }
        }
        
        window.nextStory = function() {
            if (currentStoryIndex < currentStoryProducts.length - 1) {
                currentStoryIndex++;
                showStoryAtIndex(currentStoryIndex);
                stopStoryTimer();
                startStoryTimer();
            }
        };
        
        window.closeInstagramStory = () => {
            stopStoryTimer();
            document.getElementById('instagramStoryModal').classList.remove('active');
            currentStoryProducts = [];
        };
        
        // Open category story - Instagram style
        window.openCategoryStory = async (categoryId, categoryName) => {
            try {
                let query = supabase.from('products').select('*');
                if (categoryId !== 'all') {
                    const category = categories.find(c => c.id === categoryId);
                    if (category && category.filter) {
                        query = query.ilike('category', `%${category.filter}%`);
                    }
                }
                const { data: products, error } = await query.limit(10);
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    showToast(`No products in ${categoryName}`, true);
                    return;
                }
                
                currentStoryProducts = products.map(p => ({
                    id: p.id,
                    name: p.name,
                    sku: p.sku,
                    price: p.price,
                    image: p.images?.[0] || 'https://via.placeholder.com/400x400',
                    description: p.description || 'Exquisite handcrafted jewelry piece.'
                }));
                
                currentStoryIndex = 0;
                showStoryAtIndex(0);
                document.getElementById('instagramStoryModal').classList.add('active');
                startStoryTimer();
            } catch (error) {
                showToast('Error loading stories', true);
            }
        };
        
        // Load Categories/Stories
        function loadStories() {
            const container = document.getElementById('storiesContainer');
            let html = '';
            for (const cat of categories) {
                html += `
                    <div class="story-item ${cat.id === currentCategory ? 'active' : ''}" onclick="openCategoryStory('${cat.id}', '${cat.name}')">
                        <div class="story-ring">
                            <div class="story-image" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--gold-light), var(--white));">
                                <i class="fas ${cat.icon}" style="font-size: 28px; color: var(--gold);"></i>
                            </div>
                        </div>
                        <div class="story-name">${cat.name}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // Filter by category (for products grid)
        window.filterByCategory = async (categoryId) => {
            currentCategory = categoryId;
            
            // Update active state on stories
            document.querySelectorAll('.story-item').forEach((item, index) => {
                if (index === categories.findIndex(c => c.id === categoryId)) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Update UI
            const category = categories.find(c => c.id === categoryId);
            document.getElementById('categoryTitle').textContent = category?.name || 'Products';
            document.getElementById('currentCategory').textContent = category?.name || 'All';
            
            // Load products for selected category
            await loadProductsByCategory(categoryId);
        };
        
        // Load products by category
        async function loadProductsByCategory(categoryId) {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            try {
                let query = supabase.from('products').select('*');
                
                if (categoryId !== 'all') {
                    const category = categories.find(c => c.id === categoryId);
                    if (category && category.filter) {
                        query = query.ilike('category', `%${category.filter}%`);
                    }
                }
                
                const { data: products, error } = await query.order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ No products found in this category</div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/400x400?text=Style+Of+Life';
                    const desc = p.description || 'Exquisite handcrafted jewelry piece made with premium quality materials and finest craftsmanship. Perfect for special occasions.';
                    
                    html += `
                        <div class="product-item">
                            <img class="product-item-image" src="${img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x400?text=Style+Of+Life'">
                            <div class="product-item-info">
                                <div class="product-item-name">${escapeHtml(p.name)}</div>
                                <div class="product-item-sku">SKU: ${p.sku} | ${p.category || 'Jewelry'}</div>
                                <div class="product-item-desc">${escapeHtml(desc.substring(0, 120))}${desc.length > 120 ? '...' : ''}</div>
                                <div class="product-item-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="product-item-buttons">
                                    <button class="product-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-bolt"></i> Buy Now
                                    </button>
                                    <button class="product-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-shopping-cart"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        // Load random products for featured section
        async function loadRandomProducts() {
            const container = document.getElementById('randomProducts');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ Coming soon</div>';
                    return;
                }
                
                // Shuffle and get 4 random products
                const shuffled = [...products];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const randomProducts = shuffled.slice(0, 4);
                
                let html = '';
                for (const p of randomProducts) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/300x150?text=Style+Of+Life';
                    const desc = p.description || 'Exquisite handcrafted jewelry piece.';
                    
                    html += `
                        <div class="random-product-card">
                            <img class="random-product-image" src="${img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x150?text=Style+Of+Life'">
                            <div class="random-product-info">
                                <div class="random-product-name">${escapeHtml(p.name)}</div>
                                <div class="random-product-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="random-product-desc">${escapeHtml(desc.substring(0, 60))}${desc.length > 60 ? '...' : ''}</div>
                                <div class="random-buttons">
                                    <button class="random-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">Buy Now</button>
                                    <button class="random-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading random products:', error);
                container.innerHTML = '<div class="empty-state">Unable to load recommendations</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        // Close modal on outside click
        document.getElementById('instagramStoryModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeInstagramStory();
            }
        });
        
        // Touch swipe for story navigation
        let touchStartX = 0;
        document.getElementById('storyContent').addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        document.getElementById('storyContent').addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchEndX < touchStartX - 50) {
                nextStory();
            }
        });
        
        // Initialize
        loadStories();
        await updateCartCount();
        await loadRandomProducts();
        await loadProductsByCategory('all');
    </script>
</body>
</html>
