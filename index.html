<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luxury Imitation Jewellery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #111;
      color: #fff;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: gold;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      height: 60vh;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
    }

    .section {
      padding: 20px;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .card {
      border: 1px solid #eee;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }

    button {
      padding: 6px 10px;
      border: none;
      background: gold;
      cursor: pointer;
      margin-top: 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Jewellery Store</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Rings</a>
    <a href="#">Necklaces</a>
    <a href="#">Earrings</a>
    <a href="#">Cart</a>
  </nav>
</header>

<div class="hero" id="hero">
  Luxury Imitation Jewellery
</div>

<div class="section">
  <div class="title">Featured Products</div>
  <div class="grid" id="products"></div>
</div>

<footer>
  © 2026 Jewellery Store | All Rights Reserved
</footer>

<script>
const API_URL = "https://your-backend.com/api/products"; // change this

async function loadProducts() {
  try {
    // Dummy fallback if API not ready
    const data = [
      {
        name: "Gold Plated Necklace",
        price: 799,
        image: "https://via.placeholder.com/300"
      },
      {
        name: "Diamond Look Earrings",
        price: 499,
        image: "https://via.placeholder.com/300"
      },
      {
        name: "Bridal Set",
        price: 1999,
        image: "https://via.placeholder.com/300"
      }
    ];

    const container = document.getElementById("products");

    data.forEach(p => {
      container.innerHTML += `
        <div class="card">
          <img src="${p.image}" />
          <h4>${p.name}</h4>
          <div class="price">₹${p.price}</div>
          <button>Add to Cart</button>
        </div>
      `;
    });

  } catch (err) {
    console.log(err);
  }
}

loadProducts();
</script>

</body>
</html>
