<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --black: #000000;
            --black-light: #1A1A1A;
            --black-dark: #0A0A0A;
            --white: #FFFFFF;
            --gray: #2A2A2A;
            --gray-light: #3A3A3A;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0a0a);
        }
        
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--gold), transparent);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 15s infinite;
        }
        
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.1; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.4; }
        }
        
        /* Instagram Stories Section */
        .stories-section {
            padding: 15px 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212,175,55,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 75px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .story-item:hover {
            transform: translateY(-3px);
        }
        
        .story-ring {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold-dark));
            padding: 2px;
            margin-bottom: 8px;
            animation: ringPulse 2s infinite;
        }
        
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); }
            50% { box-shadow: 0 0 0 5px rgba(212,175,55,0.2); }
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--black);
        }
        
        .story-name {
            font-size: 11px;
            color: var(--gold-light);
            font-weight: 500;
        }
        
        /* Header */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        
        /* Animated Logo */
        .animated-logo {
            position: relative;
            cursor: pointer;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #D4AF37 0%, #F5E6B3 30%, #D4AF37 60%, #B8962E 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            animation: logoShine 3s ease-in-out infinite;
        }
        
        @keyframes logoShine {
            0%, 100% {
                text-shadow: 0 0 10px rgba(212,175,55,0.3);
                letter-spacing: 4px;
            }
            50% {
                text-shadow: 0 0 25px rgba(212,175,55,0.6);
                letter-spacing: 5px;
            }
        }
        
        .logo-sub {
            font-size: 8px;
            letter-spacing: 6px;
            color: var(--gold);
            margin-top: -2px;
            opacity: 0.7;
        }
        
        .logo-diamond {
            position: absolute;
            top: -15px;
            right: -25px;
            font-size: 14px;
            color: var(--gold);
            animation: diamondSpin 3s linear infinite;
        }
        
        @keyframes diamondSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.5; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.5; }
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--gold);
            font-size: 22px;
            text-decoration: none;
            position: relative;
            transition: all 0.3s;
        }
        
        .header-icons a:hover {
            transform: scale(1.1);
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
            animation: badgePulse 1.5s infinite;
        }
        
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Instagram Post Card */
        .post-card {
            margin-bottom: 20px;
            background: var(--black-light);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.1);
            transition: all 0.3s;
        }
        
        .post-card:hover {
            transform: translateY(-3px);
            border-color: rgba(212,175,55,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
        }
        
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .post-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            padding: 2px;
        }
        
        .post-user-info h4 {
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .post-user-info p {
            font-size: 10px;
            color: var(--gray-light);
        }
        
        .verified-badge {
            color: var(--gold);
            font-size: 12px;
            margin-left: 4px;
        }
        
        .post-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .post-card:hover .post-image {
            transform: scale(1.02);
        }
        
        /* Action Buttons - Only Share & Cart */
        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
        }
        
        .action-buttons {
            display: flex;
            gap: 25px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(212,175,55,0.1);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(212,175,55,0.2);
        }
        
        .action-btn i {
            font-size: 18px;
            color: var(--gold);
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
            color: var(--gold-light);
        }
        
        .action-btn:hover {
            background: rgba(212,175,55,0.2);
            transform: translateY(-2px);
            border-color: var(--gold);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        /* Share Popup */
        .share-popup {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black-light);
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(212,175,55,0.3);
            width: 280px;
            text-align: center;
        }
        
        .share-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        
        .share-popup h4 {
            margin-bottom: 15px;
            color: var(--gold);
        }
        
        .share-options {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .share-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .share-option i {
            font-size: 24px;
        }
        
        .share-option.whatsapp {
            background: #25D366;
            color: white;
        }
        
        .share-option.instagram {
            background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            color: white;
        }
        
        .share-option.facebook {
            background: #1877F2;
            color: white;
        }
        
        .share-option.twitter {
            background: #1DA1F2;
            color: white;
        }
        
        .share-option:hover {
            transform: scale(1.1);
        }
        
        .post-caption {
            padding: 0 15px 12px;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .post-caption span {
            font-weight: 600;
            margin-right: 5px;
            color: var(--gold);
        }
        
        .hashtag {
            color: var(--gold);
            cursor: pointer;
        }
        
        .post-time {
            padding: 0 15px 15px;
            font-size: 10px;
            color: var(--gray-light);
        }
        
        /* Product Tag - Enhanced */
        .post-product-tag {
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.08));
            margin: 10px 15px;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
        }
        
        .post-product-tag:hover {
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.1));
            border-color: var(--gold);
        }
        
        .tag-product-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .tag-product-image {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .tag-product-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .tag-product-price {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
        }
        
        /* Attractive Shop Buttons */
        .product-buttons {
            display: flex;
            gap: 12px;
        }
        
        .buy-now-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .buy-now-btn i {
            font-size: 14px;
        }
        
        .buy-now-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212,175,55,0.4);
            letter-spacing: 0.5px;
        }
        
        .add-to-cart-icon {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            color: var(--gold);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-to-cart-icon i {
            font-size: 18px;
        }
        
        .add-to-cart-icon:hover {
            background: var(--gold);
            color: var(--black);
            transform: scale(1.05);
            border-color: var(--gold);
        }
        
        /* Grid Section */
        .grid-section {
            padding: 20px 15px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
            position: relative;
        }
        
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }
        
        .section-title a {
            color: var(--gold);
            font-size: 12px;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        
        .grid-product {
            aspect-ratio: 1 / 1;
            object-fit: cover;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .grid-product:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(212,175,55,0.2);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray-light);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
            transition: all 0.3s;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        .bottom-nav a.active i {
            transform: translateY(-3px);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        
        .toast-error {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <!-- Animated Background Particles -->
    <div class="animated-bg"></div>
    <div class="floating-particles" id="particles"></div>
    
    <!-- Instagram Stories -->

        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        let currentShareProduct = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
                
                const cartIcon = document.querySelector('.header-icons a:first-child i');
                if (cartIcon) {
                    cartIcon.classList.add('cart-animation');
                    setTimeout(() => cartIcon.classList.remove('cart-animation'), 500);
                }
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        window.showSharePopup = (productId, productName, productPrice, productImg) => {
            currentShareProduct = { id: productId, name: productName, price: productPrice, image: productImg };
            const popup = document.getElementById('sharePopup');
            popup.classList.add('show');
            setTimeout(() => {
                popup.classList.remove('show');
            }, 5000);
        };
        
        window.shareToWhatsApp = () => {
            if (currentShareProduct) {
                const text = `Check out this beautiful ${currentShareProduct.name} from Style Of Life! Price: ₹${currentShareProduct.price.toLocaleString()}`;
                const url = window.location.href;
                window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
                showToast('Opening WhatsApp...');
            }
            document.getElementById('sharePopup').classList.remove('show');
        };
        
        window.shareToInstagram = () => {
            showToast('Copy the link to share on Instagram!');
            navigator.clipboard.writeText(window.location.href);
            document.getElementById('sharePopup').classList.remove('show');
        };
        
        window.shareToFacebook = () => {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
            showToast('Opening Facebook...');
            document.getElementById('sharePopup').classList.remove('show');
        };
        
        window.shareToTwitter = () => {
            const text = `Check out Style Of Life - Luxury Jewelry!`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`, '_blank');
            showToast('Opening Twitter...');
            document.getElementById('sharePopup').classList.remove('show');
        };
        
        async function loadFeed() {
            const container = document.getElementById('feedContainer');
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('id')
                .limit(5);
            
            if (error || !products?.length) {
                container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading feed...</p></div>';
                return;
            }
            
            const feedPosts = [
                {
                    id: 1,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: 'https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop',
                    product: products[0],
                    caption: 'Elevate your elegance with our stunning diamond necklace. ✨ Handcrafted with love and precision.',
                    time: '2 hours ago',
                    hashtags: '#LuxuryJewelry #StyleOfLife #DiamondNecklace'
                },
                {
                    id: 2,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: 'https://images.pexels.com/photos/1191665/pexels-photo-1191665.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop',
                    product: products[1] || products[0],
                    caption: 'The perfect ring for your special moment. 💍 Our solitaire diamond ring is a timeless classic.',
                    time: '5 hours ago',
                    likes: 892,
                    hashtags: '#DiamondRing #Proposal #EngagementRing'
                },
                {
                    id: 3,
                    user: 'styleoflife',
                    name: 'Style Of Life',
                    avatar: 'https://images.pexels.com/photos/1455286/pexels-photo-1455286.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop',
                    product: products[2] || products[0],
                    caption: 'Pearls never go out of style. 🌟 Our pearl drop earrings add the perfect touch of elegance.',
                    time: '1 day ago',
                    hashtags: '#PearlJewelry #Elegance #StyleOfLife'
                }
            ];
            
            let html = '';
            for (const post of feedPosts) {
                const img = post.product?.images?.[0] || 'https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop';
                
                html += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-user">
                                <img class="post-avatar" src="${post.avatar}" alt="">
                                <div class="post-user-info">
                                    <h4>${post.name} <i class="fas fa-check-circle verified-badge"></i></h4>
                                    <p>${post.user}</p>
                                </div>
                            </div>
                            <div class="post-menu"><i class="fas fa-ellipsis-h"></i></div>
                        </div>
                        <img class="post-image" src="${img}" alt="">
                        <div class="post-actions">
                            <div class="action-buttons">
                                <div class="action-btn" onclick="showSharePopup(${post.product?.id || 1}, '${escapeHtml(post.product?.name || 'Jewelry')}', ${post.product?.price || 0}, '${img}')">
                                    <i class="fas fa-share-alt"></i>
                                    <span>Share</span>
                                </div>
                            </div>
                        </div>
                        <div class="post-caption">
                            <span>${post.user}</span> ${post.caption}<br>
                            <span class="hashtag">${post.hashtags}</span>
                        </div>
                        <div class="post-product-tag">
                            <div class="tag-product-info">
                                <img class="tag-product-image" src="${img}" alt="">
                                <div>
                                    <div class="tag-product-name">${post.product?.name || 'Luxury Jewelry'}</div>
                                    <div class="tag-product-price">₹${(post.product?.price || 0).toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="product-buttons">
                                <button class="buy-now-btn" onclick="buyNow(${post.product?.id || 1}, '${escapeHtml(post.product?.name || 'Jewelry')}', ${post.product?.price || 0}, '${post.product?.sku || 'LUX-001'}', '${img}')">
                                    <i class="fas fa-bolt"></i> Buy Now
                                </button>
                                <div class="add-to-cart-icon" onclick="addToCart(${post.product?.id || 1}, '${escapeHtml(post.product?.name || 'Jewelry')}', ${post.product?.price || 0}, '${post.product?.sku || 'LUX-001'}', '${img}')">
                                    <i class="fas fa-shopping-cart"></i>
                                </div>
                            </div>
                        </div>
                        <div class="post-time">${post.time}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        async function loadProductGrid() {
            const container = document.getElementById('productGrid');
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id')
                    .limit(6);
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="loading"><p>Coming soon...</p></div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/200x200?text=Style+Of+Life';
                    html += `
                        <img class="grid-product" src="${img}" alt="${p.name}" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="loading"><p>Error loading</p></div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        await updateCartCount();
        await loadFeed();
        await loadProductGrid();
    </script>
</body>
</html>
