<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --gold-glow: rgba(212,175,55,0.3);
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --white-dark: #F0F0F0;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --gray: #2A2A2A;
            --gray-light: #3A3A3A;
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
            --shadow-hover: 0 15px 40px rgba(212,175,55,0.15);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(212,175,55,0.2);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        
        /* Premium Animated Background */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0a0a);
        }
        
        .glow-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212,175,55,0.08), transparent);
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 20s ease-in-out infinite;
            z-index: -1;
        }
        
        .glow-orb-1 { top: -200px; left: -200px; animation-delay: 0s; }
        .glow-orb-2 { bottom: -200px; right: -200px; animation-delay: -5s; }
        .glow-orb-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; animation-delay: -10s; opacity: 0.3; }
        
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }
        
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--gold), transparent);
            border-radius: 50%;
            opacity: 0.2;
            animation: floatParticle 20s infinite;
        }
        
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.1; }
            50% { transform: translateY(-60px) translateX(40px); opacity: 0.4; }
        }
        
        /* Premium Stories Section */
        .stories-section {
            padding: 20px 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 0 20px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-toggle {
            text-align: center;
            min-width: 80px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .story-toggle:hover {
            transform: translateY(-5px);
        }
        
        .story-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark), var(--gold-light));
            padding: 3px;
            margin-bottom: 8px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }
        
        .story-toggle:hover .story-ring {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212,175,55,0.5);
        }
        
        .story-thumbnail {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--black);
        }
        
        /* Premium Instagram Story Modal */
        .instagram-story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .instagram-story-modal.active {
            display: flex;
        }
        
        .story-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10;
        }
        
        .story-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .story-user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }
        
        .story-user-info h4 {
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .story-user-info p {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
        }
        
        .story-close {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .story-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }
        
        .story-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .story-content-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .story-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 6px;
            padding: 15px 20px;
            z-index: 10;
        }
        
        .story-progress-segment {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .story-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            transition: width 0.1s linear;
        }
        
        .story-product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 80px 25px 35px;
            color: white;
        }
        
        .story-product-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .story-product-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            margin: 12px 0;
        }
        
        .story-product-desc {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .story-buttons {
            display: flex;
            gap: 15px;
        }
        
        .story-buy, .story-cart {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .story-buy {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            border: none;
        }
        
        .story-cart {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        
        .story-buy:hover, .story-cart:hover {
            transform: translateY(-3px);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Premium Header */
        .premium-header {
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .luxury-logo {
            position: relative;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(212,175,55,0.3); }
            50% { text-shadow: 0 0 40px rgba(212,175,55,0.6); }
        }
        
        .logo-diamond {
            position: absolute;
            top: -15px;
            right: -30px;
            font-size: 18px;
            color: var(--gold);
            animation: diamondFloat 3s ease-in-out infinite;
        }
        
        @keyframes diamondFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(180deg); }
        }
        
        .header-icons {
            display: flex;
            gap: 25px;
        }
        
        .header-icons a {
            color: var(--gold);
            font-size: 22px;
            position: relative;
            transition: all 0.3s;
        }
        
        .header-icons a:hover {
            transform: scale(1.1);
            text-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Premium Featured Section */
        .featured-section {
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(212,175,55,0.05), rgba(212,175,55,0.01));
            margin: 20px;
            border-radius: 32px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
        
        .featured-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
        }
        
        .featured-title::before,
        .featured-title::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--gold);
        }
        
        .featured-title::before {
            left: 20%;
        }
        
        .featured-title::after {
            right: 20%;
        }
        
        .random-products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .random-product-card {
            background: var(--black-card);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid var(--glass-border);
            position: relative;
        }
        
        .random-product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
            transition: left 0.6s;
        }
        
        .random-product-card:hover::before {
            left: 100%;
        }
        
        .random-product-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(212,175,55,0.2);
        }
        
        .random-product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .random-product-card:hover .random-product-image {
            transform: scale(1.05);
        }
        
        .random-product-info {
            padding: 15px;
        }
        
        .random-product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .random-product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 12px;
        }
        
        .random-buttons {
            display: flex;
            gap: 10px;
        }
        
        .random-buy-btn, .random-cart-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .random-buy-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            border: none;
        }
        
        .random-cart-btn {
            background: rgba(212,175,55,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        
        .random-buy-btn:hover, .random-cart-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Premium Products Section */
        .products-section {
            padding: 20px;
        }
        
        .section-title {
            margin-bottom: 25px;
            position: relative;
        }
        
        .section-title h3 {
            font-size: 28px;
            font-weight: 700;
            display: inline-block;
            position: relative;
        }
        
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        
        .product-item {
            background: var(--black-card);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid var(--glass-border);
            position: relative;
        }
        
        .product-item:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(212,175,55,0.15);
        }
        
        .product-gallery {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            display: flex;
            scrollbar-width: thin;
            cursor: grab;
        }
        
        .product-gallery:active {
            cursor: grabbing;
        }
        
        .product-gallery::-webkit-scrollbar {
            height: 4px;
        }
        
        .product-gallery::-webkit-scrollbar-track {
            background: var(--gray);
            border-radius: 10px;
        }
        
        .product-gallery::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        .gallery-image {
            min-width: 100%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
        }
        
        .gallery-dots {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 5;
        }
        
        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .gallery-dot.active {
            width: 25px;
            border-radius: 3px;
            background: var(--gold);
        }
        
        .product-item-info {
            padding: 20px;
        }
        
        .product-item-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .product-item-sku {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }
        
        .product-item-desc {
            font-size: 13px;
            color: var(--gray-light);
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .product-item-price {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 18px;
        }
        
        .product-item-buttons {
            display: flex;
            gap: 12px;
        }
        
        .product-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .product-cart-btn, .product-share-btn {
            background: rgba(212,175,55,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-buy-btn:hover, .product-cart-btn:hover, .product-share-btn:hover {
            transform: translateY(-3px);
        }
        
        .product-cart-btn:hover, .product-share-btn:hover {
            background: var(--gold);
            color: var(--black);
        }
        
        /* Premium Share Modal */
        .share-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--black-card);
            border-radius: 32px 32px 0 0;
            padding: 30px;
            z-index: 3000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-top: 1px solid var(--glass-border);
        }
        
        .share-modal.active {
            transform: translateY(0);
        }
        
        .share-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .share-modal-header h4 {
            font-size: 20px;
            color: var(--gold);
        }
        
        .close-share {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray-light);
        }
        
        .share-product-info {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: var(--gray);
            border-radius: 20px;
        }
        
        .share-product-image {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            object-fit: cover;
        }
        
        .share-product-details h5 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .share-product-details p {
            font-size: 14px;
            color: var(--gold);
            font-weight: 700;
        }
        
        .share-options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--gray);
        }
        
        .share-option:hover {
            transform: translateY(-5px);
            background: rgba(212,175,55,0.1);
        }
        
        .share-option-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .share-whatsapp-icon { background: #25D366; }
        .share-instagram-icon { background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .share-facebook-icon { background: #1877F2; }
        .share-twitter-icon { background: #1DA1F2; }
        .share-copy-icon { background: var(--gray); }
        
        .share-link-container {
            background: var(--gray);
            border-radius: 16px;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .share-link-input {
            flex: 1;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--gray-light);
        }
        
        .copy-link-btn {
            background: var(--gold);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            color: var(--black);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid var(--glass-border);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray-light);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
            transform: translateY(-3px);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
            box-shadow: 0 5px 20px rgba(212,175,55,0.3);
        }
        
        .toast-error {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        @media (min-width: 768px) {
            .random-products {
                grid-template-columns: repeat(4, 1fr);
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .featured-title::before { left: 30%; }
            .featured-title::after { right: 30%; }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
    <div class="floating-particles" id="particles"></div>
    
    <!-- Premium Stories Section -->
    <div class="stories-section">
        <div class="stories-container" id="storiesContainer"></div>
    </div>
    
    <!-- Premium Instagram Story Modal -->
    <div id="instagramStoryModal" class="instagram-story-modal">
        <div class="story-header">
            <div class="story-user">
                <img id="storyUserAvatar" class="story-user-avatar" src="" alt="">
                <div class="story-user-info">
                    <h4 id="storyUserName">Style Of Life</h4>
                    <p id="storyUserTime">Just now</p>
                </div>
            </div>
            <button class="story-close" onclick="closeInstagramStory()">✕</button>
        </div>
        <div class="story-progress-bar" id="storyProgressBar"></div>
        <div class="story-content">
            <img id="storyContentImage" class="story-content-image" src="" alt="">
        </div>
        <div class="story-product-info">
            <div class="story-product-name" id="storyProductName"></div>
            <div class="story-product-price" id="storyProductPrice"></div>
            <div class="story-product-desc" id="storyProductDesc"></div>
            <div class="story-buttons">
                <button class="story-buy" id="storyBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                <button class="story-cart" id="storyCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
            </div>
        </div>
    </div>
    
    <!-- Premium Share Modal -->
    <div id="shareModal" class="share-modal">
        <div class="share-modal-header">
            <h4><i class="fas fa-share-alt" style="color: var(--gold);"></i> Share this beauty</h4>
            <button class="close-share" onclick="closeShareModal()">&times;</button>
        </div>
        <div id="shareProductInfo" class="share-product-info"></div>
        <div class="share-options-grid">
            <div class="share-option" onclick="shareToWhatsApp()">
                <div class="share-option-icon share-whatsapp-icon"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </div>
            <div class="share-option" onclick="shareToInstagram()">
                <div class="share-option-icon share-instagram-icon"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </div>
            <div class="share-option" onclick="shareToFacebook()">
                <div class="share-option-icon share-facebook-icon"><i class="fab fa-facebook-f"></i></div>
                <span>Facebook</span>
            </div>
            <div class="share-option" onclick="shareToTwitter()">
                <div class="share-option-icon share-twitter-icon"><i class="fab fa-twitter"></i></div>
                <span>Twitter</span>
            </div>
            <div class="share-option" onclick="copyProductLink()">
                <div class="share-option-icon share-copy-icon"><i class="fas fa-link"></i></div>
                <span>Copy Link</span>
            </div>
        </div>
        <div class="share-link-container">
            <input type="text" id="shareLinkInput" class="share-link-input" readonly>
            <button class="copy-link-btn" onclick="copyProductLink()">Copy Link</button>
        </div>
    </div>
    
    <!-- Premium Header -->
    <div class="premium-header">
        <div class="header-content">
            <div class="luxury-logo">
                <div class="logo-text">STYLE OF LIFE</div>
                <i class="fas fa-gem logo-diamond"></i>
            </div>
            <div class="header-icons">
                <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
                <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
            </div>
        </div>
    </div>
    
    <!-- Premium You May Also Like Section -->
    <div class="featured-section">
        <div class="featured-title">✨ You May Also Like ✨</div>
        <div class="random-products" id="randomProducts">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Premium Products Section -->
    <div class="products-section">
        <div class="section-title">
            <h3>All Products</h3>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div><p>Loading exquisite pieces...</p></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        let currentShareProduct = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
                
                const cartIcon = document.querySelector('.header-icons a:first-child i');
                if (cartIcon) {
                    cartIcon.classList.add('cart-animation');
                    setTimeout(() => cartIcon.classList.remove('cart-animation'), 500);
                }
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        // Share Functions
        window.openShareModal = (product) => {
            currentShareProduct = product;
            const shareInfo = document.getElementById('shareProductInfo');
            shareInfo.innerHTML = `
                <img class="share-product-image" src="${product.image}" onerror="this.src='https://via.placeholder.com/70x70'">
                <div class="share-product-details">
                    <h5>${escapeHtml(product.name)}</h5>
                    <p>₹${product.price.toLocaleString()}</p>
                </div>
            `;
            document.getElementById('shareLinkInput').value = `${window.location.origin}${window.location.pathname}?product=${product.id}`;
            document.getElementById('shareModal').classList.add('active');
        };
        
        window.closeShareModal = () => {
            document.getElementById('shareModal').classList.remove('active');
        };
        
        window.shareToWhatsApp = () => {
            if (currentShareProduct) {
                const text = `✨ Check out this beautiful ${currentShareProduct.name} from Style Of Life! ✨\nPrice: ₹${currentShareProduct.price.toLocaleString()}\n\n${window.location.origin}${window.location.pathname}?product=${currentShareProduct.id}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
                showToast('Opening WhatsApp...');
                closeShareModal();
            }
        };
        
        window.shareToInstagram = () => {
            if (currentShareProduct) {
                const text = `${currentShareProduct.name} - ₹${currentShareProduct.price.toLocaleString()}\n\n${window.location.origin}${window.location.pathname}?product=${currentShareProduct.id}`;
                navigator.clipboard.writeText(text);
                showToast('Link copied! Share on Instagram ✨');
                closeShareModal();
            }
        };
        
        window.shareToFacebook = () => {
            if (currentShareProduct) {
                const url = `${window.location.origin}${window.location.pathname}?product=${currentShareProduct.id}`;
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
                showToast('Opening Facebook...');
                closeShareModal();
            }
        };
        
        window.shareToTwitter = () => {
            if (currentShareProduct) {
                const text = `✨ ${currentShareProduct.name} ✨`;
                const url = `${window.location.origin}${window.location.pathname}?product=${currentShareProduct.id}`;
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
                showToast('Opening Twitter...');
                closeShareModal();
            }
        };
        
        window.copyProductLink = () => {
            const linkInput = document.getElementById('shareLinkInput');
            linkInput.select();
            navigator.clipboard.writeText(linkInput.value);
            showToast('Link copied to clipboard! ✨');
        };
        
        // Story Functions
        function showStoryInModal(product) {
            document.getElementById('storyUserAvatar').src = product.image;
            document.getElementById('storyUserName').textContent = product.name;
            document.getElementById('storyUserTime').textContent = 'Just now';
            document.getElementById('storyContentImage').src = product.image;
            document.getElementById('storyProductName').textContent = product.name;
            document.getElementById('storyProductPrice').textContent = `₹${product.price.toLocaleString()}`;
            document.getElementById('storyProductDesc').textContent = product.description;
            
            const buyBtn = document.getElementById('storyBuyBtn');
            const cartBtn = document.getElementById('storyCartBtn');
            
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, product.image);
            cartBtn.onclick = () => addToCart(product.id, product.name, product.price, product.sku, product.image);
        }
        
        window.openStory = (product) => {
            showStoryInModal(product);
            document.getElementById('instagramStoryModal').classList.add('active');
        };
        
        window.closeInstagramStory = () => {
            document.getElementById('instagramStoryModal').classList.remove('active');
        };
        
        // Load Story Toggles
        async function loadStoryToggles() {
            const container = document.getElementById('storiesContainer');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id')
                    .limit(8);
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
                    return;
                }
                
                let html = '';
                for (const product of products) {
                    const thumbnail = product.images?.[0] || 'https://via.placeholder.com/80x80?text=Style';
                    
                    html += `
                        <div class="story-toggle" onclick="openStory({
                            id: ${product.id},
                            name: '${escapeHtml(product.name)}',
                            sku: '${product.sku}',
                            price: ${product.price},
                            image: '${thumbnail}',
                            description: '${escapeHtml(product.description || 'Exquisite handcrafted jewelry piece.')}'
                        })">
                            <div class="story-ring">
                                <img class="story-thumbnail" src="${thumbnail}" alt="${escapeHtml(product.name)}">
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading story toggles:', error);
            }
        }
        
        // Load random products for featured section
        async function loadRandomProducts() {
            const container = document.getElementById('randomProducts');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ Coming soon</div>';
                    return;
                }
                
                const shuffled = [...products];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const randomProducts = shuffled.slice(0, 4);
                
                let html = '';
                for (const p of randomProducts) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/300x180?text=Style+Of+Life';
                    
                    html += `
                        <div class="random-product-card">
                            <img class="random-product-image" src="${img}" alt="Product">
                            <div class="random-product-info">
                                <div class="random-product-name">${escapeHtml(p.name)}</div>
                                <div class="random-product-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="random-buttons">
                                    <button class="random-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-bolt"></i> Buy Now
                                    </button>
                                    <button class="random-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-cart-plus"></i> Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading random products:', error);
                container.innerHTML = '<div class="empty-state">Unable to load recommendations</div>';
            }
        }
        
        // Initialize gallery
        function initGallery(galleryId, images, dotContainerId) {
            const gallery = document.getElementById(galleryId);
            const dotContainer = document.getElementById(dotContainerId);
            
            if (!gallery || !dotContainer) return;
            
            gallery.innerHTML = '';
            dotContainer.innerHTML = '';
            
            images.forEach((img, index) => {
                const imgElement = document.createElement('img');
                imgElement.src = img;
                imgElement.className = 'gallery-image';
                imgElement.alt = 'Product image';
                imgElement.onerror = () => { imgElement.src = 'https://via.placeholder.com/400x400?text=Image+Not+Available'; };
                gallery.appendChild(imgElement);
                
                const dot = document.createElement('div');
                dot.className = 'gallery-dot';
                if (index === 0) dot.classList.add('active');
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    gallery.scrollTo({ left: gallery.clientWidth * index, behavior: 'smooth' });
                });
                dotContainer.appendChild(dot);
            });
            
            gallery.addEventListener('scroll', () => {
                const scrollPosition = gallery.scrollLeft;
                const itemWidth = gallery.clientWidth;
                const activeIndex = Math.round(scrollPosition / itemWidth);
                const dots = dotContainer.querySelectorAll('.gallery-dot');
                dots.forEach((dot, idx) => {
                    if (idx === activeIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            });
        }
        
        // Load products
        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading exquisite pieces...</p></div>';
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ No products found</div>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const desc = p.description || 'Exquisite handcrafted jewelry piece made with premium quality materials and finest craftsmanship.';
                    
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    html += `
                        <div class="product-item">
                            <div class="product-gallery" id="${galleryId}"></div>
                            <div class="gallery-dots" id="${dotId}"></div>
                            <div class="product-item-info">
                                <div class="product-item-name">${escapeHtml(p.name)}</div>
                                <div class="product-item-sku">SKU: ${p.sku} | ${p.category || 'Jewelry'}</div>
                                <div class="product-item-desc">${escapeHtml(desc.substring(0, 100))}${desc.length > 100 ? '...' : ''}</div>
                                <div class="product-item-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="product-item-buttons">
                                    <button class="product-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')">
                                        <i class="fas fa-bolt"></i> Buy Now
                                    </button>
                                    <button class="product-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')">
                                        <i class="fas fa-shopping-cart"></i>
                                    </button>
                                    <button class="product-share-btn" onclick="openShareModal({
                                        id: ${p.id},
                                        name: '${escapeHtml(p.name)}',
                                        price: ${p.price},
                                        image: '${displayImages[0]}',
                                        sku: '${p.sku}'
                                    })">
                                        <i class="fas fa-share-alt"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    setTimeout(() => {
                        initGallery(galleryId, displayImages, dotId);
                    }, 50);
                }
                
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        document.getElementById('instagramStoryModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeInstagramStory();
            }
        });
        
        document.getElementById('shareModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeShareModal();
            }
        });
        
        // Initialize
        loadStoryToggles();
        await updateCartCount();
        await loadRandomProducts();
        await loadProducts();
    </script>
</body>
</html>
