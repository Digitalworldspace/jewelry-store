<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Style Of Life - Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --white-dark: #F0F0F0;
            --black: #1A1A1A;
            --black-light: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--black);
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        
        /* Light Background Animation */
        .light-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%);
        }
        
        /* Floating Particles */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--gold), transparent);
            border-radius: 50%;
            opacity: 0.2;
            animation: floatParticle 15s infinite;
        }
        
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.1; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.3; }
        }
        
        /* Stories Section */
        .stories-section {
            padding: 15px 0;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            text-align: center;
            min-width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .story-item:active {
            transform: scale(0.95);
        }
        
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px;
            margin-bottom: 0;
            transition: all 0.3s;
        }
        
        .story-ring:hover {
            transform: scale(1.05);
        }
        
        .story-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--white);
        }
        
        /* Instagram Story Modal */
        .instagram-story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        
        .instagram-story-modal.active {
            display: flex;
        }
        
        .story-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 10;
        }
        
        .story-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .story-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
        }
        
        .story-user-info h4 {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        
        .story-user-info p {
            color: rgba(255,255,255,0.7);
            font-size: 10px;
        }
        
        .story-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .story-close:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .story-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        
        .story-content-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .story-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 4px;
            padding: 12px 15px;
            z-index: 10;
        }
        
        .story-progress-segment {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .story-progress-fill {
            height: 100%;
            width: 0%;
            background: white;
            transition: width 0.1s linear;
        }
        
        .story-product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 60px 20px 30px;
            color: white;
        }
        
        .story-product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .story-product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin: 10px 0;
        }
        
        .story-product-desc {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 20px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .story-buttons {
            display: flex;
            gap: 12px;
        }
        
        .story-buy {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .story-buy:hover, .story-cart:hover {
            transform: translateY(-2px);
        }
        
        .story-cart {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Header */
        .instagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .animated-logo {
            position: relative;
            cursor: pointer;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--black);
        }
        
        .logo-gold {
            color: var(--gold);
            font-weight: 900;
            margin: 0 2px;
        }
        
        .logo-sub {
            font-size: 8px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: -2px;
            opacity: 0.8;
        }
        
        .logo-diamond {
            position: absolute;
            top: -12px;
            right: -20px;
            font-size: 14px;
            color: var(--gold);
            animation: diamondSpin 3s linear infinite;
        }
        
        @keyframes diamondSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--black);
            font-size: 22px;
            text-decoration: none;
            position: relative;
            transition: all 0.2s;
        }
        
        .header-icons a:hover {
            transform: scale(1.05);
            color: var(--gold);
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
            animation: badgePulse 1.5s infinite;
        }
        
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Featured Section */
        .featured-section {
            padding: 20px 15px;
            background: linear-gradient(135deg, rgba(212,175,55,0.05), rgba(212,175,55,0.02));
            margin-bottom: 20px;
        }
        
        .featured-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--gold-dark);
        }
        
        .random-products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .random-product-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .random-product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: var(--gold);
        }
        
        .random-product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .random-product-info {
            padding: 12px;
        }
        
        .random-product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .random-product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .random-buttons {
            display: flex;
            gap: 8px;
        }
        
        .random-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 8px;
            border: none;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }
        
        .random-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }
        
        .random-buy-btn:hover, .random-cart-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Product Grid with Scrollable Images */
        .products-section {
            padding: 20px 15px;
        }
        
        .section-title {
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }
        
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .product-item {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .product-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        /* Image Gallery - Scrollable */
        .product-gallery {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            display: flex;
            scrollbar-width: thin;
            cursor: grab;
        }
        
        .product-gallery:active {
            cursor: grabbing;
        }
        
        .product-gallery::-webkit-scrollbar {
            height: 4px;
        }
        
        .product-gallery::-webkit-scrollbar-track {
            background: var(--white-dark);
            border-radius: 10px;
        }
        
        .product-gallery::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        .gallery-image {
            min-width: 100%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
        }
        
        .gallery-dots {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
            z-index: 5;
        }
        
        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .gallery-dot.active {
            width: 20px;
            border-radius: 3px;
            background: var(--gold);
        }
        
        .product-item-info {
            padding: 15px;
        }
        
        .product-item-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .product-item-sku {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }
        
        .product-item-desc {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-item-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }
        
        .product-item-buttons {
            display: flex;
            gap: 12px;
        }
        
        .product-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--white);
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .product-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .product-buy-btn:hover, .product-cart-btn:hover {
            transform: translateY(-2px);
        }
        
        .product-cart-btn:hover {
            background: var(--gold);
            color: var(--white);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            transition: all 0.2s;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        .bottom-nav a.active i {
            transform: translateY(-3px);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
        }
        
        .toast-error {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--white-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cart-animation {
            animation: cartBounce 0.5s ease;
        }
        
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        @media (min-width: 768px) {
            .random-products {
                grid-template-columns: repeat(4, 1fr);
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="light-bg"></div>
    <div class="floating-particles" id="particles"></div>
    
    <!-- Stories Section -->
    <div class="stories-section">
        <div class="stories-container" id="storiesContainer">
            <!-- Stories will be loaded here with product images -->
        </div>
    </div>
    
    <!-- Instagram Story Modal -->
    <div id="instagramStoryModal" class="instagram-story-modal">
        <div class="story-header">
            <div class="story-user">
                <img id="storyUserAvatar" class="story-user-avatar" src="" alt="">
                <div class="story-user-info">
                    <h4 id="storyUserName">Style Of Life</h4>
                    <p id="storyUserTime">Just now</p>
                </div>
            </div>
            <button class="story-close" onclick="closeInstagramStory()">✕</button>
        </div>
        <div class="story-progress-bar" id="storyProgressBar"></div>
        <div class="story-content" id="storyContent" onclick="nextStory()">
            <img id="storyContentImage" class="story-content-image" src="" alt="">
        </div>
        <div class="story-product-info">
            <div class="story-product-name" id="storyProductName"></div>
            <div class="story-product-price" id="storyProductPrice"></div>
            <div class="story-product-desc" id="storyProductDesc"></div>
            <div class="story-buttons">
                <button class="story-buy" id="storyBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                <button class="story-cart" id="storyCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
            </div>
        </div>
    </div>
    
    <!-- Header -->
    <div class="instagram-header">
        <div class="animated-logo">
            <div class="logo-container">
                <div class="logo-main">STYLE<span class="logo-gold">OF</span>LIFE</div>
                <div class="logo-sub">LUXURY JEWELRY</div>
            </div>
            <i class="fas fa-gem logo-diamond"></i>
        </div>
        <div class="header-icons">
            <a href="cart.html"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a href="customer-portal.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- You May Also Like Section -->
    <div class="featured-section">
        <div class="featured-title">✨ You May Also Like</div>
        <div class="random-products" id="randomProducts">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
    
    <!-- Products Section with Scrollable Images -->
    <div class="products-section">
        <div class="section-title">
            <h3>All Products</h3>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html"><i class="fas fa-search"></i><span>Explore</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        let currentStoryProducts = [];
        let currentStoryIndex = 0;
        let storyTimer = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function updateCartCount() {
            try {
                const { data, error } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                document.getElementById('cartCount').textContent = total;
            } catch (error) {}
        }
        
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase
                    .from('carts')
                    .select('items')
                    .eq('session_id', sessionId)
                    .maybeSingle();
                
                if (fetchError) throw fetchError;
                
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                
                const { error: saveError } = await supabase
                    .from('carts')
                    .upsert({
                        session_id: sessionId,
                        items: items,
                        total: total,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'session_id' });
                
                if (saveError) throw saveError;
                
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
                
                const cartIcon = document.querySelector('.header-icons a:first-child i');
                if (cartIcon) {
                    cartIcon.classList.add('cart-animation');
                    setTimeout(() => cartIcon.classList.remove('cart-animation'), 500);
                }
            } catch (error) {
                showToast('Failed to add', true);
            }
        };
        
        window.buyNow = async (id, name, price, sku, img) => {
            await addToCart(id, name, price, sku, img);
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 500);
        };
        
        // Story Functions
        function showStoryAtIndex(index) {
            if (!currentStoryProducts[index]) return;
            
            const product = currentStoryProducts[index];
            document.getElementById('storyUserAvatar').src = product.image;
            document.getElementById('storyUserName').textContent = product.name;
            document.getElementById('storyUserTime').textContent = 'Just now';
            document.getElementById('storyContentImage').src = product.image;
            document.getElementById('storyProductName').textContent = product.name;
            document.getElementById('storyProductPrice').textContent = `₹${product.price.toLocaleString()}`;
            document.getElementById('storyProductDesc').textContent = product.description;
            
            const buyBtn = document.getElementById('storyBuyBtn');
            const cartBtn = document.getElementById('storyCartBtn');
            
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, product.image);
            cartBtn.onclick = () => addToCart(product.id, product.name, product.price, product.sku, product.image);
            
            updateProgressBars(index);
        }
        
        function updateProgressBars(currentIndex) {
            const container = document.getElementById('storyProgressBar');
            container.innerHTML = '';
            
            for (let i = 0; i < currentStoryProducts.length; i++) {
                const segment = document.createElement('div');
                segment.className = 'story-progress-segment';
                const fill = document.createElement('div');
                fill.className = 'story-progress-fill';
                if (i < currentIndex) {
                    fill.style.width = '100%';
                } else if (i === currentIndex) {
                    fill.style.width = '0%';
                    setTimeout(() => {
                        fill.style.transition = 'width 5s linear';
                        fill.style.width = '100%';
                    }, 10);
                }
                segment.appendChild(fill);
                container.appendChild(segment);
            }
        }
        
        function startStoryTimer() {
            if (storyTimer) clearInterval(storyTimer);
            storyTimer = setInterval(() => {
                if (currentStoryIndex < currentStoryProducts.length - 1) {
                    currentStoryIndex++;
                    showStoryAtIndex(currentStoryIndex);
                } else {
                    closeInstagramStory();
                }
            }, 5000);
        }
        
        function stopStoryTimer() {
            if (storyTimer) {
                clearInterval(storyTimer);
                storyTimer = null;
            }
        }
        
        window.nextStory = function() {
            if (currentStoryIndex < currentStoryProducts.length - 1) {
                currentStoryIndex++;
                showStoryAtIndex(currentStoryIndex);
                stopStoryTimer();
                startStoryTimer();
            }
        };
        
        window.closeInstagramStory = () => {
            stopStoryTimer();
            document.getElementById('instagramStoryModal').classList.remove('active');
            currentStoryProducts = [];
        };
        
        // Open random story with products
        window.openRandomStory = async () => {
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    showToast('No products available', true);
                    return;
                }
                
                const shuffled = [...products];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                
                currentStoryProducts = shuffled.slice(0, 10).map(p => ({
                    id: p.id,
                    name: p.name,
                    sku: p.sku,
                    price: p.price,
                    image: p.images?.[0] || 'https://via.placeholder.com/400x400',
                    description: p.description || 'Exquisite handcrafted jewelry piece.'
                }));
                
                currentStoryIndex = 0;
                showStoryAtIndex(0);
                document.getElementById('instagramStoryModal').classList.add('active');
                startStoryTimer();
            } catch (error) {
                showToast('Error loading stories', true);
            }
        };
        
        // Load Stories with actual product images from database
        async function loadStories() {
            const container = document.getElementById('storiesContainer');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id')
                    .limit(6);
                
                if (error) throw error;
                
                let html = '';
                
                if (products && products.length > 0) {
                    // Use actual product images from database
                    for (let i = 0; i < 6; i++) {
                        const product = products[i % products.length];
                        const storyImage = product.images?.[0] || 'https://via.placeholder.com/70x70?text=Style';
                        
                        html += `
                            <div class="story-item" onclick="openRandomStory()">
                                <div class="story-ring">
                                    <img class="story-image" src="${storyImage}" alt="Story">
                                </div>
                            </div>
                        `;
                    }
                } else {
                    // Fallback images if no products
                    const fallbackImages = [
                        'https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                        'https://images.pexels.com/photos/1191665/pexels-photo-1191665.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                        'https://images.pexels.com/photos/1455286/pexels-photo-1455286.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                        'https://images.pexels.com/photos/1740602/pexels-photo-1740602.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                        'https://images.pexels.com/photos/1095318/pexels-photo-1095318.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                        'https://images.pexels.com/photos/1455285/pexels-photo-1455285.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop'
                    ];
                    
                    for (let i = 0; i < 6; i++) {
                        html += `
                            <div class="story-item" onclick="openRandomStory()">
                                <div class="story-ring">
                                    <img class="story-image" src="${fallbackImages[i]}" alt="Story">
                                </div>
                            </div>
                        `;
                    }
                }
                
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading stories:', error);
                // Fallback
                const fallbackImages = [
                    'https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                    'https://images.pexels.com/photos/1191665/pexels-photo-1191665.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                    'https://images.pexels.com/photos/1455286/pexels-photo-1455286.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                    'https://images.pexels.com/photos/1740602/pexels-photo-1740602.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                    'https://images.pexels.com/photos/1095318/pexels-photo-1095318.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop',
                    'https://images.pexels.com/photos/1455285/pexels-photo-1455285.jpeg?auto=compress&cs=tinysrgb&w=70&h=70&fit=crop'
                ];
                
                let html = '';
                for (let i = 0; i < 6; i++) {
                    html += `
                        <div class="story-item" onclick="openRandomStory()">
                            <div class="story-ring">
                                <img class="story-image" src="${fallbackImages[i]}" alt="Story">
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            }
        }
        
        // Load random products for featured section
        async function loadRandomProducts() {
            const container = document.getElementById('randomProducts');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ Coming soon</div>';
                    return;
                }
                
                const shuffled = [...products];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const randomProducts = shuffled.slice(0, 4);
                
                let html = '';
                for (const p of randomProducts) {
                    const img = p.images?.[0] || 'https://via.placeholder.com/300x150?text=Style+Of+Life';
                    
                    html += `
                        <div class="random-product-card">
                            <img class="random-product-image" src="${img}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/300x150?text=Style+Of+Life'">
                            <div class="random-product-info">
                                <div class="random-product-name">${escapeHtml(p.name)}</div>
                                <div class="random-product-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="random-buttons">
                                    <button class="random-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-bolt"></i> Buy
                                    </button>
                                    <button class="random-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">
                                        <i class="fas fa-cart-plus"></i> Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading random products:', error);
                container.innerHTML = '<div class="empty-state">Unable to load recommendations</div>';
            }
        }
        
        // Initialize gallery with scroll and dots
        function initGallery(galleryId, images, dotContainerId) {
            const gallery = document.getElementById(galleryId);
            const dotContainer = document.getElementById(dotContainerId);
            
            if (!gallery || !dotContainer) return;
            
            gallery.innerHTML = '';
            dotContainer.innerHTML = '';
            
            images.forEach((img, index) => {
                const imgElement = document.createElement('img');
                imgElement.src = img;
                imgElement.className = 'gallery-image';
                imgElement.alt = 'Product image';
                imgElement.onerror = () => { imgElement.src = 'https://via.placeholder.com/400x400?text=Image+Not+Available'; };
                gallery.appendChild(imgElement);
                
                const dot = document.createElement('div');
                dot.className = 'gallery-dot';
                if (index === 0) dot.classList.add('active');
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    gallery.scrollTo({ left: gallery.clientWidth * index, behavior: 'smooth' });
                });
                dotContainer.appendChild(dot);
            });
            
            gallery.addEventListener('scroll', () => {
                const scrollPosition = gallery.scrollLeft;
                const itemWidth = gallery.clientWidth;
                const activeIndex = Math.round(scrollPosition / itemWidth);
                const dots = dotContainer.querySelectorAll('.gallery-dot');
                dots.forEach((dot, idx) => {
                    if (idx === activeIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            });
        }
        
        // Load products with scrollable images
        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ No products found</div>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const desc = p.description || 'Exquisite handcrafted jewelry piece made with premium quality materials and finest craftsmanship. Perfect for special occasions.';
                    
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    html += `
                        <div class="product-item">
                            <div class="product-gallery" id="${galleryId}"></div>
                            <div class="gallery-dots" id="${dotId}"></div>
                            <div class="product-item-info">
                                <div class="product-item-name">${escapeHtml(p.name)}</div>
                                <div class="product-item-sku">SKU: ${p.sku} | ${p.category || 'Jewelry'}</div>
                                <div class="product-item-desc">${escapeHtml(desc.substring(0, 120))}${desc.length > 120 ? '...' : ''}</div>
                                <div class="product-item-price">₹${(p.price || 0).toLocaleString()}</div>
                                <div class="product-item-buttons">
                                    <button class="product-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')">
                                        <i class="fas fa-bolt"></i> Buy Now
                                    </button>
                                    <button class="product-cart-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')">
                                        <i class="fas fa-shopping-cart"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    setTimeout(() => {
                        initGallery(galleryId, displayImages, dotId);
                    }, 50);
                }
                
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        document.getElementById('instagramStoryModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeInstagramStory();
            }
        });
        
        let touchStartX = 0;
        const storyContent = document.getElementById('storyContent');
        if (storyContent) {
            storyContent.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            });
            
            storyContent.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                if (touchEndX < touchStartX - 50) {
                    nextStory();
                }
            });
        }
        
        // Initialize
        loadStories();
        await updateCartCount();
        await loadRandomProducts();
        await loadProducts();
    </script>
</body>
</html>
