<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary: #d4af37; 
            --primary-dark: #b8962e;
            --dark: #1a1a1a; 
            --darker: #0a0a0a; 
            --light: #ffffff; 
            --gray-100: #f8f9fa; 
            --gray-200: #e9ecef; 
            --gray-600: #6c757d;
            --danger: #dc3545; 
            --success: #28a745;
            --warning: #ffc107;
            --info: #17a2b8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        
        .admin-header {
            background: var(--darker);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; }
        .admin-nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 15px;
            border-radius: 6px;
        }
        .admin-nav a:hover, .admin-nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
        
        table { width: 100%; background: white; border-radius: 12px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-200); }
        th { background: var(--gray-100); color: var(--gray-600); font-weight: 600; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: var(--warning); color: #856404; }
        .status-processing { background: var(--info); color: white; }
        .status-shipped { background: var(--success); color: white; }
        .status-delivered { background: #20c997; color: white; }
        .status-cancelled { background: var(--danger); color: white; }
        
        .status-select {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--gray-200);
            cursor: pointer;
            font-weight: 500;
        }
        .delete-btn {
            background: var(--danger);
            color: white;
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .empty-state { text-align: center; padding: 60px; color: var(--gray-600); }
        .loading { text-align: center; padding: 60px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        footer { background: var(--darker); color: white; text-align: center; padding: 30px; margin-top: 60px; }
        
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; padding: 15px; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <div class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h1>Order Management</h1>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><h3>Total Orders</h3><div class="stat-number" id="totalOrders">--</div></div>
            <div class="stat-card"><h3>Revenue</h3><div class="stat-number" id="totalRevenue">--</div></div>
            <div class="stat-card"><h3>Pending</h3><div class="stat-number" id="pendingOrders">--</div></div>
        </div>
        
        <div id="ordersList">
            <div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>
        </div>
    </div>

    <footer><p>© 2026 STYLE OF LIFE</p></footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        async function loadOrders() {
            const container = document.getElementById('ordersList');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>';
            
            try {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                const orders = data || [];
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
                const pendingCount = orders.filter(o => o.status === 'Pending' || o.status === 'pending').length;
                
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('totalRevenue').textContent = `₹${totalRevenue.toLocaleString()}`;
                document.getElementById('pendingOrders').textContent = pendingCount;
                
                if (orders.length === 0) {
                    container.innerHTML = '<div class="empty-state">📦 No orders yet</div>';
                    return;
                }
                
                let html = `
                    <table>
                        <thead>
                            <tr><th>Order ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                `;
                
                for (const o of orders) {
                    const itemsList = o.items?.map(i => `${i.name} x${i.quantity}`).join('<br>') || 'N/A';
                    const statusClass = o.status?.toLowerCase() || 'pending';
                    
                    html += `
                        <tr>
                            <td><strong>${o.order_id}</strong></td>
                            <td>${escapeHtml(o.customer_name)}</td>
                            <td>${o.customer_phone || o.phone || 'N/A'}</td>
                            <td><small>${itemsList}</small></td>
                            <td>₹${(o.total || 0).toLocaleString()}</td>
                            <td>
                                <select class="status-select" onchange="updateStatus('${o.order_id}', this.value)">
                                    <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Processing" ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                    <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                    <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                    <option value="Cancelled" ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                            <td>${new Date(o.created_at).toLocaleDateString()}</td>
                            <td><button class="delete-btn" onclick="deleteOrder('${o.order_id}')">Delete</button></td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = `<div class="empty-state">❌ Error loading orders: ${error.message}</div>`;
            }
        }
        
        window.updateStatus = async function(orderId, status) {
            try {
                const { error } = await supabase
                    .from('orders')
                    .update({ status: status })
                    .eq('order_id', orderId);
                
                if (error) throw error;
                alert(`✅ Order ${orderId} updated to ${status}`);
                loadOrders();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };
        
        window.deleteOrder = async function(orderId) {
            if (!confirm('Delete this order?')) return;
            
            try {
                const { error } = await supabase
                    .from('orders')
                    .delete()
                    .eq('order_id', orderId);
                
                if (error) throw error;
                alert('✅ Order deleted');
                loadOrders();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };
        
        window.logout = function() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadOrders();
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
