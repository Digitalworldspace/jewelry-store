<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --dark: #1a1a1a; --darker: #0a0a0a; --light: #ffffff; --gray-100: #f8f9fa; --gray-200: #e9ecef; --danger: #dc3545; --success: #28a745; --warning: #ffc107; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        header { background: var(--darker); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; }
        nav a { color: #aaa; text-decoration: none; margin-left: 20px; padding: 8px 15px; border-radius: 6px; }
        nav a:hover, nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--gray-200); text-align: center; flex: 1; }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
        table { width: 100%; background: white; border-radius: 12px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--gray-200); }
        th { background: var(--gray-100); color: var(--gray-600); }
        .status-select { padding: 5px 10px; border-radius: 20px; border: none; cursor: pointer; font-weight: 500; }
        .status-pending { background: var(--warning); color: #856404; }
        .status-processing { background: #17a2b8; color: white; }
        .status-shipped { background: var(--success); color: white; }
        .status-delivered { background: #20c997; color: white; }
        .status-cancelled { background: var(--danger); color: white; }
        .delete-btn { background: var(--danger); color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        footer { background: var(--darker); color: white; text-align: center; padding: 30px; margin-top: 60px; }
        @media (max-width: 768px) { .stats { flex-direction: column; } header { flex-direction: column; gap: 15px; padding: 15px; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>Order Management</h1>
        <div class="stats" id="stats"></div>
        
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th> </thead>
                <tbody id="ordersList"></tbody>
            </table>
        </div>
    </div>

    <footer><p>© 2026 STYLE OF LIFE</p></footer>

    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const totalRevenue = orders.reduce((s, o) => s + (o.total || 0), 0);
            const pendingCount = orders.filter(o => o.status === 'Pending').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>Total Orders</h3><div class="stat-number">${orders.length}</div></div>
                <div class="stat-card"><h3>Revenue</h3><div class="stat-number">₹${totalRevenue.toLocaleString()}</div></div>
                <div class="stat-card"><h3>Pending</h3><div class="stat-number">${pendingCount}</div></div>
            `;
            
            const tbody = document.getElementById('ordersList');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No orders found</td></tr>';
                return;
            }
            
            let html = '';
            orders.forEach(o => {
                const items = o.items.map(i => `${i.name} x${i.quantity}`).join('<br>');
                html += `
                    <tr>
                        <td><strong>${o.orderId}</strong></td>
                        <td>${o.name}<br><small>${o.phone}</small></td>
                        <td><small>${items}</small></td>
                        <td>₹${o.total?.toLocaleString() || 0}</td>
                        <td>
                            <select class="status-select status-${o.status?.toLowerCase()}" onchange="updateStatus('${o.orderId}', this.value)">
                                <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processing" ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>${new Date(o.date).toLocaleDateString()}</td>
                        <td><button class="delete-btn" onclick="deleteOrder('${o.orderId}')">Delete</button></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
        
        function updateStatus(orderId, status) {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const index = orders.findIndex(o => o.orderId === orderId);
            if (index >= 0) {
                orders[index].status = status;
                localStorage.setItem('orders', JSON.stringify(orders));
                alert(`✅ Order ${orderId} updated to ${status}`);
                loadOrders();
            }
        }
        
        function deleteOrder(orderId) {
            if (!confirm('Delete this order?')) return;
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const filtered = orders.filter(o => o.orderId !== orderId);
            localStorage.setItem('orders', JSON.stringify(filtered));
            alert('✅ Order deleted');
            loadOrders();
        }
        
        function logout() { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; }
        
        loadOrders();
        setInterval(loadOrders, 5000);
    </script>
</body>
</html>
