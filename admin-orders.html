<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary: #d4af37; 
            --primary-dark: #b8962e;
            --dark: #1a1a1a; 
            --darker: #0a0a0a; 
            --light: #ffffff; 
            --gray-100: #f8f9fa; 
            --gray-200: #e9ecef; 
            --gray-600: #6c757d;
            --danger: #dc3545; 
            --success: #28a745;
            --warning: #ffc107;
            --info: #17a2b8;
            --purple: #6f42c1;
        }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
        
        .admin-header {
            background: var(--darker);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 600; color: var(--primary); }
        .logo span { background: var(--primary); color: var(--darker); padding: 4px 8px; border-radius: 4px; }
        .admin-nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 15px;
            border-radius: 6px;
        }
        .admin-nav a:hover, .admin-nav a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--gray-200);
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-icon { font-size: 32px; margin-bottom: 10px; }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--gray-600); margin-top: 5px; }
        
        /* Filter Bar */
        .filter-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 15px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-bar button {
            padding: 8px 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .refresh-btn {
            background: var(--gray-600);
            color: white;
            margin-left: auto;
        }
        
        /* Orders Table */
        .orders-table-container {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--gray-200);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }
        th {
            background: var(--gray-100);
            font-weight: 600;
            color: var(--gray-600);
            font-size: 13px;
        }
        tr:hover { background: var(--gray-100); }
        
        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #c3e6cb; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        /* Payment Badges */
        .payment-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .payment-success { background: #d4edda; color: #155724; }
        .payment-pending { background: #fff3cd; color: #856404; }
        .payment-cod { background: #d1ecf1; color: #0c5460; }
        .payment-failed { background: #f8d7da; color: #721c24; }
        .payment-refunded { background: #e2d5f5; color: #4a1d96; }
        
        /* Select Dropdown */
        .status-select, .payment-select {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            font-size: 12px;
            cursor: pointer;
        }
        
        /* Action Buttons */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin: 0 3px;
        }
        .view-btn { background: var(--info); color: white; }
        .delete-btn { background: var(--danger); color: white; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--gray-200);
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        
        /* Customer Info Card */
        .customer-info-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .customer-info-row {
            display: flex;
            margin-bottom: 8px;
            align-items: center;
        }
        .customer-info-label {
            width: 100px;
            font-weight: 600;
            color: var(--gray-600);
            font-size: 12px;
        }
        .customer-info-value {
            flex: 1;
            font-weight: 500;
            color: var(--dark);
        }
        
        /* Product Items Styling */
        .product-items-list {
            margin-top: 15px;
        }
        .product-item-card {
            background: var(--gray-100);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .product-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            background: white;
        }
        .product-item-details {
            flex: 1;
        }
        .product-item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .product-item-sku {
            font-size: 11px;
            color: var(--gray-600);
            margin-bottom: 4px;
        }
        .product-item-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }
        .product-item-price {
            color: var(--primary);
            font-weight: 600;
        }
        .product-item-quantity {
            color: var(--gray-600);
        }
        
        /* Summary Section */
        .order-summary {
            background: linear-gradient(135deg, #fff9e6, #fff3d6);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .summary-row.total {
            border-bottom: none;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            padding-top: 12px;
            margin-top: 5px;
            border-top: 2px solid var(--primary);
        }
        
        /* Status Timeline */
        .status-timeline {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }
        .status-timeline::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gray-200);
            z-index: 0;
        }
        .timeline-step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }
        .timeline-icon {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 18px;
        }
        .timeline-step.completed .timeline-icon {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        .timeline-step.active .timeline-icon {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }
        .timeline-label {
            font-size: 10px;
            color: var(--gray-600);
        }
        .timeline-step.completed .timeline-label,
        .timeline-step.active .timeline-label {
            color: var(--dark);
            font-weight: 600;
        }
        
        /* Badge for Customer Type */
        .customer-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 8px;
        }
        .customer-new { background: #d1ecf1; color: #0c5460; }
        .customer-regular { background: #d4edda; color: #155724; }
        .customer-vip { background: #fff3cd; color: #856404; }
        
        .loading { text-align: center; padding: 60px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state { text-align: center; padding: 60px; color: var(--gray-600); }
        
        footer { background: var(--darker); color: white; text-align: center; padding: 30px; margin-top: 60px; }
        
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; padding: 15px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .refresh-btn { margin-left: 0; }
            th, td { font-size: 12px; padding: 8px; }
            .product-item-card { flex-direction: column; text-align: center; }
            .product-item-image { width: 80px; height: 80px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <div class="admin-nav">
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="admin-customers.html">Customers</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h1>📋 Order Management</h1>
        
        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-number" id="totalOrders">--</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-number" id="totalRevenue">--</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="paidOrders">--</div>
                <div class="stat-label">Paid Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-number" id="pendingPayment">--</div>
                <div class="stat-label">Pending Payment</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💵</div>
                <div class="stat-number" id="codOrders">--</div>
                <div class="stat-label">COD Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">❌</div>
                <div class="stat-number" id="failedPayments">--</div>
                <div class="stat-label">Failed Payments</div>
            </div>
        </div>
        
        <!-- Filter Bar -->
        <div class="filter-bar">
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <select id="paymentFilter">
                <option value="all">All Payments</option>
                <option value="success">Paid</option>
                <option value="pending">Pending</option>
                <option value="cod">Cash on Delivery</option>
                <option value="failed">Failed</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search by Order ID or Customer" style="width: 250px;">
            <button onclick="applyFilters()">🔍 Apply Filters</button>
            <button onclick="loadOrders()" class="refresh-btn">🔄 Refresh</button>
        </div>
        
        <!-- Orders Table -->
        <div class="orders-table-container">
            <div id="ordersList">
                <div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>
            </div>
        </div>
    </div>
    
    <!-- Order Details Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-receipt"></i> Order Details</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE | Order Management System</p>
    </footer>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let allOrders = [];
        let allCustomers = [];
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 20px; right: 20px; background: ${isError ? '#dc3545' : '#28a745'}; 
                color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; animation: fadeIn 0.3s;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Get customer type based on order count
        function getCustomerType(orderCount) {
            if (orderCount >= 5) return { type: 'VIP', class: 'customer-vip', icon: '👑' };
            if (orderCount >= 2) return { type: 'Regular', class: 'customer-regular', icon: '⭐' };
            return { type: 'New', class: 'customer-new', icon: '🆕' };
        }
        
        // Load all orders and customer data
        async function loadOrders() {
            const container = document.getElementById('ordersList');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>';
            
            try {
                // Load orders
                const { data: orders, error: ordersError } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (ordersError) throw ordersError;
                
                // Load profiles for customer info
                const { data: profiles, error: profilesError } = await supabase
                    .from('profiles')
                    .select('*');
                
                if (!profilesError && profiles) {
                    allCustomers = profiles;
                }
                
                // Calculate order count per customer
                const customerOrderCount = {};
                orders?.forEach(order => {
                    const email = order.email || order.customer_email;
                    if (email) {
                        customerOrderCount[email] = (customerOrderCount[email] || 0) + 1;
                    }
                });
                
                // Enhance orders with customer data
                allOrders = (orders || []).map(order => {
                    const email = order.email || order.customer_email;
                    const orderCount = customerOrderCount[email] || 1;
                    const customerType = getCustomerType(orderCount);
                    
                    return {
                        ...order,
                        customer_order_count: orderCount,
                        customer_type: customerType.type,
                        customer_type_class: customerType.class,
                        customer_type_icon: customerType.icon
                    };
                });
                
                updateStats();
                renderOrders();
                
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = `<div class="empty-state">❌ Error loading orders: ${error.message}</div>`;
            }
        }
        
        function updateStats() {
            const orders = allOrders;
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
            const paidOrders = orders.filter(o => o.payment_status === 'success').length;
            const pendingPayment = orders.filter(o => o.payment_status === 'pending').length;
            const codOrders = orders.filter(o => o.payment_status === 'cod').length;
            const failedPayments = orders.filter(o => o.payment_status === 'failed').length;
            
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = `₹${totalRevenue.toLocaleString()}`;
            document.getElementById('paidOrders').textContent = paidOrders;
            document.getElementById('pendingPayment').textContent = pendingPayment;
            document.getElementById('codOrders').textContent = codOrders;
            document.getElementById('failedPayments').textContent = failedPayments;
        }
        
        function getPaymentStatusIcon(status) {
            const icons = {
                'success': '<span class="payment-badge payment-success">✅ Paid</span>',
                'pending': '<span class="payment-badge payment-pending">⏳ Pending</span>',
                'cod': '<span class="payment-badge payment-cod">💵 COD</span>',
                'failed': '<span class="payment-badge payment-failed">❌ Failed</span>',
                'refunded': '<span class="payment-badge payment-refunded">🔄 Refunded</span>'
            };
            return icons[status] || '<span class="payment-badge payment-pending">⏳ Pending</span>';
        }
        
        function getOrderStatusIcon(status) {
            const icons = {
                'pending': '<span class="status-badge status-pending">⏳ Pending</span>',
                'processing': '<span class="status-badge status-processing">⚙️ Processing</span>',
                'shipped': '<span class="status-badge status-shipped">🚚 Shipped</span>',
                'delivered': '<span class="status-badge status-delivered">🎁 Delivered</span>',
                'cancelled': '<span class="status-badge status-cancelled">❌ Cancelled</span>'
            };
            return icons[status] || icons.pending;
        }
        
        function applyFilters() {
            renderOrders();
        }
        
        function renderOrders() {
            const container = document.getElementById('ordersList');
            const statusFilter = document.getElementById('statusFilter').value;
            const paymentFilter = document.getElementById('paymentFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredOrders = [...allOrders];
            
            if (statusFilter !== 'all') {
                filteredOrders = filteredOrders.filter(o => o.status?.toLowerCase() === statusFilter);
            }
            if (paymentFilter !== 'all') {
                filteredOrders = filteredOrders.filter(o => o.payment_status === paymentFilter);
            }
            if (searchTerm) {
                filteredOrders = filteredOrders.filter(o => 
                    o.order_id?.toLowerCase().includes(searchTerm) || 
                    o.customer_name?.toLowerCase().includes(searchTerm) ||
                    o.email?.toLowerCase().includes(searchTerm) ||
                    o.phone?.includes(searchTerm)
                );
            }
            
            if (filteredOrders.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No orders found</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Contact</th>
                            <th>Items</th>
                            <th>Amount</th>
                            <th>Payment</th>
                            <th>Order Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const o of filteredOrders) {
                const itemsCount = o.items?.length || 0;
                const date = new Date(o.created_at).toLocaleDateString('en-IN');
                const customerTypeBadge = `<span class="customer-badge ${o.customer_type_class}">${o.customer_type_icon} ${o.customer_type}</span>`;
                
                // Get first few product names
                const productNames = o.items?.slice(0, 2).map(item => item.name).join(', ') || 'N/A';
                const moreItems = itemsCount > 2 ? ` +${itemsCount - 2} more` : '';
                
                html += `
                    <tr>
                        <td><strong>${o.order_id}</strong></td>
                        <td>${date}</td>
                        <td>
                            ${escapeHtml(o.customer_name)} ${customerTypeBadge}
                            <div style="font-size: 10px; color: var(--gray-600); margin-top: 2px;">
                                ${o.customer_order_count} order${o.customer_order_count > 1 ? 's' : ''} total
                            </div>
                        </td>
                        <td>
                            <div><i class="fas fa-phone"></i> ${o.phone || o.customer_phone || 'N/A'}</div>
                            <div style="font-size: 11px;"><i class="fas fa-envelope"></i> ${o.email || o.customer_email || 'N/A'}</div>
                        </td>
                        <td>
                            <div style="font-size: 12px;">${productNames}${moreItems}</div>
                            <div style="font-size: 10px; color: var(--gray-600);">${itemsCount} item(s)</div>
                        </td>
                        <td><strong>₹${(o.total || 0).toLocaleString()}</strong></td>
                        <td>${getPaymentStatusIcon(o.payment_status)}</td>
                        <td>
                            <select class="status-select" onchange="updateOrderStatus('${o.order_id}', this.value)">
                                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>
                            <button class="action-btn view-btn" onclick="viewOrderDetails('${o.order_id}')">👁️ View</button>
                            <button class="action-btn delete-btn" onclick="deleteOrder('${o.order_id}')">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            }
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        // Status Timeline Component
        function renderStatusTimeline(currentStatus) {
            const statuses = ['pending', 'processing', 'shipped', 'delivered'];
            const statusLabels = {
                'pending': 'Order Placed',
                'processing': 'Processing',
                'shipped': 'Shipped',
                'delivered': 'Delivered'
            };
            const statusIcons = {
                'pending': '📝',
                'processing': '⚙️',
                'shipped': '🚚',
                'delivered': '🎁'
            };
            
            const currentIndex = statuses.indexOf(currentStatus);
            
            let html = '<div class="status-timeline">';
            statuses.forEach((status, index) => {
                let stepClass = '';
                if (index < currentIndex) stepClass = 'completed';
                if (index === currentIndex) stepClass = 'active';
                
                html += `
                    <div class="timeline-step ${stepClass}">
                        <div class="timeline-icon">${statusIcons[status]}</div>
                        <div class="timeline-label">${statusLabels[status]}</div>
                    </div>
                `;
            });
            html += '</div>';
            
            return html;
        }
        
        window.updateOrderStatus = async function(orderId, status) {
            try {
                const { error } = await supabase
                    .from('orders')
                    .update({ status: status, updated_at: new Date().toISOString() })
                    .eq('order_id', orderId);
                
                if (error) throw error;
                
                showToast(`✅ Order ${orderId} updated to ${status}`);
                loadOrders();
                
            } catch (error) {
                showToast('Error: ' + error.message, true);
            }
        };
        
        window.updatePaymentStatus = async function(orderId, paymentStatus) {
            try {
                const { error } = await supabase
                    .from('orders')
                    .update({ payment_status: paymentStatus, updated_at: new Date().toISOString() })
                    .eq('order_id', orderId);
                
                if (error) throw error;
                
                showToast(`✅ Payment status for ${orderId} updated to ${paymentStatus}`);
                loadOrders();
                
            } catch (error) {
                showToast('Error: ' + error.message, true);
            }
        };
        
        window.viewOrderDetails = async function(orderId) {
            const order = allOrders.find(o => o.order_id === orderId);
            if (!order) return;
            
            // Customer Info with enhanced details
            const customerTypeBadge = `<span class="customer-badge ${order.customer_type_class}">${order.customer_type_icon} ${order.customer_type} Customer</span>`;
            
            // Product Items with images
            let itemsHtml = '<div class="product-items-list">';
            if (order.items && order.items.length > 0) {
                for (const item of order.items) {
                    // Fetch product image if available
                    let productImage = item.image || 'https://via.placeholder.com/60x60?text=Product';
                    
                    itemsHtml += `
                        <div class="product-item-card">
                            <img class="product-item-image" src="${productImage}" onerror="this.src='https://via.placeholder.com/60x60?text=Product'" alt="${escapeHtml(item.name)}">
                            <div class="product-item-details">
                                <div class="product-item-name">${escapeHtml(item.name)}</div>
                                <div class="product-item-sku">SKU: ${item.sku || 'N/A'}</div>
                                <div class="product-item-meta">
                                    <span class="product-item-price">₹${(item.price || 0).toLocaleString()}</span>
                                    <span class="product-item-quantity">× ${item.quantity}</span>
                                    <span class="product-item-total">= ₹${((item.price || 0) * item.quantity).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } else {
                itemsHtml += '<p>No items found</p>';
            }
            itemsHtml += '</div>';
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <!-- Status Timeline -->
                ${renderStatusTimeline(order.status)}
                
                <!-- Customer Information Card -->
                <div class="customer-info-card">
                    <h4 style="margin-bottom: 12px;"><i class="fas fa-user"></i> Customer Information ${customerTypeBadge}</h4>
                    <div class="customer-info-row">
                        <span class="customer-info-label"><i class="fas fa-user-circle"></i> Name:</span>
                        <span class="customer-info-value">${escapeHtml(order.customer_name)}</span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label"><i class="fas fa-phone"></i> Phone:</span>
                        <span class="customer-info-value">${order.phone || order.customer_phone || 'N/A'}</span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label"><i class="fas fa-envelope"></i> Email:</span>
                        <span class="customer-info-value">${order.email || order.customer_email || 'N/A'}</span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label"><i class="fas fa-map-marker-alt"></i> Address:</span>
                        <span class="customer-info-value">${escapeHtml(order.address || 'N/A')}</span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label"><i class="fas fa-chart-line"></i> Order History:</span>
                        <span class="customer-info-value">${order.customer_order_count} total order${order.customer_order_count > 1 ? 's' : ''} with us</span>
                    </div>
                </div>
                
                <!-- Order Information -->
                <div style="margin-bottom: 15px;">
                    <h4><i class="fas fa-receipt"></i> Order Information</h4>
                    <div class="customer-info-row">
                        <span class="customer-info-label">Order ID:</span>
                        <span class="customer-info-value"><strong>${order.order_id}</strong></span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label">Order Date:</span>
                        <span class="customer-info-value">${new Date(order.created_at).toLocaleString()}</span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label">Order Status:</span>
                        <span class="customer-info-value">${getOrderStatusIcon(order.status)}</span>
                    </div>
                    <div class="customer-info-row">
                        <span class="customer-info-label">Payment Status:</span>
                        <span class="customer-info-value">${getPaymentStatusIcon(order.payment_status)}</span>
                    </div>
                    ${order.payment_id ? `<div class="customer-info-row">
                        <span class="customer-info-label">Payment ID:</span>
                        <span class="customer-info-value"><code>${order.payment_id}</code></span>
                    </div>` : ''}
                    ${order.payment_error ? `<div class="customer-info-row">
                        <span class="customer-info-label">Payment Error:</span>
                        <span class="customer-info-value" style="color: var(--danger);">${order.payment_error}</span>
                    </div>` : ''}
                </div>
                
                <!-- Products Section -->
                <div>
                    <h4><i class="fas fa-shopping-bag"></i> Order Items (${order.items?.length || 0})</h4>
                    ${itemsHtml}
                </div>
                
                <!-- Order Summary -->
                <div class="order-summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹${(order.subtotal || 0).toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>₹${(order.shipping || order.shipping_charge || 0).toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (18% GST)</span>
                        <span>₹${(order.tax || 0).toLocaleString()}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total Amount</span>
                        <span>₹${(order.total || 0).toLocaleString()}</span>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <select id="modalPaymentStatus" class="payment-select" style="flex: 1;">
                        <option value="success" ${order.payment_status === 'success' ? 'selected' : ''}>✅ Paid</option>
                        <option value="pending" ${order.payment_status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                        <option value="cod" ${order.payment_status === 'cod' ? 'selected' : ''}>💵 Cash on Delivery</option>
                        <option value="failed" ${order.payment_status === 'failed' ? 'selected' : ''}>❌ Failed</option>
                    </select>
                    <button class="action-btn" style="background: var(--primary);" onclick="updatePaymentFromModal('${order.order_id}')">
                        <i class="fas fa-save"></i> Update Payment
                    </button>
                </div>
            `;
            
            document.getElementById('orderModal').style.display = 'flex';
        };
        
        window.updatePaymentFromModal = async function(orderId) {
            const newStatus = document.getElementById('modalPaymentStatus').value;
            await updatePaymentStatus(orderId, newStatus);
            closeModal();
        };
        
        window.deleteOrder = async function(orderId) {
            if (!confirm(`Delete order ${orderId}? This action cannot be undone.`)) return;
            
            try {
                const { error } = await supabase
                    .from('orders')
                    .delete()
                    .eq('order_id', orderId);
                
                if (error) throw error;
                
                showToast(`✅ Order ${orderId} deleted`);
                loadOrders();
                
            } catch (error) {
                showToast('Error: ' + error.message, true);
            }
        };
        
        window.closeModal = function() {
            document.getElementById('orderModal').style.display = 'none';
        };
        
        window.applyFilters = function() {
            renderOrders();
        };
        
        window.logout = function() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Auto-refresh every 30 seconds
        loadOrders();
        setInterval(loadOrders, 30000);
        
        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
