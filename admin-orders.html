<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Management - Style Of Life</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="js/config.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f8f9fa;}

.admin-header{
background:#0a0a0a;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
}
.logo{color:#d4af37;font-size:22px;}

.container{max-width:1200px;margin:30px auto;padding:20px;}

table{width:100%;border-collapse:collapse;background:#fff;}
th,td{padding:12px;border-bottom:1px solid #eee;}
th{background:#f1f1f1;}

.action-btn{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.view-btn{background:#17a2b8;color:#fff;}
.delete-btn{background:#dc3545;color:#fff;}
</style>
</head>

<body>

<div class="admin-header">
<div class="logo">STYLE OF LIFE ADMIN</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">
<h2>📦 Orders</h2>

<div id="ordersList">Loading...</div>

</div>

<script type="importmap">
{
 "imports": {
 "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
 }
}
</script>

<script type="module">
import { createClient } from '@supabase/supabase-js';

const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

let allOrders = [];

async function loadOrders(){
 const { data, error } = await supabase
  .from('orders')
  .select('*')
  .order('created_at',{ascending:false});

 if(error){
  document.getElementById('ordersList').innerHTML="Error loading orders";
  return;
 }

 allOrders=data;
 renderOrders();
}

function renderOrders(){
 let html=`
 <table>
 <thead>
 <tr>
 <th>Order ID</th>
 <th>Customer</th>
 <th>Total</th>
 <th>Actions</th>
 </tr>
 </thead>
 <tbody>
 `;

 allOrders.forEach(o=>{
 html+=`
 <tr>
 <td>${o.order_id}</td>
 <td>${o.customer_name}</td>
 <td>₹${o.total}</td>
 <td>

 <button class="action-btn view-btn" onclick="viewOrder('${o.order_id}')">👁️</button>

 <button class="action-btn" style="background:#000;color:#fff"
 onclick="printShippingLabel('${o.order_id}')">🖨️</button>

 <button class="action-btn delete-btn"
 onclick="deleteOrder('${o.order_id}')">🗑️</button>

 </td>
 </tr>
 `;
 });

 html+="</tbody></table>";
 document.getElementById('ordersList').innerHTML=html;
}

window.viewOrder=function(id){
 alert("Order: "+id);
}

window.deleteOrder=async function(id){
 if(!confirm("Delete?"))return;

 await supabase.from('orders').delete().eq('order_id',id);
 loadOrders();
}

/* ✅ PRINT LABEL FUNCTION */
window.printShippingLabel=function(orderId){

 const order=allOrders.find(o=>o.order_id===orderId);
 if(!order)return;

 const itemsHtml=(order.items||[]).map(i=>`
 <tr>
 <td>${i.name}</td>
 <td>${i.quantity}</td>
 <td>₹${i.price}</td>
 </tr>
 `).join('');

 const win=window.open('','','width=800,height=600');

 win.document.write(`
 <html>
 <head>
 <title>Label</title>
 <style>
 body{font-family:Arial;padding:20px;}
 .box{border:2px solid #000;padding:20px;}
 table{width:100%;border-collapse:collapse;}
 td,th{border:1px solid #000;padding:5px;}
 .barcode{text-align:center;font-size:22px;letter-spacing:3px;}
 </style>
 </head>

 <body>
 <div class="box">

 <h2>STYLE OF LIFE</h2>

 <p><b>Order ID</b></p>
 <div class="barcode">*${order.order_id}*</div>

 <p><b>Ship To:</b><br>
 ${order.customer_name}<br>
 ${order.address||''}<br>
 ${order.phone||''}
 </p>

 <p><b>Total:</b> ₹${order.total}</p>

 <table>
 <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
 ${itemsHtml}
 </table>

 <p><b>From:</b><br>Surat, Gujarat</p>

 </div>

 <script>
 window.print();
 window.close();
 <\/script>

 </body>
 </html>
 `);

 win.document.close();
}

window.logout=function(){
 sessionStorage.clear();
 location.reload();
}

loadOrders();

</script>

</body>
</html>
