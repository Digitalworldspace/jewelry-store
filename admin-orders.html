<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Style Of Life</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --dark: #1a1a1a;
            --darker: #0a0a0a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
        }

        header {
            background: var(--darker);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            background: var(--primary);
            color: var(--darker);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 1.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            background: rgba(212,175,55,0.1);
            color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2rem;
            font-size: 1.75rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }

        .stat-card h3 {
            color: var(--gray-600);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .table-container {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            border: 1px solid var(--gray-200);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        th {
            background: var(--gray-100);
            font-weight: 600;
            font-size: 0.8rem;
        }

        tr:hover {
            background: var(--gray-100);
        }

        .status-select {
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .status-Pending { background: var(--warning); color: #856404; }
        .status-Processing { background: var(--info); color: white; }
        .status-Shipped { background: var(--success); color: white; }
        .status-Delivered { background: #20c997; color: white; }
        .status-Cancelled { background: var(--danger); color: white; }

        .view-btn, .delete-btn {
            padding: 0.25rem 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }

        .view-btn {
            background: var(--primary);
            color: var(--dark);
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            border-radius: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .detail-row {
            display: flex;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--gray-200);
        }

        .detail-label {
            font-weight: 600;
            width: 120px;
        }

        footer {
            background: var(--darker);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html" class="active">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>Order Management</h1>
        <div class="stats" id="stats"></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                </thead>
                <tbody id="ordersList"></tbody>
            </table>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Order Details</h3>
                <button class="close-modal" onclick="closeOrderModal()">&times;</button>
            </div>
            <div id="orderDetails"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://tbopyyocuvlsjvtdogcp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRib3B5eW9jdXZsc2p2dGRvZ2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzYxNzcsImV4cCI6MjA4OTYxMjE3N30.TfEtU1NBHCGnZqZzm4LuI1iw22lSPav0OrUskhDw5wc";
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        let allOrders = [];
        
        async function loadOrders() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                allOrders = await response.json();
                displayOrders();
                updateStats();
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }
        
        function updateStats() {
            const totalRevenue = allOrders.reduce((s, o) => s + (o.total || 0), 0);
            const pendingCount = allOrders.filter(o => o.status === 'Pending').length;
            const completedCount = allOrders.filter(o => o.status === 'Delivered' || o.status === 'Shipped').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>Total Orders</h3><div class="stat-number">${allOrders.length}</div></div>
                <div class="stat-card"><h3>Revenue</h3><div class="stat-number">₹${totalRevenue.toLocaleString()}</div></div>
                <div class="stat-card"><h3>Pending</h3><div class="stat-number">${pendingCount}</div></div>
                <div class="stat-card"><h3>Completed</h3><div class="stat-number">${completedCount}</div></div>
            `;
        }
        
        function displayOrders() {
            const tbody = document.getElementById('ordersList');
            if (allOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem;">No orders found</td></tr>';
                return;
            }
            
            let html = '';
            for (const o of allOrders) {
                const itemsList = o.items.map(i => `${i.name} x${i.quantity}`).join(', ');
                html += `
                    <tr>
                        <td><strong>${o.order_id}</strong></td>
                        <td>${escapeHtml(o.customer_name)}<br><small>${o.phone}</small></td>
                        <td><small>${itemsList.substring(0, 50)}${itemsList.length > 50 ? '...' : ''}</small></td>
                        <td><strong>₹${(o.total || 0).toLocaleString()}</strong></td>
                        <td>
                            <select class="status-select status-${o.status}" onchange="updateStatus('${o.order_id}', this.value)">
                                <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processing" ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td><small>${new Date(o.created_at).toLocaleDateString()}</small></td>
                        <td>
                            <button class="view-btn" onclick="viewOrderDetails('${o.order_id}')">View</button>
                            <button class="delete-btn" onclick="deleteOrder('${o.order_id}')">Delete</button>
                        </td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }
        
        window.updateStatus = async function(orderId, status) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/orders?order_id=eq.${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });
                alert(`Order ${orderId} updated to ${status}`);
                loadOrders();
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
            }
        };
        
        window.viewOrderDetails = function(orderId) {
            const order = allOrders.find(o => o.order_id === orderId);
            if (!order) return;
            
            let itemsHtml = '';
            for (const item of order.items) {
                itemsHtml += `<div style="display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid #e9ecef;">
                    <span>${escapeHtml(item.name)} x${item.quantity}</span>
                    <span>₹${(item.price * item.quantity).toLocaleString()}</span>
                </div>`;
            }
            
            document.getElementById('orderDetails').innerHTML = `
                <div class="detail-row"><div class="detail-label">Order ID:</div><div>${order.order_id}</div></div>
                <div class="detail-row"><div class="detail-label">Status:</div><div><span class="status-select status-${order.status}" style="display:inline-block;">${order.status}</span></div></div>
                <div class="detail-row"><div class="detail-label">Customer:</div><div>${escapeHtml(order.customer_name)}</div></div>
                <div class="detail-row"><div class="detail-label">Phone:</div><div>${order.phone}</div></div>
                <div class="detail-row"><div class="detail-label">Email:</div><div>${order.email || 'Not provided'}</div></div>
                <div class="detail-row"><div class="detail-label">Address:</div><div>${escapeHtml(order.address)}</div></div>
                <div class="detail-row"><div class="detail-label">Date:</div><div>${new Date(order.created_at).toLocaleString()}</div></div>
                <div style="margin: 1rem 0;"><h4>Items</h4>${itemsHtml}</div>
                <div style="margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--primary);">
                    <div style="display:flex; justify-content:space-between;"><strong>Subtotal:</strong> ₹${order.subtotal.toLocaleString()}</div>
                    <div style="display:flex; justify-content:space-between;"><strong>Tax (18%):</strong> ₹${order.tax.toLocaleString()}</div>
                    <div style="display:flex; justify-content:space-between;"><strong>Shipping:</strong> ₹${order.shipping}</div>
                    <div style="display:flex; justify-content:space-between; font-size:1.2rem; font-weight:bold; color:var(--primary); margin-top:0.5rem;">
                        <span>Total:</span> ₹${order.total.toLocaleString()}
                    </div>
                </div>
            `;
            
            document.getElementById('orderModal').style.display = 'block';
        };
        
        window.deleteOrder = async function(orderId) {
            if (!confirm('Delete this order permanently?')) return;
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/orders?order_id=eq.${orderId}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                alert('Order deleted successfully');
                loadOrders();
            } catch (error) {
                console.error('Error deleting order:', error);
                alert('Error deleting order');
            }
        };
        
        window.closeOrderModal = function() {
            document.getElementById('orderModal').style.display = 'none';
        };
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        loadOrders();
    </script>
</body>
</html>
