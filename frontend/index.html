<!DOCTYPE html>
<html>
<head>
<title>Style OF Life</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff;
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:220px;
    border:1px solid #eee;
    padding:15px;
    text-align:center;
}

.btn{
    background:#fff;
    border:2px solid #111;
    padding:10px;
    cursor:pointer;
}

.btn:hover{
    background:#111;
    color:#fff;
}

#cart{
    padding:20px;
    border-top:1px solid #eee;
}
</style>
</head>

<body>

<header>Style OF Life 💎</header>

<div class="container" id="products"></div>

<div id="cart"></div>

<script src="app.js"></script>

</body>
</html>
