<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Customer Management - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --primary-light: #f5e6c6;
            --white: #ffffff;
            --white-light: #faf7f2;
            --gray-50: #f8f9fa;
            --gray-100: #f1f3f5;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--gray-800);
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        
        /* Mobile Header */
        .mobile-header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo i {
            font-size: 24px;
            color: var(--primary);
        }
        
        .logo span {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-800);
        }
        
        .logo small {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 8px;
            margin-left: 5px;
        }
        
        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--gray-600);
            cursor: pointer;
            padding: 8px;
        }
        
        /* Mobile Sidebar */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--white);
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: var(--shadow-xl);
            overflow-y: auto;
        }
        
        .mobile-sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .sidebar-overlay.open { display: block; }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 { font-size: 18px; color: var(--primary); }
        .close-sidebar {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--gray-600);
        }
        
        .sidebar-nav { padding: 15px; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--gray-700);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .sidebar-nav a i { width: 22px; font-size: 18px; }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(212,175,55,0.05));
            color: var(--primary);
        }
        .logout-mobile { margin-top: 20px; border-top: 1px solid var(--gray-200); padding-top: 15px; }
        
        /* Desktop Layout */
        @media (min-width: 769px) {
            .mobile-header { display: none; }
            .mobile-sidebar { display: none; }
            .sidebar-overlay { display: none; }
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
            
            .desktop-layout {
                display: flex;
                min-height: 100vh;
            }
            .desktop-sidebar {
                width: 280px;
                background: var(--white);
                border-right: 1px solid var(--gray-200);
                position: fixed;
                height: 100vh;
                overflow-y: auto;
            }
            .desktop-content {
                flex: 1;
                margin-left: 280px;
            }
            .desktop-sidebar .logo {
                padding: 25px 20px;
                border-bottom: 1px solid var(--gray-200);
            }
            .desktop-sidebar .logo span { font-size: 20px; }
            .desktop-nav { padding: 20px; }
            .desktop-nav a {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 15px;
                color: var(--gray-700);
                text-decoration: none;
                border-radius: 12px;
                margin-bottom: 5px;
                transition: all 0.2s;
            }
            .desktop-nav a i { width: 22px; }
            .desktop-nav a:hover, .desktop-nav a.active {
                background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(212,175,55,0.05));
                color: var(--primary);
            }
            .logout-desktop {
                position: absolute;
                bottom: 20px;
                left: 20px;
                right: 20px;
                border-top: 1px solid var(--gray-200);
                padding-top: 20px;
            }
        }
        
        /* Main Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        @media (min-width: 768px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
        }
        
        .stat-card {
            background: var(--white);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
        }
        .stat-icon {
            width: 45px;
            height: 45px;
            background: rgba(212,175,55,0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .stat-icon i { font-size: 22px; color: var(--primary); }
        .stat-info h3 {
            font-size: 12px;
            color: var(--gray-500);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .stat-number { font-size: 24px; font-weight: 700; color: var(--gray-800); }
        
        /* Search Bar */
        .search-bar {
            background: var(--white);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--gray-200);
            border-radius: 40px;
            font-size: 14px;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .filter-select {
            padding: 10px 15px;
            border: 1px solid var(--gray-200);
            border-radius: 40px;
            background: var(--white);
            font-size: 13px;
        }
        
        /* Customers Table */
        .data-card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--gray-200);
        }
        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .data-header h2 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        .admin-table th, .admin-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }
        .admin-table th {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
        }
        .customer-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary-light), var(--gray-200));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary-dark);
        }
        .customer-name { font-weight: 600; }
        .customer-email { font-size: 12px; color: var(--gray-500); }
        
        .order-count {
            background: var(--gray-100);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .total-spent { font-weight: 600; color: var(--primary-dark); }
        
        .action-btn {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            color: var(--gray-600);
            transition: all 0.2s;
            border-radius: 8px;
        }
        .action-btn:hover { background: var(--gray-100); color: var(--primary); }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 12px;
            border: 1px solid var(--gray-200);
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
        }
        .pagination button.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }
        
        .empty-state { text-align: center; padding: 60px; color: var(--gray-500); }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            color: var(--gray-800);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar" id="mobileSidebar">

            <button class="close-sidebar" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="sidebar-nav">

    <!-- Desktop Layout -->
    <div class="desktop-layout">

            <div class="logo">
                <i class="fas fa-users" style="font-size: 28px; color: var(--primary);"></i>
                <span>STYLE OF LIFE</span>
                <small>CUSTOMERS</small>
            </div>
            <div class="desktop-nav">
                <a href="admin.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="admin-products.html"><i class="fas fa-box"></i> Products</a>
                <a href="admin-orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>

        <a href="admin-customers.html" class="active"><i class="fas fa-users"></i><span>Customers</span></a>

    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let allCustomers = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            else toast.classList.add('toast-success');
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadCustomers() {
            try {
                // Get all orders to aggregate customer data
                const { data: orders, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                // Aggregate customer data
                const customerMap = new Map();
                orders?.forEach(order => {
                    const email = order.email || order.customer_email;
                    const phone = order.phone || order.customer_phone;
                    const key = email || phone;
                    
                    if (!customerMap.has(key) && (email || phone)) {
                        customerMap.set(key, {
                            id: key,
                            name: order.customer_name,
                            email: email,
                            phone: phone,
                            orders: [],
                            totalSpent: 0,
                            firstOrder: order.created_at,
                            lastOrder: order.created_at
                        });
                    }
                    
                    if (customerMap.has(key)) {
                        const customer = customerMap.get(key);
                        customer.orders.push(order);
                        customer.totalSpent += order.total || 0;
                        if (new Date(order.created_at) > new Date(customer.lastOrder)) {
                            customer.lastOrder = order.created_at;
                        }
                        if (new Date(order.created_at) < new Date(customer.firstOrder)) {
                            customer.firstOrder = order.created_at;
                        }
                    }
                });
                
                allCustomers = Array.from(customerMap.values());
                
                // Sort by newest first
                allCustomers.sort((a, b) => new Date(b.lastOrder) - new Date(a.lastOrder));
                
                updateStats();
                renderCustomers();
                
            } catch (error) {
                console.error('Error loading customers:', error);
                document.getElementById('customersList').innerHTML = '<div class="empty-state">Error loading customers</div>';
            }
        }
        
        function updateStats() {
            const totalCustomers = allCustomers.length;
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const newThisMonth = allCustomers.filter(c => {
                const firstOrder = new Date(c.firstOrder);
                return firstOrder.getMonth() === currentMonth && firstOrder.getFullYear() === currentYear;
            }).length;
            const totalOrders = allCustomers.reduce((sum, c) => sum + c.orders.length, 0);
            const totalSpent = allCustomers.reduce((sum, c) => sum + c.totalSpent, 0);
            
            document.getElementById('totalCustomers').textContent = totalCustomers;
            document.getElementById('newCustomers').textContent = newThisMonth;
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalSpent').textContent = `₹${totalSpent.toLocaleString()}`;
        }
        
        function filterAndSortCustomers() {
            let filtered = [...allCustomers];
            
            // Search filter
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(c => 
                    c.name?.toLowerCase().includes(searchTerm) ||
                    c.email?.toLowerCase().includes(searchTerm) ||
                    c.phone?.includes(searchTerm)
                );
            }
            
            // Sort
            const sortBy = document.getElementById('sortSelect').value;
            switch(sortBy) {
                case 'newest':
                    filtered.sort((a, b) => new Date(b.lastOrder) - new Date(a.lastOrder));
                    break;
                case 'oldest':
                    filtered.sort((a, b) => new Date(a.firstOrder) - new Date(b.firstOrder));
                    break;
                case 'most_orders':
                    filtered.sort((a, b) => b.orders.length - a.orders.length);
                    break;
                case 'highest_spent':
                    filtered.sort((a, b) => b.totalSpent - a.totalSpent);
                    break;
            }
            
            return filtered;
        }
        
        function renderCustomers() {
            const filtered = filterAndSortCustomers();
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginatedCustomers = filtered.slice(start, start + itemsPerPage);
            
            const container = document.getElementById('customersList');
            
            if (paginatedCustomers.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>No customers found</p></div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '<table class="admin-table"><thead><tr><th>Customer</th><th>Contact</th><th>Orders</th><th>Total Spent</th><th>Member Since</th><th>Actions</th></tr></thead><tbody>';
            
            paginatedCustomers.forEach(c => {
                const initials = c.name?.split(' ').map(n => n[0]).join('').toUpperCase() || 'U';
                const memberDate = new Date(c.firstOrder).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
                
                html += `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="customer-avatar">${initials}</div>
                                <div>
                                    <div class="customer-name">${c.name || 'Guest'}</div>
                                    <div class="customer-email">${c.email || 'No email'}</div>
                                </div>
                            </div>
                        </td>
                        <td>${c.phone || 'No phone'}</td>
                        <td><span class="order-count">${c.orders.length}</span></td>
                        <td class="total-spent">₹${c.totalSpent.toLocaleString()}</td>
                        <td>${memberDate}</td>
                        <td>
                            <button class="action-btn" onclick="viewCustomerOrders('${c.id}')" title="View Orders">
                                <i class="fas fa-eye"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
            
            // Pagination
            let paginationHtml = '<div class="pagination">';
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                paginationHtml += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (totalPages > 5) {
                paginationHtml += `<span>...</span>`;
                paginationHtml += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            paginationHtml += '</div>';
            document.getElementById('pagination').innerHTML = paginationHtml;
        }
        
        window.goToPage = function(page) {
            currentPage = page;
            renderCustomers();
        };
        
        window.viewCustomerOrders = async function(customerId) {
            const customer = allCustomers.find(c => c.id === customerId);
            if (!customer) return;
            
            let ordersHtml = '';
            customer.orders.forEach(o => {
                ordersHtml += `
                    <div style="border-bottom: 1px solid var(--gray-200); padding: 12px 0;">
                        <div><strong>${o.order_id}</strong> - ${new Date(o.created_at).toLocaleDateString()}</div>
                        <div>Total: ₹${(o.total || 0).toLocaleString()} | Status: ${o.status || 'Pending'}</div>
                        <div style="font-size: 12px;">Items: ${o.items?.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
                    </div>
                `;
            });
            
            alert(`Customer: ${customer.name}\n\nOrders:\n${ordersHtml.replace(/<[^>]*>/g, '\n')}`);
        };
        
        window.openSidebar = function() {
            document.getElementById('mobileSidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('open');
        };
        
        window.closeSidebar = function() {
            document.getElementById('mobileSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        };
        
        window.logout = function() {
            sessionStorage.removeItem('adminLoggedIn');
            showToast('Logged out successfully');
            setTimeout(() => window.location.href = 'login.html', 500);
        };
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            renderCustomers();
        });
        document.getElementById('sortSelect').addEventListener('change', () => {
            currentPage = 1;
            renderCustomers();
        });
        
        loadCustomers();
    </script>
</body>
</html>
