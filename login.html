<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d4af37; --primary-dark: #b8962e; --dark: #1a1a1a; --darker: #0a0a0a; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .login-header {
            background: linear-gradient(135deg, var(--dark), var(--darker));
            padding: 40px;
            text-align: center;
        }
        .login-header h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .login-header p { color: #6c757d; margin-top: 8px; font-size: 14px; }
        .login-body { padding: 40px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; color: #6c757d; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 40px;
            color: var(--dark);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .hint { text-align: center; margin-top: 20px; font-size: 12px; color: #6c757d; padding-top: 20px; border-top: 1px solid #e9ecef; }
        .hint strong { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>STYLE OF LIFE</h1>
            <p>Admin Panel Access</p>
        </div>
        <div class="login-body">
            <div id="errorMessage" class="error-message"></div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button onclick="login()">Login to Dashboard →</button>
            <div class="hint">
                <strong>Demo Credentials:</strong><br>
                Username: <strong>admin</strong> | Password: <strong>1234</strong>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            
            if (username === 'admin' && password === '1234') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Invalid username or password. Please try again.';
                document.getElementById('password').value = '';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
            }
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
