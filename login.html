    <meta name="description" content="Login to your Style Of Life account. Access your orders, track shipments, and manage your profile.">

    <link rel="canonical" href="https://styleoflife987-hub.github.io/jewelry-store/login.html">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --primary-light: #f5e6c6;
            --white: #ffffff;
            --white-light: #f8f9fa;
            --gray-100: #f1f3f5;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --dark: #1a1a1a;
            --darker: #0a0a0a;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }
        
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -150px; right: -150px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--purple); bottom: -100px; left: -100px; animation-delay: 5s; }
        .orb-3 { width: 250px; height: 250px; background: var(--cyan); top: 50%; left: 20%; animation-delay: 10s; }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        /* Login Container */
        .login-container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        
        /* Brand Logo */
        .brand {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .gemini-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .gemini-star {
            width: 50px;
            height: 50px;
            animation: starPulse 2s ease-in-out infinite;
        }
        
        .gemini-star svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.5));
        }
        
        @keyframes starPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }
        
        .gemini-text {
            font-size: 32px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #D4AF37, #F5E6B3, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        
        .gemini-sub {
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        /* Login Card */
        .login-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 45px 40px;
            box-shadow: var(--shadow-xl);
            transition: all 0.3s ease;
            border: 1px solid rgba(212,175,55,0.2);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .login-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
        }
        
        .login-header p {
            font-size: 14px;
            color: var(--gray-500);
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 13px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--gray-500);
            font-size: 16px;
        }
        
        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1.5px solid var(--gray-200);
            border-radius: 20px;
            font-size: 15px;
            transition: all 0.3s;
            background: var(--white);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
        }
        
        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--darker);
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212,175,55,0.3);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Error Message */
        .error-message {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .success-message {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: var(--success);
        }
        
        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: var(--darker);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Footer Links */
        .footer-links {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--gray-200);
        }
        
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }
        
        .footer-links a:hover {
            color: var(--primary-dark);
        }
        
        /* Register Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            padding: 35px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .modal-header h2 {
            font-size: 24px;
            color: var(--primary);
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray-500);
            transition: color 0.3s;
        }
        
        .close-modal:hover {
            color: var(--danger);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--gray-200);
            border-radius: 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* Pixel Test Button */
        .pixel-test-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: #1877F2;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 12px;
            opacity: 0.7;
            border: none;
        }
        .pixel-test-btn:hover { opacity: 1; }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card { padding: 30px 25px; }
            .gemini-text { font-size: 24px; }
            .gemini-star { width: 40px; height: 40px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Pixel Test Button -->
    <button class="pixel-test-btn" onclick="testFacebookPixel()" title="Test Facebook Pixel">
        <i class="fab fa-facebook-f"></i>
    </button>
    
    <!-- Clear old sessions on login page load -->
    <script>
        console.log('🔐 Login page loaded - Clearing old sessions');
        sessionStorage.removeItem('vendorLoggedIn');
        sessionStorage.removeItem('adminLoggedIn');
        sessionStorage.removeItem('userRole');
        sessionStorage.removeItem('userEmail');
        sessionStorage.removeItem('userName');
    </script>
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="login-container">
        <!-- Brand Logo -->
        <div class="brand">
            <div class="gemini-logo">
                <div class="gemini-star">
                    <svg viewBox="0 0 24 24" width="100%" height="100%">
                        <defs>
                            <linearGradient id="geminiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                                <stop offset="33%" style="stop-color:#EA4335;stop-opacity:1" />
                                <stop offset="66%" style="stop-color:#FBBC05;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#34A853;stop-opacity:1" />

                        </defs>
                        <path class="star-outline" d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" fill="white" stroke="url(#geminiGradient)" stroke-width="2" stroke-linejoin="round"/>
                    </svg>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">

            <form id="registerForm">

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMessage');
        
        // ========== FACEBOOK PIXEL TEST FUNCTION ==========
        window.testFacebookPixel = function() {
            if (typeof fbq !== 'undefined') {
                console.log('✅ Facebook Pixel is loaded!');
                fbq('track', 'CustomEvent', {event_name: 'PixelTest'});
                alert('✅ Facebook Pixel is working! Check Meta Events Manager for test event.');
            } else {
                console.log('❌ Facebook Pixel NOT loaded');
                alert('❌ Facebook Pixel is NOT loaded. Check your internet connection.');
            }
        };
        
        // ========== CHECK IF VENDOR EXISTS BY EMAIL ==========
        async function checkVendorExists(email) {
            try {
                const { data, error } = await supabase
                    .from('vendors')
                    .select('id, email, status')
                    .eq('email', email)
                    .maybeSingle();
                
                if (error && error.code !== 'PGRST116') {
                    console.error('Error checking vendor:', error);
                }
                return data;
            } catch (err) {
                console.error('Error checking vendor:', err);
                return null;
            }
        }
        
        // ========== LOGIN FUNCTION ==========
        async function handleLogin(email, password) {
            errorDiv.style.display = 'none';
            errorDiv.classList.remove('success-message');
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return false;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="loading-spinner"></div> Signing in...';
            
            try {
                // STEP 1: Check if user is ADMIN (from admin_users table)
                const { data: adminData, error: adminError } = await supabase
                    .from('admin_users')
                    .select('email, full_name, role')
                    .eq('email', email)
                    .maybeSingle();
                
                // STEP 2: If admin found, authenticate as admin
                if (adminData) {
                    console.log('✅ User found in admin_users table');
                    
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) {
                        console.error('Admin auth error:', error);
                        throw new Error('Invalid admin credentials');
                    }
                    
                    if (data.session) {
                        sessionStorage.removeItem('vendorLoggedIn');
                        sessionStorage.setItem('adminLoggedIn', 'true');
                        sessionStorage.setItem('userRole', 'admin');
                        sessionStorage.setItem('userEmail', email);
                        sessionStorage.setItem('userName', adminData.full_name || 'Admin');
                        
                        console.log('✅ Admin session set');
                        showSuccess('Welcome Admin! Redirecting to Dashboard...');
                        
                        // Track Login event for Admin
                        if (typeof fbq !== 'undefined') {
                            fbq('track', 'Login', {
                                method: 'email',
                                role: 'admin'
                            });
                            console.log('✅ Facebook Login Event Tracked (Admin)');
                        }
                        
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 800);
                        return true;
                    }
                }
                
                // STEP 3: Check if user is VENDOR
                const vendorData = await checkVendorExists(email);
                
                if (!vendorData) {
                    showError('Account not found. Please register as vendor.');
                    return false;
                }
                
                console.log('✅ User found in vendors table, status:', vendorData.status);
                
                // Check vendor status
                if (vendorData.status === 'rejected') {
                    showError('Your vendor application has been rejected. Please contact support.');
                    return false;
                }
                
                if (vendorData.status === 'pending') {
                    showError('Your vendor application is pending approval. Please wait for admin approval.');
                    return false;
                }
                
                if (vendorData.status !== 'approved') {
                    showError('Your account is not approved yet. Please contact admin.');
                    return false;
                }
                
                // Authenticate vendor
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error('Vendor auth error:', error);
                    throw new Error('Invalid vendor credentials');
                }
                
                if (data.session) {
                    sessionStorage.removeItem('adminLoggedIn');
                    sessionStorage.setItem('vendorLoggedIn', 'true');
                    sessionStorage.setItem('userRole', 'vendor');
                    sessionStorage.setItem('userEmail', email);
                    sessionStorage.setItem('userName', vendorData.business_name || 'Vendor');
                    sessionStorage.setItem('vendorId', vendorData.id);
                    
                    console.log('✅ Vendor session set');
                    showSuccess('Welcome Vendor! Redirecting to Portal...');
                    
                    // Track Login event for Vendor
                    if (typeof fbq !== 'undefined') {
                        fbq('track', 'Login', {
                            method: 'email',
                            role: 'vendor'
                        });
                        console.log('✅ Facebook Login Event Tracked (Vendor)');
                    }
                    
                    setTimeout(() => {
                        window.location.href = 'vendor.html';
                    }, 800);
                    return true;
                }
                
                return false;
                
            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login failed. Please try again.');
                return false;
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Sign In';
            }
        }
        
        function showError(message) {
            errorDiv.style.display = 'block';
            errorDiv.classList.remove('success-message');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
            
            setTimeout(() => {
                if (errorDiv.style.display === 'block') {
                    errorDiv.style.opacity = '0';
                    setTimeout(() => {
                        errorDiv.style.display = 'none';
                        errorDiv.style.opacity = '1';
                    }, 300);
                }
            }, 5000);
        }
        
        function showSuccess(message) {
            errorDiv.style.display = 'block';
            errorDiv.classList.add('success-message');
            errorDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        }
        
        // ========== FORM SUBMIT ==========
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            await handleLogin(email, password);
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // ========== VENDOR REGISTRATION ==========
        const registerModal = document.getElementById('registerModal');
        
        window.showRegisterModal = () => {
            registerModal.style.display = 'flex';
            // Track Registration Start event
            if (typeof fbq !== 'undefined') {
                fbq('track', 'CustomEvent', {event_name: 'RegistrationStart'});
                console.log('✅ Facebook RegistrationStart Event Tracked');
            }
        };
        
        window.closeRegisterModal = () => {
            registerModal.style.display = 'none';
            document.getElementById('registerForm').reset();
            document.getElementById('registerError').style.display = 'none';
        };
        
        document.getElementById('showRegisterBtn')?.addEventListener('click', showRegisterModal);
        
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const businessName = document.getElementById('regBusinessName').value.trim();
            const ownerName = document.getElementById('regOwnerName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const phone = document.getElementById('regPhone').value.trim();
            const gstNumber = document.getElementById('regGst').value.trim();
            const address = document.getElementById('regAddress').value.trim();
            const errorDiv = document.getElementById('registerError');
            
            errorDiv.style.display = 'none';
            errorDiv.classList.remove('success-message');
            
            // Validation
            if (!businessName || !ownerName || !email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please fill all required fields';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Password must be at least 6 characters';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Passwords do not match';
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please enter a valid email address';
                return;
            }
            
            const registerBtn = document.querySelector('#registerForm .login-btn');
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<div class="loading-spinner"></div> Registering...';
            
            try {
                // FIRST: Check if vendor already exists in vendors table
                const { data: existingVendor } = await supabase
                    .from('vendors')
                    .select('id, email')
                    .eq('email', email)
                    .maybeSingle();
                
                if (existingVendor) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> A vendor with this email already exists. Please login.';
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register as Vendor';
                    return;
                }
                
                // SECOND: Check if email is used as admin
                const { data: existingAdmin } = await supabase
                    .from('admin_users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();
                
                if (existingAdmin) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> This email is registered as admin. Please use a different email.';
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register as Vendor';
                    return;
                }
                
                // Create auth user
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            business_name: businessName,
                            owner_name: ownerName,
                            role: 'vendor'
                        }
                    }
                });
                
                if (authError) {
                    if (authError.message.includes('User already registered')) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> This email is already registered. Please login instead.';
                        registerBtn.disabled = false;
                        registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register as Vendor';
                        return;
                    }
                    throw authError;
                }
                
                if (authData.user) {
                    const userId = authData.user.id;
                    
                    // Check if vendor record already exists
                    const { data: existingVendorRecord } = await supabase
                        .from('vendors')
                        .select('id')
                        .eq('id', userId)
                        .maybeSingle();
                    
                    if (!existingVendorRecord) {
                        // Create vendor record
                        const { error: insertError } = await supabase.from('vendors').insert([{
                            id: userId,
                            business_name: businessName,
                            owner_name: ownerName,
                            email: email,
                            phone: phone || null,
                            gst_number: gstNumber || null,
                            address: address || null,
                            status: 'pending'
                        }]);
                        
                        if (insertError) {
                            console.error('Vendor insert error:', insertError);
                        }
                    } else {
                        // Update existing vendor record
                        const { error: updateError } = await supabase.from('vendors')
                            .update({
                                business_name: businessName,
                                owner_name: ownerName,
                                phone: phone || null,
                                gst_number: gstNumber || null,
                                address: address || null,
                                status: 'pending'
                            })
                            .eq('id', userId);
                        
                        if (updateError) {
                            console.error('Vendor update error:', updateError);
                        }
                    }
                    
                    // Track Registration event
                    if (typeof fbq !== 'undefined') {
                        fbq('track', 'CompleteRegistration', {
                            method: 'email',
                            role: 'vendor'
                        });
                        console.log('✅ Facebook CompleteRegistration Event Tracked');
                    }
                    
                    // Show success
                    errorDiv.style.display = 'block';
                    errorDiv.classList.add('success-message');
                    errorDiv.innerHTML = '<i class="fas fa-check-circle"></i> Registration successful! Please wait for admin approval. You will be notified once approved.';
                    
                    setTimeout(() => {
                        closeRegisterModal();
                        errorDiv.style.display = 'none';
                        errorDiv.classList.remove('success-message');
                    }, 4000);
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                errorDiv.style.display = 'block';
                errorDiv.classList.remove('success-message');
                
                let errorMessage = 'Registration failed: ';
                if (error.message.includes('duplicate key')) {
                    errorMessage = 'Account already exists. Please login instead.';
                } else if (error.message.includes('User already registered')) {
                    errorMessage = 'This email is already registered. Please login instead.';
                } else {
                    errorMessage += error.message;
                }
                
                errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${errorMessage}`;
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register as Vendor';
            }
        });
        
        // Phone number validation
        document.getElementById('regPhone')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });
        
        // Close modal on outside click
        registerModal?.addEventListener('click', (e) => {
            if (e.target === registerModal) closeRegisterModal();
        });
        
        // Forgot password
        window.forgotPassword = () => {
            // Track ForgotPassword event
            if (typeof fbq !== 'undefined') {
                fbq('track', 'CustomEvent', {event_name: 'ForgotPassword'});
                console.log('✅ Facebook ForgotPassword Event Tracked');
            }
            alert('Please contact support at styleoflife987@gmail.com to reset your password.');
        };
        
        // Check if already logged in and redirect accordingly
        (function checkExistingSession() {
            const isAdminLoggedIn = sessionStorage.getItem('adminLoggedIn') === 'true';
            const isVendorLoggedIn = sessionStorage.getItem('vendorLoggedIn') === 'true';
            const userRole = sessionStorage.getItem('userRole');
            
            console.log('Checking existing session - admin:', isAdminLoggedIn, 'vendor:', isVendorLoggedIn, 'role:', userRole);
            
            if (isAdminLoggedIn && userRole === 'admin') {
                console.log('Admin already logged in, redirecting to admin.html');
                window.location.href = 'admin.html';
            } else if (isVendorLoggedIn && userRole === 'vendor') {
                console.log('Vendor already logged in, redirecting to vendor.html');
                window.location.href = 'vendor.html';
            }
        })();
        
        console.log('🎯 Facebook Pixel Active - Events Tracked:');
        console.log('   - PageView (auto on load)');
        console.log('   - Login (when user logs in)');
        console.log('   - RegistrationStart (when registration modal opens)');
        console.log('   - CompleteRegistration (when vendor registration completes)');
        console.log('   - ForgotPassword (when forgot password clicked)');
        console.log('   - Pixel Test Button: Click the blue Facebook icon to test');
    </script>
</body>
</html>
