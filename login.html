<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Jewellery Store</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #111, #333);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .box {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
  }

  .switch {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    color: #555;
    font-size: 14px;
  }

  .hidden {
    display: none;
  }

</style>
</head>

<body>

<div class="box">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login</h2>
    <input type="text" placeholder="Email or Mobile">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <div class="switch" onclick="toggle()">New user? Register</div>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="hidden">
    <h2>Register</h2>
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Mobile Number">
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="register()">Create Account</button>

    <div class="switch" onclick="toggle()">Already have account? Login</div>
  </div>

</div>

<script>

function toggle() {
  document.getElementById("loginBox").classList.toggle("hidden");
  document.getElementById("registerBox").classList.toggle("hidden");
}

function login() {
  alert("Login API call here");

  /*
  fetch("https://your-backend.com/api/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  })
  */
}

function register() {
  alert("Register API call here");

  /*
  fetch("https://your-backend.com/api/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name, phone, email, password})
  })
  */
}

</script>

</body>
</html>
