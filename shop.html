<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Shop - Style Of Life | Luxury Jewelry from Main Store & Artisans</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
            --gray-light: #999999;
            --purple: #8b5cf6;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--white-light); color: var(--black); overflow-x: hidden; padding-bottom: 70px; }
        .light-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%); }
        
        .gemini-logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Playfair Display', serif; padding: 12px 0; background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .gemini-star { width: 40px; height: 40px; animation: starPulse 2s ease-in-out infinite; }
        .gemini-star svg { width: 100%; height: 100%; }
        @keyframes starPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .gemini-text { font-size: 20px; font-weight: 700; color: var(--black); }
        .gemini-sub { font-size: 9px; letter-spacing: 2px; color: var(--gray); margin-left: 5px; }
        
        .shop-header { background: linear-gradient(135deg, var(--black) 0%, #1a1a2e 100%); padding: 60px 20px; text-align: center; color: white; }
        .shop-header h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 15px; }
        .shop-header h1 span { color: var(--gold); }
        .shop-header p { color: rgba(255,255,255,0.8); max-width: 600px; margin: 0 auto; }
        
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-left: 15px;
        }
        .view-btn {
            background: var(--gray-200);
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            color: var(--gray-700);
        }
        .view-btn.active {
            background: var(--gold);
            color: white;
        }
        
        .floating-filter { position: fixed; bottom: 80px; left: 20px; width: 50px; height: 50px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(212,175,55,0.4); }
        .floating-filter:hover { transform: scale(1.1); }
        .floating-filter i { font-size: 22px; color: var(--black); }
        .filter-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 10px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; display: none; }
        
        .filter-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: flex-end; }
        .filter-modal.active { display: flex; }
        .filter-drawer { width: 85%; max-width: 350px; height: 100%; background: var(--white); box-shadow: -2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .filter-drawer-header { padding: 20px; background: var(--gold); color: var(--black); display: flex; justify-content: space-between; align-items: center; }
        .filter-drawer-header h3 { font-size: 18px; }
        .close-filter { background: none; border: none; font-size: 24px; cursor: pointer; }
        .filter-drawer-content { flex: 1; overflow-y: auto; padding: 15px; }
        .filter-drawer-footer { padding: 15px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; }
        .filter-drawer-footer button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .filters-section { background: white; border-radius: 16px; margin: 30px 20px; box-shadow: var(--shadow); overflow: hidden; display: none; }
        .filter-group { border-bottom: 1px solid var(--gray-200); }
        .filter-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; }
        .filter-header h4 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .filter-header i { color: var(--gold); }
        .filter-content { padding: 0 20px 15px 20px; display: none; }
        .filter-content.show { display: block; }
        .filter-options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .filter-option { background: var(--white-light); padding: 6px 14px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; }
        .filter-option:hover { border-color: var(--gold); }
        .filter-option.active { background: var(--gold); color: white; border-color: var(--gold); }
        
        .price-range, .carat-range { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .price-range input, .carat-range input { flex: 1; padding: 10px; border: 1px solid var(--gray-200); border-radius: 8px; }
        
        .filter-actions { display: flex; gap: 10px; padding: 15px 20px; background: var(--white-light); }
        .btn-filter { background: var(--gold); color: black; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; }
        .btn-reset { background: var(--gray-600); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; }
        
        .active-filters { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; background: var(--white-light); border-top: 1px solid var(--gray-200); }
        .filter-tag { background: rgba(212,175,55,0.15); color: var(--gold); padding: 4px 10px; border-radius: 20px; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
        .filter-tag i { cursor: pointer; font-size: 10px; }
        
        .shop-layout { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .products-container { padding: 0 0 50px; }
        .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .products-count { color: var(--gray); font-size: 14px; }
        .sort-select { padding: 8px 15px; border: 1px solid var(--gray-200); border-radius: 8px; background: white; cursor: pointer; }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        .products-grid.grid-view {
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }
        
        .products-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .list-product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            cursor: pointer;
            display: flex;
            flex-direction: row;
        }
        .list-product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: var(--gold);
        }
        .list-image-container {
            position: relative;
            width: 200px;
            min-width: 200px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f5f5f5;
        }
        .list-product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .list-product-card:hover .list-product-image {
            transform: scale(1.05);
        }
        .list-product-info {
            flex: 1;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .list-product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .list-product-sku {
            font-size: 12px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }
        .list-product-desc {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .list-price-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .list-product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
        }
        .list-product-price small {
            font-size: 12px;
            color: var(--gray);
            font-weight: normal;
        }
        .list-diamond-details {
            background: var(--white-light);
            border-radius: 12px;
            padding: 8px 12px;
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .list-diamond-item {
            font-size: 12px;
        }
        .list-diamond-item strong {
            color: var(--gray);
        }
        .list-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .list-btn-buy, .list-btn-cart {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .list-btn-buy {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
        }
        .list-btn-cart {
            background: var(--white);
            border: 1.5px solid var(--gold);
            color: var(--gold);
        }
        .list-btn-buy:hover, .list-btn-cart:hover {
            transform: translateY(-2px);
        }
        .vendor-badge-list {
            display: inline-block;
            background: linear-gradient(135deg, var(--purple), #6d28d9);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }
        .main-badge-list {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }
        
        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--gold);
        }
        .product-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f5f5f5;
        }
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .vendor-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, var(--purple), #6d28d9);
            color: white;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 5;
        }
        .main-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 5;
        }
        .product-info {
            padding: 18px;
        }
        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .product-sku {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .diamond-details {
            background: var(--white-light);
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .diamond-detail-item {
            text-align: center;
            flex: 1;
            min-width: 60px;
        }
        .diamond-detail-label {
            font-size: 9px;
            color: var(--gray);
            text-transform: uppercase;
        }
        .diamond-detail-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
        }
        .product-buttons-icon {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-icon-buy, .btn-icon-cart {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 18px;
        }
        .btn-icon-buy {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
        }
        .btn-icon-cart {
            background: var(--white);
            border: 1.5px solid var(--gold);
            color: var(--gold);
        }
        
        /* Gallery Swipe Styles */
        .product-gallery-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f5f5f5;
        }
        .product-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            height: 100%;
            width: 100%;
            cursor: grab;
        }
        .product-gallery:active {
            cursor: grabbing;
        }
        .product-gallery::-webkit-scrollbar {
            display: none;
        }
        .gallery-item {
            min-width: 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            position: relative;
        }
        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        .gallery-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-d360 {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2a, #0a0a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
        }
        .gallery-d360 i {
            font-size: 48px;
            color: var(--gold);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .gallery-d360 span {
            font-size: 14px;
            color: var(--gold);
            font-weight: 600;
        }
        .gallery-d360 p {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        .gallery-dots {
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 10;
        }
        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.2s;
        }
        .gallery-dot.active {
            width: 20px;
            border-radius: 3px;
            background: var(--gold);
        }
        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            z-index: 10;
            transition: all 0.3s;
        }
        .gallery-arrow:hover {
            background: var(--gold);
            color: black;
        }
        .gallery-arrow-left {
            left: 8px;
        }
        .gallery-arrow-right {
            right: 8px;
        }
        
        /* D360 Modal */
        .d360-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .d360-modal-content {
            background: linear-gradient(135deg, #1a1a2a, #0a0a1a);
            border-radius: 24px;
            width: 90%;
            max-width: 900px;
            height: 80%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .d360-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        .d360-modal-header h3 {
            color: var(--gold);
            font-size: 18px;
        }
        .d360-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .d360-close:hover {
            color: var(--gold);
        }
        .d360-iframe-container {
            flex: 1;
            position: relative;
        }
        .d360-iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .d360-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .floating-cart {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(212,175,55,0.4);
        }
        .floating-cart:hover { transform: scale(1.1); }
        .floating-cart i { font-size: 24px; color: var(--black); }
        .floating-cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--black);
            color: var(--gold);
            font-size: 11px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .swipe-cart-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 30px 30px 0 0;
            padding: 20px;
            padding-bottom: 30px;
            touch-action: pan-y pinch-zoom;
        }
        .swipe-cart-overlay.active { transform: translateY(0); }
        .swipe-handle { width: 50px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; margin: 0 auto 20px; cursor: grab; }
        .swipe-title { text-align: center; color: white; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .cart-preview { flex: 1; overflow-y: auto; max-height: 45vh; margin-bottom: 15px; }
        .cart-preview-item { display: flex; gap: 12px; background: rgba(255,255,255,0.08); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
        .cart-preview-item img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }
        .cart-preview-total { text-align: center; padding: 15px; color: white; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px; }
        .swipe-container { background: rgba(255,255,255,0.1); border-radius: 50px; padding: 4px; margin: 15px 0 10px; position: relative; cursor: grab; }
        .swipe-track { background: rgba(255,255,255,0.2); border-radius: 50px; position: relative; overflow: hidden; height: 52px; }
        .swipe-thumb { width: 75px; height: 48px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 5px; cursor: grab; position: relative; z-index: 2; }
        .swipe-progress { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50px; width: 0%; z-index: 1; }
        .swipe-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.7); font-size: 13px; white-space: nowrap; pointer-events: none; }
        .action-card { background: rgba(255,255,255,0.08); border-radius: 50px; padding: 10px 20px; text-align: center; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: black;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-weight: 700;
            animation: fadeUp 0.3s;
        }
        .toast-error { background: #dc3545; color: white; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .loading { text-align: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px; color: var(--gray); }
        
        .load-more-container { text-align: center; margin-top: 40px; }
        .load-more-btn { background: var(--gold); color: var(--black); padding: 12px 30px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }

            .products-grid.grid-view {

            .products-container { flex: 1; }
            .products-grid.grid-view {
                grid-template-columns: repeat(2, 1fr);
            }

        @media (max-width: 1023px) { .filters-section { display: none; } }

                font-size: 20px;
            }
            .d360-modal-content {
                width: 95%;
                height: 70%;
            }
        }
    </style>
</head>
<body>
    <div class="light-bg"></div>
    
    <div class="gemini-logo" data-page="home">
        <div class="gemini-star"><svg viewBox="0 0 24 24"><defs><linearGradient id="gg"><stop offset="0%" stop-color="#4285F4"/><stop offset="33%" stop-color="#EA4335"/><stop offset="66%" stop-color="#FBBC05"/><stop offset="100%" stop-color="#34A853"/></linearGradient></defs><path d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" fill="white" stroke="url(#gg)" stroke-width="2"/></svg></div>
        <div><span class="gemini-text">Style Of Life</span><span class="gemini-sub">SHOP</span></div>

        <div class="swipe-title"><i class="fas fa-shopping-bag" style="color: var(--gold);"></i> Your Cart</div>
        <div id="cartPreviewContent" class="cart-preview"><div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);"><i class="fas fa-shopping-cart" style="font-size:48px;margin-bottom:15px;"></i><p>Your cart is empty</p></div></div>

    <div id="filterModal" class="filter-modal">

            <div class="filter-drawer-content" id="mobileFilterContent"></div>
            <div class="filter-drawer-footer"><button class="btn-filter" onclick="applyFilters(); closeFilterModal();">Apply Filters</button><button class="btn-reset" onclick="resetFilters(); closeFilterModal();">Reset All</button></div>
        </div>

    <div class="floating-cart" id="floatingCartBtn"><i class="fas fa-shopping-bag"></i><span class="floating-cart-badge" id="cartCount">0</span></div>
    
    <div class="shop-header">
        <h1>Our <span>Collection</span></h1>

        <div class="filters-section" id="desktopFilters"></div>
        
        <div class="products-container">
            <div class="products-header">
                <div class="products-count" id="productsCount">Loading products...</div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="view-toggle">
                        <button class="view-btn active" id="listViewBtn" onclick="setView('list')"><i class="fas fa-list"></i> List View</button>
                        <button class="view-btn" id="gridViewBtn" onclick="setView('grid')"><i class="fas fa-th"></i> Grid View</button>
                    </div>
                    <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                        <option value="default">Sort by: Default</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>

    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop" class="active"><i class="fas fa-search"></i><span>Discover</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Bag</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="customer-portal"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) { sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('sessionId', sessionId); }
        
        let allProducts = [];
        let filteredProducts = [];
        let currentDisplayCount = 30;
        let currentCart = [];
        let currentView = 'list';
        
        let isSwipeDragging = false;
        let swipeStartX = 0;
        let swipeCurrentTranslate = 0;
        let swipeMaxProgress = 0;
        let touchStartY = 0;
        let isSwipingDown = false;
        
        let selectedFilters = { 
            sources: [], categories: [], minPrice: '', maxPrice: '',
            minCarat: '', maxCarat: '', diamondColor: '', diamondClarity: '', diamondCut: ''
        };
        let availableCategories = [];
        let availableDiamondColors = [];
        let availableDiamondClarities = [];
        let availableDiamondCuts = [];
        
        function calculateGST(price, gstPercent) { const gst = (price * gstPercent) / 100; return { gstAmount: gst, total: price + gst }; }
        function navigateTo(page) { window.location.href = page + '.html'; }
        document.querySelectorAll('[data-page]').forEach(el => el.addEventListener('click', (e) => { e.preventDefault(); navigateTo(el.getAttribute('data-page')); }));
        
        function showToast(msg, isErr = false) { const t = document.createElement('div'); t.className = 'toast' + (isErr ? ' toast-error' : ''); t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        
        function isVideoUrl(url) {
            if (!url) return false;
            return url.match(/\.(mp4|webm|mov|avi|m3u8)$/i) || url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo.com');
        }
        
        function isD360Url(url) {
            if (!url) return false;
            return url.includes('d360.tech/view.html') || 
                   url.includes('/view.html?d=') ||
                   url.includes('3dviewer') ||
                   url.includes('360view') ||
                   (url.includes('.html') && (url.includes('360') || url.includes('3d')));
        }
        
        function openD360Viewer(url, productName) {
            const existingModal = document.querySelector('.d360-modal');
            if (existingModal) existingModal.remove();
            
            const modal = document.createElement('div');
            modal.className = 'd360-modal';
            modal.innerHTML = `
                <div class="d360-modal-content">
                    <div class="d360-modal-header">
                        <h3><i class="fas fa-cube"></i> 360° View - ${escapeHtml(productName || 'Product')}</h3>
                        <button class="d360-close" onclick="this.closest('.d360-modal').remove()">&times;</button>
                    </div>
                    <div class="d360-iframe-container">
                        <div class="d360-loading" id="d360Loading">
                            <div class="spinner"></div>
                            <p>Loading 3D experience...</p>
                        </div>
                        <iframe src="${url}" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            const iframe = modal.querySelector('iframe');
            const loadingDiv = modal.querySelector('#d360Loading');
            
            iframe.onload = function() {
                if (loadingDiv) loadingDiv.style.display = 'none';
            };
            
            setTimeout(() => {
                if (loadingDiv) loadingDiv.style.display = 'none';
            }, 5000);
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.querySelector('.d360-modal')) {
                    modal.remove();
                }
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }
        
        function openImageModal(imageUrl) {
            const modalHtml = `<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:3000;display:flex;justify-content:center;align-items:center;" onclick="this.remove()">
                <div style="background:white;border-radius:20px;max-width:90%;max-height:90%;padding:10px;" onclick="event.stopPropagation()">
                    <img src="${imageUrl}" style="max-width:100%;max-height:80vh;border-radius:16px;">
                    <button style="position:absolute;top:20px;right:20px;background:black;color:white;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;" onclick="this.closest('div').remove()">×</button>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        // ========== CART FUNCTIONS ==========
        async function updateCartCount() {
            const { data } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            const items = data?.items || []; 
            currentCart = items;
            const total = items.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').textContent = total;
            return items;
        }
        
        async function updateCartPreview() {
            const items = await updateCartCount();
            const container = document.getElementById('cartPreviewContent');
            if (!items.length) { 
                container.innerHTML = `<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);"><i class="fas fa-shopping-cart" style="font-size:48px;margin-bottom:15px;"></i><p>Your cart is empty</p></div>`; 
                return; 
            }
            let subtotal = 0, totalGST = 0, html = '';
            for (const item of items) {
                const gstPercent = item.gst || 18;
                const gstAmount = (item.price * gstPercent) / 100;
                subtotal += item.price * item.quantity;
                totalGST += gstAmount * item.quantity;
                html += `<div class="cart-preview-item"><img src="${item.image}" onerror="this.src='https://via.placeholder.com/55'"><div><div style="font-weight:600;">${escapeHtml(item.name)}</div><div>₹${item.price.toLocaleString()} × ${item.quantity}</div><div style="font-size:10px;">GST: ₹${(gstAmount * item.quantity).toFixed(2)}</div></div><div style="color:var(--gold);">₹${((item.price + gstAmount) * item.quantity).toFixed(2)}</div></div>`;
            }
            const shipping = subtotal >= 3000 ? 0 : 100;
            const grand = subtotal + totalGST + shipping;
            container.innerHTML = html + `<div class="cart-preview-total"><div>Subtotal: ₹${subtotal.toLocaleString()}</div><div>GST: ₹${totalGST.toFixed(2)}</div><div>Shipping: ₹${shipping}</div><div style="font-size:18px;margin-top:10px;">Total: ₹${grand.toFixed(2)}</div></div>`;
        }
        
        window.addToCart = async (id, name, price, sku, img, gst = 18) => {
            let { data: cart } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            let items = cart?.items || [];
            const existing = items.find(i => i.id === id);
            if (existing) existing.quantity++;
            else items.push({ id, sku, name, price, gst, quantity: 1, image: img });
            await supabase.from('carts').upsert({ session_id: sessionId, items, total: items.reduce((s, i) => s + (i.price * i.quantity), 0), updated_at: new Date() }, { onConflict: 'session_id' });
            showToast(`✨ ${name} added to bag!`);
            await updateCartPreview();
            updateCartCount();
        };
        
        window.buyNow = async (id, name, price, sku, img, gst) => { await addToCart(id, name, price, sku, img, gst); setTimeout(() => navigateTo('checkout'), 600); };
        
        // ========== SWIPE CART FUNCTIONALITY ==========
        function initSwipeCart() {
            const swipeThumb = document.getElementById('swipeThumb');
            const swipeTrack = document.querySelector('.swipe-track');
            if (!swipeThumb || !swipeTrack) return;
            swipeMaxProgress = swipeTrack.getBoundingClientRect().width - 75;
            
            const startDrag = (e) => {
                isSwipeDragging = true;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                swipeStartX = clientX - swipeCurrentTranslate;
                swipeThumb.style.transition = 'none';
                document.getElementById('swipeProgress').style.transition = 'none';
                e.stopPropagation();
            };
            
            const onDrag = (e) => {
                if (!isSwipeDragging) return;
                e.preventDefault();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let newTranslate = clientX - swipeStartX;
                newTranslate = Math.max(0, Math.min(newTranslate, swipeMaxProgress));
                swipeCurrentTranslate = newTranslate;
                swipeThumb.style.transform = `translateX(${swipeCurrentTranslate}px)`;
                document.getElementById('swipeProgress').style.width = `${(swipeCurrentTranslate / swipeMaxProgress) * 100}%`;
                if ((swipeCurrentTranslate / swipeMaxProgress) >= 0.95) completeSwipe();
            };
            
            const endDrag = () => {
                isSwipeDragging = false;
                swipeThumb.style.transition = 'transform 0.3s ease';
                document.getElementById('swipeProgress').style.transition = 'width 0.3s ease';
                if (swipeCurrentTranslate < swipeMaxProgress * 0.95) resetSwipe();
            };
            
            const resetSwipe = () => {
                swipeCurrentTranslate = 0;
                swipeThumb.style.transform = 'translateX(0px)';
                document.getElementById('swipeProgress').style.width = '0%';
            };
            
            const completeSwipe = () => {
                resetSwipe();
                closeSwipeCart();
                if (currentCart.length > 0) navigateTo('checkout');
                else showToast('Your bag is empty!', true);
            };
            
            swipeThumb.addEventListener('mousedown', startDrag);
            swipeThumb.addEventListener('touchstart', startDrag);
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('touchmove', onDrag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }
        
        function openSwipeCart() {
            document.getElementById('swipeCartOverlay').classList.add('active');
            updateCartPreview();
            setTimeout(initSwipeCart, 150);
        }
        
        function closeSwipeCart() {
            document.getElementById('swipeCartOverlay').classList.remove('active');
            swipeCurrentTranslate = 0;
            const thumb = document.getElementById('swipeThumb');
            const progress = document.getElementById('swipeProgress');
            if (thumb) thumb.style.transform = 'translateX(0px)';
            if (progress) progress.style.width = '0%';
        }
        
        function setupSwipeDownToClose() {
            const overlay = document.getElementById('swipeCartOverlay');
            const handle = document.getElementById('swipeHandle');
            if (!overlay) return;
            
            overlay.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
                isSwipingDown = true;
            });
            overlay.addEventListener('touchmove', (e) => {
                if (!isSwipingDown) return;
                const deltaY = e.touches[0].clientY - touchStartY;
                if (deltaY > 0 && overlay.classList.contains('active')) {
                    overlay.style.transform = `translateY(${Math.min(deltaY, 300)}px)`;
                    e.preventDefault();
                }
            });
            overlay.addEventListener('touchend', (e) => {
                if (e.changedTouches[0].clientY - touchStartY > 100) closeSwipeCart();
                overlay.style.transform = '';
                isSwipingDown = false;
            });
            
            let mouseStartY = 0, isMouseSwiping = false;
            handle?.addEventListener('mousedown', (e) => {
                mouseStartY = e.clientY;
                isMouseSwiping = true;
            });
            document.addEventListener('mousemove', (e) => {
                if (!isMouseSwiping || !overlay.classList.contains('active')) return;
                const deltaY = e.clientY - mouseStartY;
                if (deltaY > 0 && deltaY < 300) overlay.style.transform = `translateY(${deltaY}px)`;
            });
            document.addEventListener('mouseup', (e) => {
                if (!isMouseSwiping) return;
                if (e.clientY - mouseStartY > 100) closeSwipeCart();
                overlay.style.transform = '';
                isMouseSwiping = false;
            });
        }
        
        document.getElementById('floatingCartBtn')?.addEventListener('click', openSwipeCart);
        document.getElementById('clearCartSwipeBtn')?.addEventListener('click', async () => {
            if (currentCart.length && confirm('Clear your bag?')) {
                await supabase.from('carts').upsert({ session_id: sessionId, items: [], total: 0, updated_at: new Date() }, { onConflict: 'session_id' });
                showToast('Bag cleared!');
                await updateCartPreview();
                closeSwipeCart();
                updateCartCount();
            }
        });
        
        // ========== VIEW TOGGLE ==========
        window.setView = function(view) {
            currentView = view;
            const listBtn = document.getElementById('listViewBtn');
            const gridBtn = document.getElementById('gridViewBtn');
            const container = document.getElementById('productsContainer');
            
            if (view === 'list') {
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
                container.classList.remove('grid-view');
                container.classList.add('products-list');
                renderListView(filteredProducts.slice(0, currentDisplayCount));
            } else {
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
                container.classList.add('grid-view');
                container.classList.remove('products-list');
                renderGridView(filteredProducts.slice(0, currentDisplayCount));
            }
        };
        
        // ========== GET PRODUCT MEDIA (INCLUDING D360 AS A SLIDE) ==========
        function getProductMedia(product) {
            const media = [];
            
            // Add images
            if (product.image1_url && product.image1_url.trim()) media.push({ url: product.image1_url, type: 'image' });
            if (product.image2_url && product.image2_url.trim()) media.push({ url: product.image2_url, type: 'image' });
            if (product.image3_url && product.image3_url.trim()) media.push({ url: product.image3_url, type: 'image' });
            if (product.images_url_1 && product.images_url_1.trim()) media.push({ url: product.images_url_1, type: 'image' });
            if (product.images_url_2 && product.images_url_2.trim()) media.push({ url: product.images_url_2, type: 'image' });
            if (product.images_url_3 && product.images_url_3.trim()) media.push({ url: product.images_url_3, type: 'image' });
            
            // Add video if it's a regular video (not D360)
            if (product.video_url && product.video_url.trim()) {
                if (isVideoUrl(product.video_url)) {
                    media.push({ url: product.video_url, type: 'video' });
                } else if (isD360Url(product.video_url)) {
                    media.push({ url: product.video_url, type: 'd360' });
                }
            }
            
            return media;
        }
        
        // ========== CREATE GALLERY HTML (WITH D360 AS A SLIDE) ==========
        function createGalleryHTML(product, media, uniqueId) {
            if (!media.length) {
                const defaultImg = product.image1_url || product.image2_url || product.image3_url || product.images_url_1 || 'https://via.placeholder.com/400';
                return `<div class="product-gallery-container">
                            <div class="product-gallery" id="gallery-${uniqueId}">
                                <div class="gallery-item" data-type="image" data-url="${defaultImg}">
                                    <img class="gallery-image" src="${defaultImg}" alt="${escapeHtml(product.product_name)}" loading="lazy" onclick="event.stopPropagation(); openImageModal('${defaultImg}')" onerror="this.src='https://via.placeholder.com/400'">
                                </div>
                            </div>
                        </div>`;
            }
            
            let galleryItems = '';
            for (let i = 0; i < media.length; i++) {
                const m = media[i];
                if (m.type === 'video') {
                    galleryItems += `<div class="gallery-item" data-type="video" data-url="${m.url}">
                                        <video class="gallery-video" id="video-${uniqueId}-${i}" src="${m.url}" poster="${media[0]?.url || ''}" preload="metadata" muted playsinline loop webkit-playsinline></video>
                                    </div>`;
                } else if (m.type === 'd360') {
                    galleryItems += `<div class="gallery-item" data-type="d360" data-url="${m.url}">
                                        <div class="gallery-d360" onclick="event.stopPropagation(); openD360Viewer('${m.url}', '${escapeHtml(product.product_name)}')">
                                            <i class="fas fa-cube"></i>
                                            <span>360° View</span>
                                            <p>Click to explore in 3D</p>
                                        </div>
                                    </div>`;
                } else {
                    galleryItems += `<div class="gallery-item" data-type="image" data-url="${m.url}">
                                        <img class="gallery-image" src="${m.url}" alt="${escapeHtml(product.product_name)}" loading="lazy" onclick="event.stopPropagation(); openImageModal('${m.url}')" onerror="this.src='https://via.placeholder.com/400'">
                                    </div>`;
                }
            }
            
            let dotsHtml = '';
            if (media.length > 1) {
                for (let i = 0; i < media.length; i++) {
                    dotsHtml += `<div class="gallery-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`;
                }
            }
            
            return `<div class="product-gallery-container">
                        <div class="product-gallery" id="gallery-${uniqueId}">
                            ${galleryItems}
                        </div>
                        ${media.length > 1 ? `
                        <div class="gallery-dots">${dotsHtml}</div>
                        <div class="gallery-arrow gallery-arrow-left" onclick="event.stopPropagation(); scrollGallery('gallery-${uniqueId}', -1)"><i class="fas fa-chevron-left"></i></div>
                        <div class="gallery-arrow gallery-arrow-right" onclick="event.stopPropagation(); scrollGallery('gallery-${uniqueId}', 1)"><i class="fas fa-chevron-right"></i></div>
                        ` : ''}
                    </div>`;
        }
        
        window.scrollGallery = function(galleryId, direction) {
            const gallery = document.getElementById(galleryId);
            if (gallery) {
                const scrollAmount = gallery.clientWidth;
                gallery.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
                setTimeout(() => {
                    checkAndPlayMedia(galleryId);
                }, 100);
            }
        };
        
        function checkAndPlayMedia(galleryId) {
            const gallery = document.getElementById(galleryId);
            if (!gallery) return;
            
            const scrollPos = gallery.scrollLeft;
            const itemWidth = gallery.clientWidth;
            const activeIndex = Math.round(scrollPos / itemWidth);
            const items = gallery.querySelectorAll('.gallery-item');
            const videos = gallery.querySelectorAll('video');
            
            videos.forEach(video => { video.pause(); });
            
            const activeItem = items[activeIndex];
            if (activeItem) {
                const video = activeItem.querySelector('video');
                if (video && video.src) {
                    video.play().catch(e => console.log('Autoplay prevented:', e));
                }
            }
        }
        
        function setupGalleryListeners(galleryId, mediaLength) {
            if (mediaLength <= 1) return;
            setTimeout(() => {
                const gallery = document.getElementById(galleryId);
                if (!gallery) return;
                const container = gallery.closest('.product-gallery-container');
                const dots = container?.querySelectorAll('.gallery-dot');
                
                gallery.addEventListener('scroll', () => {
                    const scrollPos = gallery.scrollLeft;
                    const itemWidth = gallery.clientWidth;
                    const activeIndex = Math.round(scrollPos / itemWidth);
                    if (dots) {
                        dots.forEach((dot, idx) => {
                            dot.classList.toggle('active', idx === activeIndex);
                        });
                    }
                    checkAndPlayMedia(galleryId);
                });
                
                if (dots) {
                    dots.forEach((dot, idx) => {
                        dot.addEventListener('click', (e) => {
                            e.stopPropagation();
                            gallery.scrollTo({ left: idx * gallery.clientWidth, behavior: 'smooth' });
                        });
                    });
                }
                
                setTimeout(() => {
                    checkAndPlayMedia(galleryId);
                }, 500);
            }, 100);
        }
        
        // ========== FILTER FUNCTIONS ==========
        function extractFilterOptions(products) {
            const categories = new Set();
            const diamondColors = new Set();
            const diamondClarities = new Set();
            const diamondCuts = new Set();
            
            products.forEach(p => {
                if (p.category) categories.add(p.category);
                if (p.diamond_color) diamondColors.add(p.diamond_color);
                if (p.diamond_clarity) diamondClarities.add(p.diamond_clarity);
                if (p.diamond_cut) diamondCuts.add(p.diamond_cut);
            });
            
            availableCategories = Array.from(categories).sort();
            availableDiamondColors = Array.from(diamondColors).sort();
            availableDiamondClarities = Array.from(diamondClarities).sort();
            availableDiamondCuts = Array.from(diamondCuts).sort();
        }
        
        async function loadAllProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading exquisite pieces...</p></div>';
            try {
                const [mainRes, vendorRes] = await Promise.all([
                    supabase.from('products').select('*'),
                    supabase.from('vendor_products').select('*')
                ]);
                
                const mainProducts = mainRes.data || [];
                const vendorProducts = vendorRes.data || [];
                
                console.log(`✅ Shop loaded: ${mainProducts.length} main products, ${vendorProducts.length} vendor products`);
                
                const mainMarked = mainProducts.map(p => ({ ...p, source: 'main', product_name: p.product_name || p.name }));
                const vendorMarked = vendorProducts.map(p => ({ ...p, source: 'vendor', product_name: p.product_name }));
                
                allProducts = [...mainMarked, ...vendorMarked];
                
                extractFilterOptions(allProducts);
                buildFilterUI();
                applyFilters();
                
            } catch(e) { console.error(e); container.innerHTML = '<div class="empty-state">Error loading collection</div>'; }
        }
        
        function buildFilterUI() {
            const filterHtml = `
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('sourceFilter')">
                        <h4><i class="fas fa-store"></i> Source</h4>
                        <i class="fas fa-chevron-down" id="sourceFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="sourceFilter">
                        <div class="filter-options">
                            <div class="filter-option source-option" data-source="main" onclick="toggleSource('main')">🏛️ Main Store</div>
                            <div class="filter-option source-option" data-source="vendor" onclick="toggleSource('vendor')">🎨 Artisan</div>
                        </div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('categoryFilter')">
                        <h4><i class="fas fa-tags"></i> Category</h4>
                        <i class="fas fa-chevron-down" id="categoryFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="categoryFilter">
                        <div class="filter-options" id="categoryOptions">
                            ${availableCategories.map(cat => `<div class="filter-option category-option" data-cat="${cat}" onclick="toggleCategory('${cat}')">${cat}</div>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('priceFilter')">
                        <h4><i class="fas fa-rupee-sign"></i> Price Range</h4>
                        <i class="fas fa-chevron-down" id="priceFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="priceFilter">
                        <div class="price-range"><input type="number" id="minPrice" placeholder="Min ₹" value="" step="1000"><span>-</span><input type="number" id="maxPrice" placeholder="Max ₹" value="" step="1000"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('caratFilter')">
                        <h4><i class="fas fa-gem"></i> Carat Range</h4>
                        <i class="fas fa-chevron-down" id="caratFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="caratFilter">
                        <div class="carat-range"><input type="number" id="minCarat" placeholder="Min Carat" value="" step="0.1"><span>-</span><input type="number" id="maxCarat" placeholder="Max Carat" value="" step="0.1"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('diamondColorFilter')">
                        <h4><i class="fas fa-palette"></i> Diamond Color</h4>
                        <i class="fas fa-chevron-down" id="diamondColorFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="diamondColorFilter">
                        <div class="filter-options">${availableDiamondColors.map(color => `<div class="filter-option diamond-color-option" data-color="${color}" onclick="selectDiamondColor('${color}')">${color}</div>`).join('')}</div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('diamondClarityFilter')">
                        <h4><i class="fas fa-eye"></i> Diamond Clarity</h4>
                        <i class="fas fa-chevron-down" id="diamondClarityFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="diamondClarityFilter">
                        <div class="filter-options">${availableDiamondClarities.map(clarity => `<div class="filter-option diamond-clarity-option" data-clarity="${clarity}" onclick="selectDiamondClarity('${clarity}')">${clarity}</div>`).join('')}</div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('diamondCutFilter')">
                        <h4><i class="fas fa-cut"></i> Diamond Cut</h4>
                        <i class="fas fa-chevron-down" id="diamondCutFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="diamondCutFilter">
                        <div class="filter-options">${availableDiamondCuts.map(cut => `<div class="filter-option diamond-cut-option" data-cut="${cut}" onclick="selectDiamondCut('${cut}')">${cut}</div>`).join('')}</div>
                    </div>
                </div>
                <div class="filter-actions"><button class="btn-filter" onclick="applyFilters()">Apply Filters</button><button class="btn-reset" onclick="resetFilters()">Reset All</button></div>
                <div id="activeFilters" class="active-filters"></div>
            `;
            document.getElementById('desktopFilters').innerHTML = filterHtml;
            document.getElementById('mobileFilterContent').innerHTML = filterHtml;
            attachFilterEvents();
        }
        
        function attachFilterEvents() {
            document.querySelectorAll('.source-option').forEach(el => {
                if (selectedFilters.sources.includes(el.getAttribute('data-source'))) el.classList.add('active');
            });
            document.querySelectorAll('.category-option').forEach(el => {
                if (selectedFilters.categories.includes(el.getAttribute('data-cat'))) el.classList.add('active');
            });
            document.getElementById('minPrice').value = selectedFilters.minPrice;
            document.getElementById('maxPrice').value = selectedFilters.maxPrice;
            document.getElementById('minCarat').value = selectedFilters.minCarat;
            document.getElementById('maxCarat').value = selectedFilters.maxCarat;
            
            document.querySelectorAll('.diamond-color-option').forEach(el => {
                if (el.getAttribute('data-color') === selectedFilters.diamondColor) el.classList.add('active');
                else el.classList.remove('active');
            });
            document.querySelectorAll('.diamond-clarity-option').forEach(el => {
                if (el.getAttribute('data-clarity') === selectedFilters.diamondClarity) el.classList.add('active');
                else el.classList.remove('active');
            });
            document.querySelectorAll('.diamond-cut-option').forEach(el => {
                if (el.getAttribute('data-cut') === selectedFilters.diamondCut) el.classList.add('active');
                else el.classList.remove('active');
            });
        }
        
        window.toggleFilter = function(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id + 'Icon');
            content.classList.toggle('show');
            icon.classList.toggle('rotated');
        };
        
        window.toggleSource = function(source) {
            const index = selectedFilters.sources.indexOf(source);
            if (index === -1) selectedFilters.sources.push(source);
            else selectedFilters.sources.splice(index, 1);
            applyFilters();
        };
        
        window.toggleCategory = function(category) {
            const index = selectedFilters.categories.indexOf(category);
            if (index === -1) selectedFilters.categories.push(category);
            else selectedFilters.categories.splice(index, 1);
            applyFilters();
        };
        
        window.selectDiamondColor = function(color) {
            selectedFilters.diamondColor = selectedFilters.diamondColor === color ? '' : color;
            applyFilters();
        };
        
        window.selectDiamondClarity = function(clarity) {
            selectedFilters.diamondClarity = selectedFilters.diamondClarity === clarity ? '' : clarity;
            applyFilters();
        };
        
        window.selectDiamondCut = function(cut) {
            selectedFilters.diamondCut = selectedFilters.diamondCut === cut ? '' : cut;
            applyFilters();
        };
        
        function updateActiveFiltersDisplay() {
            const container = document.getElementById('activeFilters');
            if (!container) return;
            const filters = [];
            if (selectedFilters.sources.length) filters.push(`Source: ${selectedFilters.sources.join(', ')}`);
            if (selectedFilters.categories.length) filters.push(`Category: ${selectedFilters.categories.join(', ')}`);
            if (selectedFilters.minPrice) filters.push(`Min Price: ₹${parseInt(selectedFilters.minPrice).toLocaleString()}`);
            if (selectedFilters.maxPrice) filters.push(`Max Price: ₹${parseInt(selectedFilters.maxPrice).toLocaleString()}`);
            if (selectedFilters.minCarat) filters.push(`Min Carat: ${selectedFilters.minCarat}ct`);
            if (selectedFilters.maxCarat) filters.push(`Max Carat: ${selectedFilters.maxCarat}ct`);
            if (selectedFilters.diamondColor) filters.push(`Diamond Color: ${selectedFilters.diamondColor}`);
            if (selectedFilters.diamondClarity) filters.push(`Diamond Clarity: ${selectedFilters.diamondClarity}`);
            if (selectedFilters.diamondCut) filters.push(`Diamond Cut: ${selectedFilters.diamondCut}`);
            
            if (filters.length === 0) container.innerHTML = '<span style="color:var(--gray); font-size:12px;">No active filters</span>';
            else container.innerHTML = filters.map(f => `<span class="filter-tag">${f} <i class="fas fa-times" onclick="removeFilterTag('${f.split(':')[0]}')"></i></span>`).join('');
            
            document.getElementById('filterBadge').style.display = filters.length ? 'flex' : 'none';
            if (filters.length) document.getElementById('filterBadge').textContent = filters.length;
        }
        
        window.removeFilterTag = function(type) {
            if (type === 'Source') selectedFilters.sources = [];
            if (type === 'Category') selectedFilters.categories = [];
            if (type === 'Min Price') { document.getElementById('minPrice').value = ''; selectedFilters.minPrice = ''; }
            if (type === 'Max Price') { document.getElementById('maxPrice').value = ''; selectedFilters.maxPrice = ''; }
            if (type === 'Min Carat') { document.getElementById('minCarat').value = ''; selectedFilters.minCarat = ''; }
            if (type === 'Max Carat') { document.getElementById('maxCarat').value = ''; selectedFilters.maxCarat = ''; }
            if (type === 'Diamond Color') { selectedFilters.diamondColor = ''; }
            if (type === 'Diamond Clarity') { selectedFilters.diamondClarity = ''; }
            if (type === 'Diamond Cut') { selectedFilters.diamondCut = ''; }
            applyFilters();
        };
        
        window.applyFilters = function() {
            selectedFilters.minPrice = document.getElementById('minPrice')?.value || '';
            selectedFilters.maxPrice = document.getElementById('maxPrice')?.value || '';
            selectedFilters.minCarat = document.getElementById('minCarat')?.value || '';
            selectedFilters.maxCarat = document.getElementById('maxCarat')?.value || '';
            
            let filtered = [...allProducts];
            
            if (selectedFilters.sources.length) {
                filtered = filtered.filter(p => selectedFilters.sources.includes(p.source));
            }
            if (selectedFilters.categories.length) {
                filtered = filtered.filter(p => selectedFilters.categories.includes(p.category));
            }
            
            const minPrice = parseFloat(selectedFilters.minPrice);
            const maxPrice = parseFloat(selectedFilters.maxPrice);
            if (minPrice) filtered = filtered.filter(p => p.price >= minPrice);
            if (maxPrice) filtered = filtered.filter(p => p.price <= maxPrice);
            
            const minCarat = parseFloat(selectedFilters.minCarat);
            const maxCarat = parseFloat(selectedFilters.maxCarat);
            if (minCarat) filtered = filtered.filter(p => (p.carat || 0) >= minCarat);
            if (maxCarat) filtered = filtered.filter(p => (p.carat || 0) <= maxCarat);
            
            if (selectedFilters.diamondColor) {
                filtered = filtered.filter(p => p.diamond_color === selectedFilters.diamondColor);
            }
            if (selectedFilters.diamondClarity) {
                filtered = filtered.filter(p => p.diamond_clarity === selectedFilters.diamondClarity);
            }
            if (selectedFilters.diamondCut) {
                filtered = filtered.filter(p => p.diamond_cut === selectedFilters.diamondCut);
            }
            
            const sortBy = document.getElementById('sortSelect')?.value || 'default';
            if (sortBy === 'price_asc') filtered.sort((a, b) => a.price - b.price);
            if (sortBy === 'price_desc') filtered.sort((a, b) => b.price - a.price);
            if (sortBy === 'carat_asc') filtered.sort((a, b) => (a.carat || 0) - (b.carat || 0));
            if (sortBy === 'carat_desc') filtered.sort((a, b) => (b.carat || 0) - (a.carat || 0));
            
            filteredProducts = filtered;
            currentDisplayCount = 30;
            
            if (currentView === 'list') {
                renderListView(filteredProducts.slice(0, currentDisplayCount));
            } else {
                renderGridView(filteredProducts.slice(0, currentDisplayCount));
            }
            
            updateActiveFiltersDisplay();
            document.getElementById('productsCount').innerHTML = `Showing ${Math.min(currentDisplayCount, filteredProducts.length)} of ${filteredProducts.length} products`;
            document.getElementById('loadMoreContainer').style.display = filteredProducts.length > currentDisplayCount ? 'block' : 'none';
        };
        
        window.loadMoreProducts = function() {
            currentDisplayCount += 30;
            if (currentView === 'list') {
                renderListView(filteredProducts.slice(0, currentDisplayCount));
            } else {
                renderGridView(filteredProducts.slice(0, currentDisplayCount));
            }
            document.getElementById('productsCount').innerHTML = `Showing ${Math.min(currentDisplayCount, filteredProducts.length)} of ${filteredProducts.length} products`;
            document.getElementById('loadMoreContainer').style.display = filteredProducts.length > currentDisplayCount ? 'block' : 'none';
        };
        
        window.resetFilters = function() {
            selectedFilters = { 
                sources: [], categories: [], minPrice: '', maxPrice: '',
                minCarat: '', maxCarat: '', diamondColor: '', diamondClarity: '', diamondCut: ''
            };
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            document.getElementById('minCarat').value = '';
            document.getElementById('maxCarat').value = '';
            document.getElementById('sortSelect').value = 'default';
            applyFilters();
        };
        
        // ========== LIST VIEW RENDER ==========
        function renderListView(products) {
            const container = document.getElementById('productsContainer');
            if (!products.length) {
                container.innerHTML = '<div class="empty-state">✨ No products match your filters</div>';
                return;
            }
            
            let html = '';
            for (let idx = 0; idx < products.length; idx++) {
                const p = products[idx];
                const media = getProductMedia(p);
                const galleryHtml = createGalleryHTML(p, media, `${p.id}-${idx}`);
                const gstPercent = p.gst || 18;
                const { total } = calculateGST(p.price || 0, gstPercent);
                const badge = p.source === 'vendor' 
                    ? '<div class="vendor-badge-list"><i class="fas fa-store"></i> Artisan</div>' 
                    : '<div class="main-badge-list"><i class="fas fa-crown"></i> Style Of Life</div>';
                
                const hasDiamond = p.carat || p.diamond_color || p.diamond_clarity;
                
                html += `
                    <div class="list-product-card">
                        <div class="list-image-container">
                            ${badge}
                            ${galleryHtml}
                        </div>
                        <div class="list-product-info">
                            <div>
                                <div class="list-product-name">${escapeHtml(p.product_name)}</div>
                                <div class="list-product-sku">${p.sku} | ${p.category || 'Jewelry'}</div>
                                ${hasDiamond ? `
                                <div class="list-diamond-details">
                                    ${p.carat ? `<div class="list-diamond-item"><strong>Carat:</strong> ${p.carat}ct</div>` : ''}
                                    ${p.diamond_color ? `<div class="list-diamond-item"><strong>Color:</strong> ${p.diamond_color}</div>` : ''}
                                    ${p.diamond_clarity ? `<div class="list-diamond-item"><strong>Clarity:</strong> ${p.diamond_clarity}</div>` : ''}
                                </div>
                                ` : ''}
                                <div class="list-product-desc">${escapeHtml((p.description || '').substring(0, 120))}</div>
                            </div>
                            <div>
                                <div class="list-price-section">
                                    <div class="list-product-price">₹${total.toLocaleString()} <small>Incl. GST</small></div>
                                </div>
                                <div class="list-buttons" onclick="event.stopPropagation()">
                                    <button class="list-btn-buy" onclick="event.stopPropagation(); buyNow('${p.id}', '${escapeHtml(p.product_name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${media[0]?.url || ''}', ${gstPercent})"><i class="fas fa-bolt"></i> Buy Now</button>
                                    <button class="list-btn-cart" onclick="event.stopPropagation(); addToCart('${p.id}', '${escapeHtml(p.product_name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${media[0]?.url || ''}', ${gstPercent})"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            // Setup gallery listeners
            for (let idx = 0; idx < products.length; idx++) {
                const p = products[idx];
                const media = getProductMedia(p);
                if (media.length > 1) {
                    setupGalleryListeners(`gallery-${p.id}-${idx}`, media.length);
                }
            }
        }
        
        // ========== GRID VIEW RENDER ==========
        function renderGridView(products) {
            const container = document.getElementById('productsContainer');
            if (!products.length) {
                container.innerHTML = '<div class="empty-state">✨ No products match your filters</div>';
                return;
            }
            
            let html = '<div class="products-grid grid-view">';
            for (let idx = 0; idx < products.length; idx++) {
                const p = products[idx];
                const media = getProductMedia(p);
                const galleryHtml = createGalleryHTML(p, media, `${p.id}-${idx}`);
                const gstPercent = p.gst || 18;
                const { total } = calculateGST(p.price || 0, gstPercent);
                const badge = p.source === 'vendor' 
                    ? '<div class="vendor-badge"><i class="fas fa-store"></i> Artisan</div>' 
                    : '<div class="main-badge"><i class="fas fa-crown"></i> Style Of Life</div>';
                
                const hasDiamond = p.carat || p.diamond_color || p.diamond_clarity;
                let diamondHtml = '';
                if (hasDiamond) {
                    diamondHtml = `<div class="diamond-details">
                        ${p.carat ? `<div class="diamond-detail-item"><div class="diamond-detail-label">Carat</div><div class="diamond-detail-value">${p.carat}ct</div></div>` : ''}
                        ${p.diamond_color ? `<div class="diamond-detail-item"><div class="diamond-detail-label">Color</div><div class="diamond-detail-value">${p.diamond_color}</div></div>` : ''}
                        ${p.diamond_clarity ? `<div class="diamond-detail-item"><div class="diamond-detail-label">Clarity</div><div class="diamond-detail-value">${p.diamond_clarity}</div></div>` : ''}
                    </div>`;
                }
                
                html += `<div class="product-card">
                    <div class="product-image-container">
                        ${badge}
                        ${galleryHtml}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.product_name)}</div>
                        <div class="product-sku">${p.sku} | ${p.category || 'Jewelry'}</div>
                        ${diamondHtml}
                        <div class="product-desc">${escapeHtml((p.description || '').substring(0, 80))}</div>
                        <div class="product-price">₹${total.toLocaleString()} <small>Incl. GST</small></div>
                        <div class="product-buttons-icon" onclick="event.stopPropagation()">
                            <button class="btn-icon-buy" onclick="event.stopPropagation(); buyNow('${p.id}', '${escapeHtml(p.product_name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${media[0]?.url || ''}', ${gstPercent})"><i class="fas fa-bolt"></i></button>
                            <button class="btn-icon-cart" onclick="event.stopPropagation(); addToCart('${p.id}', '${escapeHtml(p.product_name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${media[0]?.url || ''}', ${gstPercent})"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
            
            // Setup gallery listeners
            for (let idx = 0; idx < products.length; idx++) {
                const p = products[idx];
                const media = getProductMedia(p);
                if (media.length > 1) {
                    setupGalleryListeners(`gallery-${p.id}-${idx}`, media.length);
                }
            }
        }
        
        function openFilterModal() { document.getElementById('filterModal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        window.closeFilterModal = function() { document.getElementById('filterModal').classList.remove('active'); document.body.style.overflow = ''; };
        document.getElementById('floatingFilterBtn')?.addEventListener('click', openFilterModal);
        document.getElementById('filterModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('filterModal')) closeFilterModal(); });
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        // Initialize
        updateCartPreview();
        setupSwipeDownToClose();
        loadAllProducts();
    </script>
</body>
</html>
