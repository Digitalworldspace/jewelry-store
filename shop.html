<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shop - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --primary-light: #f5e6c6;
            --dark: #1a1a1a;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --white: #ffffff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ff9800;
        }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; padding-bottom: 70px; }
        
        header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo { font-size: 20px; font-weight: 600; color: var(--primary); font-family: 'Playfair Display', serif; text-decoration: none; }
        
        .filter-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 60px;
            z-index: 99;
        }
        .filter-chip {
            padding: 6px 16px;
            background: var(--gray-200);
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .filter-chip.active { background: var(--primary); color: var(--dark); font-weight: 600; }
        
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            cursor: pointer;
            transition: all 0.3s;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: var(--primary); }
        .product-image { width: 100%; height: 160px; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .product-price { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .product-buttons { display: flex; gap: 8px; }
        .cart-btn, .buy-btn {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .cart-btn { background: white; border: 1px solid var(--primary); color: var(--primary); }
        .buy-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--dark); }
        
        /* Product Modal */
        .product-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .product-modal.show { display: flex; }
        
        .modal-container {
            background: white;
            border-radius: 28px;
            max-width: 90%;
            width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            font-size: 20px;
        }
        
        .modal-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f5f5f5;
        }
        
        .modal-info { padding: 20px; }
        .modal-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .modal-sku { font-size: 12px; color: var(--gray-600); margin-bottom: 10px; }
        .modal-category {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 12px;
        }
        .modal-price { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        .modal-desc {
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.5;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--gray-200);
        }
        .modal-stock {
            font-size: 13px;
            padding: 10px;
            border-radius: 12px;
            background: var(--gray-100);
            margin-bottom: 20px;
        }
        .stock-in { color: var(--success); }
        .stock-low { color: var(--warning); }
        .stock-out { color: var(--danger); }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        .modal-buy, .modal-cart {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .modal-buy { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--dark); }
        .modal-cart { background: white; border: 1px solid var(--primary); color: var(--primary); }
        .modal-wishlist {
            background: white;
            border: 1px solid var(--gray-200);
            width: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-wishlist.active { color: var(--danger); border-color: var(--danger); }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 12px;
            animation: fadeUp 0.3s ease;
        }
        .toast-success { background: #28a745; }
        .toast-error { background: #dc3545; }
        .toast-info { background: #ff9800; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
        
        @media (min-width: 768px) {
            .products { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px; }
            .product-image { height: 220px; }
            .modal-container { width: 500px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">STYLE·OF·LIFE</a>
        <a href="cart.html"><i class="fas fa-shopping-bag" style="font-size: 20px;"></i></a>
    </header>
    
    <div class="filter-bar" id="filterBar"></div>
    <div class="products" id="products"></div>
    
    <!-- Product Modal -->
    <div id="productModal" class="product-modal">
        <div class="modal-container">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <img id="modalImg" class="modal-image" src="" alt="">
            <div class="modal-info">
                <div class="modal-name" id="modalName"></div>
                <div class="modal-sku" id="modalSku"></div>
                <div class="modal-category" id="modalCategory"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div class="modal-stock" id="modalStock"></div>
                <div class="modal-buttons">
                    <button class="modal-buy" id="modalBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                    <button class="modal-cart" id="modalCartBtn"><i class="fas fa-cart-plus"></i> Cart</button>
                    <button class="modal-wishlist" id="modalWishlistBtn"><i class="far fa-heart"></i></button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html" class="active"><i class="fas fa-search"></i><span>Shop</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        let sessionId = localStorage.getItem('sessionId');
        let allProducts = [];
        let currentUser = null;
        let currentProduct = null;
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Get current user
        async function getCurrentUser() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            return currentUser;
        }
        
        // Add to cart
        async function addToCart(id, name, price, sku, img) {
            const { data: product } = await supabase.from('products').select('stock').eq('id', id).single();
            if (product?.stock <= 0) {
                showToast(`${name} out of stock!`, 'error');
                return false;
            }
            
            let { data: cartData } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            let items = cartData?.items || [];
            const existing = items.find(i => i.id === id);
            if (existing) existing.quantity += 1;
            else items.push({ id, sku, name, price, quantity: 1, image: img });
            const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
            await supabase.from('carts').upsert({ session_id: sessionId, items, total, updated_at: new Date() }, { onConflict: 'session_id' });
            showToast(`${name} added to cart!`, 'success');
            return true;
        }
        
        // Buy now
        async function buyNow(id, name, price, sku, img) {
            const added = await addToCart(id, name, price, sku, img);
            if (added) setTimeout(() => window.location.href = 'checkout.html', 500);
        }
        
        // Add to wishlist (with login check)
        async function addToWishlist(productId) {
            if (!currentUser) {
                showToast('Please login to add to wishlist', 'info');
                setTimeout(() => {
                    window.location.href = 'customer-portal.html';
                }, 1500);
                return false;
            }
            
            const { data: existing } = await supabase
                .from('wishlist')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('product_id', productId)
                .maybeSingle();
            
            if (existing) {
                showToast('Product already in wishlist', 'info');
                return false;
            }
            
            const { error } = await supabase
                .from('wishlist')
                .insert({ user_id: currentUser.id, product_id: productId });
            
            if (error) {
                showToast('Failed to add to wishlist', 'error');
                return false;
            }
            
            showToast('Added to wishlist! ❤️', 'success');
            return true;
        }
        
        // Remove from wishlist
        async function removeFromWishlist(productId) {
            if (!currentUser) return false;
            
            const { error } = await supabase
                .from('wishlist')
                .delete()
                .eq('user_id', currentUser.id)
                .eq('product_id', productId);
            
            if (!error) {
                showToast('Removed from wishlist', 'success');
                return true;
            }
            return false;
        }
        
        // Check if in wishlist
        async function isInWishlist(productId) {
            if (!currentUser) return false;
            const { data } = await supabase
                .from('wishlist')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('product_id', productId)
                .maybeSingle();
            return !!data;
        }
        
        // Open modal
        window.openModal = async function(product) {
            currentProduct = product;
            
            const img = product.images?.[0] || 'https://via.placeholder.com/400x400';
            document.getElementById('modalImg').src = img;
            document.getElementById('modalName').textContent = product.name;
            document.getElementById('modalSku').textContent = `SKU: ${product.sku}`;
            document.getElementById('modalCategory').textContent = product.category || 'Jewelry';
            document.getElementById('modalPrice').textContent = `₹${product.price.toLocaleString()}`;
            document.getElementById('modalDesc').textContent = product.description || 'Exquisite handcrafted jewelry piece.';
            
            const stockDiv = document.getElementById('modalStock');
            if (product.stock <= 0) {
                stockDiv.innerHTML = '❌ Out of Stock';
                stockDiv.className = 'modal-stock stock-out';
            } else if (product.stock < 10) {
                stockDiv.innerHTML = `⚠️ Only ${product.stock} left!`;
                stockDiv.className = 'modal-stock stock-low';
            } else {
                stockDiv.innerHTML = `✅ In Stock (${product.stock})`;
                stockDiv.className = 'modal-stock stock-in';
            }
            
            const buyBtn = document.getElementById('modalBuyBtn');
            const cartBtn = document.getElementById('modalCartBtn');
            const wishlistBtn = document.getElementById('modalWishlistBtn');
            
            const canAdd = product.stock > 0;
            buyBtn.disabled = !canAdd;
            cartBtn.disabled = !canAdd;
            
            buyBtn.onclick = () => {
                if (canAdd) buyNow(product.id, product.name, product.price, product.sku, img);
            };
            
            cartBtn.onclick = () => {
                if (canAdd) addToCart(product.id, product.name, product.price, product.sku, img);
            };
            
            // Setup wishlist button
            const inWishlist = await isInWishlist(product.id);
            if (inWishlist) {
                wishlistBtn.innerHTML = '<i class="fas fa-heart"></i>';
                wishlistBtn.classList.add('active');
                wishlistBtn.onclick = async () => {
                    await removeFromWishlist(product.id);
                    wishlistBtn.innerHTML = '<i class="far fa-heart"></i>';
                    wishlistBtn.classList.remove('active');
                    // Re-attach add handler
                    wishlistBtn.onclick = async () => {
                        const added = await addToWishlist(product.id);
                        if (added) {
                            wishlistBtn.innerHTML = '<i class="fas fa-heart"></i>';
                            wishlistBtn.classList.add('active');
                        }
                    };
                };
            } else {
                wishlistBtn.innerHTML = '<i class="far fa-heart"></i>';
                wishlistBtn.classList.remove('active');
                wishlistBtn.onclick = async () => {
                    const added = await addToWishlist(product.id);
                    if (added) {
                        wishlistBtn.innerHTML = '<i class="fas fa-heart"></i>';
                        wishlistBtn.classList.add('active');
                        // Change to remove handler
                        wishlistBtn.onclick = async () => {
                            await removeFromWishlist(product.id);
                            wishlistBtn.innerHTML = '<i class="far fa-heart"></i>';
                            wishlistBtn.classList.remove('active');
                        };
                    }
                };
            }
            
            document.getElementById('productModal').classList.add('show');
        };
        
        window.closeModal = function() {
            document.getElementById('productModal').classList.remove('show');
        };
        
        // Load products
        async function loadProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            const { data, error } = await supabase.from('products').select('*').order('id');
            if (error) {
                container.innerHTML = '<div class="loading">Error loading products</div>';
                return;
            }
            
            allProducts = data || [];
            
            // Build categories
            const categories = ['all', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
            document.getElementById('filterBar').innerHTML = categories.map(cat => 
                `<span class="filter-chip ${cat === 'all' ? 'active' : ''}" data-cat="${cat}">${cat === 'all' ? '✨ All' : cat}</span>`
            ).join('');
            
            // Add filter click handlers
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    const cat = chip.dataset.cat;
                    renderProducts(cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat));
                });
            });
            
            renderProducts(allProducts);
        }
        
        function renderProducts(products) {
            const container = document.getElementById('products');
            if (!products.length) {
                container.innerHTML = '<div class="loading">No products found</div>';
                return;
            }
            
            let html = '';
            for (const p of products) {
                const img = p.images?.[0] || 'https://via.placeholder.com/300x160';
                html += `
                    <div class="product-card">
                        <img class="product-image" src="${img}" onerror="this.src='https://via.placeholder.com/300x160'">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">₹${(p.price || 0).toLocaleString()}</div>
                            <div class="product-buttons">
                                <button class="cart-btn" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}" data-sku="${p.sku}" data-img="${img}">🛒 Cart</button>
                                <button class="buy-btn" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}" data-sku="${p.sku}" data-img="${img}">⚡ Buy</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            // Add event listeners to buttons
            document.querySelectorAll('.cart-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const name = btn.dataset.name;
                    const price = parseFloat(btn.dataset.price);
                    const sku = btn.dataset.sku;
                    const img = btn.dataset.img;
                    addToCart(id, name, price, sku, img);
                });
            });
            
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const name = btn.dataset.name;
                    const price = parseFloat(btn.dataset.price);
                    const sku = btn.dataset.sku;
                    const img = btn.dataset.img;
                    buyNow(id, name, price, sku, img);
                });
            });
            
            // Add click on card to open modal
            document.querySelectorAll('.product-card').forEach((card, index) => {
                card.addEventListener('click', () => {
                    const product = products[index];
                    openModal(product);
                });
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        // Close modal on outside click
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Initialize
        await getCurrentUser();
        await loadProducts();
    </script>
</body>
</html>
