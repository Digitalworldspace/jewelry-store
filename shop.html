<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Of Life - Shop | Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <style>
        /* Same styles as home.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            padding-bottom: 70px;
        }
        .products-section { padding: 20px 15px; }
        .section-title h3 {
            font-size: 18px;
            font-weight: 600;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .section-title h3::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .product-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .product-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .product-gallery {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow-x: auto;
            display: flex;
            scroll-snap-type: x mandatory;
        }
        .gallery-image {
            min-width: 100%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
        }
        .gallery-dots {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .gallery-dot.active {
            width: 20px;
            border-radius: 3px;
            background: var(--gold);
        }
        .product-item-info { padding: 15px; }
        .product-item-name { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        .product-item-sku { font-size: 11px; color: #999; margin-bottom: 10px; }
        .product-item-price { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 15px; }
        .product-item-buttons { display: flex; gap: 12px; }
        .product-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .product-cart-btn {
            background: var(--white-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid #e9ecef;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 25px; padding: 20px; }
        }
        
        /* Product Detail Modal */
        .product-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .product-detail-modal.active { display: flex; }
        .product-detail-content {
            background: white;
            border-radius: 24px;
            max-width: 90%;
            width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .product-detail-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            border: none;
        }
        .product-detail-image { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .product-detail-info { padding: 20px; }
        .product-detail-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .product-detail-price { font-size: 28px; font-weight: 700; color: var(--gold); margin: 15px 0; }
        .product-detail-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .product-detail-buy, .product-detail-cart {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .product-detail-buy {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
        }
        .product-detail-cart {
            background: white;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="products-section">
        <div class="section-title">
            <h3>All Products</h3>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
        </div>
    </div>
    
    <div id="productDetailModal" class="product-detail-modal">
        <div class="product-detail-content">
            <div class="product-detail-close" onclick="closeProductDetailModal()">&times;</div>
            <img id="detailImage" class="product-detail-image" src="" alt="Product detail">
            <div class="product-detail-info">
                <div class="product-detail-name" id="detailName"></div>
                <div class="product-detail-sku" id="detailSku"></div>
                <div class="product-detail-price" id="detailPrice"></div>
                <div class="product-detail-desc" id="detailDesc"></div>
                <div class="product-detail-buttons">
                    <button class="product-detail-buy" id="detailBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                    <button class="product-detail-cart" id="detailCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop" class="active"><i class="fas fa-search"></i><span>Shop</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="account"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        // URL Masking Navigation
        function navigateTo(page) {
            if (window.parent !== window) {
                window.parent.postMessage({ page: page }, '*');
            } else {
                window.location.href = page + '.html';
            }
        }
        
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.style.background = '#dc3545';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function addToCart(id, name, price, sku, img) {
            try {
                let { data: cartData, error: fetchError } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (fetchError) throw fetchError;
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                if (existing) { existing.quantity += 1; } 
                else { items.push({ id, sku, name, price, quantity: 1, image: img }); }
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                const { error: saveError } = await supabase.from('carts').upsert({ session_id: sessionId, items: items, total: total, updated_at: new Date().toISOString() }, { onConflict: 'session_id' });
                if (saveError) throw saveError;
                showToast(`${name} added to cart! ✨`);
                return true;
            } catch (error) { 
                showToast('Failed to add', true); 
                return false;
            }
        }
        
        window.buyNow = async (id, name, price, sku, img) => {
            const added = await addToCart(id, name, price, sku, img);
            if (added) {
                setTimeout(() => { navigateTo('checkout'); }, 500);
            }
        };
        
        window.addToCartGlobal = addToCart;
        
        function initGallery(galleryId, images, dotContainerId) {
            const gallery = document.getElementById(galleryId);
            const dotContainer = document.getElementById(dotContainerId);
            if (!gallery || !dotContainer) return;
            gallery.innerHTML = '';
            dotContainer.innerHTML = '';
            images.forEach((img, index) => {
                const imgElement = document.createElement('img');
                imgElement.src = img;
                imgElement.className = 'gallery-image';
                imgElement.alt = 'Product image';
                imgElement.onerror = () => { imgElement.src = 'https://via.placeholder.com/400x400?text=Image+Not+Available'; };
                gallery.appendChild(imgElement);
                const dot = document.createElement('div');
                dot.className = 'gallery-dot';
                if (index === 0) dot.classList.add('active');
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    gallery.scrollTo({ left: gallery.clientWidth * index, behavior: 'smooth' });
                });
                dotContainer.appendChild(dot);
            });
            gallery.addEventListener('scroll', () => {
                const scrollPos = gallery.scrollLeft;
                const itemWidth = gallery.clientWidth;
                const activeIndex = Math.round(scrollPos / itemWidth);
                const dots = dotContainer.querySelectorAll('.gallery-dot');
                dots.forEach((dot, idx) => {
                    if (idx === activeIndex) dot.classList.add('active');
                    else dot.classList.remove('active');
                });
            });
        }
        
        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
            
            try {
                const { data: products, error } = await supabase.from('products').select('*').order('id');
                if (error) throw error;
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="empty-state">✨ No products found</div>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const desc = p.description || 'Exquisite handcrafted jewelry piece.';
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    
                    html += `<div class="product-item">
                        <div class="product-gallery" id="${galleryId}"></div>
                        <div class="gallery-dots" id="${dotId}"></div>
                        <div class="product-item-info">
                            <div class="product-item-name">${escapeHtml(p.name)}</div>
                            <div class="product-item-sku">SKU: ${p.sku} | ${p.category || 'Jewelry'}</div>
                            <div class="product-item-desc">${escapeHtml(desc.substring(0, 120))}${desc.length > 120 ? '...' : ''}</div>
                            <div class="product-item-price">₹${(p.price || 0).toLocaleString()}</div>
                            <div class="product-item-buttons">
                                <button class="product-buy-btn" onclick="buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')"><i class="fas fa-bolt"></i> Buy Now</button>
                                <button class="product-cart-btn" onclick="addToCartGlobal(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${displayImages[0]}')"><i class="fas fa-shopping-cart"></i></button>
                                <button class="product-share-btn" onclick="openShareModal(${JSON.stringify(p)})"><i class="fas fa-share-alt"></i></button>
                            </div>
                        </div>
                    </div>`;
                }
                container.innerHTML = html;
                
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const images = p.images || [];
                    const validImages = images.filter(img => img && img.trim() !== '');
                    const displayImages = validImages.length > 0 ? validImages : ['https://via.placeholder.com/400x400?text=Style+Of+Life'];
                    const galleryId = `gallery-${p.id}`;
                    const dotId = `dots-${p.id}`;
                    setTimeout(() => initGallery(galleryId, displayImages, dotId), 50);
                }
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        window.openProductDetailModal = function(product) {
            const img = product.images?.[0] || 'https://via.placeholder.com/400x400?text=Style+Of+Life';
            document.getElementById('detailImage').src = img;
            document.getElementById('detailName').textContent = product.name;
            document.getElementById('detailSku').textContent = `SKU: ${product.sku}`;
            document.getElementById('detailPrice').textContent = `₹${(product.price || 0).toLocaleString()}`;
            document.getElementById('detailDesc').textContent = product.description || 'Exquisite handcrafted jewelry piece.';
            
            const buyBtn = document.getElementById('detailBuyBtn');
            const cartBtn = document.getElementById('detailCartBtn');
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, img);
            cartBtn.onclick = () => addToCartGlobal(product.id, product.name, product.price, product.sku, img);
            
            document.getElementById('productDetailModal').classList.add('active');
        };
        
        window.closeProductDetailModal = function() {
            document.getElementById('productDetailModal').classList.remove('active');
        };
        
        window.openShareModal = function(product) {
            const shareText = `Check out ${product.name} at Style Of Life! Price: ₹${(product.price || 0).toLocaleString()}`;
            navigator.clipboard.writeText(shareText);
            showToast('Product link copied! Share with friends ✨');
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        document.getElementById('productDetailModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeProductDetailModal();
        });
        
        loadProducts();
    </script>
</body>
</html>
