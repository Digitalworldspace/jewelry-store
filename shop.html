<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#d4af37">
    <title>Shop - Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --dark: #1a1a1a;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
        }
        body { font-family: 'Inter', sans-serif; background: #faf7f2; padding-bottom: 70px; }
        
        header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 600; color: var(--primary); font-family: 'Playfair Display', serif; text-decoration: none; }
        
        /* Filter Bar */
        .filter-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--gray-200);
        }
        .filter-chip {
            padding: 6px 16px;
            background: var(--gray-200);
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .filter-chip.active { background: var(--primary); color: var(--dark); }
        
        /* Products Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        .product-image { width: 100%; height: 160px; object-fit: cover; }
        .product-info { padding: 10px; }
        .product-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .product-price { font-size: 14px; font-weight: 700; color: var(--primary); }
        .add-btn {
            width: 100%;
            padding: 8px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
        }
        
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 15px;
            border-top: 1px solid var(--gray-200);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: var(--primary); }
        
        @media (min-width: 768px) {
            .products { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px; }
            .product-image { height: 220px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">STYLE·OF·LIFE</a>
        <a href="cart.html"><i class="fas fa-shopping-bag" style="font-size: 20px; color: var(--gray-600);"></i></a>
    </header>
    
    <div class="filter-bar" id="filterBar"></div>
    <div class="products" id="products"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
    
    <div class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html" class="active"><i class="fas fa-search"></i><span>Shop</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) { sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('sessionId', sessionId); }
        
        let allProducts = [];
        let currentCategory = 'all';
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#dc3545' : '#1a1a1a';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadProducts() {
            const { data, error } = await supabase.from('products').select('*').order('id');
            if (error) return;
            allProducts = data;
            loadCategories();
            renderProducts();
        }
        
        function loadCategories() {
            const categories = ['all', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = categories.map(cat => `<span class="filter-chip ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat === 'all' ? 'All' : cat}</span>`).join('');
        }
        
        window.filterByCategory = function(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        };
        
        function renderProducts() {
            const container = document.getElementById('products');
            let products = currentCategory === 'all' ? allProducts : allProducts.filter(p => p.category === currentCategory);
            if (!products.length) { container.innerHTML = '<div class="loading"><p>No products</p></div>'; return; }
            
            let html = '';
            products.forEach(p => {
                const img = p.images?.[0] || 'https://via.placeholder.com/300x160';
                html += `
                    <div class="product-card">
                        <img class="product-image" src="${img}" onerror="this.src='https://via.placeholder.com/300x160'">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">₹${(p.price || 0).toLocaleString()}</div>
                            <button class="add-btn" onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')">Add to Cart</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        window.addToCart = async function(id, name, price, sku, img) {
            const { data: product } = await supabase.from('products').select('stock').eq('id', id).single();
            if (product?.stock <= 0) { showToast(`${name} out of stock!`, true); return; }
            
            const { data: cartData } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            let items = cartData?.items || [];
            const existing = items.find(i => i.id === id);
            if (existing) { existing.quantity++; }
            else { items.push({ id, sku, name, price, quantity: 1, image: img }); }
            
            const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
            await supabase.from('carts').upsert({ session_id: sessionId, items, total, updated_at: new Date().toISOString() });
            showToast(`${name} added!`);
        };
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m))); }
        
        loadProducts();
    </script>
</body>
</html>
