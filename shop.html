    <title>Shop - Style Of Life | Buy Diamond Rings, Gold Necklaces & Jewelry Online</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
            --gray-light: #999999;
            --purple: #8b5cf6;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--white-light); color: var(--black); overflow-x: hidden; padding-bottom: 70px; }
        
        .shop-header {
            background: linear-gradient(135deg, var(--black) 0%, #1a1a2e 100%);
            padding: 60px 20px;
            text-align: center;
            color: white;
        }
        .shop-header h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 15px; }
        .shop-header h1 span { color: var(--gold); }
        
        .floating-cart {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(212,175,55,0.4);
        }
        .floating-cart i { font-size: 24px; color: var(--black); }
        .floating-cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--black);
            color: var(--gold);
            font-size: 11px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); text-decoration: none; font-size: 10px; cursor: pointer; }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--gold); }
        .product-image { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 18px; }
        .product-name { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        .product-price { font-size: 22px; font-weight: 700; color: var(--gold); margin: 10px 0; }
        .btn-icon-buy, .btn-icon-cart {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            margin-right: 10px;
        }
        .btn-icon-buy { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--black); }
        .btn-icon-cart { background: var(--white); border: 1.5px solid var(--gold); color: var(--gold); }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: black;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-weight: 700;
            animation: fadeUp 0.3s;
        }
        .toast-error { background: #dc3545; color: white; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .loading { text-align: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pixel-test-btn {
            position: fixed;
            bottom: 140px;
            right: 20px;
            background: #1877F2;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 12px;
            opacity: 0.7;
        }
        .pixel-test-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="shop-header">
        <h1>Our <span>Collection</span></h1>
        <p>Discover timeless masterpieces from Style Of Life and talented partner artisans.</p>
    </div>
    
    <div class="pixel-test-btn" onclick="testFacebookPixel()" title="Test Facebook Pixel">
        <i class="fab fa-facebook-f"></i>
    </div>
    
    <div class="floating-cart" id="floatingCartBtn"><i class="fas fa-shopping-bag"></i><span class="floating-cart-badge" id="cartCount">0</span></div>
    
    <div id="productsGrid" class="products-grid"><div class="loading"><div class="spinner"></div><p>Loading exquisite pieces...</p></div></div>
    
    <div class="bottom-nav">
        <a href="home.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html" class="active"><i class="fas fa-search"></i><span>Discover</span></a>
        <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Bag</span></a>
        <a href="track.html"><i class="fas fa-truck"></i><span>Track</span></a>
        <a href="customer-portal.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabaseUrl = "https://kkvgdagjboxhtuyqlomq.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrdmdkYWdqYm94aHR1eXFsb21xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzgyMTksImV4cCI6MjA5MDA1NDIxOX0.5A4UUcvwAi5UM8K81mmrN3lOTmzUYq70qRouaVqpwDA";
        
        const supabase = createClient(supabaseUrl, supabaseAnonKey);
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) { sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('sessionId', sessionId); }
        
        let currentCart = [];
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function navigateTo(page) { window.location.href = page + '.html'; }
        function showToast(msg, isErr = false) { const t = document.createElement('div'); t.className = 'toast' + (isErr ? ' toast-error' : ''); t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        
        async function updateCartCount() {
            const { data } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            const items = data?.items || []; currentCart = items;
            document.getElementById('cartCount').textContent = items.reduce((s, i) => s + i.quantity, 0);
            return items;
        }
        
        window.addToCart = async (id, name, price, sku, img, gst = 18) => {
            let { data: cart } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            let items = cart?.items || [];
            const existing = items.find(i => i.id === id);
            if (existing) existing.quantity++;
            else items.push({ id, sku, name, price, gst, quantity: 1, image: img });
            await supabase.from('carts').upsert({ session_id: sessionId, items, total: items.reduce((s, i) => s + (i.price * i.quantity), 0), updated_at: new Date() }, { onConflict: 'session_id' });
            
            // Facebook AddToCart Event
            if (typeof fbq !== 'undefined') {
                fbq('track', 'AddToCart', {
                    content_ids: [id],
                    content_name: name,
                    content_type: 'product',
                    value: price,
                    currency: 'INR'
                });
                console.log('✅ Facebook AddToCart Event Tracked:', name);
            }
            
            showToast(`✨ ${name} added to bag!`);
            updateCartCount();
        };
        
        window.buyNow = async (id, name, price, sku, img, gst) => {
            await addToCart(id, name, price, sku, img, gst);
            
            if (typeof fbq !== 'undefined') {
                fbq('track', 'InitiateCheckout');
                console.log('✅ Facebook InitiateCheckout Event Tracked');
            }
            
            setTimeout(() => navigateTo('checkout'), 600);
        };
        
        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading masterpieces...</p></div>';
            
            try {
                const [mainRes, vendorRes] = await Promise.all([
                    supabase.from('products').select('*'),
                    supabase.from('vendor_products').select('*').eq('status', 'approved')
                ]);
                
                const allProducts = [...(mainRes.data || []), ...(vendorRes.data || [])];
                
                if (!allProducts.length) {
                    container.innerHTML = '<div class="empty-state">✨ No products found</div>';
                    return;
                }
                
                let html = '';
                for (const p of allProducts) {
                    const img = p.image1_url || p.image2_url || p.image3_url || p.images_url_1 || 'https://via.placeholder.com/400x280?text=Style+Of+Life';
                    const gstPercent = p.gst || 18;
                    const total = p.price + ((p.price * gstPercent) / 100);
                    
                    html += `<div class="product-card" onclick='openProductModal(${JSON.stringify(p)})'>
                                <img class="product-image" src="${img}" alt="${escapeHtml(p.product_name || p.name)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x280'">
                                <div class="product-info">
                                    <div class="product-name">${escapeHtml(p.product_name || p.name)}</div>
                                    <div class="product-sku">${p.sku || 'LUX-' + p.id} | ${p.category || 'Jewelry'}</div>
                                    <div class="product-price">₹${total.toLocaleString()} <small>Incl. GST</small></div>
                                    <div>
                                        <button class="btn-icon-buy" onclick="event.stopPropagation(); buyNow('${p.id}', '${escapeHtml(p.product_name || p.name).replace(/'/g, "\\'")}', ${p.price || 0}, '${p.sku || ''}', '${img}', ${gstPercent})"><i class="fas fa-bolt"></i></button>
                                        <button class="btn-icon-cart" onclick="event.stopPropagation(); addToCart('${p.id}', '${escapeHtml(p.product_name || p.name).replace(/'/g, "\\'")}', ${p.price || 0}, '${p.sku || ''}', '${img}', ${gstPercent})"><i class="fas fa-shopping-cart"></i></button>
                                    </div>
                                </div>
                            </div>`;
                }
                container.innerHTML = html;
            } catch(e) {
                console.error(e);
                container.innerHTML = '<div class="empty-state">Error loading products</div>';
            }
        }
        
        window.openProductModal = function(product) {
            const gstPercent = product.gst || 18;
            const total = product.price + ((product.price * gstPercent) / 100);
            const img = product.image1_url || product.image2_url || product.image3_url || product.images_url_1 || 'https://via.placeholder.com/400';
            
            // Facebook ViewContent Event
            if (typeof fbq !== 'undefined') {
                fbq('track', 'ViewContent', {
                    content_ids: [product.id],
                    content_name: product.product_name || product.name,
                    content_category: product.category || 'Jewelry',
                    content_type: 'product',
                    value: product.price || 0,
                    currency: 'INR'
                });
                console.log('✅ Facebook ViewContent Event Tracked for:', product.product_name || product.name);
            }
            
            const modalHtml = `<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;display:flex;justify-content:center;align-items:center;" onclick="this.remove()">
                                <div style="background:white;border-radius:28px;max-width:90%;width:450px;max-height:85vh;overflow-y:auto;padding:20px;" onclick="event.stopPropagation()">
                                    <img src="${img}" style="width:100%; border-radius:16px; margin-bottom:15px;" onerror="this.src='https://via.placeholder.com/400'">
                                    <h2 style="font-size:22px;">${escapeHtml(product.product_name || product.name)}</h2>
                                    <div style="color:var(--gold);font-size:28px;font-weight:700;margin:10px 0;">₹${total.toLocaleString()}</div>
                                    <p style="color:var(--gray); margin-bottom:15px;">${escapeHtml(product.description || 'Exquisite handcrafted piece.')}</p>
                                    ${product.carat ? `<div style="background:var(--white-light); padding:10px; border-radius:12px; margin:10px 0;"><strong><i class="fas fa-gem"></i> Diamond:</strong> ${product.carat}ct | ${product.diamond_color || ''} | ${product.diamond_clarity || ''}</div>` : ''}
                                    <div style="display:flex;gap:12px;margin-top:20px;">
                                        <button class="btn-icon-buy" style="flex:1;border-radius:40px;" onclick="buyNow('${product.id}', '${escapeHtml(product.product_name || product.name).replace(/'/g, "\\'")}', ${product.price || 0}, '${product.sku || ''}', '${img}', ${gstPercent}); document.body.lastChild.remove();">Buy Now</button>
                                        <button class="btn-icon-cart" style="flex:1;border-radius:40px;" onclick="addToCart('${product.id}', '${escapeHtml(product.product_name || product.name).replace(/'/g, "\\'")}', ${product.price || 0}, '${product.sku || ''}', '${img}', ${gstPercent}); document.body.lastChild.remove();">Add to Cart</button>
                                    </div>
                                </div>
                            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        };
        
        window.testFacebookPixel = function() {
            if (typeof fbq !== 'undefined') {
                console.log('✅ Facebook Pixel is loaded!');
                fbq('track', 'CustomEvent', {event_name: 'PixelTest'});
                alert('✅ Facebook Pixel is working! Check Meta Events Manager for test event.');
            } else {
                console.log('❌ Facebook Pixel NOT loaded');
                alert('❌ Facebook Pixel is NOT loaded. Check your internet connection.');
            }
        };
        
        setTimeout(() => {
            if (typeof fbq !== 'undefined') {
                console.log('🎯 Facebook Pixel Status: LOADED - Pixel ID: 991714683377528');
                console.log('✅ PageView event already sent on page load');
            } else {
                console.log('❌ Facebook Pixel Status: NOT LOADED');
            }
        }, 2000);
        
        updateCartCount();
        loadProducts();
        
        console.log('🎯 Facebook Pixel Active - Events Tracked:');
        console.log('   - PageView (auto on load)');
        console.log('   - ViewContent (when product modal opens)');
        console.log('   - AddToCart (when add to cart button clicked)');
        console.log('   - InitiateCheckout (when buy now clicked)');
    </script>
</body>
</html>
