<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Shop - Style Of Life | Luxury Jewelry from Main Store & Artisans</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6B3;
            --gold-dark: #B8962E;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
            --gray-light: #999999;
            --purple: #8b5cf6;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--white-light); color: var(--black); overflow-x: hidden; padding-bottom: 70px; }
        .light-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 100%); }
        
        .gemini-logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Playfair Display', serif; padding: 12px 0; background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .gemini-star { width: 40px; height: 40px; animation: starPulse 2s ease-in-out infinite; }
        .gemini-star svg { width: 100%; height: 100%; }
        @keyframes starPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .gemini-text { font-size: 20px; font-weight: 700; color: var(--black); }
        .gemini-sub { font-size: 9px; letter-spacing: 2px; color: var(--gray); margin-left: 5px; }
        
        .shop-header { background: linear-gradient(135deg, var(--black) 0%, #1a1a2e 100%); padding: 60px 20px; text-align: center; color: white; }
        .shop-header h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 15px; }
        .shop-header h1 span { color: var(--gold); }
        .shop-header p { color: rgba(255,255,255,0.8); max-width: 600px; margin: 0 auto; }
        
        .floating-filter { position: fixed; bottom: 80px; left: 20px; width: 50px; height: 50px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(212,175,55,0.4); }
        .floating-filter:hover { transform: scale(1.1); }
        .floating-filter i { font-size: 22px; color: var(--black); }
        .filter-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 10px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; display: none; }
        
        .filter-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: flex-end; }
        .filter-modal.active { display: flex; }
        .filter-drawer { width: 85%; max-width: 350px; height: 100%; background: var(--white); box-shadow: -2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .filter-drawer-header { padding: 20px; background: var(--gold); color: var(--black); display: flex; justify-content: space-between; align-items: center; }
        .filter-drawer-header h3 { font-size: 18px; }
        .close-filter { background: none; border: none; font-size: 24px; cursor: pointer; }
        .filter-drawer-content { flex: 1; overflow-y: auto; padding: 15px; }
        .filter-drawer-footer { padding: 15px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; }
        .filter-drawer-footer button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .filters-section { background: white; border-radius: 16px; margin: 30px 20px; box-shadow: var(--shadow); overflow: hidden; display: none; }
        .filter-group { border-bottom: 1px solid var(--gray-200); }
        .filter-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; }
        .filter-header h4 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .filter-header i { color: var(--gold); }
        .filter-content { padding: 0 20px 15px 20px; display: none; }
        .filter-content.show { display: block; }
        .filter-options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .filter-option { background: var(--white-light); padding: 6px 14px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; }
        .filter-option:hover { border-color: var(--gold); }
        .filter-option.active { background: var(--gold); color: white; border-color: var(--gold); }
        
        .price-range { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .price-range input { flex: 1; padding: 10px; border: 1px solid var(--gray-200); border-radius: 8px; }
        
        .filter-actions { display: flex; gap: 10px; padding: 15px 20px; background: var(--white-light); }
        .btn-filter { background: var(--gold); color: black; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; }
        .btn-reset { background: var(--gray-600); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; }
        
        .active-filters { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; background: var(--white-light); border-top: 1px solid var(--gray-200); }
        .filter-tag { background: rgba(212,175,55,0.15); color: var(--gold); padding: 4px 10px; border-radius: 20px; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
        .filter-tag i { cursor: pointer; font-size: 10px; }
        
        .shop-layout { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .products-container { padding: 0 0 50px; }
        .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .products-count { color: var(--gray); font-size: 14px; }
        .sort-select { padding: 8px 15px; border: 1px solid var(--gray-200); border-radius: 8px; background: white; cursor: pointer; }
        .products-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        
        .product-card { background: var(--white); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); transition: all 0.4s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--gold); }
        
        .product-image-container { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background: #f5f5f5; }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .vendor-badge { position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, var(--purple), #6d28d9); color: white; font-size: 10px; padding: 4px 10px; border-radius: 20px; z-index: 5; display: flex; align-items: center; gap: 4px; }
        .main-badge { position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--black); font-size: 10px; padding: 4px 10px; border-radius: 20px; z-index: 5; display: flex; align-items: center; gap: 4px; }
        
        .product-info { padding: 18px; }
        .product-name { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        .product-sku { font-size: 11px; color: var(--gray-light); margin-bottom: 8px; }
        .product-desc { font-size: 13px; color: var(--gray); line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
        .product-price small { font-size: 11px; color: var(--gray); font-weight: normal; }
        
        .diamond-details { background: var(--white-light); border-radius: 12px; padding: 10px; margin: 10px 0; display: flex; flex-wrap: wrap; gap: 10px; }
        .diamond-detail-item { text-align: center; flex: 1; }
        .diamond-detail-label { font-size: 9px; color: var(--gray); text-transform: uppercase; }
        .diamond-detail-value { font-size: 12px; font-weight: 600; color: var(--gold); }
        
        .product-buttons-icon { display: flex; gap: 12px; margin-top: 12px; }
        .btn-icon-buy, .btn-icon-cart { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; border: none; font-size: 18px; }
        .btn-icon-buy { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--black); }
        .btn-icon-cart { background: var(--white); border: 1.5px solid var(--gold); color: var(--gold); }
        .btn-icon-buy:hover, .btn-icon-cart:hover { transform: translateY(-3px) scale(1.05); }
        
        .floating-cart { position: fixed; bottom: 80px; right: 20px; width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(212,175,55,0.4); }
        .floating-cart:hover { transform: scale(1.1); }
        .floating-cart i { font-size: 24px; color: var(--black); }
        .floating-cart-badge { position: absolute; top: -5px; right: -5px; background: var(--black); color: var(--gold); font-size: 11px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 20px 20px; border-top: 1px solid rgba(0,0,0,0.05); z-index: 100; }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); text-decoration: none; font-size: 10px; cursor: pointer; }
        .bottom-nav a i { font-size: 22px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: black; padding: 12px 24px; border-radius: 40px; z-index: 9999; font-weight: 700; animation: fadeUp 0.3s; }
        .toast-error { background: #dc3545; color: white; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .loading { text-align: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px; color: var(--gray); }
        
        .load-more-container { text-align: center; margin-top: 40px; }
        .load-more-btn { background: var(--gold); color: var(--black); padding: 12px 30px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
        
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) {
            .floating-filter { display: none; }
            .shop-layout { display: flex; gap: 30px; align-items: flex-start; }
            .filters-section { width: 300px; margin: 0; position: sticky; top: 20px; display: block !important; }
            .products-container { flex: 1; }
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 1023px) { .filters-section { display: none; } }
        @media (min-width: 1280px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <div class="light-bg"></div>
    
    <div class="gemini-logo" data-page="home">
        <div class="gemini-star"><svg viewBox="0 0 24 24"><defs><linearGradient id="gg"><stop offset="0%" stop-color="#4285F4"/><stop offset="33%" stop-color="#EA4335"/><stop offset="66%" stop-color="#FBBC05"/><stop offset="100%" stop-color="#34A853"/></linearGradient></defs><path d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" fill="white" stroke="url(#gg)" stroke-width="2"/></svg></div>
        <div><span class="gemini-text">Style Of Life</span><span class="gemini-sub">SHOP</span></div>
    </div>
    
    <div class="floating-filter" id="floatingFilterBtn"><i class="fas fa-sliders-h"></i><span class="filter-badge" id="filterBadge"></span></div>
    
    <div id="filterModal" class="filter-modal">
        <div class="filter-drawer">
            <div class="filter-drawer-header"><h3><i class="fas fa-sliders-h"></i> Filter Products</h3><button class="close-filter" onclick="closeFilterModal()">&times;</button></div>
            <div class="filter-drawer-content" id="mobileFilterContent"></div>
            <div class="filter-drawer-footer"><button class="btn-filter" onclick="applyFilters(); closeFilterModal();">Apply Filters</button><button class="btn-reset" onclick="resetFilters(); closeFilterModal();">Reset All</button></div>
        </div>
    </div>
    
    <div class="floating-cart" id="floatingCartBtn"><i class="fas fa-shopping-bag"></i><span class="floating-cart-badge" id="cartCount">0</span></div>
    
    <div class="shop-header">
        <h1>Our <span>Collection</span></h1>
        <p>Discover timeless masterpieces from Style Of Life and talented partner artisans.</p>
    </div>
    
    <div class="shop-layout">
        <div class="filters-section" id="desktopFilters"></div>
        
        <div class="products-container">
            <div class="products-header">
                <div class="products-count" id="productsCount">Loading products...</div>
                <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                    <option value="default">Sort by: Default</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                </select>
            </div>
            <div class="products-grid" id="productsGrid"><div class="loading"><div class="spinner"></div><p>Loading exquisite pieces...</p></div></div>
            <div class="load-more-container" id="loadMoreContainer" style="display: none;"><button class="load-more-btn" onclick="loadMoreProducts()">Load More Products</button></div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop" class="active"><i class="fas fa-search"></i><span>Discover</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Bag</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="customer-portal"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>
    
    <script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) { sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('sessionId', sessionId); }
        
        let allProducts = [];
        let filteredProducts = [];
        let currentDisplayCount = 30;
        
        let selectedFilters = { sources: [], categories: [], minPrice: '', maxPrice: '' };
        let availableCategories = [];
        
        function calculateGST(price, gstPercent) { const gst = (price * gstPercent) / 100; return { gstAmount: gst, total: price + gst }; }
        function navigateTo(page) { window.location.href = page + '.html'; }
        document.querySelectorAll('[data-page]').forEach(el => el.addEventListener('click', (e) => { e.preventDefault(); navigateTo(el.getAttribute('data-page')); }));
        
        function showToast(msg, isErr = false) { const t = document.createElement('div'); t.className = 'toast' + (isErr ? ' toast-error' : ''); t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        
        async function updateCartCount() {
            const { data } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            const items = data?.items || [];
            document.getElementById('cartCount').textContent = items.reduce((s, i) => s + i.quantity, 0);
        }
        
        window.addToCart = async (id, name, price, sku, img, gst = 18) => {
            let { data: cart } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
            let items = cart?.items || [];
            const existing = items.find(i => i.id === id);
            if (existing) existing.quantity++;
            else items.push({ id, sku, name, price, gst, quantity: 1, image: img });
            await supabase.from('carts').upsert({ session_id: sessionId, items, total: items.reduce((s, i) => s + (i.price * i.quantity), 0), updated_at: new Date() }, { onConflict: 'session_id' });
            showToast(`✨ ${name} added to bag!`);
            await updateCartCount();
        };
        
        window.buyNow = async (id, name, price, sku, img, gst) => { await addToCart(id, name, price, sku, img, gst); setTimeout(() => navigateTo('checkout'), 600); };
        
        // LOAD BOTH MAIN + APPROVED VENDOR PRODUCTS
        async function loadAllProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading exquisite pieces...</p></div>';
            try {
                const [mainRes, vendorRes] = await Promise.all([
                    supabase.from('products').select('*'),
                    supabase.from('vendor_products').select('*').eq('status', 'approved')
                ]);
                
                const mainProducts = mainRes.data || [];
                const vendorProducts = vendorRes.data || [];
                
                console.log(`✅ Shop loaded: ${mainProducts.length} main products, ${vendorProducts.length} approved vendor products`);
                
                const mainMarked = mainProducts.map(p => ({ ...p, source: 'main', product_name: p.product_name || p.name }));
                const vendorMarked = vendorProducts.map(p => ({ ...p, source: 'vendor', product_name: p.product_name }));
                
                allProducts = [...mainMarked, ...vendorMarked];
                
                // Extract categories
                const categorySet = new Set();
                allProducts.forEach(p => { if (p.category) categorySet.add(p.category); });
                availableCategories = Array.from(categorySet);
                
                buildFilterUI();
                applyFilters();
                
            } catch(e) { console.error(e); container.innerHTML = '<div class="empty-state">Error loading collection</div>'; }
        }
        
        function buildFilterUI() {
            const filterHtml = `
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('sourceFilter')">
                        <h4><i class="fas fa-store"></i> Source</h4>
                        <i class="fas fa-chevron-down" id="sourceFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="sourceFilter">
                        <div class="filter-options">
                            <div class="filter-option source-option" data-source="main" onclick="toggleSource('main')">🏛️ Main Store</div>
                            <div class="filter-option source-option" data-source="vendor" onclick="toggleSource('vendor')">🎨 Artisan</div>
                        </div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('categoryFilter')">
                        <h4><i class="fas fa-tags"></i> Category</h4>
                        <i class="fas fa-chevron-down" id="categoryFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="categoryFilter">
                        <div class="filter-options" id="categoryOptions">
                            ${availableCategories.map(cat => `<div class="filter-option category-option" data-cat="${cat}" onclick="toggleCategory('${cat}')">${cat}</div>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-header" onclick="toggleFilter('priceFilter')">
                        <h4><i class="fas fa-rupee-sign"></i> Price Range</h4>
                        <i class="fas fa-chevron-down" id="priceFilterIcon"></i>
                    </div>
                    <div class="filter-content" id="priceFilter">
                        <div class="price-range"><input type="number" id="minPrice" placeholder="Min ₹" value=""><span>-</span><input type="number" id="maxPrice" placeholder="Max ₹" value=""></div>
                    </div>
                </div>
                <div class="filter-actions"><button class="btn-filter" onclick="applyFilters()">Apply Filters</button><button class="btn-reset" onclick="resetFilters()">Reset All</button></div>
                <div id="activeFilters" class="active-filters"></div>
            `;
            document.getElementById('desktopFilters').innerHTML = filterHtml;
            document.getElementById('mobileFilterContent').innerHTML = filterHtml;
            attachFilterEvents();
        }
        
        function attachFilterEvents() {
            document.querySelectorAll('.source-option').forEach(el => {
                if (selectedFilters.sources.includes(el.getAttribute('data-source'))) el.classList.add('active');
            });
            document.querySelectorAll('.category-option').forEach(el => {
                if (selectedFilters.categories.includes(el.getAttribute('data-cat'))) el.classList.add('active');
            });
            document.getElementById('minPrice').value = selectedFilters.minPrice;
            document.getElementById('maxPrice').value = selectedFilters.maxPrice;
        }
        
        window.toggleFilter = function(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id + 'Icon');
            content.classList.toggle('show');
            icon.classList.toggle('rotated');
        };
        
        window.toggleSource = function(source) {
            const index = selectedFilters.sources.indexOf(source);
            if (index === -1) selectedFilters.sources.push(source);
            else selectedFilters.sources.splice(index, 1);
            updateSourceUI();
            applyFilters();
        };
        
        window.toggleCategory = function(category) {
            const index = selectedFilters.categories.indexOf(category);
            if (index === -1) selectedFilters.categories.push(category);
            else selectedFilters.categories.splice(index, 1);
            updateCategoryUI();
            applyFilters();
        };
        
        function updateSourceUI() {
            document.querySelectorAll('.source-option').forEach(el => {
                const src = el.getAttribute('data-source');
                if (selectedFilters.sources.includes(src)) el.classList.add('active');
                else el.classList.remove('active');
            });
        }
        
        function updateCategoryUI() {
            document.querySelectorAll('.category-option').forEach(el => {
                const cat = el.getAttribute('data-cat');
                if (selectedFilters.categories.includes(cat)) el.classList.add('active');
                else el.classList.remove('active');
            });
        }
        
        function updateActiveFiltersDisplay() {
            const container = document.getElementById('activeFilters');
            if (!container) return;
            const filters = [];
            if (selectedFilters.sources.length) filters.push(`Source: ${selectedFilters.sources.join(', ')}`);
            if (selectedFilters.categories.length) filters.push(`Category: ${selectedFilters.categories.join(', ')}`);
            if (selectedFilters.minPrice) filters.push(`Min: ₹${parseInt(selectedFilters.minPrice).toLocaleString()}`);
            if (selectedFilters.maxPrice) filters.push(`Max: ₹${parseInt(selectedFilters.maxPrice).toLocaleString()}`);
            if (filters.length === 0) container.innerHTML = '<span style="color:var(--gray); font-size:12px;">No active filters</span>';
            else container.innerHTML = filters.map(f => `<span class="filter-tag">${f} <i class="fas fa-times" onclick="removeFilterTag('${f.split(':')[0]}')"></i></span>`).join('');
            document.getElementById('filterBadge').style.display = filters.length ? 'flex' : 'none';
            if (filters.length) document.getElementById('filterBadge').textContent = filters.length;
        }
        
        window.removeFilterTag = function(type) {
            if (type === 'Source') selectedFilters.sources = [];
            if (type === 'Category') selectedFilters.categories = [];
            if (type === 'Min') { document.getElementById('minPrice').value = ''; selectedFilters.minPrice = ''; }
            if (type === 'Max') { document.getElementById('maxPrice').value = ''; selectedFilters.maxPrice = ''; }
            updateSourceUI(); updateCategoryUI(); applyFilters();
        };
        
        window.applyFilters = function() {
            selectedFilters.minPrice = document.getElementById('minPrice')?.value || '';
            selectedFilters.maxPrice = document.getElementById('maxPrice')?.value || '';
            
            let filtered = [...allProducts];
            
            if (selectedFilters.sources.length) {
                filtered = filtered.filter(p => selectedFilters.sources.includes(p.source));
            }
            if (selectedFilters.categories.length) {
                filtered = filtered.filter(p => selectedFilters.categories.includes(p.category));
            }
            const minPrice = parseFloat(selectedFilters.minPrice);
            const maxPrice = parseFloat(selectedFilters.maxPrice);
            if (minPrice) filtered = filtered.filter(p => p.price >= minPrice);
            if (maxPrice) filtered = filtered.filter(p => p.price <= maxPrice);
            
            const sortBy = document.getElementById('sortSelect')?.value || 'default';
            if (sortBy === 'price_asc') filtered.sort((a, b) => a.price - b.price);
            if (sortBy === 'price_desc') filtered.sort((a, b) => b.price - a.price);
            
            filteredProducts = filtered;
            currentDisplayCount = 30;
            renderProducts();
            updateActiveFiltersDisplay();
            document.getElementById('productsCount').innerHTML = `Showing ${Math.min(currentDisplayCount, filteredProducts.length)} of ${filteredProducts.length} products`;
            document.getElementById('loadMoreContainer').style.display = filteredProducts.length > currentDisplayCount ? 'block' : 'none';
        };
        
        window.loadMoreProducts = function() {
            currentDisplayCount += 30;
            renderProducts();
            document.getElementById('productsCount').innerHTML = `Showing ${Math.min(currentDisplayCount, filteredProducts.length)} of ${filteredProducts.length} products`;
            document.getElementById('loadMoreContainer').style.display = filteredProducts.length > currentDisplayCount ? 'block' : 'none';
        };
        
        window.resetFilters = function() {
            selectedFilters = { sources: [], categories: [], minPrice: '', maxPrice: '' };
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            document.getElementById('sortSelect').value = 'default';
            updateSourceUI(); updateCategoryUI();
            applyFilters();
        };
        
        function renderProducts() {
            const container = document.getElementById('productsGrid');
            const productsToShow = filteredProducts.slice(0, currentDisplayCount);
            if (!productsToShow.length) { container.innerHTML = '<div class="empty-state">✨ No products match your filters</div>'; return; }
            
            let html = '';
            for (const p of productsToShow) {
                const img = p.images_url_1 || p.image1_url || p.images_url_2 || p.image2_url || p.images_url_3 || p.image3_url || p.video_url || 'https://via.placeholder.com/400x400?text=Style';
                const gstPercent = p.gst || 18;
                const { total } = calculateGST(p.price || 0, gstPercent);
                const badge = p.source === 'vendor' 
                    ? '<div class="vendor-badge"><i class="fas fa-store"></i> Artisan</div>' 
                    : '<div class="main-badge"><i class="fas fa-crown"></i> Style Of Life</div>';
                
                const hasDiamond = p.carat || p.diamond_color || p.diamond_clarity;
                let diamondHtml = '';
                if (hasDiamond) {
                    diamondHtml = `<div class="diamond-details">
                        ${p.carat ? `<div class="diamond-detail-item"><div class="diamond-detail-label">Carat</div><div class="diamond-detail-value">${p.carat}ct</div></div>` : ''}
                        ${p.diamond_color ? `<div class="diamond-detail-item"><div class="diamond-detail-label">Color</div><div class="diamond-detail-value">${p.diamond_color}</div></div>` : ''}
                        ${p.diamond_clarity ? `<div class="diamond-detail-item"><div class="diamond-detail-label">Clarity</div><div class="diamond-detail-value">${p.diamond_clarity}</div></div>` : ''}
                    </div>`;
                }
                
                html += `<div class="product-card" onclick='openProductModal(${JSON.stringify(p)})'>
                    <div class="product-image-container">
                        ${badge}
                        <img class="product-image" src="${img}" alt="${escapeHtml(p.product_name)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400'">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.product_name)}</div>
                        <div class="product-sku">${p.sku} | ${p.category || 'Jewelry'}</div>
                        ${diamondHtml}
                        <div class="product-desc">${escapeHtml((p.description || '').substring(0, 80))}</div>
                        <div class="product-price">₹${total.toLocaleString()} <small>Incl. GST</small></div>
                        <div class="product-buttons-icon" onclick="event.stopPropagation()">
                            <button class="btn-icon-buy" onclick="event.stopPropagation(); buyNow('${p.id}', '${escapeHtml(p.product_name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}', ${gstPercent})"><i class="fas fa-bolt"></i></button>
                            <button class="btn-icon-cart" onclick="event.stopPropagation(); addToCart('${p.id}', '${escapeHtml(p.product_name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}', ${gstPercent})"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }
        
        window.openProductModal = function(product) {
            const img = product.images_url_1 || product.image1_url || 'https://via.placeholder.com/400';
            const { total } = calculateGST(product.price || 0, product.gst || 18);
            const modalHtml = `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;display:flex;justify-content:center;align-items:center;" onclick="this.remove()">
                    <div style="background:white;border-radius:28px;max-width:90%;width:400px;max-height:85vh;overflow-y:auto;padding:20px;" onclick="event.stopPropagation()">
                        <img src="${img}" style="width:100%;border-radius:16px;margin-bottom:15px;">
                        <h2 style="font-size:22px;">${escapeHtml(product.product_name)}</h2>
                        <div style="color:var(--gold);font-size:28px;font-weight:700;margin:10px 0;">₹${total.toLocaleString()}</div>
                        <p>${escapeHtml(product.description || 'Exquisite handcrafted piece.')}</p>
                        <div style="display:flex;gap:12px;margin-top:20px;">
                            <button class="btn-icon-buy" style="flex:1;border-radius:40px;" onclick="buyNow('${product.id}', '${escapeHtml(product.product_name).replace(/'/g, "\\'")}', ${product.price}, '${product.sku}', '${img}', ${product.gst || 18}); document.body.lastChild.remove();">Buy Now</button>
                            <button class="btn-icon-cart" style="flex:1;border-radius:40px;" onclick="addToCart('${product.id}', '${escapeHtml(product.product_name).replace(/'/g, "\\'")}', ${product.price}, '${product.sku}', '${img}', ${product.gst || 18}); document.body.lastChild.remove();">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        };
        
        function openFilterModal() { document.getElementById('filterModal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        window.closeFilterModal = function() { document.getElementById('filterModal').classList.remove('active'); document.body.style.overflow = ''; };
        document.getElementById('floatingFilterBtn')?.addEventListener('click', openFilterModal);
        document.getElementById('filterModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('filterModal')) closeFilterModal(); });
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        updateCartCount();
        loadAllProducts();
    </script>
</body>
</html>
