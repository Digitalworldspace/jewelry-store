<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Style Of Life - Shop | Luxury Jewelry Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8962E;
            --gold-light: #F5E6B3;
            --white: #FFFFFF;
            --white-light: #F8F9FA;
            --black: #1A1A1A;
            --gray: #666666;
            --gray-light: #999999;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--white-light);
            color: var(--black);
            padding-bottom: 70px;
        }
        
        /* Header */
        .shop-header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--black);
            cursor: pointer;
        }
        
        .logo-gold {
            color: var(--gold);
            font-weight: 900;
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .header-icons a {
            color: var(--black);
            font-size: 20px;
            text-decoration: none;
            position: relative;
            cursor: pointer;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        /* Filter Bar */
        .filter-bar {
            background: var(--white);
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 60px;
            z-index: 99;
            scrollbar-width: none;
        }
        
        .filter-bar::-webkit-scrollbar {
            display: none;
        }
        
        .filter-chip {
            padding: 8px 20px;
            background: var(--white-light);
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .filter-chip.active {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }
        
        .filter-chip:hover {
            background: var(--gold-light);
        }
        
        /* Products Grid */
        .products-section {
            padding: 20px 15px;
        }
        
        .section-title {
            margin-bottom: 20px;
        }
        
        .section-title h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--black);
            position: relative;
            display: inline-block;
        }
        
        .section-title h2::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 40px;
            height: 3px;
            background: var(--gold);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        /* Product Card */
        .product-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--gold);
        }
        
        /* Product Image Container */
        .product-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f5f5f5;
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        /* Wishlist Button on Image */
        .wishlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 5;
        }
        
        .wishlist-btn i {
            color: #999;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .wishlist-btn:hover i {
            color: #ff4444;
        }
        
        .wishlist-btn.active i {
            color: #ff4444;
        }
        
        /* Product Info */
        .product-info {
            padding: 12px;
        }
        
        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }
        
        .product-sku {
            font-size: 10px;
            color: var(--gray-light);
            margin-bottom: 6px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .product-stock {
            font-size: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .stock-in {
            color: #28a745;
        }
        
        .stock-low {
            color: #ff9800;
        }
        
        .stock-out {
            color: #dc3545;
        }
        
        /* Buttons */
        .product-buttons {
            display: flex;
            gap: 8px;
        }
        
        .buy-now-btn {
            flex: 2;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 10px 8px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        .buy-now-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
        }
        
        .buy-now-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .cart-btn {
            flex: 1;
            background: var(--white);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 8px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        .cart-btn:hover {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-2px);
        }
        
        .cart-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .share-btn {
            width: 36px;
            background: var(--white-light);
            border: 1px solid rgba(0,0,0,0.05);
            color: var(--gray);
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .share-btn:hover {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--white-light);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 60px;
            color: var(--gray-light);
            margin-bottom: 15px;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            cursor: pointer;
        }
        
        .bottom-nav a i {
            font-size: 22px;
        }
        
        .bottom-nav a.active,
        .bottom-nav a:hover {
            color: var(--gold);
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }
        
        .toast-error {
            background: #dc3545;
            color: white;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        /* Product Detail Modal */
        .product-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .product-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            border-radius: 24px;
            max-width: 90%;
            width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            font-size: 18px;
            border: none;
        }
        
        .modal-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .modal-info {
            padding: 20px;
        }
        
        .modal-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .modal-sku {
            font-size: 12px;
            color: var(--gray-light);
            margin-bottom: 12px;
        }
        
        .modal-category {
            display: inline-block;
            background: var(--gold-light);
            color: var(--gold-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .modal-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }
        
        .modal-description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-stock {
            font-size: 13px;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 12px;
            background: var(--white-light);
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .modal-cart-btn {
            flex: 1;
            background: var(--white);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        /* Responsive */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 0 20px;
            }
            
            .products-section {
                padding: 30px;
            }
            
            .product-name {
                font-size: 16px;
                height: 40px;
            }
            
            .product-price {
                font-size: 20px;
            }
            
            .buy-now-btn, .cart-btn {
                font-size: 13px;
                padding: 10px 12px;
            }
        }
        
        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 1400px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="shop-header">
        <div class="logo-main" data-page="home">STYLE<span class="logo-gold">OF</span>LIFE</div>
        <div class="header-icons">
            <a data-page="cart"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <a data-page="account"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>
    
    <!-- Filter Bar -->
    <div class="filter-bar" id="filterBar">
        <div class="filter-chip active" data-cat="all">✨ All Products</div>
    </div>
    
    <!-- Products Section -->
    <div class="products-section">
        <div class="section-title">
            <h2>Our Collection</h2>
        </div>
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading beautiful products...</p>
            </div>
        </div>
    </div>
    
    <!-- Product Detail Modal -->
    <div id="productModal" class="product-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">&times;</button>
            <img id="modalImage" class="modal-image" src="" alt="Product detail">
            <div class="modal-info">
                <div class="modal-name" id="modalName"></div>
                <div class="modal-sku" id="modalSku"></div>
                <div class="modal-category" id="modalCategory"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-description" id="modalDescription"></div>
                <div class="modal-stock" id="modalStock"></div>
                <div class="modal-buttons">
                    <button class="modal-buy-btn" id="modalBuyBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                    <button class="modal-cart-btn" id="modalCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a data-page="home"><i class="fas fa-home"></i><span>Home</span></a>
        <a data-page="shop" class="active"><i class="fas fa-search"></i><span>Shop</span></a>
        <a data-page="cart"><i class="fas fa-shopping-bag"></i><span>Cart</span></a>
        <a data-page="track"><i class="fas fa-truck"></i><span>Track</span></a>
        <a data-page="account"><i class="fas fa-user"></i><span>Account</span></a>
    </div>
    
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let sessionId = localStorage.getItem('sessionId');
        
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }
        
        let allProducts = [];
        let currentCategory = 'all';
        
        // Navigation
        function navigateTo(page) {
            if (window.parent !== window) {
                window.parent.postMessage({ page: page }, '*');
            } else {
                window.location.href = page + '.html';
            }
        }
        
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        // Toast Notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Update Cart Count
        async function updateCartCount() {
            try {
                const { data, error } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (error) throw error;
                const items = data?.items || [];
                const total = items.reduce((s, i) => s + i.quantity, 0);
                const badge = document.getElementById('cartCount');
                if (badge) badge.textContent = total;
            } catch (error) {}
        }
        
        // Add to Cart
        window.addToCart = async (id, name, price, sku, img) => {
            try {
                let { data: cartData, error: fetchError } = await supabase.from('carts').select('items').eq('session_id', sessionId).maybeSingle();
                if (fetchError) throw fetchError;
                let items = cartData?.items || [];
                const existing = items.find(i => i.id === id);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    items.push({ id, sku, name, price, quantity: 1, image: img });
                }
                const total = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                const { error: saveError } = await supabase.from('carts').upsert({
                    session_id: sessionId,
                    items: items,
                    total: total,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'session_id' });
                if (saveError) throw saveError;
                showToast(`${name} added to cart! ✨`);
                await updateCartCount();
                return true;
            } catch (error) {
                showToast('Failed to add', true);
                return false;
            }
        };
        
        // Buy Now
        window.buyNow = async (id, name, price, sku, img) => {
            const added = await addToCart(id, name, price, sku, img);
            if (added) {
                setTimeout(() => { navigateTo('checkout'); }, 500);
            }
        };
        
        // Share Product
        window.shareProduct = (name, price, img) => {
            const text = `Check out ${name} at Style Of Life! Price: ₹${price.toLocaleString()}`;
            if (navigator.share) {
                navigator.share({
                    title: name,
                    text: text,
                    url: window.location.href
                }).catch(() => {
                    navigator.clipboard.writeText(text);
                    showToast('Link copied! Share with friends ✨');
                });
            } else {
                navigator.clipboard.writeText(text);
                showToast('Link copied! Share with friends ✨');
            }
        };
        
        // Get Stock Status
        function getStockStatus(stock) {
            if (stock <= 0) {
                return { text: 'Out of Stock', class: 'stock-out', disabled: true };
            } else if (stock < 10) {
                return { text: `⚠️ Only ${stock} left`, class: 'stock-low', disabled: false };
            } else {
                return { text: '✓ In Stock', class: 'stock-in', disabled: false };
            }
        }
        
        // Load Categories
        async function loadCategories() {
            try {
                const { data: products, error } = await supabase.from('products').select('category');
                if (error) throw error;
                
                const categories = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
                const filterBar = document.getElementById('filterBar');
                
                let html = '';
                categories.forEach(cat => {
                    const displayName = cat === 'all' ? '✨ All Products' : cat;
                    html += `<div class="filter-chip ${cat === currentCategory ? 'active' : ''}" data-cat="${cat}">${displayName}</div>`;
                });
                filterBar.innerHTML = html;
                
                document.querySelectorAll('.filter-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        currentCategory = chip.dataset.cat;
                        renderProducts();
                    });
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }
        
        // Render Products
        function renderProducts() {
            const container = document.getElementById('productsGrid');
            let products = currentCategory === 'all' 
                ? allProducts 
                : allProducts.filter(p => p.category === currentCategory);
            
            if (!products.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <p>No products found in this category</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const p of products) {
                const img = p.images?.[0] || 'https://via.placeholder.com/400x400?text=Style+Of+Life';
                const stock = getStockStatus(p.stock);
                const disabledAttr = stock.disabled ? 'disabled' : '';
                
                html += `
                    <div class="product-card" data-product-id="${p.id}">
                        <div class="product-image-container">
                            <img class="product-image" src="${img}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/400x400?text=Image+Not+Available'">
                            <div class="wishlist-btn" onclick="event.stopPropagation(); shareProduct('${escapeHtml(p.name)}', ${p.price}, '${img}')">
                                <i class="fas fa-share-alt"></i>
                            </div>
                        </div>
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-sku">${p.sku} | ${p.category || 'Jewelry'}</div>
                            <div class="product-price">₹${(p.price || 0).toLocaleString()}</div>
                            <div class="product-stock ${stock.class}">
                                <i class="fas ${p.stock <= 0 ? 'fa-times-circle' : (p.stock < 10 ? 'fa-exclamation-triangle' : 'fa-check-circle')}"></i>
                                <span>${stock.text}</span>
                            </div>
                            <div class="product-buttons">
                                <button class="buy-now-btn" onclick="event.stopPropagation(); buyNow(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')" ${disabledAttr}>
                                    <i class="fas fa-bolt"></i> Buy Now
                                </button>
                                <button class="cart-btn" onclick="event.stopPropagation(); addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${p.sku}', '${img}')" ${disabledAttr}>
                                    <i class="fas fa-shopping-cart"></i> Cart
                                </button>
                                <button class="share-btn" onclick="event.stopPropagation(); shareProduct('${escapeHtml(p.name)}', ${p.price}, '${img}')">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // Open Product Modal
        window.openProductModal = function(product) {
            const img = product.images?.[0] || 'https://via.placeholder.com/400x400?text=Style+Of+Life';
            const stock = getStockStatus(product.stock);
            
            document.getElementById('modalImage').src = img;
            document.getElementById('modalName').textContent = product.name;
            document.getElementById('modalSku').textContent = `SKU: ${product.sku}`;
            document.getElementById('modalCategory').textContent = product.category || 'Jewelry';
            document.getElementById('modalPrice').textContent = `₹${(product.price || 0).toLocaleString()}`;
            document.getElementById('modalDescription').textContent = product.description || 'Exquisite handcrafted jewelry piece.';
            document.getElementById('modalStock').innerHTML = `
                <i class="fas ${product.stock <= 0 ? 'fa-times-circle' : (product.stock < 10 ? 'fa-exclamation-triangle' : 'fa-check-circle')}"></i>
                ${stock.text}
            `;
            
            const buyBtn = document.getElementById('modalBuyBtn');
            const cartBtn = document.getElementById('modalCartBtn');
            
            buyBtn.onclick = () => buyNow(product.id, product.name, product.price, product.sku, img);
            cartBtn.onclick = () => addToCart(product.id, product.name, product.price, product.sku, img);
            
            document.getElementById('productModal').classList.add('active');
        };
        
        window.closeProductModal = function() {
            document.getElementById('productModal').classList.remove('active');
        };
        
        // Load All Products
        async function loadProducts() {
            try {
                const { data: products, error } = await supabase.from('products').select('*').order('id');
                if (error) throw error;
                allProducts = products || [];
                renderProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading products. Please refresh.</p>
                    </div>
                `;
            }
        }
        
        // Add click handlers to product cards
        function addProductCardClickHandlers() {
            document.querySelectorAll('.product-card').forEach((card, index) => {
                card.addEventListener('click', () => {
                    const filtered = currentCategory === 'all' ? allProducts : allProducts.filter(p => p.category === currentCategory);
                    if (filtered[index]) {
                        openProductModal(filtered[index]);
                    }
                });
            });
        }
        
        // Observer for dynamically added product cards
        const observer = new MutationObserver(() => {
            addProductCardClickHandlers();
        });
        observer.observe(document.getElementById('productsGrid'), { childList: true, subtree: true });
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : (m === '>' ? '&gt;' : m)));
        }
        
        // Close modal on outside click
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeProductModal();
        });
        
        // Initialize
        updateCartCount();
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
