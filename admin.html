<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Style Of Life</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --dark: #1a1a1a;
            --darker: #0a0a0a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
        }

        header {
            background: var(--darker);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            background: var(--primary);
            color: var(--darker);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 1.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            background: rgba(212,175,55,0.1);
            color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2rem;
            font-size: 1.75rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--gray-200);
        }

        .stat-icon {
            font-size: 2.5rem;
        }

        .stat-info h3 {
            color: var(--gray-600);
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--gray-200);
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--primary);
        }

        .card-header h2 {
            font-size: 1.2rem;
            color: var(--dark);
        }

        .action-btn {
            background: var(--primary);
            color: var(--dark);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .order-item, .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .order-item:hover, .product-item:hover {
            background: var(--gray-100);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-processing { background: #d1ecf1; color: #0c5460; }
        .badge-shipped { background: #d4edda; color: #155724; }
        .badge-delivered { background: #c3e6cb; color: #155724; }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: var(--gray-600);
        }

        footer {
            background: var(--darker);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">STYLE OF LIFE <span>ADMIN</span></div>
        <nav>
            <a href="admin.html" class="active">Dashboard</a>
            <a href="admin-products.html">Products</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h1>Dashboard Overview</h1>
        <div class="stats" id="stats"></div>
        
        <div class="card">
            <div class="card-header">
                <h2>Recent Orders</h2>
                <a href="admin-orders.html" class="action-btn">View All →</a>
            </div>
            <div id="recentOrders"></div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h2>Products</h2>
                <a href="admin-products.html" class="action-btn">Manage →</a>
            </div>
            <div id="productsList"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 STYLE OF LIFE. All rights reserved.</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://tbopyyocuvlsjvtdogcp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRib3B5eW9jdXZsc2p2dGRvZ2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzYxNzcsImV4cCI6MjA4OTYxMjE3N30.TfEtU1NBHCGnZqZzm4LuI1iw22lSPav0OrUskhDw5wc";
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        async function loadDashboard() {
            try {
                const [productsRes, ordersRes] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    }),
                    fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    })
                ]);
                
                const products = await productsRes.json();
                const orders = await ordersRes.json();
                
                const productCount = products.length;
                const totalOrders = orders.length;
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
                const pendingOrders = orders.filter(o => o.status === 'Pending').length;
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-info"><h3>Total Products</h3><div class="stat-number">${productCount}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">🛍️</div><div class="stat-info"><h3>Total Orders</h3><div class="stat-number">${totalOrders}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">₹${totalRevenue.toLocaleString()}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-info"><h3>Pending Orders</h3><div class="stat-number">${pendingOrders}</div></div></div>
                `;
                
                // Recent orders
                const recentOrdersDiv = document.getElementById('recentOrders');
                if (orders.length === 0) {
                    recentOrdersDiv.innerHTML = '<div class="empty-message">No orders yet</div>';
                } else {
                    let ordersHtml = '';
                    orders.slice(0, 5).forEach(o => {
                        let badgeClass = '';
                        if (o.status === 'Pending') badgeClass = 'badge-pending';
                        else if (o.status === 'Processing') badgeClass = 'badge-processing';
                        else if (o.status === 'Shipped') badgeClass = 'badge-shipped';
                        else badgeClass = 'badge-pending';
                        
                        ordersHtml += `
                            <div class="order-item">
                                <span><strong>${o.order_id}</strong></span>
                                <span>${escapeHtml(o.customer_name)}</span>
                                <span class="badge ${badgeClass}">${o.status}</span>
                                <span>₹${(o.total || 0).toLocaleString()}</span>
                                <span style="font-size:0.75rem; color:var(--gray-600);">${new Date(o.created_at).toLocaleDateString()}</span>
                            </div>
                        `;
                    });
                    recentOrdersDiv.innerHTML = ordersHtml;
                }
                
                // Products list
                const productsListDiv = document.getElementById('productsList');
                if (products.length === 0) {
                    productsListDiv.innerHTML = '<div class="empty-message">No products added</div>';
                } else {
                    let productsHtml = '';
                    products.slice(0, 5).forEach(p => {
                        productsHtml += `
                            <div class="product-item">
                                <span><strong>${escapeHtml(p.name)}</strong></span>
                                <span>SKU: ${p.sku}</span>
                                <span>Stock: ${p.stock}</span>
                                <span style="color:var(--primary); font-weight:600;">₹${(p.price || 0).toLocaleString()}</span>
                            </div>
                        `;
                    });
                    productsListDiv.innerHTML = productsHtml;
                }
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminUser');
            window.location.href = 'login.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
