<!DOCTYPE html>
<html>
<head>
<title>Admin - Style OF Life</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    padding:40px;
}

input{
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
}

.btn{
    background:#fff;
    border:2px solid #111;
    padding:10px 20px;
    cursor:pointer;
}

.btn:hover{
    background:#111;
    color:#fff;
}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<button class="btn" onclick="addProduct()">Add Product</button>

<script>
function addProduct(){

    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;

    alert("Fake Admin Added:\n" + name + " - ₹" + price);

    console.log({
        name:name,
        price:price
    });
}
</script>

</body>
</html>
