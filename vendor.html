<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Deep Sea Vendor Portal | Style Of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #03101a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Underwater Background */
        .ocean-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #043b5e, #011126);
            overflow: hidden;
        }
        .ocean-backdrop::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(transparent, transparent 98px, rgba(0,180,255,0.08) 98px, rgba(0,180,255,0.1) 100px);
            pointer-events: none;
        }
        /* Marine life animations - floating & swimming */
        .sea-creature {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            opacity: 0.7;
            transition: transform 0.2s ease;
        }
        .whale-animation {
            top: 15%;
            left: -20%;
            width: 320px;
            animation: swimWhale 38s linear infinite;
        }
        .shark-animation {
            bottom: 12%;
            right: -15%;
            width: 240px;
            animation: swimShark 42s ease-in-out infinite;
        }
        .dolphin-animation {
            top: 65%;
            left: -25%;
            width: 180px;
            animation: swimDolphin 35s ease-in-out infinite;
        }
        .turtle-animation {
            bottom: 25%;
            right: 5%;
            width: 150px;
            animation: floatTurtle 24s ease-in-out infinite;
        }
        .jellyfish {
            top: 40%;
            left: 80%;
            width: 100px;
            animation: floatJelly 18s ease-in-out infinite;
        }
        .stingray {
            bottom: 40%;
            left: 10%;
            width: 200px;
            animation: glideStingray 30s linear infinite;
        }
        @keyframes swimWhale {
            0% { transform: translateX(0) translateY(0px); left: -20%; }
            50% { transform: translateX(20px) translateY(-25px); }
            100% { transform: translateX(calc(100vw + 20%)) translateY(10px); left: 100%; }
        }
        @keyframes swimShark {
            0% { transform: translateX(0) scaleX(1); right: -15%; }
            45% { transform: translateX(-30px) translateY(-15px) scaleX(1); }
            55% { transform: translateX(-30px) translateY(15px) scaleX(1); }
            100% { transform: translateX(calc(-100vw - 20%)) scaleX(1); right: 100%; }
        }
        @keyframes swimDolphin {
            0% { transform: translateX(0) translateY(0); left: -25%; }
            40% { transform: translateX(12vw) translateY(-20px); }
            70% { transform: translateX(35vw) translateY(15px); }
            100% { transform: translateX(calc(100vw + 25%)) translateY(0); left: 100%; }
        }
        @keyframes floatTurtle {
            0%,100% { transform: translateX(0px) translateY(0px) rotate(0deg); }
            50% { transform: translateX(-20px) translateY(-15px) rotate(5deg); }
        }
        @keyframes floatJelly {
            0%,100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }
        @keyframes glideStingray {
            0% { transform: translateX(0) translateY(0) rotate(0deg); left: 5%; }
            50% { transform: translateX(40px) translateY(-20px) rotate(10deg); }
            100% { transform: translateX(calc(100vw + 10%)) translateY(10px) rotate(0deg); left: 100%; }
        }
        /* Bubbles */
        .bubble {
            position: fixed;
            background: radial-gradient(circle, rgba(120,210,255,0.5), rgba(70,150,200,0.15));
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            animation: bubbleRise 7s infinite ease-in;
        }
        @keyframes bubbleRise {
            0% { transform: translateY(0) scale(0.8); opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(1.1); opacity: 0; }
        }
        /* UI Overlay */
        .vendor-header, .vendor-sidebar, .vendor-main, .stat-card, .chart-card, .form-card, .product-card {
            position: relative;
            z-index: 12;
        }
        .vendor-header {
            background: rgba(2, 20, 35, 0.9);
            backdrop-filter: blur(18px);
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #00b8ff70;
            z-index: 100;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #2dd4ff, #00a3cc, #2dd4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .company-name-display {
            background: #00a3cc20;
            padding: 6px 22px;
            border-radius: 36px;
            font-weight: 500;
            border-left: 2px solid #2dd4ff;
        }
        .logout-btn {
            background: #ef444430;
            border: 1px solid #ef4444a0;
            padding: 8px 24px;
            border-radius: 32px;
            cursor: pointer;
            transition: 0.2s;
        }
        .vendor-sidebar {
            width: 270px;
            background: #021a2ad9;
            backdrop-filter: blur(12px);
            padding: 28px 16px;
            height: calc(100vh - 72px);
            position: sticky;
            top: 72px;
            border-right: 1px solid #40e0ff30;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #d4f1ff;
        }
        .nav-item:hover, .nav-item.active {
            background: linear-gradient(90deg, #1aa3c030, #005f8a30);
            color: #b0f5ff;
            border-left: 3px solid #2dd4ff;
            transform: translateX(4px);
        }
        .vendor-main {
            flex: 1;
            padding: 28px 30px;
            overflow-y: auto;
            max-height: calc(100vh - 72px);
        }
        .page-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6ee7ff, #9efff0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2dd4ff50;
        }
        .stat-value {
            font-size: 38px;
            font-weight: 800;
            color: #6ee7ff;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: #031e2ed9;
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 18px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 22px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 8px;
        }
        /* Scrollbar styling */
        .products-grid::-webkit-scrollbar {
            width: 6px;
        }
        .products-grid::-webkit-scrollbar-track {
            background: #0a344e;
            border-radius: 10px;
        }
        .products-grid::-webkit-scrollbar-thumb {
            background: #2dd4ff;
            border-radius: 10px;
        }
        .product-card {
            background: #032a3fb3;
            border-radius: 24px;
            overflow: hidden;
            transition: 0.25s;
            border: 1px solid #3ad1ff40;
        }
        .product-image {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }
        .product-info {
            padding: 16px;
        }
        .product-price {
            color: #6ee7ff;
            font-weight: 700;
            font-size: 20px;
        }
        .form-card {
            background: #032535b3;
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 28px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
        }
        .btn-primary {
            background: linear-gradient(95deg, #00c3ff, #0077aa);
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .orders-table {
            width: 100%;
            background: #022b3ed9;
            border-radius: 20px;
            overflow: auto;
            display: block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0f4c5f;
            padding: 12px 24px;
            border-radius: 48px;
            z-index: 2000;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
        @media (max-width: 780px) {
            .vendor-sidebar { width: 100%; height: auto; display: flex; gap: 6px; overflow-x: auto; }
            .nav-item { white-space: nowrap; }
            .vendor-layout { flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }
        .company-stats {
            background: #0177a330;
            border-radius: 28px;
            padding: 16px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 20px;
        }
        .pagination-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
            align-items: center;
        }
        .page-btn {
            background: #085f7c;
            padding: 8px 16px;
            border-radius: 32px;
            cursor: pointer;
            border: none;
            color: white;
        }
        .page-btn.active-page {
            background: #2dd4ff;
            color: #022b36;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="ocean-backdrop"></div>

<!-- Enhanced marine life with videos + animated SVG creatures -->
<div class="sea-creature whale-animation"><i class="fas fa-fish" style="font-size: 120px; color: #6fbfe6; text-shadow: 0 0 10px cyan;"></i><span style="position: absolute; top: -30px; left: 20px; font-size: 12px;">🐋 WHALE</span></div>
<div class="sea-creature shark-animation"><i class="fas fa-fish" style="font-size: 90px; color: #426e86; transform: scaleX(-1);"></i><span style="position: absolute; top: -20px;">🦈 SHARK</span></div>
<div class="sea-creature dolphin-animation"><i class="fas fa-water" style="font-size: 70px; color: #3498db;"></i><span>🐬 DOLPHIN</span></div>
<div class="sea-creature turtle-animation"><i class="fas fa-crown" style="font-size: 50px; color: #59bd6b;"></i><span style="font-size: 11px;">🐢 SEA TURTLE</span></div>
<div class="sea-creature jellyfish"><i class="fas fa-bezier-curve" style="font-size: 60px; color: #f5b0e6;"></i>🪼</div>

<script>
    for(let i=0;i<22;i++){
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = 4+Math.random()*12;
        b.style.width = size+'px';
        b.style.height = size+'px';
        b.style.bottom = Math.random()*100+'%';
        b.style.left = Math.random()*100+'%';
        b.style.animationDuration = 5+Math.random()*10+'s';
        b.style.animationDelay = Math.random()*8+'s';

<div class="vendor-header">
    <div class="logo">🌊 STYLE OF LIFE <span style="font-size:12px;">DEEP SEA VENDOR</span></div>
    <div class="company-name-display"><i class="fas fa-building"></i> <span id="headerCompanyName">Loading...</span></div>
    <button class="logout-btn" onclick="logoutVendor()"><i class="fas fa-sign-out-alt"></i> Surface</button>
</div>

<div class="vendor-layout">
    <div class="vendor-sidebar">
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-item" data-page="products"><i class="fas fa-box"></i> My Products <span class="nav-badge" id="productCountBadge">0</span></div>
        <div class="nav-item" data-page="add-product"><i class="fas fa-plus-circle"></i> Add Product</div>
        <div class="nav-item" data-page="bulk-upload"><i class="fas fa-file-upload"></i> Bulk Upload</div>
        <div class="nav-item" data-page="orders"><i class="fas fa-shopping-cart"></i> My Orders <span id="orderCountBadge">0</span></div>

    </div>
</div>

<script type="importmap">{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }</script>
<script type="module">
    import { createClient } from '@supabase/supabase-js';
    const SUPABASE_URL = "https://kkvgdagjboxhtuyqlomq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrdmdkYWdqYm94aHR1eXFsb21xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzgyMTksImV4cCI6MjA5MDA1NDIxOX0.5A4UUcvwAi5UM8K81mmrN3lOTmzUYq70qRouaVqpwDA";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let vendorData = null, companyId = null;
    let currentPage = 1, productsPerPage = 24, totalProductsCount = 0, allProductsList = [];
    let caratChart,colorChart,clarityChart,salesChart;
    
    const vendorEmail = sessionStorage.getItem('userEmail');
    if(!vendorEmail || sessionStorage.getItem('vendorLoggedIn') !== 'true') window.location.href = 'login.html';
    
    function showToast(msg,err=false){
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        t.style.background = err ? '#aa2e3e' : '#117f8c';
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),3000);
    }
    
    function renderPage(html){
        document.getElementById('mainContent').innerHTML = html;
    }
    
    async function loadVendor(){
        let {data,error} = await supabase.from('vendors').select('*').eq('email',vendorEmail).maybeSingle();
        if(error || !data || data.status !== 'approved'){
            showToast('Vendor not approved',true);
            setTimeout(()=>window.location.href='login.html',1500);
            return;
        }
        vendorData = data; companyId = data.id;
        document.getElementById('headerCompanyName').innerText = data.business_name || 'Vendor';
        await loadDashboardUI();
        attachNavEvents();
        await loadAllProductsData();
        loadOrders();
    }
    
    async function loadAllProductsData(){
        let {data,error} = await supabase.from('vendor_products').select('*').eq('vendor_id',companyId);
        if(!error) {
            allProductsList = data || [];
            totalProductsCount = allProductsList.length;
            document.getElementById('productCountBadge') && (document.getElementById('productCountBadge').innerText = totalProductsCount);
        }
        displayProductsPageList(currentPage);
    }
    
    function displayProductsPageList(page){
        let start = (page-1)*productsPerPage;
        let end = start + productsPerPage;
        let paginated = allProductsList.slice(start,end);
        let gridHtml = `<div class="page-header"><div class="page-title">📦 Ocean Treasures (${totalProductsCount} products)</div></div>
        <div class="products-grid" id="productsGridDynamic">`;
        if(paginated.length===0) gridHtml += `<div class="loading">✨ No products found</div>`;
        paginated.forEach(p => {
            let img = p.image1_url || p.image2_url || p.image3_url || 'https://via.placeholder.com/300x180?text=Pearl';
            gridHtml += `<div class="product-card">
                <img class="product-image" src="${img}" onerror="this.src='https://placehold.co/400x200?text=Ocean+Gem'">
                <div class="product-info"><div class="product-name">${escapeHtml(p.product_name)}</div>
                <div class="product-price">₹${Number(p.price).toLocaleString()}</div>
                <span class="product-status status-${p.status}">${p.status||'pending'}</span>
                <div class="card-actions" style="display:flex; gap:10px; margin-top:12px;">
                    <button class="btn-edit" onclick="window.editProductModal(${p.id})" style="background:#2c5a70; padding:6px 12px; border-radius:30px;">✏️ Edit</button>
                    <button class="btn-delete" onclick="window.deleteProductById(${p.id})" style="background:#8b3c3c; padding:6px 12px; border-radius:30px;">🗑️ Delete</button>
                </div></div></div>`;
        });
        gridHtml += `</div><div class="pagination-controls">`;
        let totalPages = Math.ceil(totalProductsCount/productsPerPage);
        for(let i=1;i<=totalPages && i<=12;i++){
            gridHtml += `<button class="page-btn ${currentPage===i?'active-page':''}" data-page-num="${i}">${i}</button>`;
        }
        gridHtml += `</div>`;
        renderPage(gridHtml);
        document.querySelectorAll('.page-btn').forEach(btn=>{
            btn.addEventListener('click',(e)=>{
                currentPage = parseInt(btn.getAttribute('data-page-num'));
                displayProductsPageList(currentPage);
            });
        });
        window.editProductModal = editProductById;
        window.deleteProductById = deleteProduct;
    }
    
    window.editProductById = async function(id){
        let prod = allProductsList.find(p=>p.id==id);
        if(!prod) return;
        await showAddProductForm(prod);
    };
    
    async function showAddProductForm(product=null){
        renderPage(`
            <div class="page-header"><div class="page-title">${product ? '✏️ Edit Product' : '➕ Add New Treasure'}</div></div>
            <div class="form-card">
                <input type="hidden" id="editProdId" value="${product?.id||''}">
                <div class="form-grid">
                    <div class="form-group"><label>SKU *</label><input id="sku" value="${escapeHtml(product?.sku||'')}"></div>
                    <div class="form-group"><label>Name *</label><input id="product_name" value="${escapeHtml(product?.product_name||'')}"></div>
                    <div class="form-group"><label>Category</label><input id="category" value="${escapeHtml(product?.category||'')}"></div>
                    <div class="form-group"><label>Price (₹)</label><input id="price" type="number" value="${product?.price||''}"></div>
                    <div class="form-group"><label>GST (%)</label><input id="gst" value="${product?.gst||18}"></div>
                    <div class="form-group"><label>Stock</label><input id="stock" type="number" value="${product?.stock||0}"></div>
                </div>
                <div><label>Description</label><textarea id="description" rows="2">${escapeHtml(product?.description||'')}</textarea></div>
                <div class="form-grid">
                    <div><label>Image URL1</label><input id="image1_url" value="${product?.image1_url||''}"></div>
                    <div><label>Image URL2</label><input id="image2_url" value="${product?.image2_url||''}"></div>
                    <div><label>Video URL</label><input id="video_url" value="${product?.video_url||''}"></div>
                </div>
                <div style="background:#022b38; padding:16px; border-radius:20px; margin:15px 0;">
                    <h4>💎 Diamond Details</h4>
                    <div class="form-grid">
                        <div><label>Carat</label><input id="carat" value="${product?.carat||''}"></div>
                        <div><label>Color</label><input id="diamond_color" value="${product?.diamond_color||''}"></div>
                        <div><label>Clarity</label><input id="diamond_clarity" value="${product?.diamond_clarity||''}"></div>
                        <div><label>Cut</label><input id="diamond_cut" value="${product?.diamond_cut||''}"></div>
                    </div>
                </div>
                <div><button class="btn-primary" id="saveProdBtn">💾 Save Product</button>
                <button class="btn-primary" style="background:#2a4758" onclick="loadAllProductsData()">Cancel</button></div>
            </div>
        `);
        document.getElementById('saveProdBtn').onclick = async()=>{
            let id = document.getElementById('editProdId').value;
            let payload = {
                vendor_id: companyId,
                sku: document.getElementById('sku').value,
                product_name: document.getElementById('product_name').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                gst: parseFloat(document.getElementById('gst').value)||18,
                stock: parseInt(document.getElementById('stock').value)||0,
                description: document.getElementById('description').value,
                image1_url: document.getElementById('image1_url').value,
                image2_url: document.getElementById('image2_url').value,
                video_url: document.getElementById('video_url').value,
                carat: document.getElementById('carat').value ? parseFloat(document.getElementById('carat').value):null,
                diamond_color: document.getElementById('diamond_color').value,
                diamond_clarity: document.getElementById('diamond_clarity').value,
                diamond_cut: document.getElementById('diamond_cut').value,
                status: 'pending',
                updated_at: new Date()
            };
            if(!payload.sku || !payload.product_name || !payload.category || isNaN(payload.price)) { showToast("Fill required fields",true); return; }
            if(id){
                await supabase.from('vendor_products').update(payload).eq('id',id);
                showToast("Product updated");
            } else {
                await supabase.from('vendor_products').insert([payload]);
                showToast("Added, pending approval");
            }
            await loadAllProductsData();
            document.querySelector('.nav-item[data-page="products"]').click();
        };
    }
    
    window.deleteProduct = async function(id){
        if(!confirm('Delete permanently?')) return;
        await supabase.from('vendor_products').delete().eq('id',id);
        showToast("Deleted");
        await loadAllProductsData();
        if(document.querySelector('.nav-item[data-page="products"]').classList.contains('active')) document.querySelector('.nav-item[data-page="products"]').click();
        else await loadDashboardUI();
    };
    
    async function loadDashboardUI(){
        let {data:products} = await supabase.from('vendor_products').select('*').eq('vendor_id',companyId);
        let productCount = products?.length||0;
        let revenue = products?.reduce((s,p)=>s+((p.price||0)*(p.orders_count||0)),0)||0;
        let {data:orders} = await supabase.from('vendor_orders').select('*').eq('vendor_id',companyId);
        let orderCount = orders?.length||0;
        let pending = products?.filter(p=>p.status==='pending').length||0;
        let approved = productCount-pending;
        let diamondItems = products?.filter(p=>p.carat).length||0;
        renderPage(`
            <div class="page-title">🐙 Dashboard</div>
            <div class="company-stats">
                <div><strong>${vendorData?.business_name}</strong> | Owner: ${vendorData?.owner_name||'N/A'}</div>
                <div>GST: ${vendorData?.gst_number||'N/A'}</div>
                <div>✅ Approved: ${approved} | ⏳ Pending: ${pending}</div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-box"></i><div class="stat-value">${productCount}</div><div>Total Products</div></div>
                <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-value">${orderCount}</div><div>Orders</div></div>
                <div class="stat-card"><i class="fas fa-rupee-sign"></i><div class="stat-value">₹${revenue.toLocaleString()}</div><div>Revenue</div></div>
                <div class="stat-card"><i class="fas fa-gem"></i><div class="stat-value">${diamondItems}</div><div>Diamond SKUs</div></div>
            </div>
            <div class="charts-grid">
                <div class="chart-card"><canvas id="caratChart"></canvas></div>
                <div class="chart-card"><canvas id="colorChart"></canvas></div>
                <div class="chart-card"><canvas id="clarityChart"></canvas></div>
                <div class="chart-card"><canvas id="salesChart"></canvas></div>
            </div>
        `);
        let diamonds = products?.filter(p=>p.carat)||[];
        if(caratChart) caratChart.destroy();
        let ctx1 = document.getElementById('caratChart')?.getContext('2d');
        if(ctx1) caratChart = new Chart(ctx1, { type:'bar', data:{ labels:diamonds.map(d=>d.product_name?.slice(0,12)), datasets:[{label:'Carat', data:diamonds.map(d=>d.carat), backgroundColor:'#44ddff'}] }, options:{responsive:true, plugins:{legend:{labels:{color:'#fff'}}}}});
        let colorMap={}; diamonds.forEach(d=>{if(d.diamond_color) colorMap[d.diamond_color]=(colorMap[d.diamond_color]||0)+1});
        let colorCtx = document.getElementById('colorChart')?.getContext('2d');
        if(colorCtx) colorChart = new Chart(colorCtx, {type:'pie', data:{labels:Object.keys(colorMap), datasets:[{data:Object.values(colorMap), backgroundColor:['#2dd4ff','#60a5fa','#f97316','#10b981','#facc15']}]}});
        let clarityMap={}; diamonds.forEach(d=>{if(d.diamond_clarity) clarityMap[d.diamond_clarity]=(clarityMap[d.diamond_clarity]||0)+1});
        let clarCtx = document.getElementById('clarityChart')?.getContext('2d');
        if(clarCtx) clarityChart = new Chart(clarCtx, {type:'bar', data:{labels:Object.keys(clarityMap), datasets:[{label:'Clarity count', data:Object.values(clarityMap), backgroundColor:'#34d399'}]}});
    }
    
    async function loadOrders(){
        let {data} = await supabase.from('vendor_orders').select('*').eq('vendor_id',companyId).order('created_at',{ascending:false});
        let html = `<div class="page-title">📦 My Orders</div><div style="overflow-x:auto;"><table class="orders-table" style="width:100%; border-collapse:collapse;"><tr><th>Order ID</th><th>Product</th><th>Qty</th><th>Amount</th><th>Status</th><th>Date</th></tr>`;
        (data||[]).forEach(o=>{
            html+=`<tr><td>${o.order_id}</td><td>${escapeHtml(o.product_name)}</td><td>${o.quantity}</td><td>₹${Number(o.total_amount).toLocaleString()}</td><td>${o.order_status||'Processing'}</td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`;
        });
        if(!data||data.length===0) html+='<tr><td colspan="6">No orders yet</td></tr>';
        html+=`</table></div>`;
        renderPage(html);
    }
    
    function bulkUploadPage(){
        renderPage(`
            <div class="page-title">📂 Bulk Upload (Up to 10000 products)</div>
            <div class="form-card">
                <div id="bulkDropZone" style="border:2px dashed #2dd4ff; padding:40px; text-align:center; border-radius:30px; cursor:pointer;"><i class="fas fa-cloud-upload-alt fa-3x"></i><p>Click or Drag Excel/CSV</p></div>
                <input type="file" id="bulkFile" accept=".csv,.xlsx,.xls" style="display:none">
                <div id="bulkProgressBar" style="height:6px; background:#0f4e62; margin:20px 0; border-radius:4px;"><div id="bulkFill" style="width:0%; height:100%; background:#2dd4ff;"></div></div>
                <div id="uploadStatus"></div>
                <div style="margin-top:20px;"><button class="btn-primary" onclick="downloadSample()">📎 Download Sample Excel</button></div>
            </div>
        `);
        let zone = document.getElementById('bulkDropZone');
        let fileInput = document.getElementById('bulkFile');
        zone.onclick = ()=>fileInput.click();
        fileInput.onchange = async(e)=>{
            let file = e.target.files[0];
            if(!file) return;
            let fill = document.getElementById('bulkFill');
            let statusDiv = document.getElementById('uploadStatus');
            fill.style.width = '5%';
            statusDiv.innerText = 'Reading...';
            let data = await file.arrayBuffer();
            let workbook = XLSX.read(data);
            let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            fill.style.width='20%';
            let success=0, errors=0;
            let batchSize=50;
            for(let i=0;i<rows.length;i+=batchSize){
                let batch = rows.slice(i,i+batchSize);
                let inserts = [];
                for(let row of batch){
                    let sku = row.sku || row.SKU || '';
                    if(!sku || !row.product_name || !row.category || !row.price) { errors++; continue; }
                    inserts.push({ vendor_id:companyId, sku:String(sku), product_name:String(row.product_name), category:String(row.category), price:parseFloat(row.price), gst:row.gst||18, stock:row.stock||0, description:row.description||'', image1_url:row.image1_url||'', carat:row.carat?parseFloat(row.carat):null, diamond_color:row.diamond_color||null, diamond_clarity:row.diamond_clarity||null, status:'pending', created_at:new Date() });
                }
                if(inserts.length) {
                    let {error} = await supabase.from('vendor_products').insert(inserts);
                    if(!error) success+=inserts.length; else errors+=inserts.length;
                }
                let percent = 20 + (i+batchSize)/rows.length * 70;
                fill.style.width = Math.min(percent,98)+'%';
                statusDiv.innerText = `Uploaded: ${success} products, errors: ${errors}`;
                await new Promise(r=>setTimeout(r,20));
            }
            fill.style.width='100%';
            statusDiv.innerHTML = `✅ Done: ${success} imported, ${errors} skipped`;
            await loadAllProductsData();
            showToast(`${success} products uploaded`);
        };
        window.downloadSample = ()=>{
            let sample = [{sku:"RING-999", product_name:"Deep Blue Diamond", category:"Rings", price:34999, gst:18, stock:5, description:"Sapphire touch", carat:1.2, diamond_color:"F"}];
            let ws = XLSX.utils.json_to_sheet(sample);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,"Sample");
            XLSX.writeFile(wb,"vendor_sample.xlsx");
        };
    }
    
    function profilePage(){
        renderPage(`
            <div class="page-title">👤 Profile Settings</div>
            <div class="form-card">
                <div class="form-grid">
                    <div><label>Business Name</label><input id="bizName" value="${escapeHtml(vendorData?.business_name||'')}"></div>
                    <div><label>Owner Name</label><input id="ownerName" value="${escapeHtml(vendorData?.owner_name||'')}"></div>
                    <div><label>Phone</label><input id="phone" value="${escapeHtml(vendorData?.phone||'')}"></div>
                    <div><label>GST Number</label><input id="gstNum" value="${escapeHtml(vendorData?.gst_number||'')}"></div>
                    <div><label>Address</label><textarea id="address">${escapeHtml(vendorData?.address||'')}</textarea></div>
                </div>
                <button class="btn-primary" id="updateProfileBtn">Update Profile</button>
            </div>
        `);
        document.getElementById('updateProfileBtn').onclick = async()=>{
            let updates = { business_name:document.getElementById('bizName').value, owner_name:document.getElementById('ownerName').value, phone:document.getElementById('phone').value, gst_number:document.getElementById('gstNum').value, address:document.getElementById('address').value, updated_at:new Date() };
            await supabase.from('vendors').update(updates).eq('id',companyId);
            vendorData = {...vendorData,...updates};
            document.getElementById('headerCompanyName').innerText = vendorData.business_name;
            showToast("Profile saved");
        };
    }
    
    function attachNavEvents(){
        document.querySelectorAll('.nav-item').forEach(nav=>{
            nav.onclick = ()=>{
                document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
                nav.classList.add('active');
                let page = nav.getAttribute('data-page');
                if(page === 'dashboard') loadDashboardUI();
                else if(page === 'products') displayProductsPageList(1);
                else if(page === 'add-product') showAddProductForm();
                else if(page === 'bulk-upload') bulkUploadPage();
                else if(page === 'orders') loadOrders();
                else if(page === 'profile') profilePage();
            };
        });
    }
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    window.logoutVendor = function(){ sessionStorage.clear(); window.location.href='login.html'; };
    loadVendor();
</script>
